<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Eternal Bakery — Idle Cookie Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:      #0d0906;
  --bg-dark:      #1a1108;
  --bg-mid:       #261a0e;
  --bg-panel:     #2e1f10;
  --bg-card:      #3a2714;
  --border:       #5a3a1a;
  --border-glow:  #c8821a;
  --gold:         #f0a830;
  --gold-light:   #ffd060;
  --gold-dim:     #8a6020;
  --amber:        #e07828;
  --cream:        #f5e8c8;
  --cream-dim:    #a08060;
  --text:         #f0d8a8;
  --text-dim:     #907858;
  --green:        #60d890;
  --red:          #e05040;
  --purple:       #c080f0;
  --blue:         #60a8f0;
  --teal:         #40d0c0;
  --season-accent:#f0a830;
  --cookie-size:  160px;
  --panel-w:      340px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg-deep); color:var(--text); font-family:'Crimson Text',Georgia,serif; font-size:16px; }

body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background: radial-gradient(ellipse at 20% 50%, rgba(60,30,10,0.4) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(80,40,5,0.3) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 90%, rgba(100,50,10,0.2) 0%, transparent 40%);
  pointer-events:none;
}

/* Season overlays */
body.season-winter::before { background: radial-gradient(ellipse at 30% 40%, rgba(20,40,80,0.5) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(30,50,100,0.3) 0%, transparent 50%); }
body.season-spring::before { background: radial-gradient(ellipse at 20% 50%, rgba(20,80,40,0.4) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(40,100,20,0.3) 0%, transparent 50%); }
body.season-summer::before { background: radial-gradient(ellipse at 50% 20%, rgba(120,60,5,0.5) 0%, transparent 60%), radial-gradient(ellipse at 80% 70%, rgba(100,50,0,0.3) 0%, transparent 50%); }
body.season-autumn::before { background: radial-gradient(ellipse at 20% 50%, rgba(100,40,10,0.5) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(120,60,5,0.4) 0%, transparent 50%); }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg-dark); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-glow); }

/* ── LAYOUT ── */
#game-wrapper {
  position:relative; z-index:1;
  display:grid;
  grid-template-rows:64px 1fr 48px;
  grid-template-columns:1fr var(--panel-w);
  width:100%; height:100vh; overflow:hidden;
}

/* TOP BAR */
#topbar {
  grid-column:1 / -1;
  display:flex; align-items:center; gap:16px;
  padding:0 20px;
  background:linear-gradient(to right, var(--bg-panel), var(--bg-dark));
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 20px rgba(0,0,0,0.6);
  transition:background 1s;
}
#topbar h1 { font-family:'Cinzel',serif; font-size:1rem; font-weight:900; color:var(--gold); letter-spacing:2px; text-shadow:0 0 20px rgba(240,168,48,0.5); white-space:nowrap; }
.stat-block { display:flex; flex-direction:column; align-items:flex-start; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:6px; padding:4px 12px; min-width:140px; }
.stat-label { font-size:0.6rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.stat-value { font-family:'Cinzel',serif; font-size:0.95rem; color:var(--gold-light); font-weight:600; }
#topbar-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
#season-badge { font-size:0.75rem; padding:4px 10px; border-radius:20px; border:1px solid var(--season-accent); color:var(--season-accent); background:rgba(0,0,0,0.3); font-family:'Cinzel',serif; white-space:nowrap; }

/* CENTER */
#center-panel { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:16px 12px; overflow-y:auto; position:relative; }

/* Cookie */
#cookie-area { display:flex; flex-direction:column; align-items:center; gap:10px; padding:12px; flex-shrink:0; }
#cookie-btn { width:var(--cookie-size); height:var(--cookie-size); cursor:pointer; border:none; background:none; position:relative; transition:transform 0.08s; filter:drop-shadow(0 0 20px rgba(240,168,48,0.3)); user-select:none; -webkit-user-select:none; }
#cookie-btn:active { transform:scale(0.92); }
#cookie-btn svg { width:100%; height:100%; }
#click-cps { font-size:0.82rem; color:var(--cream-dim); text-align:center; }
#click-cps span { color:var(--gold); }

/* Tabs */
#lower-tabs { display:flex; gap:0; margin-top:10px; width:100%; max-width:620px; flex-wrap:wrap; }
.tab-btn { flex:1; padding:7px 4px; background:var(--bg-card); border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.5px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; min-width:60px; }
.tab-btn:first-child { border-radius:6px 0 0 6px; }
.tab-btn:last-child  { border-radius:0 6px 6px 0; }
.tab-btn:hover { background:var(--bg-mid); color:var(--gold); }
.tab-btn.active { background:var(--bg-mid); color:var(--gold); border-color:var(--border-glow); }

#tab-content { width:100%; max-width:620px; margin-top:8px; flex:1; overflow-y:auto; }

/* Upgrades */
#upgrades-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; padding:8px 0; }
.upgrade-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:10px 8px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; gap:4px; position:relative; overflow:hidden; }
.upgrade-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, transparent 60%, rgba(240,168,48,0.05)); pointer-events:none; }
.upgrade-card:hover:not(.bought):not(.locked) { border-color:var(--border-glow); box-shadow:0 0 12px rgba(240,168,48,0.2); transform:translateY(-2px); }
.upgrade-card.bought { opacity:0.4; cursor:default; border-color:var(--bg-mid); }
.upgrade-card.locked { opacity:0.25; cursor:not-allowed; }
.upgrade-icon { font-size:1.5rem; }
.upgrade-name { font-family:'Cinzel',serif; font-size:0.68rem; color:var(--gold); }
.upgrade-desc { font-size:0.7rem; color:var(--text-dim); line-height:1.3; }
.upgrade-cost { font-size:0.72rem; color:var(--amber); font-weight:600; }

/* Achievements */
#achievements-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; padding:8px 0; }
.ach-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:10px 8px; display:flex; flex-direction:column; align-items:center; gap:4px; text-align:center; transition:all 0.2s; }
.ach-card.unlocked { border-color:var(--gold-dim); }
.ach-card.locked { filter:grayscale(1) brightness(0.4); }
.ach-icon { font-size:1.8rem; }
.ach-name { font-family:'Cinzel',serif; font-size:0.62rem; color:var(--gold); }
.ach-desc { font-size:0.65rem; color:var(--text-dim); }

/* Prestige */
#prestige-panel { padding:12px 0; }
.prestige-info { background:linear-gradient(135deg, rgba(192,128,240,0.1), rgba(60,30,80,0.3)); border:1px solid rgba(192,128,240,0.3); border-radius:10px; padding:16px; margin-bottom:12px; }
.prestige-info h3 { font-family:'Cinzel',serif; color:var(--purple); margin-bottom:8px; }
.prestige-info p { font-size:0.85rem; color:var(--text-dim); line-height:1.5; }

/* ── TECH TREE ── */
#tech-panel { padding:8px 0; }
.tech-resource-bar { display:flex; align-items:center; gap:12px; background:rgba(64,208,192,0.08); border:1px solid rgba(64,208,192,0.25); border-radius:8px; padding:10px 14px; margin-bottom:14px; font-size:0.85rem; }
.tech-resource-bar .rp-label { color:var(--teal); font-family:'Cinzel',serif; font-size:0.75rem; }
.tech-resource-bar .rp-val { color:var(--gold); font-family:'Cinzel',serif; font-size:1rem; }
.tech-tree-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.tech-row-label { grid-column:1/-1; font-family:'Cinzel',serif; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; border-bottom:1px solid var(--border); padding-bottom:4px; margin-top:6px; }
.tech-node { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; }
.tech-node:hover:not(.owned):not(.locked-tech) { border-color:var(--teal); box-shadow:0 0 12px rgba(64,208,192,0.25); transform:translateY(-2px); }
.tech-node.owned { border-color:var(--teal); opacity:0.55; cursor:default; }
.tech-node.locked-tech { opacity:0.25; cursor:not-allowed; }
.tech-node-icon { font-size:1.6rem; margin-bottom:4px; }
.tech-node-name { font-family:'Cinzel',serif; font-size:0.62rem; color:var(--teal); margin-bottom:3px; }
.tech-node-desc { font-size:0.65rem; color:var(--text-dim); line-height:1.3; margin-bottom:6px; }
.tech-node-cost { font-size:0.7rem; color:var(--amber); font-weight:600; }

/* ── MINIGAMES ── */
#minigames-panel { padding:8px 0; }
.minigame-card { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; }
.minigame-card h3 { font-family:'Cinzel',serif; font-size:0.85rem; color:var(--gold); margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.minigame-card p { font-size:0.78rem; color:var(--text-dim); margin-bottom:10px; line-height:1.4; }
.minigame-card.locked-mg { opacity:0.35; }
.minigame-card.locked-mg .btn { cursor:not-allowed; opacity:0.5; }

/* Garden minigame */
#garden-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.garden-plot { aspect-ratio:1; background:rgba(20,60,20,0.4); border:1px solid #2a5a1a; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; transition:all 0.2s; font-size:1.3rem; }
.garden-plot:hover { border-color:#60d040; box-shadow:0 0 8px rgba(96,208,64,0.3); }
.garden-plot.empty { opacity:0.5; }
.garden-plot .plot-progress { font-size:0.6rem; color:#60d040; }

/* Market minigame */
#market-graph { height:80px; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:6px; margin-bottom:10px; position:relative; overflow:hidden; }
#market-line { position:absolute; bottom:0; left:0; width:100%; height:100%; }
.market-bet-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; flex-wrap:wrap; }
.market-bet-row input { background:var(--bg-dark); border:1px solid var(--border); color:var(--gold); padding:4px 8px; border-radius:4px; width:120px; font-family:'Crimson Text',serif; }

/* Spell minigame */
#spell-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.spell-card { background:linear-gradient(135deg,rgba(100,40,180,0.2),rgba(60,20,100,0.4)); border:1px solid rgba(192,128,240,0.3); border-radius:8px; padding:12px 8px; text-align:center; cursor:pointer; transition:all 0.2s; }
.spell-card:hover:not(.spell-used) { border-color:var(--purple); box-shadow:0 0 12px rgba(192,128,240,0.3); transform:translateY(-2px); }
.spell-card.spell-used { opacity:0.3; cursor:not-allowed; }
.spell-icon { font-size:1.8rem; margin-bottom:4px; }
.spell-name { font-family:'Cinzel',serif; font-size:0.65rem; color:var(--purple); }
.spell-cost { font-size:0.65rem; color:var(--text-dim); }

/* STORE */
#store-panel { background:linear-gradient(to bottom, var(--bg-panel), var(--bg-dark)); border-left:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
#store-header { padding:12px 16px 8px; font-family:'Cinzel',serif; font-size:0.85rem; color:var(--gold); letter-spacing:2px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2; background:var(--bg-panel); }
.building-row { display:flex; align-items:center; padding:7px 10px; gap:8px; border-bottom:1px solid rgba(90,58,26,0.4); cursor:pointer; transition:all 0.15s; position:relative; }
.building-row:hover { background:rgba(255,200,80,0.06); }
.building-row.affordable:hover { background:rgba(255,200,80,0.1); }
.building-row.unaffordable { opacity:0.5; cursor:not-allowed; }
.building-icon { font-size:1.4rem; flex-shrink:0; }
.building-info { flex:1; min-width:0; }
.building-name { font-family:'Cinzel',serif; font-size:0.73rem; color:var(--cream); }
.building-prod { font-size:0.65rem; color:var(--text-dim); }
.building-right { text-align:right; flex-shrink:0; }
.building-cost { font-family:'Cinzel',serif; font-size:0.73rem; color:var(--gold); }
.building-count { font-family:'Cinzel',serif; font-size:1rem; color:var(--amber); font-weight:700; }

/* BOTTOM BAR */
#bottombar { grid-column:1/-1; display:flex; align-items:center; gap:16px; padding:0 16px; background:var(--bg-panel); border-top:1px solid var(--border); font-size:0.8rem; color:var(--text-dim); }
#save-status { margin-left:auto; font-size:0.72rem; color:var(--text-dim); }

/* BUTTONS */
.btn { padding:5px 12px; border-radius:5px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-family:'Crimson Text',serif; font-size:0.82rem; cursor:pointer; transition:all 0.2s; }
.btn:hover { border-color:var(--border-glow); color:var(--gold); background:var(--bg-mid); }
.btn-gold { background:linear-gradient(135deg, #c87820, #e09030); border-color:var(--gold); color:#1a0e00; font-weight:600; }
.btn-gold:hover { filter:brightness(1.15); }
.btn-danger { border-color:var(--red); color:var(--red); }
.btn-danger:hover { background:rgba(224,80,64,0.15); }
.btn-prestige { background:linear-gradient(135deg, #6030a0, #a060e0); border-color:var(--purple); color:#fff; font-weight:600; }
.btn-prestige:hover { filter:brightness(1.15); }
.btn-teal { background:linear-gradient(135deg, #1a5050, #20a090); border-color:var(--teal); color:#fff; font-weight:600; }
.btn-teal:hover { filter:brightness(1.15); }
.btn-sm { padding:4px 10px; font-size:0.75rem; }

/* FLOATS */
#floats { position:fixed; inset:0; pointer-events:none; z-index:100; }
.float-num { position:absolute; font-family:'Cinzel',serif; font-size:0.9rem; color:var(--gold-light); font-weight:700; text-shadow:0 0 8px rgba(240,200,80,0.8); animation:floatUp 1.2s ease-out forwards; pointer-events:none; white-space:nowrap; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 50%{opacity:1;transform:translateY(-40px) scale(1.1)} 100%{opacity:0;transform:translateY(-80px) scale(0.8)} }

/* GOLDEN COOKIE */
#golden-cookie { position:fixed; z-index:90; cursor:pointer; display:none; animation:goldenPulse 1.5s ease-in-out infinite; filter:drop-shadow(0 0 20px rgba(255,215,0,0.8)) drop-shadow(0 0 40px rgba(255,165,0,0.5)); width:70px; height:70px; }
@keyframes goldenPulse { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.12) rotate(5deg)} }

/* NOTIFICATION */
#notification { position:fixed; bottom:60px; left:50%; transform:translateX(-50%) translateY(80px); background:linear-gradient(135deg, var(--bg-panel), var(--bg-card)); border:1px solid var(--border-glow); border-radius:10px; padding:12px 20px; font-family:'Cinzel',serif; font-size:0.8rem; color:var(--gold); z-index:200; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 4px 30px rgba(0,0,0,0.6),0 0 20px rgba(240,168,48,0.2); max-width:380px; text-align:center; pointer-events:none; }
#notification.show { transform:translateX(-50%) translateY(0); }

/* MODAL */
#modal-overlay { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.75); display:none; align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal-box { background:var(--bg-panel); border:1px solid var(--border-glow); border-radius:12px; padding:24px 28px; max-width:460px; width:92%; box-shadow:0 20px 60px rgba(0,0,0,0.8),0 0 40px rgba(240,168,48,0.1); max-height:85vh; overflow-y:auto; }
#modal-box h2 { font-family:'Cinzel',serif; color:var(--gold); margin-bottom:12px; }
#modal-box p  { color:var(--text-dim); line-height:1.6; margin-bottom:14px; font-size:0.9rem; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

/* SEASON PARTICLES */
.season-particle { position:fixed; pointer-events:none; z-index:5; animation:fall linear forwards; font-size:1rem; }
@keyframes fall { 0%{opacity:1;transform:translateY(-20px) rotate(0)} 100%{opacity:0;transform:translateY(110vh) rotate(360deg)} }

/* Offline */
#offline-msg { background:linear-gradient(135deg, rgba(96,216,144,0.1), rgba(30,80,50,0.3)); border:1px solid rgba(96,216,144,0.3); border-radius:8px; padding:12px 16px; margin-bottom:12px; font-size:0.82rem; color:var(--green); display:none; width:100%; max-width:620px; }

@keyframes cookiePop { 0%{transform:scale(1)} 40%{transform:scale(1.08) rotate(-2deg)} 70%{transform:scale(0.96) rotate(1deg)} 100%{transform:scale(1)} }
#cookie-btn.popping { animation:cookiePop 0.2s ease; }
body.frenzy #cookie-btn { filter:drop-shadow(0 0 30px rgba(255,50,50,0.9)) drop-shadow(0 0 60px rgba(255,100,0,0.6)); }
body.frenzy #topbar { background:linear-gradient(to right, #3a0a05, #1a0802); }

#loading { position:fixed; inset:0; z-index:999; background:var(--bg-deep); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
#loading h2 { font-family:'Cinzel',serif; color:var(--gold); font-size:1.4rem; }
.spinner { width:50px; height:50px; border:3px solid var(--bg-card); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.chip-display { display:inline-flex; align-items:center; gap:6px; background:rgba(192,128,240,0.15); border:1px solid rgba(192,128,240,0.3); border-radius:20px; padding:3px 10px; font-family:'Cinzel',serif; font-size:0.75rem; color:var(--purple); }

@media(max-width:768px) { :root{--panel-w:220px;--cookie-size:110px;} #topbar h1{display:none;} }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><h2>🍪 Firing up the ovens…</h2></div>
<div id="floats"></div>
<div id="golden-cookie" title="Click me!">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="gc-grad" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#ffe080"/><stop offset="60%" stop-color="#f0a020"/><stop offset="100%" stop-color="#c06010"/></radialGradient></defs>
    <circle cx="50" cy="50" r="46" fill="url(#gc-grad)" stroke="#ffe060" stroke-width="2"/>
    <circle cx="35" cy="38" r="5" fill="#c07010" opacity="0.7"/><circle cx="60" cy="32" r="4" fill="#c07010" opacity="0.7"/>
    <circle cx="68" cy="55" r="6" fill="#c07010" opacity="0.7"/><circle cx="42" cy="62" r="4" fill="#c07010" opacity="0.7"/>
    <circle cx="28" cy="60" r="3" fill="#c07010" opacity="0.6"/><circle cx="55" cy="70" r="3" fill="#c07010" opacity="0.6"/>
    <text x="50" y="54" text-anchor="middle" font-size="18" fill="#fff8" font-weight="bold">✦</text>
  </svg>
</div>
<div id="notification"></div>
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">Confirm</h2>
    <div id="modal-body-content"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div id="game-wrapper">
  <div id="topbar">
    <h1>✨ Eternal Bakery</h1>
    <div class="stat-block"><span class="stat-label">Cookies</span><span class="stat-value" id="stat-cookies">0</span></div>
    <div class="stat-block"><span class="stat-label">Per Second</span><span class="stat-value" id="stat-cps">0</span></div>
    <div class="stat-block"><span class="stat-label">All Time</span><span class="stat-value" id="stat-total">0</span></div>
    <span id="season-badge">🌾 Loading…</span>
    <div id="topbar-actions">
      <button class="btn" onclick="manualSave()">💾 Save</button>
      <button class="btn btn-danger" onclick="confirmReset()">⟳ Reset</button>
    </div>
  </div>

  <div id="center-panel">
    <div id="offline-msg"></div>
    <div id="cookie-area">
      <button id="cookie-btn" onclick="clickCookie(event)" title="Click to bake!">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>

function getBuildingMult(idx) {
  let m = 1;
  const T = (id) => hasUpgrade(id);
  if (idx===0){ if(T(5))m*=2; if(T(6))m*=3; if(T(7))m*=5; }
  if (idx===1){ if(T(8))m*=2; if(T(9))m*=3; if(T(10))m*=5; if(T(11))m*=7; }
  if (idx===2){ if(T(12))m*=2; if(T(13))m*=3; if(T(14))m*=5; }
  if (idx===3){ if(T(15))m*=2; if(T(16))m*=3; if(T(17))m*=5; }
  if (idx===4){ if(T(18))m*=2; if(T(19))m*=3; if(T(20))m*=5; }
  if (idx===5){ if(T(24))m*=2; if(T(25))m*=3; }
  if (idx===6){ if(T(26))m*=2; if(T(27))m*=3; }
  if (idx===7){ if(T(28))m*=2; if(T(29))m*=3; }
  // Tech bonuses
  if (hasTech('farm_boost') && idx===2) m*=1.5;
  if (hasTech('mine_boost') && idx===3) m*=1.5;
  if (hasTech('factory_boost') && idx===4) m*=1.5;
  return m;
}

function getGlobalCPSMult() {
  let m = 1;
  if (hasUpgrade(21)) m*=1.5;
  if (hasUpgrade(22)) m*=2;
  if (hasUpgrade(23)) m*=3;
  if (hasUpgrade(30)) m*=5;
  if (hasUpgrade(31)) m*=10;
  if (hasUpgrade(32)) m*=50;
  m *= (1 + G.totalHeavenlyChips * 0.02);
  // Tech bonuses
  if (hasTech('cps_boost_1')) m*=1.25;
  if (hasTech('cps_boost_2')) m*=1.5;
  if (hasTech('cps_boost_3')) m*=2;
  if (hasTech('golden_harmony')) m*=1.1;
  return m;
}

function getEffectiveCPC() {
  let base = G.cookiesPerClick;
  base += G.totalHeavenlyChips * 0.5;
  if (Date.now() < G.superClickEnd) base *= 10;
  if (hasTech('click_boost_1')) base *= 1.5;
  if (hasTech('click_boost_2')) base *= 2;
  base *= getSeasonClickMult();
  return Math.max(1, Math.floor(base));
}

function hasUpgrade(id) { return G.upgrades.includes(id); }

function purchaseUpgrade(id) {
  if (hasUpgrade(id)) return;
  const up = UPGRADES.find(u=>u.id===id);
  if (!up || G.cookies < up.cost) { notify("Not enough cookies! 🍪"); return; }
  G.cookies -= up.cost;
  G.upgrades.push(id);
  if (up.effect) up.effect();
  notify(`✅ Purchased: ${up.name}`);
  renderUpgrades(); renderBuildings();
}

function hasTech(id) { return G.techOwned.includes(id); }

function getRPperSecond() {
  return getTotalBuildings() * 0.1;
}

function canUnlockTech(tech) {
  if (hasTech(tech.id)) return false;
  if (G.researchPoints < tech.cost) return false;
  return tech.requires.every(r=>hasTech(r));
}

function purchaseTech(id) {
  const tech = TECH.find(t=>t.id===id);
  if (!tech) return;
  if (hasTech(id)) { notify("Already researched!"); return; }
  if (!tech.requires.every(r=>hasTech(r))) { notify("🔒 Prerequisites not met!"); return; }
  if (G.researchPoints < tech.cost) { notify("Not enough Research Points!"); return; }
  G.researchPoints -= tech.cost;
  G.totalResearchPoints += tech.cost;
  G.techOwned.push(id);
  // eternal_engine extra handling
  if (id === 'eternal_engine') {
    G.cookiesPerClick *= 2;
  }
  notify(`🔬 Researched: ${tech.name}!`);
  checkAchievements();
  renderTech();
}

/* ── 7B: MARKET (Bank mini-game) ── */
let marketHistory = Array.from({length:30}, ()=>50);
let marketPrice = 50;

function updateMarket(delta) {
  // Random walk
  marketPrice += (Math.random()-0.49)*3;
  marketPrice = Math.max(10, Math.min(90, marketPrice));
  marketHistory.push(marketPrice);
  if (marketHistory.length > 30) marketHistory.shift();
}

function marketBet(direction) {
  const amountEl = document.getElementById('market-bet-amount');
  if (!amountEl) return;
  const betStr = amountEl.value.replace(/,/g,'').trim();
  const bet = parseFloat(betStr);
  if (!bet || bet <= 0) { notify("Enter a valid bet amount!"); return; }
  if (bet > G.cookies) { notify("Not enough cookies!"); return; }
  // Simulate: wait 3 seconds, then reveal
  G.cookies -= bet;
  G.marketInvested = bet;
  G.marketDirection = direction;
  G.marketStartPrice = marketPrice;
  G.marketResolveTime = Date.now() + 3000;
  notify(`📈 Bet placed! Waiting for market… (${direction === 1 ? 'UP' : 'DOWN'})`);
  amountEl.disabled = true;
  setTimeout(()=>resolveMarket(), 3100);
}

function resolveMarket() {
  if (!G.marketInvested) return;
  const startP = G.marketStartPrice;
  const endP = marketPrice;
  const diff = endP - startP;
  const won = (G.marketDirection === 1 && diff > 0) || (G.marketDirection === -1 && diff <= 0);
  if (won) {
    const winnings = G.marketInvested * 1.9;
    G.cookies += winnings;
    G.totalCookiesBaked += winnings - G.marketInvested;
    notify(`📈 Market Win! +${formatNum(winnings)} cookies!`);
  } else {
    notify(`📉 Market Loss! You lost ${formatNum(G.marketInvested)} cookies.`);
  }
  G.marketInvested = 0;
  G.marketResolveTime = 0;
  const amountEl = document.getElementById('market-bet-amount');
  if (amountEl) amountEl.disabled = false;
  renderMiniGames();
}

function drawMarketGraph() {
  const canvas = document.getElementById('market-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0,0,W,H);
  // Line
  ctx.beginPath();
  ctx.strokeStyle = marketHistory[marketHistory.length-1] > marketHistory[0] ? '#60d890' : '#e05040';
  ctx.lineWidth = 2;
  marketHistory.forEach((v,i)=>{
    const x = (i/(marketHistory.length-1))*W;
    const y = H - (v/100)*H;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Current price indicator
  ctx.fillStyle = '#f0a830';
  ctx.font = '11px Cinzel, serif';
  ctx.fillText(`Price: ${marketPrice.toFixed(1)}`, 4, 12);
}

// ============================================================
//  SECTION 10 — NUMBER FORMATTING
//  Exact integers shown with commas up to 999,999
//  Above that: formatted suffix with max precision
// ============================================================
const SUFFIXES = ['','thousand','million','billion','trillion','quadrillion','quintillion','sextillion','septillion','octillion','nonillion','decillion'];

function formatNum(n) {
  if (!isFinite(n)) return '∞';
  if (n < 0) return '-' + formatNum(-n);
  n = Math.floor(n); // always show exact integers
  if (n < 1_000) return n.toLocaleString();
  if (n < 1_000_000) return (n/1_000).toFixed(n < 10_000 ? 2 : n < 100_000 ? 1 : 0) + ' thousand';
  const tier = Math.min(Math.floor(Math.log10(n)/3), SUFFIXES.length-1);
  const scale = Math.pow(10, tier*3);
  const s = n/scale;
  const fixed = s < 10 ? s.toFixed(3) : s < 100 ? s.toFixed(2) : s.toFixed(1);
  return fixed + ' ' + SUFFIXES[tier];
}

// Exact number with commas — for tooltips/cost displays
function formatExact(n) {
  return Math.floor(n).toLocaleString();
}

function formatTime(s) {
  if (s < 60) return Math.floor(s)+'s';
  if (s < 3600) return Math.floor(s/60)+'m '+Math.floor(s%60)+'s';
  if (s < 86400) return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
  return Math.floor(s/86400)+'d';
}

const SAVE_KEY = 'eternal_bakery_v3';

  G.lastSave = Date.now();

    el.textContent = '💾 Saved ✓'; el.style.color = 'var(--green)';

  } catch(e) { document.getElementById('save-status').textContent='⚠ Save failed'; }
  autoSaveCountdown = 30;
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    // Also try old key for migration
    const rawOld = raw || localStorage.getItem('eternal_bakery_v2');
    if (!rawOld) return false;
    Object.assign(G, JSON.parse(rawOld));
    // Ensure new arrays exist
    if (!G.gardenPlots) G.gardenPlots = new Array(9).fill(null);
    if (!G.spellCooldowns) G.spellCooldowns = {};
    if (!G.techOwned) G.techOwned = [];
    return true;
  } catch(e) { return false; }
}

  const btn = document.getElementById('cookie-btn');
  btn.classList.remove('popping'); void btn.offsetWidth; btn.classList.add('popping');
  setTimeout(()=>btn.classList.remove('popping'), 220);
  checkAchievements(); updateTopBar();
}

function spawnFloatingNumber(x, y, text) {
  const el = document.createElement('div');
  el.className = 'float-num'; el.textContent = text;
  el.style.left = (x - 20 + Math.random()*40 - 20)+'px';
  el.style.top  = (y - 10)+'px';
  document.getElementById('floats').appendChild(el);
  setTimeout(()=>el.remove(), 1300);
}

// ============================================================
//  SECTION 14 — BUILDINGS PURCHASE
// ============================================================
function buyBuilding(idx) {
  const cost = getBuildingCost(idx);
  if (G.cookies < cost) return;
  G.cookies -= cost; G.buildings[idx]++;
  checkAchievements(); renderBuildings(); updateTopBar();
}

// ============================================================
//  SECTION 15 — RENDERING
// ============================================================
function renderAll() {
  updateTopBar(); renderBuildings(); renderUpgrades(); renderAchievements();
  renderPrestige(); renderTech(); renderMiniGames(); renderStats(); renderBottomBar();
  applySeasonTheme();
}

function updateTopBar() {
  document.getElementById('stat-cookies').textContent = formatNum(G.cookies);
  document.getElementById('stat-cps').textContent     = formatNum(getTotalCPS())+'/s';
  document.getElementById('stat-total').textContent   = formatNum(G.totalCookiesBaked);
  document.getElementById('cookies-per-click').textContent = formatNum(getEffectiveCPC());
}

function renderBuildings() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  for (let i = 0; i < BUILDINGS.length; i++) {
    const b = BUILDINGS[i];
    const cost = getBuildingCost(i);
    const owned = G.buildings[i];
    const cps = getBuildingCPS(i);
    const affordable = G.cookies >= cost;
    const row = document.createElement('div');
    row.className = 'building-row'+(affordable?' affordable':' unaffordable');
    // Show exact cost in title tooltip
    row.title = `${b.desc}\nCost: ${formatExact(cost)} cookies\nOwned: ${owned} → ${formatNum(cps)}/s total`;
    row.innerHTML = `
      <div class="building-icon">${b.icon}</div>
      <div class="building-info">
        <div class="building-name">${b.name}</div>
        <div class="building-prod">${formatNum(b.baseCPS)}/s base</div>
      </div>
      <div class="building-right">
        <div class="building-cost" title="Exact: ${formatExact(cost)}">${formatNum(cost)}</div>
        <div class="building-count">${owned}</div>
      </div>`;
    if (affordable) row.addEventListener('click', ()=>buyBuilding(i));
    list.appendChild(row);
  }
}

function renderUpgrades() {
  const grid = document.getElementById('upgrades-grid');
  grid.innerHTML = '';
  for (const up of UPGRADES) {
    const bought = hasUpgrade(up.id);
    const unlocked = up.unlock();
    const canAfford = G.cookies >= up.cost;
    const card = document.createElement('div');
    card.className = 'upgrade-card'+(bought?' bought':(!unlocked?' locked':''));
    card.title = unlocked ? `Cost: ${formatExact(up.cost)} cookies` : '🔒 Locked';
    card.innerHTML = `
      <div class="upgrade-icon">${up.icon}</div>
      <div class="upgrade-name">${up.name}</div>
      <div class="upgrade-desc">${up.desc}</div>
      <div class="upgrade-cost">${bought?'✓ Owned':(unlocked?formatNum(up.cost)+' 🍪':'🔒 Locked')}</div>`;
    if (!bought && unlocked) {
      card.style.opacity = canAfford ? '1':'0.65';
      card.addEventListener('click', ()=>purchaseUpgrade(up.id));
    }
    grid.appendChild(card);
  }
}

function renderAchievements() {
  const grid = document.getElementById('achievements-grid');
  grid.innerHTML = '';
  for (const ach of ACHIEVEMENTS) {
    const unlocked = G.achievements.includes(ach.id);
    const card = document.createElement('div');
    card.className = 'ach-card'+(unlocked?' unlocked':' locked');
    card.innerHTML = `<div class="ach-icon">${ach.icon}</div><div class="ach-name">${ach.name}</div><div class="ach-desc">${ach.desc}</div>`;
    grid.appendChild(card);
  }
}

function renderPrestige() {
  const panel = document.getElementById('prestige-panel');
  const pendingChips = Math.max(0, getChipsForBaking(G.totalCookiesBaked)-G.totalHeavenlyChips);
  const chipBonus = (G.totalHeavenlyChips*2).toFixed(0);
  const nextReq = G.totalHeavenlyChips === 0 ? '1 trillion cookies' : formatNum(Math.pow(G.totalHeavenlyChips+1,2)*1e12)+' cookies';
  panel.innerHTML = `
    <div class="prestige-info">
      <h3>✨ Ascension — Prestige Level ${G.prestigeLevel}</h3>
      <p>You have <strong style="color:var(--purple)">${formatNum(G.totalHeavenlyChips)} Heavenly Chip${G.totalHeavenlyChips!==1?'s':''}</strong>, giving +${chipBonus}% CPS permanently.<br><br>
      Ascending resets cookies, buildings, upgrades — but keeps achievements and chips.<br><br>
      Pending chips if you ascend now: <strong style="color:var(--gold)">${formatNum(pendingChips)}</strong><br>
      Next tier requires: ${nextReq}</p>
    </div>
    <button class="btn ${canPrestige()?'btn-prestige':''}" onclick="ascend()" ${canPrestige()?'':'disabled'} style="font-size:1rem;padding:10px 24px;">
      ✨ Ascend ${canPrestige()?`(+${formatNum(pendingChips)} chips)`:'(Not yet ready)'}
    </button>
    <div style="margin-top:16px;color:var(--text-dim);font-size:0.8rem;">
      <strong style="color:var(--gold)">All-time baked:</strong> ${formatNum(G.totalCookiesBaked)} (exact: ${formatExact(G.totalCookiesBaked)})<br>
      <strong style="color:var(--gold)">Total ascensions:</strong> ${G.prestigeLevel}
    </div>`;
}

function renderStats() {
  const panel = document.getElementById('stats-panel');
  const cps = getTotalCPS();
  const season = getCurrentSeason();
  panel.innerHTML = `
    <table style="width:100%;border-collapse:collapse;">
      <tr><td style="color:var(--gold)">Cookies owned</td><td>${formatNum(G.cookies)} <span style="color:var(--text-dim);font-size:0.75rem">(${formatExact(G.cookies)})</span></td></tr>
      <tr><td style="color:var(--gold)">Cookies/second</td><td>${formatNum(cps)}</td></tr>
      <tr><td style="color:var(--gold)">Cookies/click</td><td>${formatNum(getEffectiveCPC())}</td></tr>
      <tr><td style="color:var(--gold)">All-time baked</td><td>${formatNum(G.totalCookiesBaked)}</td></tr>
      <tr><td style="color:var(--gold)">Total clicks</td><td>${G.totalClicks.toLocaleString()}</td></tr>
      <tr><td style="color:var(--gold)">Upgrades</td><td>${G.upgrades.length} / ${UPGRADES.length}</td></tr>
      <tr><td style="color:var(--gold)">Achievements</td><td>${G.achievements.length} / ${ACHIEVEMENTS.length}</td></tr>
      <tr><td style="color:var(--gold)">Golden cookies</td><td>${G.goldenCookiesClicked}</td></tr>
      <tr><td style="color:var(--gold)">Prestige level</td><td>${G.prestigeLevel}</td></tr>
      <tr><td style="color:var(--gold)">Heavenly Chips</td><td>${formatNum(G.totalHeavenlyChips)}</td></tr>
      <tr><td style="color:var(--gold)">Research Points</td><td>${formatNum(G.researchPoints)} (${G.techOwned.length}/${TECH.length} nodes)</td></tr>
      <tr><td style="color:var(--gold)">Current Season</td><td>${season.icon} ${season.name} (CPS ×${season.cpsBonus}, Click ×${season.clickBonus})</td></tr>
      <tr><td style="color:var(--gold)">Garden Harvests</td><td>${G.gardenHarvests||0}</td></tr>
      <tr><td style="color:var(--gold)">Spells Cast</td><td>${G.spellCasts||0}</td></tr>
      <tr><td style="color:var(--gold)">Time to 1M cookies</td><td>${cps>0?formatTime(Math.max(0,1e6-G.cookies)/cps):'N/A'}</td></tr>
      <tr><td style="color:var(--gold)">Time to 1B cookies</td><td>${cps>0?formatTime(Math.max(0,1e9-G.cookies)/cps):'N/A'}</td></tr>
      <tr style="border-top:1px solid var(--border)"><td style="color:var(--gold);padding-top:8px;" colspan="2">Buildings</td></tr>
      ${BUILDINGS.map((b,i)=>`<tr><td style="padding-left:12px">${b.icon} ${b.name}</td><td>${G.buildings[i]} owned — ${formatNum(getBuildingCPS(i))}/s</td></tr>`).join('')}
    </table>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-sm" onclick="exportSave()">📤 Export Save</button>
    </div>`;
}

function renderBottomBar() {
  const chips = G.totalHeavenlyChips;
  document.getElementById('prestige-chips-bar').innerHTML = chips > 0
    ? `<span class="chip-display">✨ ${formatNum(chips)} Chip${chips!==1?'s':''} (+${(chips*2).toFixed(0)}% CPS)</span>` : '';
  const rps = getRPperSecond();
  document.getElementById('rp-bar').innerHTML = rps > 0
    ? `<span style="color:var(--teal);font-size:0.72rem;">🔬 ${formatNum(G.researchPoints)} RP (+${formatNum(rps)}/s)</span>` : '';
}

// ============================================================
//  SECTION 16 — TAB SYSTEM
// ============================================================
let currentTab = 'upgrades';
const TABS = ['upgrades','achievements','prestige','tech','minigames','stats'];

function switchTab(name) {
  currentTab = name;
  TABS.forEach(t=>{ document.getElementById(`tab-${t}`).style.display = t===name?'block':'none'; });
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{ btn.classList.toggle('active', TABS[i]===name); });
  if (name==='prestige') renderPrestige();
  if (name==='stats')    renderStats();
  if (name==='achievements') renderAchievements();
  if (name==='tech')     renderTech();
  if (name==='minigames') renderMiniGames();
}

// ============================================================
//  SECTION 17 — MODAL
// ============================================================
let modalCallback = null;

function openModal(title, body, onConfirm, confirmLabel='Confirm', showCancel=true) {
  document.getElementById('modal-title').textContent = title;
  const bodyEl = document.getElementById('modal-body-content');
  bodyEl.innerHTML = `<p style="white-space:pre-line">${body}</p>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').textContent = confirmLabel;
  document.querySelector('#modal-overlay .modal-actions .btn:first-child').style.display = showCancel?'':'none';
  modalCallback = onConfirm;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCallback = null;
}

document.getElementById('modal-confirm').addEventListener('click',()=>{ if(modalCallback) modalCallback(); closeModal(); });
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });

// ============================================================
//  SECTION 18 — NOTIFICATIONS
// ============================================================
let notifTimer = null;
function notify(msg, dur=2500) {
  const el = document.getElementById('notification');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(()=>el.classList.remove('show'), dur);
}

// ============================================================
//  SECTION 19 — GAME LOOP
// ============================================================
let lastTick = Date.now();
let frameCounter = 0;
let marketTickAcc = 0;
let gardenRedrawAcc = 0;

function gameLoop() {
  const now = Date.now();
  const delta = Math.min((now-lastTick)/1000, 0.5); // cap delta to avoid runaway
  lastTick = now;
  frameCounter++;

  // CPS
  const cps = getTotalCPS();
  if (cps > 0) { G.cookies += cps*delta; G.totalCookiesBaked += cps*delta; }

  // Research Points
  const rps = getRPperSecond();
  if (rps > 0) G.researchPoints += rps*delta;

  // Market price update
  marketTickAcc += delta;
  if (marketTickAcc >= 1) { updateMarket(delta); marketTickAcc=0; }

  // Autosave countdown
  autoSaveCountdown -= delta;
  if (autoSaveCountdown <= 0) {
    saveGame();
  } else {
    const el = document.getElementById('save-status');
    if (!saveFlashTimer) { el.textContent=`Autosave in ${Math.ceil(autoSaveCountdown)}s`; el.style.color=''; }
  }

  // Per-second checks
  if (frameCounter % 60 === 0) {
    checkAchievements();
    renderBuildings();
    renderUpgrades();
    renderBottomBar();
    if (currentTab==='stats')     renderStats();
    if (currentTab==='prestige')  renderPrestige();
    if (currentTab==='tech')      renderTech();
    if (currentTab==='minigames') { renderMiniGames(); }
  }

  // Garden growing progress (lighter redraw every 3s)
  gardenRedrawAcc += delta;
  if (gardenRedrawAcc >= 3 && currentTab==='minigames') {
    gardenRedrawAcc=0;
    renderMiniGames();
  }

  updateTopBar();
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  SECTION 20 — INIT
// ============================================================
window.addEventListener('load', ()=>{
  const hasSave = loadGame();
  if (hasSave) processOfflineProgress();

  // Ensure arrays initialised
  if (!G.gardenPlots || G.gardenPlots.length!==9) G.gardenPlots = new Array(9).fill(null);
  if (!G.spellCooldowns) G.spellCooldowns={};
  if (!G.techOwned) G.techOwned=[];

  renderAll();
  applySeasonTheme();
  startSeasonParticles();
  requestAnimationFrame(gameLoop);
  setInterval(saveGame, 30000);
  scheduleGoldenCookie();

  setTimeout(()=>{
    const loading = document.getElementById('loading');
    loading.style.opacity='0'; loading.style.transition='opacity 0.5s';
    setTimeout(()=>loading.remove(), 500);
  }, 700);

  setTimeout(()=>{
    const season = getCurrentSeason();
    if (!hasSave) {
      notify(`🍪 Welcome to Eternal Bakery! ${season.icon} It's ${season.name} season!`, 4000);
    } else {
      notify(`🍪 Welcome back! ${season.icon} ${season.name} season bonus active!`, 2500);
    }
  }, 900);
});

window.addEventListener('beforeunload', saveGame);
