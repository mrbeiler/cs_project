<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Dynasty 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rye&family=Cabin:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a0a00;overflow:hidden;font-family:'Cabin',sans-serif;color:#fff}
  #canvas-container{position:fixed;inset:0}
  canvas{display:block}

  #hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
  #top-bar{background:linear-gradient(180deg,rgba(0,0,0,.85)0%,transparent 100%);padding:12px 20px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  #title{font-family:'Rye',serif;font-size:1.4em;color:#f5c542;text-shadow:0 0 20px rgba(245,197,66,.5)}
  .stat{background:rgba(0,0,0,.5);border:1px solid rgba(245,197,66,.3);padding:5px 12px;border-radius:20px;font-size:.82em;color:#f5c542}
  .stat span{color:#fff;font-weight:700}

  #controls-panel{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.95)0%,transparent 100%);padding:14px 20px 18px;pointer-events:auto;z-index:10}
  #controls-inner{display:flex;gap:10px;align-items:center;flex-wrap:wrap;max-width:1400px;margin:0 auto}

  .btn{padding:8px 14px;border:2px solid;border-radius:8px;cursor:pointer;font-family:'Cabin',sans-serif;font-weight:700;font-size:.8em;transition:all .15s;letter-spacing:.4px;text-transform:uppercase}
  .btn-gold{background:rgba(245,197,66,.15);border-color:#f5c542;color:#f5c542}
  .btn-gold:hover{background:#f5c542;color:#000}
  .btn-green{background:rgba(76,175,80,.15);border-color:#4caf50;color:#4caf50}
  .btn-green:hover{background:#4caf50;color:#000}
  .btn-blue{background:rgba(33,150,243,.15);border-color:#2196f3;color:#2196f3}
  .btn-blue:hover{background:#2196f3;color:#000}
  .btn-red{background:rgba(244,67,54,.15);border-color:#f44336;color:#f44336}
  .btn-red:hover{background:#f44336;color:#fff}
  .btn-lime{background:rgba(139,195,74,.15);border-color:#8bc34a;color:#8bc34a}
  .btn-lime:hover{background:#8bc34a;color:#000}
  .btn-purple{background:rgba(156,39,176,.15);border-color:#9c27b0;color:#ce93d8}
  .btn-purple:hover{background:#9c27b0;color:#fff}

  .sep{width:1px;height:36px;background:rgba(255,255,255,.15);flex-shrink:0}

  select{background:#111;border:2px solid rgba(245,197,66,.4);color:#f5c542;padding:7px 12px;border-radius:8px;font-family:'Cabin',sans-serif;font-size:.8em;cursor:pointer}
  select:focus{outline:none;border-color:#f5c542}

  #tractor-panel{position:fixed;right:0;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.92);border-left:2px solid rgba(245,197,66,.3);padding:14px;width:220px;z-index:10;pointer-events:auto;max-height:80vh;overflow-y:auto}
  #tractor-panel h3{font-family:'Rye',serif;color:#f5c542;font-size:.9em;margin-bottom:10px;text-align:center}
  .tractor-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px;margin-bottom:7px;cursor:pointer;transition:all .2s}
  .tractor-card:hover{background:rgba(245,197,66,.1);border-color:rgba(245,197,66,.4)}
  .tractor-card.active{background:rgba(245,197,66,.2);border-color:#f5c542}
  .tractor-card.locked{opacity:.4;cursor:not-allowed}
  .tractor-name{font-weight:700;color:#f5c542;font-size:.8em}
  .tractor-info{font-size:.7em;color:#aaa;margin-top:2px}
  .tractor-scale{font-size:.68em;color:#88aaff;margin-top:2px}
  .tractor-price{font-size:.73em;color:#4caf50;margin-top:3px;font-weight:700}

  #msg{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);border:2px solid #f5c542;padding:10px 24px;border-radius:25px;font-weight:700;color:#f5c542;z-index:100;pointer-events:none;opacity:0;transition:opacity .3s;font-size:.88em;white-space:nowrap}

  #key-guide{position:fixed;left:14px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;z-index:10;font-size:.7em;line-height:1.9;pointer-events:none}
  #key-guide b{color:#f5c542}

  #minimap{position:fixed;right:235px;bottom:105px;width:120px;height:120px;border:2px solid rgba(245,197,66,.5);border-radius:8px;overflow:hidden;z-index:10}

  #attachment-hud{position:fixed;left:50%;transform:translateX(-50%);bottom:108px;display:flex;gap:7px;z-index:10;pointer-events:none}
  .att-pill{padding:5px 13px;border-radius:20px;font-size:.75em;font-weight:700;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.6);color:rgba(255,255,255,.35);transition:all .2s}
  .att-pill.on{border-color:#f5c542;color:#f5c542;background:rgba(245,197,66,.18)}
</style>
</head>
<body>
<div id="canvas-container"><canvas id="c"></canvas></div>

<div id="hud">
  <div id="top-bar">
    <div id="title">🚜 Farm Dynasty 3D</div>
    <div class="stat">💰 $<span id="h-money">1500</span></div>
    <div class="stat">📅 Day <span id="h-day">1</span> · <span id="h-season">🌸 Spring</span></div>
    <div class="stat">⛽ <span id="h-fuel">100</span>%</div>
    <div class="stat">🌾<span id="h-wheat">0</span> 🌽<span id="h-corn">0</span> 🥔<span id="h-pot">0</span></div>
    <div class="stat">🗺️ <span id="h-plots">0</span>/100</div>
  </div>
</div>

<div id="attachment-hud">
  <div class="att-pill" id="ap-free">🚜 Free</div>
  <div class="att-pill" id="ap-plow">🔧 Plow</div>
  <div class="att-pill" id="ap-planter">🌱 Planter</div>
  <div class="att-pill" id="ap-water">💧 Sprayer</div>
  <div class="att-pill" id="ap-harvest">🌾 Harvester</div>
</div>

<div id="controls-panel">
  <div id="controls-inner">
    <div style="color:#888;font-size:.7em;line-height:1.5">WASD<br>to drive</div>
    <div class="sep"></div>
    <button class="btn btn-gold"  onclick="G.attachPlow()">🔧 Plow [1]</button>
    <button class="btn btn-lime"  onclick="G.attachPlanter()">🌱 Planter [2]</button>
    <button class="btn btn-blue"  onclick="G.attachWater()">💧 Sprayer [3]</button>
    <button class="btn btn-green" onclick="G.attachHarvest()">🌾 Harvester [4]</button>
    <button class="btn btn-red"   onclick="G.detach()">❌ Detach</button>
    <div class="sep"></div>
    <select id="crop-sel">
      <option value="wheat">🌾 Wheat (1d·$10·$30)</option>
      <option value="corn">🌽 Corn (2d·$15·$50)</option>
      <option value="potatoes">🥔 Potatoes (2d·$20·$75)</option>
    </select>
    <div class="sep"></div>
    <button class="btn btn-green"  onclick="G.nextDay()">⏭️ Next Day</button>
    <button class="btn btn-gold"   onclick="G.sellCrops()">💰 Sell<span id="sell-preview"></span></button>
    <button class="btn btn-blue"   onclick="G.refuel()">⛽ Refuel $10</button>
    <button class="btn btn-purple" onclick="G.buyLand()">🏞️ Land $3k</button>
    <div class="sep"></div>
    <button class="btn btn-gold" onclick="G.saveGame()" style="font-size:.72em">💾 Save</button>
    <button class="btn btn-red"  onclick="G.resetGame()" style="font-size:.72em">🗑️ Reset</button>
    <div style="color:#555;font-size:.65em;line-height:1.3" id="save-info"></div>
  </div>
</div>

<div id="tractor-panel">
  <h3>🚜 Tractors</h3>
  <div id="tractor-list"></div>
</div>

<div id="key-guide">
  <b>W/↑</b> Forward<br>
  <b>S/↓</b> Reverse<br>
  <b>A/←</b> Turn Left<br>
  <b>D/→</b> Turn Right<br>
  <b>Space</b> Action<br>
  <b>C</b> Camera<br>
  <b>1</b> Plow<br>
  <b>2</b> Planter<br>
  <b>3</b> Sprayer<br>
  <b>4</b> Harvester
</div>

<div id="minimap"><canvas id="mm" width="120" height="120"></canvas></div>
<div id="msg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
var GRID_W = 10, GRID_H = 10, CELL = 4;
var gridOffX = -(GRID_W * CELL) / 2 + CELL / 2;
var gridOffZ = -(GRID_H * CELL) / 2 + CELL / 2;

// Each tractor def has:
//   scale  — uniform 3D scale of the whole tractor model (1.0 = base size)
//   plowW  — width of the plow blade in world units
//   tines  — number of plow tines
var G = {
  money: 1500, day: 1, fuel: 100, season: 0,
  seasons: ['🌸 Spring','☀️ Summer','🍂 Fall','❄️ Winter'],
  crops: { wheat: 0, corn: 0, potatoes: 0 },
  cropTypes: {
    wheat:    { icon:'🌾', growTime:1, buyPrice:10,  sellPrice:30,  color:0xf0c040 },
    corn:     { icon:'🌽', growTime:2, buyPrice:15,  sellPrice:50,  color:0xf0a020 },
    potatoes: { icon:'🥔', growTime:2, buyPrice:20,  sellPrice:75,  color:0xa06030 }
  },
  attachment: null,
  tractorIdx: 0,
  tractorDefs: [
    { name:'Basic Tractor',       price:0,     speed:6,   eff:1,   fuel:2, color:0xe05020, owned:true,  scale:1.0, plowW:2.5,  tines:3  },
    { name:'Farm Master 2000',    price:3000,  speed:9,   eff:1.5, fuel:2, color:0x2060e0, owned:false, scale:1.35,plowW:4.5,  tines:4  },
    { name:'Crop King Pro',       price:7000,  speed:12,  eff:2,   fuel:1, color:0x20b040, owned:false, scale:1.7, plowW:7.0,  tines:6  },
    { name:'Harvest Giant X',     price:10000, speed:15,  eff:3,   fuel:1, color:0xe0a020, owned:false, scale:2.1, plowW:10.0, tines:8  },
    { name:'Quantum Harvester',   price:15000, speed:20,  eff:6,   fuel:0, color:0xe020e0, owned:false, scale:2.6, plowW:13.5, tines:11 },
    { name:'Episty Plower 67000', price:50000, speed:100, eff:10,  fuel:0, color:0xe06ca0, owned:false, scale:3.4, plowW:18.0, tines:15 }
  ],
  fields: []
};

// ═══════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 160);

var camera = new THREE.PerspectiveCamera(65, 1, 0.1, 500);
var camMode = 0;

// Lighting
var sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
sun.position.set(30, 50, 30);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 200;
sun.shadow.camera.left = -80; sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80; sun.shadow.camera.bottom = -80;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6090c0, 0.6));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a3a10, 0.4));

// Ground
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300, 300),
  new THREE.MeshLambertMaterial({ color: 0x5a8a2a })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Fence posts
for (var fi = 0; fi < 20; fi++) {
  var postMesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 1.5, 0.2),
    new THREE.MeshLambertMaterial({ color: 0x8B6914 })
  );
  postMesh.position.set(-21 + fi * 2.2, 0.75, -21);
  postMesh.castShadow = true;
  scene.add(postMesh);
  var postMesh2 = postMesh.clone();
  postMesh2.position.z = 21;
  scene.add(postMesh2);
}

// Dirt road
var road = new THREE.Mesh(
  new THREE.PlaneGeometry(2.5, 50),
  new THREE.MeshLambertMaterial({ color: 0x8B6914 })
);
road.rotation.x = -Math.PI / 2;
road.position.set(-8, 0.01, 0);
scene.add(road);

// ═══════════════════════════════════════════════════════
//  FIELD GRID
// ═══════════════════════════════════════════════════════
for (var row = 0; row < GRID_H; row++) {
  for (var col = 0; col < GRID_W; col++) {
    var idx = row * GRID_W + col;
    var fmesh = new THREE.Mesh(
      new THREE.BoxGeometry(CELL - 0.15, 0.18, CELL - 0.15),
      new THREE.MeshLambertMaterial({ color: 0x8B6914 })
    );
    fmesh.position.set(gridOffX + col * CELL, 0.09, gridOffZ + row * CELL);
    fmesh.receiveShadow = true;
    scene.add(fmesh);
    G.fields[idx] = {
      status: 'empty', crop: null, plantDay: 0, watered: false,
      mesh: fmesh, cropMesh: null,
      wx: gridOffX + col * CELL, wz: gridOffZ + row * CELL
    };
  }
}

function updateFieldMesh(f) {
  var colorMap = { empty: 0x8B6914, plowed: 0x4a2808, planted: 0x3a7a18, ready: 0xd4a017 };
  f.mesh.material.color.setHex(colorMap[f.status]);
  if (f.cropMesh) { scene.remove(f.cropMesh); f.cropMesh = null; }
  if (f.status === 'planted' || f.status === 'ready') {
    var rdy = f.status === 'ready';
    var geo, col;
    if (f.crop === 'wheat')     { geo = new THREE.CylinderGeometry(0.05,0.08,0.8,5); col = rdy ? 0xf0c040 : 0x70b020; }
    else if (f.crop === 'corn') { geo = new THREE.CylinderGeometry(0.10,0.15,1.2,6); col = rdy ? 0xf0a020 : 0x40a020; }
    else                        { geo = new THREE.SphereGeometry(0.35,6,5);            col = rdy ? 0xa06030 : 0x306010; }
    var cm = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: col }));
    var yOff = f.crop === 'wheat' ? 0.4 : f.crop === 'corn' ? 0.6 : 0.35;
    cm.position.set(f.wx, yOff, f.wz);
    cm.castShadow = true;
    scene.add(cm);
    f.cropMesh = cm;
  }
}

// ═══════════════════════════════════════════════════════
//  SCENERY
// ═══════════════════════════════════════════════════════
var treePositions = [[-25,-25],[-22,-25],[-25,-22],[-25,22],[-25,25],[-22,25],[25,-25],[22,-25],[25,-22],[25,22],[25,25],[22,25],[-25,0],[25,0],[0,-25],[0,25],[-20,-20],[20,-20],[-20,20],[20,20]];
treePositions.forEach(function(p) {
  var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,2.5,8), new THREE.MeshLambertMaterial({color:0x6B3A2A}));
  trunk.position.set(p[0],1.25,p[1]); trunk.castShadow=true; scene.add(trunk);
  var leaves = new THREE.Mesh(new THREE.SphereGeometry(1.4+Math.random()*0.5,7,6), new THREE.MeshLambertMaterial({color:0x2d7a1f}));
  leaves.position.set(p[0],3.2+Math.random()*0.5,p[1]); leaves.castShadow=true; scene.add(leaves);
});

// Barn
var barnBase = new THREE.Mesh(new THREE.BoxGeometry(6,4,8), new THREE.MeshLambertMaterial({color:0xcc3300}));
barnBase.position.set(-18,2,-18); barnBase.castShadow=true; scene.add(barnBase);
var barnRoof = new THREE.Mesh(new THREE.CylinderGeometry(0,4.5,3,4,1), new THREE.MeshLambertMaterial({color:0x883300}));
barnRoof.rotation.y=Math.PI/4; barnRoof.position.set(-18,5.5,-18); barnRoof.castShadow=true; scene.add(barnRoof);
var barnDoor = new THREE.Mesh(new THREE.BoxGeometry(1.5,2.5,0.1), new THREE.MeshLambertMaterial({color:0x5a2010}));
barnDoor.position.set(-18,1.25,-22.1); scene.add(barnDoor);

// Silo
var siloBody = new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,8,12), new THREE.MeshLambertMaterial({color:0xc0c0a0}));
siloBody.position.set(-22,4,-12); siloBody.castShadow=true; scene.add(siloBody);
var siloTop = new THREE.Mesh(new THREE.CylinderGeometry(0,1.7,2,12), new THREE.MeshLambertMaterial({color:0x808060}));
siloTop.position.set(-22,9,-12); siloTop.castShadow=true; scene.add(siloTop);

// ═══════════════════════════════════════════════════════
//  TRACTOR  (built to a fixed "base" size, then scaled via tractorGroup.scale)
// ═══════════════════════════════════════════════════════
var tractorGroup = null;
var attachGroup  = null;

function buildTractor(def) {
  if (tractorGroup) scene.remove(tractorGroup);
  tractorGroup = new THREE.Group();
  var c = def.color;

  // ── Body ──────────────────────────────────────────────
  var body = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 1.1, 2.8),
    new THREE.MeshLambertMaterial({color: c})
  );
  body.position.y = 1.1; body.castShadow = true; tractorGroup.add(body);

  // ── Cab ───────────────────────────────────────────────
  var cab = new THREE.Mesh(
    new THREE.BoxGeometry(1.3, 1.0, 1.4),
    new THREE.MeshLambertMaterial({color: c})
  );
  cab.position.set(0, 2.1, 0.2); cab.castShadow = true; tractorGroup.add(cab);

  // ── Windshields ───────────────────────────────────────
  var windMat = new THREE.MeshLambertMaterial({color:0x88ccff, transparent:true, opacity:0.6});
  var windF = new THREE.Mesh(new THREE.BoxGeometry(1.25,0.85,0.05), windMat);
  windF.position.set(0, 2.1, -0.5); tractorGroup.add(windF);
  var windR = windF.clone(); windR.position.z = 0.9; tractorGroup.add(windR);

  // ── Exhaust pipe ──────────────────────────────────────
  var pipe = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08,0.08,1.0,8),
    new THREE.MeshLambertMaterial({color:0x333333})
  );
  pipe.position.set(0.5, 2.4, -0.8); tractorGroup.add(pipe);

  // ── Wheels ────────────────────────────────────────────
  var wGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.38, 16);
  var wMat = new THREE.MeshLambertMaterial({color:0x222222});
  var hGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.42, 10);
  var hMat = new THREE.MeshLambertMaterial({color:0xaaaaaa});
  [[-1.1,0.55,-0.8],[1.1,0.55,-0.8],[-1.1,0.55,0.9],[1.1,0.55,0.9]].forEach(function(wp) {
    var w = new THREE.Mesh(wGeo, wMat);
    w.rotation.z = Math.PI/2; w.position.set(wp[0],wp[1],wp[2]); w.castShadow=true;
    tractorGroup.add(w);
    var h = new THREE.Mesh(hGeo, hMat);
    h.rotation.z = Math.PI/2; h.position.set(wp[0],wp[1],wp[2]);
    tractorGroup.add(h);
  });

  // ── Headlights ────────────────────────────────────────
  [-0.6, 0.6].forEach(function(x) {
    var hl = new THREE.Mesh(
      new THREE.BoxGeometry(0.25,0.18,0.08),
      new THREE.MeshLambertMaterial({color:0xffffaa, emissive:0xffff88, emissiveIntensity:0.5})
    );
    hl.position.set(x, 1.3, -1.45); tractorGroup.add(hl);
  });

  // ── Apply scale ── THIS is what makes each tractor bigger ──
  tractorGroup.scale.setScalar(def.scale);
  tractorGroup.position.set(0, 0, 0);
  scene.add(tractorGroup);
}

// ═══════════════════════════════════════════════════════
//  ATTACHMENTS  (plow width + tine count driven by tractorDef)
// ═══════════════════════════════════════════════════════
function buildAttachment(type) {
  if (attachGroup) { scene.remove(attachGroup); attachGroup = null; }
  if (!type) return;

  attachGroup = new THREE.Group();
  var def = G.tractorDefs[G.tractorIdx];
  var sc  = def.scale;   // used to size non-plow attachments consistently

  // ── PLOW ──────────────────────────────────────────────
  if (type === 'plow') {
    var pw = def.plowW;    // blade width grows with tractor tier
    var nt = def.tines;    // tine count grows too
    var bh = 0.45 + sc * 0.12;   // blade height scales slightly
    var bd = 0.18 + sc * 0.04;   // blade depth scales slightly

    // Main blade
    var blade = new THREE.Mesh(
      new THREE.BoxGeometry(pw, bh, bd),
      new THREE.MeshLambertMaterial({color:0xd0d0d0})
    );
    blade.position.set(0, bh/2 + 0.05, 0);
    attachGroup.add(blade);

    // Curved top edge strip (darker chrome)
    var topStrip = new THREE.Mesh(
      new THREE.BoxGeometry(pw, 0.08, bd * 0.6),
      new THREE.MeshLambertMaterial({color:0x888888})
    );
    topStrip.position.set(0, bh + 0.05, -bd * 0.2);
    attachGroup.add(topStrip);

    // Tines — spread evenly across blade width
    var tineSpacing = pw / (nt - 1);
    for (var ti = 0; ti < nt; ti++) {
      var tx = -pw/2 + ti * tineSpacing;
      var tineH = 0.5 + sc * 0.1;
      var tine = new THREE.Mesh(
        new THREE.BoxGeometry(0.1 + sc*0.015, tineH, 0.65 + sc*0.08),
        new THREE.MeshLambertMaterial({color:0x777777})
      );
      tine.position.set(tx, -(tineH/2), 0.32 + sc*0.04);
      attachGroup.add(tine);

      // Pointed shoe tip on each tine
      var shoe = new THREE.Mesh(
        new THREE.BoxGeometry(0.12 + sc*0.015, 0.18, 0.22),
        new THREE.MeshLambertMaterial({color:0xaaaaaa})
      );
      shoe.position.set(tx, -(tineH), 0.52 + sc*0.04);
      attachGroup.add(shoe);
    }

    // Side end-plates
    [-pw/2 - 0.05, pw/2 + 0.05].forEach(function(ex) {
      var ep = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, bh + 0.12, bd * 1.2),
        new THREE.MeshLambertMaterial({color:0x999999})
      );
      ep.position.set(ex, bh/2, 0);
      attachGroup.add(ep);
    });

    // Wing extensions on tier 3+ (wider than 6 units)
    if (pw >= 7.0) {
      [-1, 1].forEach(function(side) {
        var wx2 = side * (pw/2 - 0.8);
        var wing = new THREE.Mesh(
          new THREE.BoxGeometry(1.4, bh * 0.85, bd * 0.9),
          new THREE.MeshLambertMaterial({color:0xbbbbbb})
        );
        wing.position.set(wx2, bh/2 + 0.05, bd * 0.35);
        wing.rotation.y = side * 0.18; // slight angle
        attachGroup.add(wing);
      });
    }

    // Central hitch arm
    var arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.14, 0.14, 1.1 + sc * 0.2),
      new THREE.MeshLambertMaterial({color:0x333333})
    );
    arm.position.set(0, 0.3, -(0.55 + sc * 0.1));
    attachGroup.add(arm);

    // Hydraulic ram (cosmetic)
    var ram = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, 0.9 + sc * 0.15, 8),
      new THREE.MeshLambertMaterial({color:0x555599})
    );
    ram.rotation.x = Math.PI / 2;
    ram.position.set(0.35, 0.5, -(0.3 + sc * 0.05));
    attachGroup.add(ram);

    // Position behind tractor, offset by scale
    attachGroup.position.set(0, 0, 1.7 * sc);
  }

  // ── PLANTER ───────────────────────────────────────────
  if (type === 'planter') {
    var hopW = 2.8 * sc;
    var hopper = new THREE.Mesh(
      new THREE.BoxGeometry(hopW, 1.0 * sc, 0.9 * sc),
      new THREE.MeshLambertMaterial({color:0x228B22})
    );
    hopper.position.set(0, 1.1 * sc, 0); attachGroup.add(hopper);

    var lid = new THREE.Mesh(
      new THREE.BoxGeometry(hopW, 0.15 * sc, 0.9 * sc),
      new THREE.MeshLambertMaterial({color:0x1a6b1a})
    );
    lid.position.set(0, 1.65 * sc, 0); lid.rotation.x = 0.18; attachGroup.add(lid);

    var selectedCrop = document.getElementById('crop-sel').value;
    var cropCol = G.cropTypes[selectedCrop].color;
    var stripe = new THREE.Mesh(
      new THREE.BoxGeometry(hopW + 0.05, 0.22 * sc, (0.92 * sc)),
      new THREE.MeshLambertMaterial({color:cropCol, emissive:cropCol, emissiveIntensity:0.35})
    );
    stripe.position.set(0, 1.1 * sc, 0); attachGroup.add(stripe);

    var pArm = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.12, 1.4 * sc),
      new THREE.MeshLambertMaterial({color:0x333333})
    );
    pArm.position.set(0, 0.4 * sc, -0.7 * sc); attachGroup.add(pArm);

    var beam = new THREE.Mesh(
      new THREE.BoxGeometry(hopW * 1.15, 0.12, 0.12),
      new THREE.MeshLambertMaterial({color:0x555555})
    );
    beam.position.set(0, 0.35 * sc, 0.5 * sc); attachGroup.add(beam);

    var tubeXs = [-1.2,-0.6,0,0.6,1.2];
    tubeXs.forEach(function(x) {
      var tube = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07,0.04,0.6*sc,8),
        new THREE.MeshLambertMaterial({color:0x1a5c1a})
      );
      tube.position.set(x * sc, 0.05*sc, 0.5*sc); attachGroup.add(tube);
      var shoe2 = new THREE.Mesh(
        new THREE.BoxGeometry(0.1,0.22*sc,0.35*sc),
        new THREE.MeshLambertMaterial({color:0x999999})
      );
      shoe2.position.set(x * sc, -0.22*sc, 0.55*sc); attachGroup.add(shoe2);
    });

    [-1.5,1.5].forEach(function(x) {
      var gw = new THREE.Mesh(
        new THREE.CylinderGeometry(0.28*sc,0.28*sc,0.15*sc,12),
        new THREE.MeshLambertMaterial({color:0x222222})
      );
      gw.rotation.z = Math.PI/2; gw.position.set(x*sc, 0.28*sc, 0.45*sc); attachGroup.add(gw);
    });

    attachGroup.position.set(0, 0, 1.9 * sc);
  }

  // ── WATER SPRAYER ─────────────────────────────────────
  if (type === 'water') {
    var tank = new THREE.Mesh(
      new THREE.CylinderGeometry(0.5*sc,0.5*sc,1.8*sc,12),
      new THREE.MeshLambertMaterial({color:0x2080ff})
    );
    tank.rotation.z = Math.PI/2; tank.position.set(0, 1.2*sc, 0); attachGroup.add(tank);

    var barW = 3.2 * sc;
    var bar = new THREE.Mesh(
      new THREE.BoxGeometry(barW, 0.08, 0.08),
      new THREE.MeshLambertMaterial({color:0x444444})
    );
    bar.position.set(0, 0.5*sc, 0.6*sc); attachGroup.add(bar);

    var nozzleCount = Math.round(5 * sc);
    for (var ni = 0; ni <= nozzleCount; ni++) {
      var nx2 = -barW/2 + (barW / nozzleCount) * ni;
      var nozzle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05,0.05,0.2*sc,6),
        new THREE.MeshLambertMaterial({color:0x333333})
      );
      nozzle.position.set(nx2, 0.3*sc, 0.6*sc); attachGroup.add(nozzle);
    }
    attachGroup.position.set(0, 0, 1.8 * sc);
  }

  // ── HARVESTER ─────────────────────────────────────────
  if (type === 'harvest') {
    var header = new THREE.Mesh(
      new THREE.BoxGeometry(3.6*sc, 0.6*sc, 0.8*sc),
      new THREE.MeshLambertMaterial({color:0xd4a017})
    );
    header.position.set(0, 0.3*sc, 0); attachGroup.add(header);

    for (var si = 0; si < 6; si++) {
      var spoke = new THREE.Mesh(
        new THREE.BoxGeometry(0.08,1.2*sc,0.08),
        new THREE.MeshLambertMaterial({color:0x888800})
      );
      spoke.rotation.z = (si/6)*Math.PI*2; spoke.position.set(0, 0.3*sc, 0.1); attachGroup.add(spoke);
    }

    for (var tx3 = -1.6*sc; tx3 <= 1.7*sc; tx3 += 0.22*sc) {
      var tooth = new THREE.Mesh(
        new THREE.BoxGeometry(0.12,0.25*sc,0.18),
        new THREE.MeshLambertMaterial({color:0xcccccc})
      );
      tooth.position.set(tx3, -0.1*sc, 0.4*sc); attachGroup.add(tooth);
    }
    attachGroup.position.set(0, 0, -2.0 * sc);
  }

  scene.add(attachGroup);
}

function syncAttachment() {
  if (!attachGroup || !tractorGroup) return;
  var sc = G.tractorDefs[G.tractorIdx].scale;
  attachGroup.position.copy(tractorGroup.position);
  var offset = new THREE.Vector3();
  if (G.attachment === 'plow' || G.attachment === 'water' || G.attachment === 'planter') {
    offset.set(0, 0, 1.8 * sc);
  } else if (G.attachment === 'harvest') {
    offset.set(0, 0, -2.1 * sc);
  }
  offset.applyEuler(tractorGroup.rotation);
  attachGroup.position.add(offset);
  attachGroup.rotation.y = tractorGroup.rotation.y;
  attachGroup.position.y = 0;
}

var keys = {};
document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'KeyC')   { camMode = (camMode + 1) % 3; e.preventDefault(); }
  if (e.code === 'Digit1') { G.attachPlow(); }
  if (e.code === 'Digit2') { G.attachPlanter(); }
  if (e.code === 'Digit3') { G.attachWater(); }
  if (e.code === 'Digit4') { G.attachHarvest(); }
  if (e.code === 'Space')  { G.doAction(); e.preventDefault(); }
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

var waterDrops = [], dirtClumps = [], smokePool = [], seedPool = [];

function spawnWaterDrop(wx, wz) {
  if (waterDrops.length > 80) return;
  var m = new THREE.Mesh(new THREE.SphereGeometry(0.06,4,3), new THREE.MeshLambertMaterial({color:0x60a0ff,transparent:true,opacity:0.8}));
  m.position.set(wx+(Math.random()-.5)*2, 0.5+Math.random()*.5, wz+(Math.random()-.5)*2);
  m.userData = { vy: -2-Math.random()*2, life: 1 };
  scene.add(m); waterDrops.push(m);
}

function spawnDirt(wx, wz) {
  if (dirtClumps.length > 60) return;
  var m = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.12), new THREE.MeshLambertMaterial({color:0x5a3010}));
  m.position.set(wx+(Math.random()-.5), 0.3, wz+(Math.random()-.5));
  var a = Math.random()*Math.PI*2;
  m.userData = { vx:Math.cos(a)*2, vy:2+Math.random()*2, vz:Math.sin(a)*2, life:1.2 };
  scene.add(m); dirtClumps.push(m);
}

function spawnSmoke() {
  if (smokePool.length > 20) return;
  var sc = G.tractorDefs[G.tractorIdx].scale;
  var m = new THREE.Mesh(new THREE.SphereGeometry((0.15+Math.random()*.1)*sc,5,4), new THREE.MeshLambertMaterial({color:0x888888,transparent:true,opacity:0.5}));
  m.position.set(tractor.x + Math.sin(tractor.angle)*.5, (2.5*sc)+Math.random()*.2, tractor.z + Math.cos(tractor.angle)*.5);
  m.userData = { vy:1.5+Math.random(), life:1 };
  scene.add(m); smokePool.push(m);
}

function spawnSeed(wx, wz, color) {
  if (seedPool.length > 100) return;
  var m = new THREE.Mesh(new THREE.SphereGeometry(0.07,5,4), new THREE.MeshLambertMaterial({color:color,transparent:true,opacity:1}));
  var a = Math.random()*Math.PI*2;
  m.position.set(wx+Math.cos(a)*Math.random()*1.2, 0.5+Math.random()*.4, wz+Math.sin(a)*Math.random()*1.2);
  m.userData = { vy:-1.5-Math.random()*1.5, life:0.8 };
  scene.add(m); seedPool.push(m);
}

function updateParticles(dt) {
  var i;
  for (i = waterDrops.length-1; i >= 0; i--) {
    var wd = waterDrops[i]; wd.userData.life -= dt*1.5;
    wd.position.y += wd.userData.vy*dt; wd.material.opacity = wd.userData.life*.8;
    if (wd.userData.life <= 0) { scene.remove(wd); waterDrops.splice(i,1); }
  }
  for (i = dirtClumps.length-1; i >= 0; i--) {
    var dc = dirtClumps[i]; dc.userData.life -= dt*1.5;
    dc.position.x += dc.userData.vx*dt; dc.position.y += dc.userData.vy*dt; dc.position.z += dc.userData.vz*dt;
    dc.userData.vy -= 9*dt;
    if (dc.userData.life <= 0) { scene.remove(dc); dirtClumps.splice(i,1); }
  }
  for (i = smokePool.length-1; i >= 0; i--) {
    var sp = smokePool[i]; sp.userData.life -= dt*.9;
    sp.position.y += sp.userData.vy*dt; sp.scale.setScalar(1+(1-sp.userData.life)*1.5);
    sp.material.opacity = sp.userData.life*.45;
    if (sp.userData.life <= 0) { scene.remove(sp); smokePool.splice(i,1); }
  }
  for (i = seedPool.length-1; i >= 0; i--) {
    var sd = seedPool[i]; sd.userData.life -= dt*2;
    sd.position.y += sd.userData.vy*dt; sd.material.opacity = sd.userData.life;
    if (sd.userData.life <= 0) { scene.remove(sd); seedPool.splice(i,1); }
  }
}

var tractor = { x:0, z:0, angle:0, speed:0 };

// ═══════════════════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════════════════
function getTractorCell() {
  var c = Math.round((tractor.x - gridOffX) / CELL);
  var r = Math.round((tractor.z - gridOffZ) / CELL);
  if (c < 0 || c >= GRID_W || r < 0 || r >= GRID_H) return -1;
  return r * GRID_W + c;
}

function doPlowField(idx) {
  var f = G.fields[idx];
  var def = G.tractorDefs[G.tractorIdx];
  if (G.fuel < def.fuel) { showMsg('⛽ Out of fuel!'); return; }
  f.status = 'plowed'; G.fuel -= def.fuel;
  updateFieldMesh(f); updateHUD();
  spawnDirt(f.wx, f.wz);
}

function doPlanterPlant(idx) {
  var f = G.fields[idx];
  var crop = document.getElementById('crop-sel').value;
  var ct = G.cropTypes[crop];
  if (G.money < ct.buyPrice) { showMsg('Not enough money for seeds!'); return; }
  f.status = 'planted'; f.crop = crop; f.plantDay = G.day;
  G.money -= ct.buyPrice;
  updateFieldMesh(f); updateHUD();
  for (var si = 0; si < 6; si++) spawnSeed(f.wx, f.wz, ct.color);
}

function doWaterField(idx) {
  var f = G.fields[idx];
  f.watered = true;
  for (var wi = 0; wi < 4; wi++) spawnWaterDrop(f.wx, f.wz);
}

function doHarvestField(idx) {
  var f = G.fields[idx];
  var def = G.tractorDefs[G.tractorIdx];
  var amt = Math.floor(def.eff * (1 + Math.random()));
  G.crops[f.crop] += amt; f.status = 'empty'; f.crop = null; f.plantDay = 0;
  updateFieldMesh(f); updateHUD();
}

G.doAction = function() {
  var ci = getTractorCell();
  if (ci < 0) return;
  var f = G.fields[ci];
  if (G.attachment === 'plow'    && f.status === 'empty')   { doPlowField(ci);    return; }
  if (G.attachment === 'planter' && f.status === 'plowed')  { doPlanterPlant(ci); return; }
  if (G.attachment === 'water'   && f.status === 'planted') { doWaterField(ci);   return; }
  if (G.attachment === 'harvest' && f.status === 'ready')   { doHarvestField(ci); return; }
  if (!G.attachment && f.status === 'plowed') showMsg('🌱 Attach Planter! [Key 2]');
};

G.attachPlow = function() {
  G.attachment = 'plow'; buildAttachment('plow'); updateAttachUI();
  var def = G.tractorDefs[G.tractorIdx];
  showMsg('🔧 Plow attached — ' + def.plowW.toFixed(1) + 'u wide, ' + def.tines + ' tines');
};
G.attachPlanter = function() {
  G.attachment = 'planter'; buildAttachment('planter'); updateAttachUI();
  var crop = document.getElementById('crop-sel').value;
  showMsg('🌱 Planter loaded with ' + G.cropTypes[crop].icon + ' ' + crop);
};
G.attachWater = function() {
  G.attachment = 'water'; buildAttachment('water'); updateAttachUI();
  showMsg('💧 Sprayer attached!');
};
G.attachHarvest = function() {
  G.attachment = 'harvest'; buildAttachment('harvest'); updateAttachUI();
  showMsg('🌾 Harvester attached!');
};
G.detach = function() {
  G.attachment = null; buildAttachment(null); updateAttachUI();
  showMsg('Attachment removed.');
};

G.nextDay = function() {
  G.day++;
  if (G.day % 30 === 0) G.season = (G.season + 1) % 4;
  G.fields.forEach(function(f) {
    if (f.status === 'planted') {
      var ct = G.cropTypes[f.crop];
      if ((G.day - f.plantDay) >= ct.growTime) { f.status = 'ready'; updateFieldMesh(f); }
    }
  });
  if (Math.random() < 0.1) {
    var b = Math.floor(Math.random()*200)+50;
    G.money += b; showMsg('☀️ Good weather! +$'+b);
  }
  updateHUD(); updateSellPreview();
  showMsg('Day ' + G.day + ' · ' + G.seasons[G.season]);
};

G.sellCrops = function() {
  var total = 0;
  Object.keys(G.crops).forEach(function(crop) {
    total += G.crops[crop] * G.cropTypes[crop].sellPrice;
    G.crops[crop] = 0;
  });
  G.money += total; updateHUD(); updateSellPreview();
  showMsg('💰 Sold for $' + total + '!');
};

G.refuel = function() {
  if (G.money < 10) { showMsg('Not enough money!'); return; }
  G.money -= 10; G.fuel = 100; updateHUD(); showMsg('⛽ Tank full!');
};

G.buyLand = function() {
  if (G.money < 3000) { showMsg('Need $3000!'); return; }
  G.money -= 3000; updateHUD(); showMsg('🏞️ Land purchased!');
};

G.switchTractor = function(idx) {
  var def = G.tractorDefs[idx];
  if (!def.owned) {
    if (G.money < def.price) { showMsg('Need $' + def.price.toLocaleString() + '!'); return; }
    G.money -= def.price; def.owned = true; updateHUD();
    showMsg('🚜 Purchased ' + def.name + '!');
  }
  G.tractorIdx = idx;
  buildTractor(def);
  buildAttachment(G.attachment);
  renderTractorList();
  showMsg('Driving: ' + def.name + ' (size ' + def.scale + 'x)');
};

function updateAttachUI() {
  document.getElementById('ap-free').className    = 'att-pill' + (!G.attachment            ? ' on' : '');
  document.getElementById('ap-plow').className    = 'att-pill' + (G.attachment==='plow'    ? ' on' : '');
  document.getElementById('ap-planter').className = 'att-pill' + (G.attachment==='planter' ? ' on' : '');
  document.getElementById('ap-water').className   = 'att-pill' + (G.attachment==='water'   ? ' on' : '');
  document.getElementById('ap-harvest').className = 'att-pill' + (G.attachment==='harvest' ? ' on' : '');
}

function updateHUD() {
  document.getElementById('h-money').textContent  = G.money.toLocaleString();
  document.getElementById('h-day').textContent    = G.day;
  document.getElementById('h-season').textContent = G.seasons[G.season];
  document.getElementById('h-fuel').textContent   = G.fuel;
  document.getElementById('h-wheat').textContent  = G.crops.wheat;
  document.getElementById('h-corn').textContent   = G.crops.corn;
  document.getElementById('h-pot').textContent    = G.crops.potatoes;
  document.getElementById('h-plots').textContent  = G.fields.filter(function(f){return f.status!=='empty';}).length;
}

function updateSellPreview() {
  var t = 0;
  Object.keys(G.crops).forEach(function(c) { t += G.crops[c] * G.cropTypes[c].sellPrice; });
  document.getElementById('sell-preview').textContent = t > 0 ? ' (+$'+t+')' : '';
}

function renderTractorList() {
  document.getElementById('tractor-list').innerHTML = G.tractorDefs.map(function(t, i) {
    var sizeBar = '';
    for (var s = 0; s < 6; s++) {
      sizeBar += '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:2px;background:' +
        (s < i + 1 ? '#f5c542' : 'rgba(255,255,255,.15)') + '"></span>';
    }
    return '<div class="tractor-card ' + (i===G.tractorIdx?'active':'') + ' ' + (!t.owned&&G.money<t.price?'locked':'') + '" onclick="G.switchTractor(' + i + ')">' +
      '<div class="tractor-name">🚜 ' + t.name + '</div>' +
      '<div class="tractor-info">Spd:' + t.speed + ' Eff:' + t.eff + 'x Fuel:' + t.fuel + '</div>' +
      '<div class="tractor-scale">' + sizeBar + ' ' + t.scale + 'x · Plow ' + t.plowW + 'u</div>' +
      (t.owned
        ? '<div class="tractor-price" style="color:#4caf50">✓ Owned</div>'
        : '<div class="tractor-price">$' + t.price.toLocaleString() + '</div>') +
      '</div>';
  }).join('');
}

var msgTimer = null;
function showMsg(text) {
  var el = document.getElementById('msg');
  el.textContent = text; el.style.opacity = '1';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(function() { el.style.opacity = '0'; }, 2800);
}

// ═══════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════
var mmCtx = document.getElementById('mm').getContext('2d');
function drawMinimap() {
  mmCtx.fillStyle = '#1a1a0a'; mmCtx.fillRect(0,0,120,120);
  var cs = 12;
  G.fields.forEach(function(f,i) {
    var c = i % GRID_W, r = Math.floor(i / GRID_W);
    mmCtx.fillStyle = f.status==='empty'?'#5a3a0a': f.status==='plowed'?'#3a1a05': f.status==='planted'?'#2a6010':'#d4a010';
    mmCtx.fillRect(c*cs+1, r*cs+1, cs-2, cs-2);
  });
  var mtx = ((tractor.x - gridOffX)/CELL)*cs + cs/2;
  var mtz = ((tractor.z - gridOffZ)/CELL)*cs + cs/2;
  // Draw tractor dot sized by scale
  var dotR = 3 + G.tractorDefs[G.tractorIdx].scale;
  mmCtx.fillStyle = '#ff4444';
  mmCtx.beginPath(); mmCtx.arc(mtx, mtz, dotR, 0, Math.PI*2); mmCtx.fill();
}

// ═══════════════════════════════════════════════════════
//  CAMERA  (zoom out for bigger tractors)
// ═══════════════════════════════════════════════════════
function updateCamera() {
  if (!tractorGroup) return;
  var sc = G.tractorDefs[G.tractorIdx].scale;
  var followDist = 14 + sc * 5;
  var followHeight = 8 + sc * 3;
  var tp = tractorGroup.position;
  if (camMode === 0) {
    var ctx = tp.x - Math.sin(tractor.angle) * followDist;
    var ctz = tp.z - Math.cos(tractor.angle) * followDist;
    camera.position.lerp(new THREE.Vector3(ctx, followHeight, ctz), 0.08);
    camera.lookAt(tp.x, sc * 1.5, tp.z);
  } else if (camMode === 1) {
    camera.position.lerp(new THREE.Vector3(tp.x, 40 + sc*8, tp.z), 0.05);
    camera.lookAt(tp.x, 0, tp.z);
  } else {
    camera.position.set(0, 60, 0);
    camera.lookAt(0, 0, 0);
  }
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
var lastTime = 0, smokeTimer = 0, autoTimer = 0;

function animate(now) {
  requestAnimationFrame(animate);
  var dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  var def = G.tractorDefs[G.tractorIdx];
  var maxSpd = def.speed;

  if (keys['KeyW'] || keys['ArrowUp']) {
    tractor.speed = Math.min(tractor.speed + maxSpd*2*dt, maxSpd);
  } else if (keys['KeyS'] || keys['ArrowDown']) {
    tractor.speed = Math.max(tractor.speed - maxSpd*2*dt, -maxSpd*.5);
  } else {
    if (tractor.speed > 0) tractor.speed = Math.max(0, tractor.speed - maxSpd*1.5*dt);
    else tractor.speed = Math.min(0, tractor.speed + maxSpd*1.5*dt);
  }

  if (Math.abs(tractor.speed) > 0.1) {
    var ts = 2.2 * (Math.abs(tractor.speed) / maxSpd);
    if (keys['KeyA'] || keys['ArrowLeft'])  tractor.angle += ts * dt;
    if (keys['KeyD'] || keys['ArrowRight']) tractor.angle -= ts * dt;
  }

  tractor.x += Math.sin(tractor.angle) * tractor.speed * dt;
  tractor.z += Math.cos(tractor.angle) * tractor.speed * dt;
  tractor.x = Math.max(-28, Math.min(28, tractor.x));
  tractor.z = Math.max(-28, Math.min(28, tractor.z));

  if (tractorGroup) {
    tractorGroup.position.set(tractor.x, 0, tractor.z);
    tractorGroup.rotation.y = tractor.angle;
  }
  syncAttachment();

  smokeTimer += dt;
  if (smokeTimer > 0.12 && Math.abs(tractor.speed) > 0.5) { smokeTimer = 0; spawnSmoke(); }

  autoTimer += dt;
  if (autoTimer > 0.35 && Math.abs(tractor.speed) > 0.3 && G.attachment) {
    autoTimer = 0;
    var ci = getTractorCell();
    if (ci >= 0) {
      var af = G.fields[ci];
      if      (G.attachment==='plow'    && af.status==='empty'   && G.fuel>=0) doPlowField(ci);
      else if (G.attachment==='planter' && af.status==='plowed')                doPlanterPlant(ci);
      else if (G.attachment==='water'   && af.status==='planted')               doWaterField(ci);
      else if (G.attachment==='harvest' && af.status==='ready')                 doHarvestField(ci);
    }
    updateSellPreview();
  }

  if (G.attachment==='plow' && Math.abs(tractor.speed)>1 && Math.random()<0.3)
    spawnDirt(tractor.x + Math.sin(tractor.angle)*1.5, tractor.z + Math.cos(tractor.angle)*1.5);
  if (G.attachment==='planter' && Math.abs(tractor.speed)>0.5 && Math.random()<0.4) {
    var pcrop = document.getElementById('crop-sel').value;
    spawnSeed(tractor.x + Math.sin(tractor.angle)*1.5, tractor.z + Math.cos(tractor.angle)*1.5, G.cropTypes[pcrop].color);
  }
  if (G.attachment==='water' && Math.abs(tractor.speed)>0.5 && Math.random()<0.5)
    spawnWaterDrop(tractor.x, tractor.z);

  updateParticles(dt);
  updateCamera();
  drawMinimap();
  renderer.render(scene, camera);
}

function onResize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

document.getElementById('crop-sel').addEventListener('change', function() {
  if (G.attachment === 'planter') buildAttachment('planter');
});

// ═══════════════════════════════════════════════════════
//  SAVE / LOAD  (localStorage — persists across page reloads)
// ═══════════════════════════════════════════════════════
var SAVE_KEY = 'farmDynasty3D_save';

function serializeFields() {
  return G.fields.map(function(f) {
    return { status: f.status, crop: f.crop, plantDay: f.plantDay, watered: f.watered };
  });
}

function applyFieldData(data) {
  data.forEach(function(fd, i) {
    var f = G.fields[i];
    f.status   = fd.status;
    f.crop     = fd.crop;
    f.plantDay = fd.plantDay;
    f.watered  = fd.watered;
    updateFieldMesh(f);
  });
}

G.saveGame = function() {
  var save = {
    money:      G.money,
    day:        G.day,
    fuel:       G.fuel,
    season:     G.season,
    crops:      JSON.parse(JSON.stringify(G.crops)),
    tractorIdx: G.tractorIdx,
    attachment: G.attachment,
    tractorOwned: G.tractorDefs.map(function(d){ return d.owned; }),
    fields:     serializeFields(),
    tractor:    { x: tractor.x, z: tractor.z, angle: tractor.angle },
    savedAt:    Date.now()
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(save));
    showMsg('💾 Game saved!');
    updateSaveInfo();
  } catch(e) {
    showMsg('⚠️ Save failed: ' + e.message);
  }
};

function loadGame() {
  var raw;
  try { raw = localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
  if (!raw) return false;
  try {
    var save = JSON.parse(raw);
    G.money      = save.money      || 1500;
    G.day        = save.day        || 1;
    G.fuel       = save.fuel       != null ? save.fuel : 100;
    G.season     = save.season     || 0;
    G.crops      = save.crops      || { wheat:0, corn:0, potatoes:0 };
    G.tractorIdx = save.tractorIdx || 0;
    G.attachment = save.attachment || null;

    if (save.tractorOwned) {
      save.tractorOwned.forEach(function(owned, i) {
        if (G.tractorDefs[i]) G.tractorDefs[i].owned = owned;
      });
    }

    if (save.tractor) {
      tractor.x     = save.tractor.x     || 0;
      tractor.z     = save.tractor.z     || 0;
      tractor.angle = save.tractor.angle || 0;
    }

    if (save.fields && save.fields.length === G.fields.length) {
      applyFieldData(save.fields);
    }

    return save.savedAt || true;
  } catch(e) {
    console.warn('Save load failed:', e);
    return false;
  }
}

G.resetGame = function() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  location.reload();
};

function updateSaveInfo() {
  var el = document.getElementById('save-info');
  if (!el) return;
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) { el.textContent = 'No save'; return; }
    var s = JSON.parse(raw);
    var d = new Date(s.savedAt);
    var pad = function(n){ return n < 10 ? '0'+n : ''+n; };
    el.textContent = 'Saved ' + pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  } catch(e) { el.textContent = ''; }
}

// Auto-save every 60 seconds
setInterval(function() {
  G.saveGame();
}, 60000);

// Also save on page hide (tab close / navigation)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') G.saveGame();
});
window.addEventListener('beforeunload', function() {
  G.saveGame();
});

// ── Boot ──────────────────────────────────────────────
var savedAt = loadGame();  // load before building anything

var startDef = G.tractorDefs[G.tractorIdx];
buildTractor(startDef);
buildAttachment(G.attachment);
renderTractorList();
updateHUD();
updateSellPreview();
updateAttachUI();
updateSaveInfo();

if (savedAt) {
  showMsg('🌱 Farm loaded! Day ' + G.day + ' · $' + G.money.toLocaleString());
} else {
  showMsg('WASD drive · 1=Plow 2=Planter 3=Sprayer 4=Harvest · Space=Action · C=Cam');
}

animate(0);
</script>
