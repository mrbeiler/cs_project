<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Eternal Bakery — Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#0d0906; --bg-dark:#1a1108; --bg-mid:#261a0e; --bg-panel:#2e1f10; --bg-card:#3a2714;
  --border:#5a3a1a; --border-glow:#c8821a; --gold:#f0a830; --gold-light:#ffd060; --gold-dim:#8a6020;
  --amber:#e07828; --cream:#f5e8c8; --cream-dim:#a08060; --text:#f0d8a8; --text-dim:#907858;
  --green:#60d890; --red:#e05040; --purple:#c080f0; --blue:#60a8f0; --teal:#40d0c0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:var(--bg-deep);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(60,30,10,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(80,40,5,.3) 0%,transparent 50%);pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-dark)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:24px 16px 48px}
header{text-align:center;margin-bottom:32px}
header h1{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;color:var(--gold);letter-spacing:3px;text-shadow:0 0 30px rgba(240,168,48,.4)}
header p{font-size:.85rem;color:var(--text-dim);margin-top:6px}
.section{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.section-title{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-row input{flex:1;min-width:140px;background:var(--bg-dark);border:1px solid var(--border);color:var(--cream);padding:8px 12px;border-radius:6px;font-family:'Crimson Text',serif;font-size:.9rem;outline:none;transition:border-color .2s}
.form-row input:focus{border-color:var(--border-glow)}
.form-row input::placeholder{color:var(--text-dim)}
.form-row input[readonly]{opacity:.75;cursor:default}
.btn{padding:8px 18px;border-radius:6px;border:1px solid var(--border-glow);background:linear-gradient(135deg,#c87820,#e09030);color:#1a0e00;font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:filter .2s;white-space:nowrap}
.btn:hover{filter:brightness(1.15)}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
.btn-sm{padding:5px 12px;font-size:.7rem}
.btn-danger{background:linear-gradient(135deg,#802010,#c03020);border-color:var(--red);color:#fff}
.btn-teal{background:linear-gradient(135deg,#1a5050,#20a090);border-color:var(--teal);color:#fff}
.lb-table{width:100%;border-collapse:collapse}
.lb-table thead th{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.lb-table thead th.r{text-align:right}
.lb-table tbody tr{border-bottom:1px solid rgba(90,58,26,.3);transition:background .15s}
.lb-table tbody tr:hover{background:rgba(255,200,80,.04)}
.lb-table td{padding:10px 10px;vertical-align:middle}
.lb-table tbody tr.top1{background:rgba(255,215,0,.05)}
.lb-table tbody tr.top2{background:rgba(192,192,192,.04)}
.lb-table tbody tr.top3{background:rgba(205,127,50,.03)}
.rank{font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;min-width:36px;text-align:center}
.rank-1{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.5)}
.rank-2{color:#c0c0c0}
.rank-3{color:#cd7f32}
.rank-other{color:var(--text-dim)}
.player-name{font-family:'Cinzel',serif;font-size:.82rem;color:var(--cream);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-name.is-you::after{content:' (you)';color:var(--teal);font-size:.68rem}
.score-val{font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold-light);text-align:right;white-space:nowrap}
.extra-col{font-size:.75rem;color:var(--text-dim);white-space:nowrap}
.prestige-badge{display:inline-block;background:rgba(192,128,240,.15);border:1px solid rgba(192,128,240,.3);border-radius:20px;padding:1px 8px;font-size:.65rem;color:var(--purple);font-family:'Cinzel',serif;margin-left:4px}
.status-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-amber{background:var(--amber)}
.dot-red{background:var(--red)}
.status-text{font-size:.78rem;color:var(--text-dim);flex:1}
.last-refresh{font-size:.72rem;color:var(--text-dim);margin-left:auto}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty-state .big-icon{font-size:2.5rem;margin-bottom:10px}
.empty-state p{font-size:.85rem}
.spinner{width:28px;height:28px;border:2px solid var(--bg-card);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-panel);border:1px solid var(--border-glow);border-radius:10px;padding:10px 22px;font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.6)}
#toast.show{transform:translateX(-50%) translateY(0)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.65rem;cursor:pointer;letter-spacing:.5px;transition:all .2s}
.filter-btn.active{border-color:var(--border-glow);color:var(--gold);background:rgba(240,168,48,.08)}
.filter-btn:hover:not(.active){border-color:var(--gold-dim);color:var(--cream-dim)}
#score-preview{margin-top:10px;background:rgba(0,0,0,.3);border-radius:6px;padding:10px 14px;display:none;font-size:.85rem}
#score-preview .sp-val{font-family:'Cinzel',serif;color:var(--gold-light)}
.save-banner{border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:.82rem;line-height:1.55}
.save-ok{background:rgba(96,216,144,.08);border:1px solid rgba(96,216,144,.25);color:var(--green)}
.save-missing{background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text-dim)}
@media(max-width:500px){.form-row{flex-direction:column}.extra-col{display:none}}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">
  <header>
    <h1>✨ Eternal Bakery</h1>
    <p>Universal Leaderboard — live via Supabase</p>
  </header>

  <div class="section">
    <div class="section-title">🍪 Submit Your Score</div>
    <div id="save-banner"></div>
    <div class="form-row">
      <input id="inp-name"     type="text"   placeholder="Your baker name" maxlength="24" />
      <input id="inp-score"    type="number" placeholder="All-time cookies" min="0" readonly />
      <input id="inp-cps"      type="number" placeholder="Cookies/sec"      min="0" readonly />
      <input id="inp-prestige" type="number" placeholder="Prestige level"   min="0" readonly />
      <button class="btn" id="btn-submit" onclick="submitScore()">🏆 Submit</button>
    </div>
    <div id="score-preview"></div>
  </div>

  <div class="section">
    <div class="section-title">
      🏅 Top Bakers
      <button class="btn btn-teal btn-sm" id="btn-refresh" onclick="loadScores()" style="margin-left:auto">↺ Refresh</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setSort('score',this)">🍪 Most Cookies</button>
      <button class="filter-btn"        onclick="setSort('cps',this)">⚡ Highest CPS</button>
      <button class="filter-btn"        onclick="setSort('prestige',this)">✨ Most Prestiges</button>
      <button class="filter-btn"        onclick="setSort('recent',this)">🕐 Most Recent</button>
    </div>
    <div id="lb-body"><div class="spinner"></div></div>
    <div class="status-bar">
      <div class="status-dot dot-amber" id="dot"></div>
      <span class="status-text" id="status-text">Connecting to Supabase…</span>
      <span class="last-refresh" id="last-refresh"></span>
    </div>
  </div>

  <div class="section" id="my-section" style="display:none">
    <div class="section-title">👤 Your Entry</div>
    <div id="my-entry-info" style="font-size:.85rem;color:var(--text-dim);margin-bottom:12px"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-teal btn-sm" onclick="scrollToMyEntry()">📍 Find Me</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMyEntry()">🗑 Remove My Entry</button>
    </div>
  </div>
</div>

<script>
"use strict";

const SB_URL  = 'https://bkmldaqawjvsrhyzuqxm.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrbWxkYXFhd2p2c3JoeXp1cXhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzEyNjMsImV4cCI6MjA5MDIwNzI2M30.ayr_1UGOtfpoZhi3cNFS_ZuhrTGXHgRS_lQWuCGUluU';
const TABLE   = 'bakery_scores';
const ID_KEY  = 'eternal_bakery_lb_id';
const SAVE_KEY= 'eternal_bakery_v4';

// ── SUPABASE REST HELPER ───────────────────────────────────────────────────────
async function sb(path, method='GET', body=null, extra={}) {
  const res = await fetch(SB_URL+'/rest/v1/'+path, {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...extra,
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) { const t=await res.text(); throw new Error(t); }
  const t=await res.text(); return t?JSON.parse(t):null;
}

// ── LOCAL IDENTITY ─────────────────────────────────────────────────────────────
function getMyId() {
  let id=localStorage.getItem(ID_KEY);
  if(!id){id='baker_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);localStorage.setItem(ID_KEY,id);}
  return id;
}

// ── NUMBER FORMAT ──────────────────────────────────────────────────────────────
const SFX=['','thousand','million','billion','trillion','quadrillion','quintillion','sextillion','septillion','octillion','nonillion','decillion'];
function fmtN(n){n=+n;if(!isFinite(n)||isNaN(n))return'0';if(n<0)return'-'+fmtN(-n);n=Math.floor(n);if(n<1000)return n.toLocaleString();if(n<1e6)return(n/1e3).toFixed(n<1e4?2:n<1e5?1:0)+' thousand';const t=Math.min(Math.floor(Math.log10(n)/3),SFX.length-1);const s=n/Math.pow(10,t*3);return(s<10?s.toFixed(3):s<100?s.toFixed(2):s.toFixed(1))+' '+SFX[t];}
function fmtCPS(n){n=+n;return(isFinite(n)&&n>0)?fmtN(Math.round(n))+'/s':'—';}
function timeAgo(ts){const d=(Date.now()-ts)/1000;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── GAME SAVE ──────────────────────────────────────────────────────────────────
function estimateCPS(G){
  const BASE=[0.8,5,20,80,300,1400,7800,44000,260000,3900000,60000000,1666666666,80000000000,4000000000000,150000000000000];
  let t=0;(G.buildings||[]).forEach((c,i)=>t+=(BASE[i]||0)*c);
  let m=1;
  m *= 1+(G.totalHeavenlyChips||0)*0.02;
  // Heavenly store bonuses
  const hu=G.heavenlyUpgrades||[];
  if(hu.includes('heavenly_ovens'))    m*=1.5;
  if(hu.includes('ascended_baking'))   m*=2;
  if(hu.includes('infinite_bakery'))   m*=10;
  if(hu.includes('cookie_universe'))   m*=100;
  if(hu.includes('eternal_chips'))     m*=1+(G.totalHeavenlyChips||0)*0.02;
  if(hu.includes('prestige_mastery'))  m*=1+(G.prestigeLevel||0)*0.05;
  if(hu.includes('omniscience'))       m*=1+(G.totalHeavenlyChips||0)*0.01;
  return Math.round(t*m);
}

function detectSave(){
  const banner=document.getElementById('save-banner');
  const preview=document.getElementById('score-preview');
  const raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem('eternal_bakery_v3')||localStorage.getItem('eternal_bakery_v2');
  if(!raw){
    banner.className='save-banner save-missing';
    banner.innerHTML='No game save found. Open the game in the <strong>same browser</strong>, play a bit, then reload this page.';
    return;
  }
  let G;try{G=JSON.parse(raw);}catch(_){return;}
  const score=Math.floor(G.totalCookiesBaked||0);
  const cps=Math.round(estimateCPS(G));
  const prestige=G.prestigeLevel||0;
  const chips=G.totalHeavenlyChips||0;
  const saved=G.lastSave?new Date(G.lastSave).toLocaleString():'?';
  document.getElementById('inp-score').value=score;
  document.getElementById('inp-cps').value=cps;
  document.getElementById('inp-prestige').value=prestige;
  banner.className='save-banner save-ok';
  banner.innerHTML=`✅ Save detected — <strong>${fmtN(score)}</strong> cookies · <strong>${fmtCPS(cps)}</strong> · Prestige <strong>${prestige}</strong>`
    +(chips?` · <strong style="color:var(--purple)">${fmtN(chips)} ✨ chips</strong>`:'')
    +`<br><span style="opacity:.7;font-size:.72rem">Last saved: ${saved}</span>`;
  if(score>0){
    preview.style.display='block';
    preview.innerHTML=`<span class="sp-val">${fmtN(score)}</span> cookies · <span class="sp-val">${fmtCPS(cps)}</span>`+(prestige?` · ✨ prestige ${prestige}`:'');
  }
}

// ── LEADERBOARD ────────────────────────────────────────────────────────────────
let allEntries=[], currentSort='score', lastRefreshTime=null;

async function loadScores(){
  document.getElementById('btn-refresh').disabled=true;
  setStatus('amber','Loading…');
  try{
    const data=await sb(`${TABLE}?select=*&limit=200`);
    allEntries=Array.isArray(data)?data:[];
    lastRefreshTime=Date.now();
    renderLeaderboard();
    const mine=allEntries.find(e=>e.id===getMyId());
    if(mine)showMySection(mine);else document.getElementById('my-section').style.display='none';
    setStatus('green',allEntries.length+' bakers on the board');
    document.getElementById('last-refresh').textContent='Updated just now';
  }catch(err){
    console.error(err);
    document.getElementById('lb-body').innerHTML=`<div class="empty-state"><div class="big-icon">⚠️</div><p>Could not reach Supabase.<br><small style="color:var(--text-dim)">${esc(err.message)}</small></p></div>`;
    setStatus('red','Connection error — check your Supabase RLS policies');
  }
  document.getElementById('btn-refresh').disabled=false;
}

function setStatus(color,msg){
  document.getElementById('dot').className='status-dot dot-'+color;
  document.getElementById('status-text').textContent=msg;
}

function setSort(key,btn){
  currentSort=key;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeaderboard();
}

function sorted(){
  const e=[...allEntries];
  if(currentSort==='score')    return e.sort((a,b)=>b.score-a.score);
  if(currentSort==='cps')      return e.sort((a,b)=>(b.cps||0)-(a.cps||0));
  if(currentSort==='prestige') return e.sort((a,b)=>(b.prestige||0)-(a.prestige||0));
  if(currentSort==='recent')   return e.sort((a,b)=>b.ts-a.ts);
  return e;
}

function renderLeaderboard(){
  const list=sorted();
  if(!list.length){document.getElementById('lb-body').innerHTML='<div class="empty-state"><div class="big-icon">🍪</div><p>No bakers yet — be the first!</p></div>';return;}
  const myid=getMyId();
  const ri=r=>r===1?'🥇':r===2?'🥈':r===3?'🥉':null;
  const rc=r=>r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-other';
  const rw=r=>r===1?'top1':r===2?'top2':r===3?'top3':'';
  const rows=list.slice(0,200).map((e,i)=>{
    const rank=i+1,icon=ri(rank),isMe=e.id===myid;
    return`<tr class="${rw(rank)}" id="row-${esc(e.id)}">
      <td><div class="rank ${rc(rank)}">${icon||rank}</div></td>
      <td><span class="player-name${isMe?' is-you':''}">${esc(e.name)}</span>${e.prestige?`<span class="prestige-badge">✨${e.prestige}</span>`:''}</td>
      <td class="score-val">${fmtN(e.score)}</td>
      <td class="extra-col">${e.cps?fmtCPS(e.cps):'—'}</td>
      <td class="extra-col" style="font-size:.68rem;color:var(--text-dim)">${timeAgo(e.ts||0)}</td>
    </tr>`;
  }).join('');
  document.getElementById('lb-body').innerHTML=`
    <table class="lb-table">
      <thead><tr><th style="width:44px">#</th><th>Baker</th><th class="r">Cookies Baked</th><th class="extra-col">CPS</th><th class="extra-col">Submitted</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function showMySection(e){
  document.getElementById('my-section').style.display='block';
  document.getElementById('my-entry-info').innerHTML=
    `You're on the board as <strong style="color:var(--gold)">${esc(e.name)}</strong> with
     <strong style="color:var(--gold-light)">${fmtN(e.score)}</strong> cookies baked,
     prestige <strong style="color:var(--purple)">${e.prestige||0}</strong>.
     Submitted ${timeAgo(e.ts||0)}.`;
}

function scrollToMyEntry(){
  const el=document.getElementById('row-'+getMyId());
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  else toast("Your entry isn't visible in this sort — try switching sort mode!");
}

// ── SUBMIT ─────────────────────────────────────────────────────────────────────
async function submitScore(){
  const name=document.getElementById('inp-name').value.trim().slice(0,24);
  const score=Math.floor(+document.getElementById('inp-score').value||0);
  const cps=Math.round(+document.getElementById('inp-cps').value||0);
  const prestige=parseInt(document.getElementById('inp-prestige').value)||0;
  const btn=document.getElementById('btn-submit');
  if(!name){toast('Enter your baker name!');document.getElementById('inp-name').focus();return;}
  if(!score){toast('No cookie count found — is the game open in this browser?');return;}
  btn.disabled=true;btn.textContent='⏳ Saving…';
  const id=getMyId();
  const entry={id,name,score,cps,prestige,ts:Date.now()};
  try{
    // Upsert: delete existing then insert fresh (works without upsert RLS policy)
    try{await sb(`${TABLE}?id=eq.${encodeURIComponent(id)}`,'DELETE');}catch(_){}
    await sb(TABLE,'POST',entry);
    toast('🏆 Score submitted!');
    document.getElementById('inp-name').value='';
    await loadScores();
  }catch(err){
    console.error(err);
    toast('Failed to save — '+err.message);
  }
  btn.disabled=false;btn.textContent='🏆 Submit';
}

// ── DELETE ─────────────────────────────────────────────────────────────────────
async function deleteMyEntry(){
  const id=getMyId();
  try{
    await sb(`${TABLE}?id=eq.${encodeURIComponent(id)}`,'DELETE');
    localStorage.removeItem(ID_KEY);
    toast('🗑 Entry removed');
    document.getElementById('my-section').style.display='none';
    await loadScores();
  }catch(err){toast('Could not delete: '+err.message);}
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
let _tt=null;
function toast(msg,dur=2800){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),dur);}

// ── INIT ───────────────────────────────────────────────────────────────────────
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')submitScore();});
setInterval(()=>{if(lastRefreshTime)document.getElementById('last-refresh').textContent='Updated '+timeAgo(lastRefreshTime);},30000);
detectSave();
loadScores();
</script>
</body>
</html>
