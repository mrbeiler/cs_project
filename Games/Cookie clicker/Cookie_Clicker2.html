<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Eternal Bakery — Idle Cookie Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#0d0906; --bg-dark:#1a1108; --bg-mid:#261a0e; --bg-panel:#2e1f10; --bg-card:#3a2714;
  --border:#5a3a1a; --border-glow:#c8821a; --gold:#f0a830; --gold-light:#ffd060; --gold-dim:#8a6020;
  --amber:#e07828; --cream:#f5e8c8; --cream-dim:#a08060; --text:#f0d8a8; --text-dim:#907858;
  --green:#60d890; --red:#e05040; --purple:#c080f0; --blue:#60a8f0; --teal:#40d0c0;
  --cookie-size:160px; --panel-w:340px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(60,30,10,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(80,40,5,.3) 0%,transparent 50%),radial-gradient(ellipse at 50% 90%,rgba(100,50,10,.2) 0%,transparent 40%);pointer-events:none}
body.season-winter::before{background:radial-gradient(ellipse at 30% 40%,rgba(20,40,80,.5) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(30,50,100,.3) 0%,transparent 50%)}
body.season-spring::before{background:radial-gradient(ellipse at 20% 50%,rgba(20,80,40,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(40,100,20,.3) 0%,transparent 50%)}
body.season-summer::before{background:radial-gradient(ellipse at 50% 20%,rgba(120,60,5,.5) 0%,transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(100,50,0,.3) 0%,transparent 50%)}
body.season-autumn::before{background:radial-gradient(ellipse at 20% 50%,rgba(100,40,10,.5) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(120,60,5,.4) 0%,transparent 50%)}
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg-dark)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px} ::-webkit-scrollbar-thumb:hover{background:var(--border-glow)}
#game-wrapper{position:relative;z-index:1;display:grid;grid-template-rows:64px 1fr 48px;grid-template-columns:1fr var(--panel-w);width:100%;height:100vh;overflow:hidden}
#topbar{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 20px;background:linear-gradient(to right,var(--bg-panel),var(--bg-dark));border-bottom:1px solid var(--border);box-shadow:0 2px 20px rgba(0,0,0,.6);transition:background 1s}
#topbar h1{font-family:'Cinzel',serif;font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:2px;text-shadow:0 0 20px rgba(240,168,48,.5);white-space:nowrap}
.stat-block{display:flex;flex-direction:column;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:4px 12px;min-width:140px}
.stat-label{font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.stat-value{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold-light);font-weight:600}
#topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
#season-badge{font-size:.75rem;padding:4px 10px;border-radius:20px;border:1px solid var(--gold);color:var(--gold);background:rgba(0,0,0,.3);font-family:'Cinzel',serif;white-space:nowrap}
#center-panel{display:flex;flex-direction:column;align-items:center;padding:16px 12px;overflow-y:auto;position:relative}
#cookie-area{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px;flex-shrink:0}
#cookie-btn{width:var(--cookie-size);height:var(--cookie-size);cursor:pointer;border:none;background:none;position:relative;transition:transform .08s;filter:drop-shadow(0 0 20px rgba(240,168,48,.3));user-select:none;-webkit-user-select:none}
#cookie-btn:active{transform:scale(.92)} #cookie-btn svg{width:100%;height:100%}
#click-cps{font-size:.82rem;color:var(--cream-dim);text-align:center} #click-cps span{color:var(--gold)}
#lower-tabs{display:flex;gap:0;margin-top:10px;width:100%;max-width:620px;flex-wrap:wrap}
.tab-btn{flex:1;padding:7px 4px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-transform:uppercase;min-width:60px}
.tab-btn:first-child{border-radius:6px 0 0 6px} .tab-btn:last-child{border-radius:0 6px 6px 0}
.tab-btn:hover{background:var(--bg-mid);color:var(--gold)} .tab-btn.active{background:var(--bg-mid);color:var(--gold);border-color:var(--border-glow)}
#tab-content{width:100%;max-width:620px;margin-top:8px;flex:1;overflow-y:auto}
#upgrades-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:8px 0}
.upgrade-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.upgrade-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(240,168,48,.05));pointer-events:none}
.upgrade-card:hover:not(.bought):not(.locked){border-color:var(--border-glow);box-shadow:0 0 12px rgba(240,168,48,.2);transform:translateY(-2px)}
.upgrade-card.bought{opacity:.4;cursor:default;border-color:var(--bg-mid)} .upgrade-card.locked{opacity:.25;cursor:not-allowed}
.upgrade-icon{font-size:1.5rem} .upgrade-name{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold)}
.upgrade-desc{font-size:.7rem;color:var(--text-dim);line-height:1.3} .upgrade-cost{font-size:.72rem;color:var(--amber);font-weight:600}
#achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:8px 0}
.ach-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;transition:all .2s}
.ach-card.unlocked{border-color:var(--gold-dim)} .ach-card.locked{filter:grayscale(1) brightness(.4)}
.ach-icon{font-size:1.8rem} .ach-name{font-family:'Cinzel',serif;font-size:.62rem;color:var(--gold)} .ach-desc{font-size:.65rem;color:var(--text-dim)}
.prestige-info{background:linear-gradient(135deg,rgba(192,128,240,.1),rgba(60,30,80,.3));border:1px solid rgba(192,128,240,.3);border-radius:10px;padding:16px;margin-bottom:12px}
.prestige-info h3{font-family:'Cinzel',serif;color:var(--purple);margin-bottom:8px}
.prestige-info p{font-size:.85rem;color:var(--text-dim);line-height:1.5}
.tech-resource-bar{display:flex;align-items:center;gap:12px;background:rgba(64,208,192,.08);border:1px solid rgba(64,208,192,.25);border-radius:8px;padding:10px 14px;margin-bottom:14px}
.tech-resource-bar .rp-label{color:var(--teal);font-family:'Cinzel',serif;font-size:.75rem}
.tech-resource-bar .rp-val{color:var(--gold);font-family:'Cinzel',serif;font-size:1rem}
.tech-tree-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tech-row-label{grid-column:1/-1;font-family:'Cinzel',serif;font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:4px;margin-top:6px}
.tech-node{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.tech-node:hover:not(.owned):not(.locked-tech){border-color:var(--teal);box-shadow:0 0 12px rgba(64,208,192,.25);transform:translateY(-2px)}
.tech-node.owned{border-color:var(--teal);opacity:.55;cursor:default} .tech-node.locked-tech{opacity:.25;cursor:not-allowed}
.tech-node-icon{font-size:1.6rem;margin-bottom:4px} .tech-node-name{font-family:'Cinzel',serif;font-size:.62rem;color:var(--teal);margin-bottom:3px}
.tech-node-desc{font-size:.65rem;color:var(--text-dim);line-height:1.3;margin-bottom:6px} .tech-node-cost{font-size:.7rem;color:var(--amber);font-weight:600}
#minigames-panel{padding:8px 0}
.minigame-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.minigame-card h3{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.minigame-card p{font-size:.78rem;color:var(--text-dim);margin-bottom:10px;line-height:1.4}
.minigame-card.locked-mg{opacity:.35}
#garden-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.garden-plot{aspect-ratio:1;background:rgba(20,60,20,.4);border:1px solid #2a5a1a;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;font-size:1.3rem}
.garden-plot:hover{border-color:#60d040;box-shadow:0 0 8px rgba(96,208,64,.3)} .garden-plot.empty{opacity:.5}
.garden-plot .plot-progress{font-size:.6rem;color:#60d040}
.market-bet-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.market-bet-row input{background:var(--bg-dark);border:1px solid var(--border);color:var(--gold);padding:4px 8px;border-radius:4px;flex:1;min-width:80px;font-family:'Crimson Text',serif}
#market-price-display{font-size:.78rem;margin-bottom:6px;min-height:18px;font-family:'Cinzel',serif}
#market-price-display.up{color:var(--green)} #market-price-display.down{color:var(--red)} #market-price-display.neutral{color:var(--text-dim)}
#spell-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.spell-card{background:linear-gradient(135deg,rgba(100,40,180,.2),rgba(60,20,100,.4));border:1px solid rgba(192,128,240,.3);border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.spell-card:hover:not(.spell-used){border-color:var(--purple);box-shadow:0 0 12px rgba(192,128,240,.3);transform:translateY(-2px)}
.spell-card.spell-used{opacity:.3;cursor:not-allowed}
.spell-icon{font-size:1.8rem;margin-bottom:4px} .spell-name{font-family:'Cinzel',serif;font-size:.65rem;color:var(--purple)} .spell-cost{font-size:.65rem;color:var(--text-dim)}
#store-panel{background:linear-gradient(to bottom,var(--bg-panel),var(--bg-dark));border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
#store-header{padding:12px 16px 8px;font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);letter-spacing:2px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;background:var(--bg-panel)}
.building-row{display:flex;align-items:center;padding:7px 10px;gap:8px;border-bottom:1px solid rgba(90,58,26,.4);cursor:pointer;transition:all .15s}
.building-row:hover{background:rgba(255,200,80,.06)} .building-row.affordable:hover{background:rgba(255,200,80,.1)} .building-row.unaffordable{opacity:.5;cursor:not-allowed}
.building-icon{font-size:1.4rem;flex-shrink:0} .building-info{flex:1;min-width:0}
.building-name{font-family:'Cinzel',serif;font-size:.73rem;color:var(--cream)} .building-prod{font-size:.65rem;color:var(--text-dim)}
.building-right{text-align:right;flex-shrink:0} .building-cost{font-family:'Cinzel',serif;font-size:.73rem;color:var(--gold)}
.building-count{font-family:'Cinzel',serif;font-size:1rem;color:var(--amber);font-weight:700}
#bottombar{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 16px;background:var(--bg-panel);border-top:1px solid var(--border);font-size:.8rem;color:var(--text-dim)}
#save-status{margin-left:auto;font-size:.72rem;color:var(--text-dim)}
.btn{padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-family:'Crimson Text',serif;font-size:.82rem;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--border-glow);color:var(--gold);background:var(--bg-mid)}
.btn-gold{background:linear-gradient(135deg,#c87820,#e09030);border-color:var(--gold);color:#1a0e00;font-weight:600} .btn-gold:hover{filter:brightness(1.15)}
.btn-danger{border-color:var(--red);color:var(--red)} .btn-danger:hover{background:rgba(224,80,64,.15)}
.btn-prestige{background:linear-gradient(135deg,#6030a0,#a060e0);border-color:var(--purple);color:#fff;font-weight:600} .btn-prestige:hover{filter:brightness(1.15)}
.btn-teal{background:linear-gradient(135deg,#1a5050,#20a090);border-color:var(--teal);color:#fff;font-weight:600} .btn-teal:hover{filter:brightness(1.15)}
.btn-sm{padding:4px 10px;font-size:.75rem}
#floats{position:fixed;inset:0;pointer-events:none;z-index:100}
.float-num{position:absolute;font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold-light);font-weight:700;text-shadow:0 0 8px rgba(240,200,80,.8);animation:floatUp 1.2s ease-out forwards;pointer-events:none;white-space:nowrap}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)} 50%{opacity:1;transform:translateY(-40px) scale(1.1)} 100%{opacity:0;transform:translateY(-80px) scale(.8)}}
#golden-cookie{position:fixed;z-index:90;cursor:pointer;display:none;animation:goldenPulse 1.5s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,215,0,.8)) drop-shadow(0 0 40px rgba(255,165,0,.5));width:70px;height:70px}
@keyframes goldenPulse{0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.12) rotate(5deg)}}
#notification{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,var(--bg-panel),var(--bg-card));border:1px solid var(--border-glow);border-radius:10px;padding:12px 20px;font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 30px rgba(0,0,0,.6),0 0 20px rgba(240,168,48,.2);max-width:380px;text-align:center;pointer-events:none}
#notification.show{transform:translateX(-50%) translateY(0)}
#modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:var(--bg-panel);border:1px solid var(--border-glow);border-radius:12px;padding:24px 28px;max-width:460px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.8);max-height:85vh;overflow-y:auto}
#modal-box h2{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:12px}
#modal-box p{color:var(--text-dim);line-height:1.6;margin-bottom:14px;font-size:.9rem}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.season-particle{position:fixed;pointer-events:none;z-index:5;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0)} 100%{opacity:0;transform:translateY(110vh) rotate(360deg)}}
#offline-msg{background:linear-gradient(135deg,rgba(96,216,144,.1),rgba(30,80,50,.3));border:1px solid rgba(96,216,144,.3);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:.82rem;color:var(--green);display:none;width:100%;max-width:620px}
@keyframes cookiePop{0%{transform:scale(1)} 40%{transform:scale(1.08) rotate(-2deg)} 70%{transform:scale(.96) rotate(1deg)} 100%{transform:scale(1)}}
#cookie-btn.popping{animation:cookiePop .2s ease}
body.frenzy #cookie-btn{filter:drop-shadow(0 0 30px rgba(255,50,50,.9)) drop-shadow(0 0 60px rgba(255,100,0,.6))}
body.frenzy #topbar{background:linear-gradient(to right,#3a0a05,#1a0802)}
#loading{position:fixed;inset:0;z-index:999;background:var(--bg-deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.4rem}
.spinner{width:50px;height:50px;border:3px solid var(--bg-card);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chip-display{display:inline-flex;align-items:center;gap:6px;background:rgba(192,128,240,.15);border:1px solid rgba(192,128,240,.3);border-radius:20px;padding:3px 10px;font-family:'Cinzel',serif;font-size:.75rem;color:var(--purple)}
@media(max-width:768px){:root{--panel-w:220px;--cookie-size:110px} #topbar h1{display:none}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><h2>🍪 Firing up the ovens…</h2></div>
<div id="floats"></div>
<div id="golden-cookie" title="Click me!">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="gc-grad" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#ffe080"/><stop offset="60%" stop-color="#f0a020"/><stop offset="100%" stop-color="#c06010"/></radialGradient></defs>
    <circle cx="50" cy="50" r="46" fill="url(#gc-grad)" stroke="#ffe060" stroke-width="2"/>
    <circle cx="35" cy="38" r="5" fill="#c07010" opacity=".7"/><circle cx="60" cy="32" r="4" fill="#c07010" opacity=".7"/>
    <circle cx="68" cy="55" r="6" fill="#c07010" opacity=".7"/><circle cx="42" cy="62" r="4" fill="#c07010" opacity=".7"/>
    <circle cx="28" cy="60" r="3" fill="#c07010" opacity=".6"/><circle cx="55" cy="70" r="3" fill="#c07010" opacity=".6"/>
    <text x="50" y="54" text-anchor="middle" font-size="18" fill="#fff8" font-weight="bold">✦</text>
  </svg>
</div>
<div id="notification"></div>
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title">Confirm</h2>
    <div id="modal-body-content"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div id="game-wrapper">
  <div id="topbar">
    <h1>✨ Eternal Bakery</h1>
    <div class="stat-block"><span class="stat-label">Cookies</span><span class="stat-value" id="stat-cookies">0</span></div>
    <div class="stat-block"><span class="stat-label">Per Second</span><span class="stat-value" id="stat-cps">0</span></div>
    <div class="stat-block"><span class="stat-label">All Time</span><span class="stat-value" id="stat-total">0</span></div>
    <span id="season-badge">🌾 Loading…</span>
    <div id="topbar-actions">
      <button class="btn" onclick="manualSave()">💾 Save</button>
      <button class="btn btn-danger" onclick="confirmReset()">⟳ Reset</button>
    </div>
  </div>

  <div id="center-panel">
    <div id="offline-msg"></div>
    <div id="cookie-area">
      <button id="cookie-btn" onclick="clickCookie(event)" title="Click to bake!">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="cookie-grad" cx="38%" cy="32%" r="65%">
              <stop offset="0%" stop-color="#f0c868"/><stop offset="50%" stop-color="#d08820"/><stop offset="100%" stop-color="#8a4808"/>
            </radialGradient>
            <filter id="cookie-shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".5"/></filter>
          </defs>
          <circle cx="100" cy="100" r="92" fill="url(#cookie-grad)" filter="url(#cookie-shadow)"/>
          <path d="M60 70 Q75 85 65 100 Q55 115 70 125" stroke="#7a4010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M110 50 Q125 65 120 80" stroke="#7a4010" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M130 110 Q140 125 135 145 Q130 155 145 165" stroke="#7a4010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="70" cy="85" rx="9" ry="8" fill="#3a1a00" transform="rotate(-15,70,85)"/>
          <ellipse cx="110" cy="68" rx="8" ry="7" fill="#3a1a00" transform="rotate(10,110,68)"/>
          <ellipse cx="140" cy="100" rx="10" ry="8" fill="#3a1a00" transform="rotate(-5,140,100)"/>
          <ellipse cx="90" cy="130" rx="9" ry="8" fill="#3a1a00" transform="rotate(20,90,130)"/>
          <ellipse cx="50" cy="120" rx="7" ry="6" fill="#3a1a00" transform="rotate(-10,50,120)"/>
          <ellipse cx="130" cy="140" rx="8" ry="7" fill="#3a1a00" transform="rotate(15,130,140)"/>
          <ellipse cx="155" cy="65" rx="7" ry="6" fill="#3a1a00" transform="rotate(-8,155,65)"/>
          <ellipse cx="75" cy="155" rx="6" ry="5" fill="#3a1a00" transform="rotate(5,75,155)"/>
          <ellipse cx="68" cy="52" rx="20" ry="12" fill="rgba(255,255,220,.12)" transform="rotate(-20,68,52)"/>
        </svg>
      </button>
      <div id="click-cps">+<span id="cookies-per-click">1</span> per click <span id="frenzy-indicator" style="display:none;color:#f06030;margin-left:8px;">🔥 FRENZY!</span></div>
    </div>

    <div id="lower-tabs">
      <button class="tab-btn active" onclick="switchTab('upgrades')">⚗️ Upgrades</button>
      <button class="tab-btn" onclick="switchTab('achievements')">🏆 Achieve</button>

  return m;
}

function getGlobalCPSMult() {
  let m = 1;
  const T = id => G.upgrades.includes(id);
  [[21,1.5],[22,2],[23,3],[30,5],[31,10],[32,50],[43,2],[44,5],[45,20],[62,100],[63,500],[64,2000]].forEach(([id,v])=>{ if(T(id)) m*=v; });

  // Heavenly store bonuses
  if ((G.heavenlyUpgrades||[]).includes('heavenly_ovens'))       m *= 1.5;
  if ((G.heavenlyUpgrades||[]).includes('ascended_baking'))      m *= 2;
  if ((G.heavenlyUpgrades||[]).includes('infinite_bakery'))      m *= 10;
  if ((G.heavenlyUpgrades||[]).includes('eternal_chips'))        m *= 1 + G.totalHeavenlyChips * 0.02; // double chip bonus
  if ((G.heavenlyUpgrades||[]).includes('prestige_mastery'))     m *= 1 + G.prestigeLevel * 0.05;
  if ((G.heavenlyUpgrades||[]).includes('omniscience'))        m *= 1 + G.totalHeavenlyChips * 0.01;
  if ((G.heavenlyUpgrades||[]).includes('cookie_universe'))    m *= 100;
  if (hasTech('cps_boost_1'))    m *= 1.25;
  if (hasTech('cps_boost_2'))    m *= 1.5;
  if (hasTech('cps_boost_3'))    m *= 2;
  if (hasTech('cps_boost_4'))    m *= 3;
  if (hasTech('cps_boost_5'))    m *= 5;
  if (hasTech('cps_boost_6'))    m *= 10;
  if (hasTech('golden_harmony')) m *= 1.1;
  if (hasTech('eternal_engine')) m *= 2;
  if (hasTech('quantum_baking')) m *= 3;
  if (hasTech('singularity_engine')) m *= 5;
  if (hasTech('transcendence_tech')) m *= 1 + G.prestigeLevel * 0.1;
  return m;
}

const getBuildingCPS = i => BUILDINGS[i].baseCPS * G.buildings[i] * getBuildingMult(i) * getGlobalCPSMult();

function getTotalCPS() {
  let t = 0;
  for (let i=0; i<BUILDINGS.length; i++) t += getBuildingCPS(i);
  if (Date.now() < G.frenzyEnd) t *= G.frenzyMultiplier; else G.frenzyMultiplier = 1;
  return t * getSeasonCPSMult();
}

function getEffectiveCPC() {
  let b = G.cookiesPerClick + G.totalHeavenlyChips * 0.5;
  if (Date.now() < G.superClickEnd) b *= 10;
  if ((G.heavenlyUpgrades||[]).includes('divine_clicking')) b *= 2;

  if (hasTech('click_boost_1'))  b *= 1.5;
  if (hasTech('click_boost_2'))  b *= 2;
  if (hasTech('eternal_engine')) b *= 2;
  if (hasTech('deep_click'))     b *= 3;
  if (hasTech('dimensional_cursor')) b *= 1 + getTotalBuildings() * 0.01;
  if (hasTech('singularity_engine')) b *= 5;
  return Math.max(1, Math.floor(b * getSeasonClickMult()));
}

function purchaseUpgrade(id) {
  if (G.upgrades.includes(id)) return;
  const up = UPGRADES.find(u=>u.id===id);
  if (!up || G.cookies < up.cost) { notify("Not enough cookies! 🍪"); return; }
  G.cookies -= up.cost;
  G.upgrades.push(id);
  if (up.effect) up.effect();
  notify(`✅ Purchased: ${up.name}`);
  renderUpgrades(); renderBuildings();
}

function getCurrentSeason() {
  const m = new Date().getMonth();
  return SEASONS.find(s=>s.event&&s.months.includes(m)) ||
         SEASONS.find(s=>!s.event&&s.months.includes(m)) ||
         {name:"Normal",badge:"🍪 Baking",cpsBonus:1,clickBonus:1,particle:"✦",accentColor:"#f0a830",bodyClass:""};
}
const getSeasonCPSMult   = () => getCurrentSeason().cpsBonus;
const getSeasonClickMult = () => getCurrentSeason().clickBonus;

let particleTimer = null;
function spawnSeasonParticle() {
  const s = getCurrentSeason();
  const el = document.createElement('div');
  el.className = 'season-particle'; el.textContent = s.particle;
  el.style.cssText = `left:${Math.random()*100}vw;animation-duration:${4+Math.random()*6}s;font-size:${.6+Math.random()*.8}rem;opacity:${.4+Math.random()*.4}`;
  document.body.appendChild(el);

function applySeasonTheme() {
  const s = getCurrentSeason();
  document.body.className = s.bodyClass || '';

  if (badge) { badge.textContent=s.badge; badge.style.borderColor=s.accentColor; badge.style.color=s.accentColor; }
}

const hasTech = id => G.techOwned.includes(id);
const getRPperSecond = () => getTotalBuildings() * 0.1;

function purchaseTech(id) {
  const tech = TECH.find(t=>t.id===id);
  if (!tech || hasTech(id)) return;
  if (!tech.requires.every(r=>hasTech(r))) { notify("🔒 Prerequisites not met!"); return; }
  if (G.researchPoints < tech.cost) { notify("Not enough Research Points!"); return; }
  G.researchPoints -= tech.cost;
  G.totalResearchPoints += tech.cost;
  G.techOwned.push(id);
  if (id==='eternal_engine') G.cookiesPerClick *= 2;
  notify(`🔬 Researched: ${tech.name}!`);
  checkAchievements(); renderTech();
}

function renderTech() {
  const rps = getRPperSecond();
  document.getElementById('tech-panel').innerHTML = `
    <div class="tech-resource-bar">
      <div><div class="rp-label">Research Points</div><div class="rp-val">${fmtN(G.researchPoints)} RP</div></div>
      <div style="margin-left:auto;font-size:.75rem;color:var(--text-dim)">+${fmtN(rps)}/s (${getTotalBuildings()} buildings)</div>
    </div>
    <div class="tech-tree-grid">
      ${[1,2,3,4,5,6,7,8].map(tier=>`
        <div class="tech-row-label">Tier ${tier}</div>
        ${TECH.filter(t=>t.tier===tier).map(t=>{
          const owned=hasTech(t.id), met=t.requires.every(r=>hasTech(r)), afford=G.researchPoints>=t.cost;
          return `<div class="tech-node ${owned?'owned':''} ${!met&&!owned?'locked-tech':''}"
            onclick="${met&&!owned?`purchaseTech('${t.id}')`:''}"
            title="${t.requires.length?'Requires: '+t.requires.join(', '):''}">
            <div class="tech-node-icon">${t.icon}</div>
            <div class="tech-node-name">${t.name}</div>
            <div class="tech-node-desc">${t.desc}</div>
            <div class="tech-node-cost">${owned?'✓ Owned':!met?'🔒 Locked':afford?t.cost+' RP':'<span style="color:var(--red)">'+t.cost+' RP</span>'}</div>
          </div>`;
        }).join('')}
      `).join('')}
    </div>`;
}

let marketHistory = Array.from({length:30}, ()=>50+Math.random()*20-10);
let marketPrice = 50;
let mgDomBuilt = false;

// Garden: plant / harvest
function gardenPlant(idx) {
  if (!G.gardenPlots) G.gardenPlots = new Array(GARDEN_SIZE).fill(null);
  if (G.gardenPlots[idx]) return;
  if (G.cookies < GARDEN_SEED_COST) { notify("Not enough cookies for seeds!"); return; }
  G.cookies -= GARDEN_SEED_COST;
  G.gardenPlots[idx] = {planted:Date.now()};
  updateGardenDOM();
}

function gardenHarvest(idx) {
  const plot = (G.gardenPlots||[])[idx];
  if (!plot) return;
  if (Date.now()-plot.planted < GARDEN_GROW_TIME) { notify("Crop not ready yet! 🌱"); return; }
  const bonus = Math.floor(getTotalCPS()*15+50);
  G.cookies += bonus; G.totalCookiesBaked += bonus;
  G.gardenPlots[idx] = null;
  G.gardenHarvests = (G.gardenHarvests||0)+1;
  notify(`🌾 Harvested! +${fmtN(bonus)} cookies!`);
  checkAchievements(); updateGardenDOM();
}

function updateGardenDOM() {
  const grid = document.getElementById('garden-grid');
  if (!grid) return;
  const farmOwned = G.buildings[2]>=1;
  grid.querySelectorAll('.garden-plot').forEach((el,i) => {
    const plot = (G.gardenPlots||[])[i];
    const ready = plot && (Date.now()-plot.planted)>=GARDEN_GROW_TIME;
    const growing = plot && !ready;
    const pct = growing ? Math.floor(((Date.now()-plot.planted)/GARDEN_GROW_TIME)*100) : 0;
    el.className = 'garden-plot'+(plot?'':' empty');
    el.onclick = farmOwned ? (plot ? ()=>gardenHarvest(i) : ()=>gardenPlant(i)) : null;
    el.innerHTML = `<span>${ready?'🌻':growing?'🌱':'🟫'}</span><span class="plot-progress">${ready?'Ready!':growing?pct+'%':'Empty'}</span>`;
  });
  const hEl = document.getElementById('garden-harvests');
  if (hEl) hEl.textContent = '🌾 Total harvests: '+(G.gardenHarvests||0);
}

// Market: update price data and redraw canvas only
function tickMarket() {
  marketPrice += (Math.random()-.49)*3 + (Math.random()>.82 ? (Math.random()-.5)*10 : 0);
  marketPrice = Math.max(10, Math.min(90, marketPrice));
  marketHistory.push(marketPrice);
  if (marketHistory.length>30) marketHistory.shift();
  drawMarketCanvas();
  const el = document.getElementById('market-price-display');
  if (!el) return;
  const prev = marketHistory[marketHistory.length-2]??marketPrice;
  const dir = marketPrice>prev?'▲':marketPrice<prev?'▼':'–';
  el.className = 'market-status '+(marketPrice>prev?'up':marketPrice<prev?'down':'neutral');
  if (!G.marketInvested) el.textContent = `Price: ${marketPrice.toFixed(1)} ${dir}`;
}

function drawMarketCanvas() {
  const canvas = document.getElementById('market-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,H);
  const isUp = marketHistory[marketHistory.length-1]>=marketHistory[0];
  ctx.beginPath();
  ctx.strokeStyle = isUp?'#60d890':'#e05040';
  ctx.lineWidth=2; ctx.shadowBlur=6; ctx.shadowColor=ctx.strokeStyle;
  marketHistory.forEach((v,i)=>{
    const x=(i/(marketHistory.length-1))*W, y=H-(v/100)*H;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke(); ctx.shadowBlur=0;
}

function marketBet(direction) {
  const input = document.getElementById('market-bet-amount');
  if (!input) return;
  const bet = parseFloat(input.value)||0;
  if (bet<=0) { notify("Enter a valid bet amount!"); return; }
  if (bet>G.cookies) { notify("Not enough cookies!"); return; }
  if (G.marketInvested>0) { notify("Bet already in progress…"); return; }
  G.cookies -= bet;
  G.marketInvested = bet; G.marketDirection = direction; G.marketStartPrice = marketPrice;
  input.disabled = true;
  const el = document.getElementById('market-price-display');
  if (el) { el.className='market-status neutral'; el.textContent=`Bet: ${fmtN(bet)} ${direction===1?'UP ▲':'DOWN ▼'} — 3s…`; }
  notify(`📊 Bet placed ${direction===1?'UP ▲':'DOWN ▼'}`);
  setTimeout(resolveMarket, 3000);
}

function resolveMarket() {
  if (!G.marketInvested) return;
  const won = (G.marketDirection===1&&marketPrice>G.marketStartPrice) ||
              (G.marketDirection===-1&&marketPrice<=G.marketStartPrice);
  if (won) {
    const gain = G.marketInvested*1.9;
    G.cookies+=gain; G.totalCookiesBaked+=gain-G.marketInvested;
    G.marketWins = (G.marketWins||0)+1;
    notify(`📈 Win! +${fmtN(gain)} cookies!`);
    checkAchievements();
  } else {
    notify(`📉 Loss! You lost ${fmtN(G.marketInvested)} cookies.`);
  }
  G.marketInvested=0;
  const input = document.getElementById('market-bet-amount');
  if (input) input.disabled = false;
}

// Update only spell card states
function updateSpellDOM() {
  document.querySelectorAll('.spell-card').forEach((card,i)=>{
    const spell=SPELLS[i]; if(!spell) return;
    const cdEnd=(G.spellCooldowns||{})[spell.id]||0, onCD=Date.now()<cdEnd;
    const cdLeft=onCD?Math.ceil((cdEnd-Date.now())/1000):0;
    card.className='spell-card'+(onCD?' spell-used':'');
    card.onclick=(!onCD&&G.buildings[7]>=1)?()=>castSpell(spell.id):null;
    const cdEl=card.querySelector('.spell-cd');
    if(cdEl) cdEl.textContent=onCD?`⏳ ${cdLeft}s`:`CD: ${spell.cooldown}s`;
  });
  const sc=document.getElementById('spell-count');
  if(sc) sc.textContent=G.spellCasts||0;
}

function castSpell(spellId) {
  const spell=SPELLS.find(s=>s.id===spellId);
  if (!spell||G.buildings[7]<1) return;
  const cdEnd=(G.spellCooldowns||{})[spellId]||0;
  if (Date.now()<cdEnd) { notify(`⏳ Spell cooling: ${Math.ceil((cdEnd-Date.now())/1000)}s`); return; }
  if (G.researchPoints<spell.cost) { notify("Not enough Research Points!"); return; }
  G.researchPoints-=spell.cost;
  if(!G.spellCooldowns) G.spellCooldowns={};
  G.spellCooldowns[spellId]=Date.now()+spell.cooldown*1000;
  G.spellCasts=(G.spellCasts||0)+1;
  if (spellId==='time_skip') {
    const b=getTotalCPS()*300; G.cookies+=b; G.totalCookiesBaked+=b; notify(`⏩ Time Skip! +${fmtN(b)} cookies!`);
  } else if (spellId==='cookie_rain') {
    G.frenzyMultiplier=3; G.frenzyEnd=Date.now()+20000;
    document.body.classList.add('frenzy'); document.getElementById('frenzy-indicator').style.display='inline';
    notify("🌧️ Cookie Rain! 3× CPS for 20s!", 3000);
    setTimeout(()=>{document.body.classList.remove('frenzy');document.getElementById('frenzy-indicator').style.display='none';},20000);
  } else if (spellId==='power_click') {
    G.superClickEnd=Date.now()+15000; notify("⚡ Power Click! 10× click power for 15s!", 3000);
  } else if (spellId==='elder_frenzy') {
    G.frenzyMultiplier=10; G.frenzyEnd=Date.now()+60000;
    document.body.classList.add('frenzy'); document.getElementById('frenzy-indicator').style.display='inline';
    notify("🔥 Elder Frenzy! 10× CPS for 60s!", 3000);
    setTimeout(()=>{document.body.classList.remove('frenzy');document.getElementById('frenzy-indicator').style.display='none';},60000);
  } else if (spellId==='grand_skip') {
    const b=getTotalCPS()*3600; G.cookies+=b; G.totalCookiesBaked+=b; notify(`⏭️ Grand Skip! +${fmtN(b)} cookies (1 hour)!`);
  } else if (spellId==='fortune') {
    // Spawn 3 golden cookies in quick succession
    [0,2000,4000].forEach(delay => setTimeout(()=>{ if(!G.spellCooldowns) return; spawnGoldenCookie(); },delay));
    notify("🎰 Fortune! Three golden cookies incoming!", 3000);
  }
  checkAchievements(); updateSpellDOM();
}

// ── NUMBER FORMAT ──────────────────────────────────────────────────────────────
const SUFFIXES=['','thousand','million','billion','trillion','quadrillion','quintillion','sextillion','septillion','octillion','nonillion','decillion'];
function fmtN(n) {
  if (!isFinite(n)) return '∞';
  if (n<0) return '-'+fmtN(-n);
  n=Math.floor(n);
  if (n<1_000) return n.toLocaleString();
  if (n<1_000_000) return (n/1_000).toFixed(n<10_000?2:n<100_000?1:0)+' thousand';
  const tier=Math.min(Math.floor(Math.log10(n)/3),SUFFIXES.length-1);
  const s=n/Math.pow(10,tier*3);
  return (s<10?s.toFixed(3):s<100?s.toFixed(2):s.toFixed(1))+' '+SUFFIXES[tier];
}
const fmtExact = n => Math.floor(n).toLocaleString();
const fmtTime  = s => s<60?Math.floor(s)+'s':s<3600?Math.floor(s/60)+'m '+Math.floor(s%60)+'s':s<86400?Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m':Math.floor(s/86400)+'d';

const SAVE_KEY='eternal_bakery_v4';
let autoSaveCountdown=30, saveFlashTimer=null;

function saveGame() {
  G.lastSave=Date.now();
  try {
    localStorage.setItem(SAVE_KEY,JSON.stringify(G));
    const el=document.getElementById('save-status');
    el.textContent='💾 Saved ✓'; el.style.color='var(--green)';
    clearTimeout(saveFlashTimer);
    saveFlashTimer=setTimeout(()=>{el.style.color='';el.textContent='Autosave ✓';saveFlashTimer=null;},1800);
  } catch(e){ document.getElementById('save-status').textContent='⚠ Save failed'; }
  autoSaveCountdown=30;
}

function loadGame() {
  try {
    const raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem('eternal_bakery_v3')||localStorage.getItem('eternal_bakery_v2');
    if (!raw) return false;
    Object.assign(G,JSON.parse(raw));
    if (!G.gardenPlots||G.gardenPlots.length!==GARDEN_SIZE) G.gardenPlots=new Array(GARDEN_SIZE).fill(null);
    if (!G.spellCooldowns) G.spellCooldowns={};
    if (!G.techOwned) G.techOwned=[];
    if (!G.heavenlyUpgrades) G.heavenlyUpgrades=[];
    if (!G.buildings||G.buildings.length<BUILDINGS.length) {
      const b=G.buildings||[];
      G.buildings=new Array(BUILDINGS.length).fill(0);
      b.forEach((v,i)=>{if(i<BUILDINGS.length)G.buildings[i]=v;});
    }
    return true;
  } catch(e){ return false; }
}

    <div class="prestige-info">
      <h3>✨ Ascension — Prestige Level ${G.prestigeLevel}</h3>
      <p>You have <strong style="color:var(--purple)">${fmtN(G.totalHeavenlyChips)} Heavenly Chip${G.totalHeavenlyChips!==1?'s':''}</strong>
      (${fmtN(G.heavenlyChips)} spendable), giving +${(G.totalHeavenlyChips*2).toFixed(0)}% CPS permanently.<br><br>
      Ascending resets cookies, buildings, upgrades — keeps achievements &amp; chips.<br><br>
      Pending chips if you ascend now: <strong style="color:var(--gold)">${fmtN(pending)}</strong><br>
      Next tier requires: ${nextReq}</p>
    </div>
    <button class="btn ${canPrestige()?'btn-prestige':''}" onclick="ascend()" ${canPrestige()?'':'disabled'} style="font-size:1rem;padding:10px 24px;margin-bottom:16px">
      ✨ Ascend ${canPrestige()?`(+${fmtN(pending)} chips)`:'(Not yet ready)'}
    </button>
    <div style="margin-bottom:16px;color:var(--text-dim);font-size:.8rem;">
      <strong style="color:var(--gold)">All-time baked:</strong> ${fmtN(G.totalCookiesBaked)}<br>
      <strong style="color:var(--gold)">Total ascensions:</strong> ${G.prestigeLevel}
    </div>
    <div style="font-family:'Cinzel',serif;font-size:.85rem;color:var(--purple);letter-spacing:2px;border-bottom:1px solid rgba(192,128,240,.3);padding-bottom:8px;margin-bottom:12px">
      💜 HEAVENLY STORE
      <span style="font-size:.7rem;color:var(--text-dim);font-family:'Crimson Text',serif;margin-left:8px">${fmtN(G.heavenlyChips)} chips to spend</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
      ${HEAVENLY_UPGRADES.map(hu_item=>{
        const owned=hu.includes(hu_item.id), canAfford=G.heavenlyChips>=hu_item.chipCost;
        return `<div style="background:${owned?'rgba(192,128,240,.08)':'var(--bg-card)'};border:1px solid ${owned?'rgba(192,128,240,.5)':'var(--border)'};border-radius:8px;padding:10px 8px;cursor:${owned?'default':'pointer'};opacity:${owned?'.5':'1'};transition:all .2s"
          onclick="${!owned?`purchaseHeavenlyUpgrade('${hu_item.id}')`:''}"
          onmouseover="if(!${owned})this.style.borderColor='var(--purple)'"
          onmouseout="this.style.borderColor='${owned?'rgba(192,128,240,.5)':'var(--border)'}'">
          <div style="font-size:1.4rem">${hu_item.icon}</div>
          <div style="font-family:'Cinzel',serif;font-size:.65rem;color:var(--purple);margin:3px 0">${hu_item.name}</div>
          <div style="font-size:.65rem;color:var(--text-dim);line-height:1.3;margin-bottom:4px">${hu_item.desc}</div>
          <div style="font-size:.7rem;color:${owned?'var(--green)':canAfford?'var(--amber)':'var(--red)'}">
            ${owned?'✓ Owned':hu_item.chipCost+' 💜'}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderStats() {
  const cps=getTotalCPS(), s=getCurrentSeason();
  document.getElementById('stats-panel').innerHTML=`
    <table style="width:100%;border-collapse:collapse">
      ${[
        ['Cookies owned',`${fmtN(G.cookies)} <span style="color:var(--text-dim);font-size:.75rem">(${fmtExact(G.cookies)})</span>`],
        ['Cookies/second',fmtN(cps)],['Cookies/click',fmtN(getEffectiveCPC())],
        ['All-time baked',fmtN(G.totalCookiesBaked)],['Total clicks',G.totalClicks.toLocaleString()],
        ['Upgrades',`${G.upgrades.length} / ${UPGRADES.length}`],
        ['Achievements',`${G.achievements.length} / ${ACHIEVEMENTS.length}`],
        ['Golden cookies',G.goldenCookiesClicked],['Prestige level',G.prestigeLevel],
        ['Heavenly Chips',`${fmtN(G.totalHeavenlyChips)} total (${fmtN(G.heavenlyChips)} spendable)`],
        ['Heavenly Upgrades',`${(G.heavenlyUpgrades||[]).length} / ${HEAVENLY_UPGRADES.length}`],
        ['Research Points',`${fmtN(G.researchPoints)} (${G.techOwned.length}/${TECH.length} nodes)`],
        ['Market wins',G.marketWins||0],['Garden harvests',G.gardenHarvests||0],['Spells cast',G.spellCasts||0],
        ['Current season',`${s.badge} (CPS ×${s.cpsBonus}, Click ×${s.clickBonus})`],
        ['Time to 1M',cps>0?fmtTime(Math.max(0,1e6-G.cookies)/cps):'N/A'],
        ['Time to 1B',cps>0?fmtTime(Math.max(0,1e9-G.cookies)/cps):'N/A'],
      ].map(([k,v])=>`<tr><td style="color:var(--gold)">${k}</td><td>${v}</td></tr>`).join('')}
      <tr><td colspan="2" style="color:var(--gold);padding-top:8px">Buildings</td></tr>
      ${BUILDINGS.map((b,i)=>`<tr><td style="padding-left:12px">${b.icon} ${b.name}</td><td>${G.buildings[i]} — ${fmtN(getBuildingCPS(i))}/s</td></tr>`).join('')}
    </table>
    <div style="margin-top:12px"><button class="btn btn-sm" onclick="exportSave()">📤 Export Save</button></div>`;
}

function renderBottomBar() {
  const chips=G.totalHeavenlyChips;
  document.getElementById('prestige-chips-bar').innerHTML=chips>0
    ?`<span class="chip-display">✨ ${fmtN(chips)} Chip${chips!==1?'s':''} (+${(chips*2).toFixed(0)}% CPS)</span>`:'';
  const rps=getRPperSecond();
  document.getElementById('rp-bar').innerHTML=rps>0
    ?`<span style="color:var(--teal);font-size:.72rem">🔬 ${fmtN(G.researchPoints)} RP (+${fmtN(rps)}/s)</span>`:'';
}

// ── TAB SYSTEM ─────────────────────────────────────────────────────────────────
let currentTab='upgrades';
const TABS=['upgrades','achievements','prestige','tech','minigames','stats'];

function switchTab(name) {
  currentTab=name;
  TABS.forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'block':'none');
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>btn.classList.toggle('active',TABS[i]===name));
  if (name==='prestige')   renderPrestige();
  if (name==='stats')      renderStats();
  if (name==='achievements') renderAchievements();
  if (name==='tech')       renderTech();
  if (name==='minigames')  { mgDomBuilt=false; buildMiniGamesPanel(); }
}

// ── MODAL ──────────────────────────────────────────────────────────────────────
let modalCallback=null;
function openModal(title,body,onConfirm,label='Confirm',showCancel=true) {
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body-content').innerHTML=`<p style="white-space:pre-line">${body}</p>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').textContent=label;
  document.querySelector('#modal-overlay .modal-actions .btn:first-child').style.display=showCancel?'':'none';
  modalCallback=onConfirm;
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); modalCallback=null; }
document.getElementById('modal-confirm').addEventListener('click',()=>{if(modalCallback)modalCallback();closeModal();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});

// ── NOTIFICATIONS ──────────────────────────────────────────────────────────────
let notifTimer=null;
function notify(msg,dur=2500) {
  const el=document.getElementById('notification');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>el.classList.remove('show'),dur);
}

// ── GAME LOOP ──────────────────────────────────────────────────────────────────
let lastTick=Date.now(), frameCounter=0, marketAcc=0, gardenAcc=0;

function gameLoop() {
  const now=Date.now(), delta=Math.min((now-lastTick)/1000,.5);
  lastTick=now; frameCounter++;

  // Income
  const cps=getTotalCPS();
  if (cps>0) { G.cookies+=cps*delta; G.totalCookiesBaked+=cps*delta; }
  const rps=getRPperSecond();
  if (rps>0) G.researchPoints+=rps*delta;

  // Market (every 1.5s — gives smooth live movement without interfering with any input)
  marketAcc+=delta;
  if (marketAcc>=1.5) { tickMarket(); marketAcc=0; }

  // Garden + spells (every 2s, non-destructive DOM patch)
  gardenAcc+=delta;
  if (gardenAcc>=2) { tickMiniGames(); gardenAcc=0; }

  // Autosave countdown
  autoSaveCountdown-=delta;
  if (autoSaveCountdown<=0) { saveGame(); } else {
    const el=document.getElementById('save-status');
    if (!saveFlashTimer) { el.textContent=`Autosave in ${Math.ceil(autoSaveCountdown)}s`; el.style.color=''; }
  }

  // ~1s: heavy renders
  if (frameCounter%60===0) {
    checkAchievements();
    renderBuildings(); renderUpgrades(); renderBottomBar();
    if (currentTab==='stats')    renderStats();
    if (currentTab==='prestige') renderPrestige();
    if (currentTab==='tech')     renderTech();
  }

  updateTopBar();
  requestAnimationFrame(gameLoop);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  const hasSave = loadGame();
  if (hasSave) processOfflineProgress();

  renderAll();
  applySeasonTheme();
  clearInterval(particleTimer);
  particleTimer = setInterval(spawnSeasonParticle, 800);
  requestAnimationFrame(gameLoop);
  setInterval(saveGame, 30000);
  scheduleGoldenCookie();

  setTimeout(()=>{
    const el=document.getElementById('loading');
    el.style.transition='opacity .5s'; el.style.opacity='0';
    setTimeout(()=>el.remove(),500);
  },700);

  setTimeout(()=>{
    const s=getCurrentSeason();
    notify(hasSave?`🍪 Welcome back! ${s.badge} bonus active!`:`🍪 Welcome to Eternal Bakery! It's ${s.name} season!`, hasSave?2500:4000);
  },900);
});

window.addEventListener('beforeunload', saveGame);
</script>
</body>
</html>
