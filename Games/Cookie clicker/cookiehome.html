<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cookie Clicker Menu</title>

<style>
body {
    margin: 0;
    font-family: 'Trebuchet MS', sans-serif;
    background: radial-gradient(circle at center, #3a1f0f, #1b0d05);
    color: #fff;
    text-align: center;
}

/* Top bar */
.header {
    background: linear-gradient(#5a2c14, #2e1408);
    padding: 20px;
    font-size: 40px;
    color: gold;
    text-shadow: 2px 2px 5px black;
    border-bottom: 4px solid #8b4513;
}

/* Main container */
.container {
    margin-top: 80px;
}

/* Big cookie */
.cookie {
    width: 220px;
    height: 220px;
    margin: 0 auto 50px;
    border-radius: 50%;
    background: radial-gradient(circle, #d89b3c, #8b5a2b);
    box-shadow: inset 0 0 20px #5c3a1a, 0 0 40px gold;
    position: relative;
}

/* chocolate chips */
.cookie::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: #3b1f0f;
    border-radius: 50%;
    top: 40px;
    left: 50px;
    box-shadow:
        80px 30px #3b1f0f,
        120px 90px #3b1f0f,
        40px 120px #3b1f0f,
        150px 50px #3b1f0f;
}

/* Buttons */
.menu-btn {
    display: block;
    width: 280px;
    margin: 20px auto;
    padding: 15px;
    font-size: 22px;
    text-decoration: none;
    color: white;
    background: linear-gradient(#a0522d, #5a2c14);
    border: 3px solid #8b4513;
    border-radius: 12px;
    box-shadow: 0 5px #2b1206;
    transition: all 0.15s ease;
}

/* Hover effect */
.menu-btn:hover {
    background: linear-gradient(#c46c3c, #7a3a1c);
    transform: scale(1.05);
}

/* Click effect */
.menu-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px #2b1206;
}
</style>
</head>

<body>

<div class="header">
    🍪 Cookie Clicker
</div>

<div class="container">

    <div class="cookie"></div>

    <a href="Cookie Clicker.html" class="menu-btn">▶ Play Game</a>
    <a href="cookiedata.html" class="menu-btn">🏆 Scoreboard</a>

</div>

</body>
</html>
