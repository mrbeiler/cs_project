<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Frenzy: Neon Sky</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameContainer {
    position: relative;
    width: 480px;
    height: 640px;
  }
  canvas {
    display: block;
    border: 2px solid #0ff;
    box-shadow: 0 0 30px #0ff, 0 0 60px #0ff4, inset 0 0 30px #0001;
    image-rendering: pixelated;
  }
  #modeBar {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .modeBtn {
    background: #000;
    border: 1px solid #0ff;
    color: #0ff;
    padding: 5px 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    text-shadow: 0 0 6px #0ff;
  }
  .modeBtn:hover { background: #0ff2; box-shadow: 0 0 10px #0ff; }
  .modeBtn.active { background: #0ff3; box-shadow: 0 0 15px #0ff; border-color: #fff; color: #fff; }

  /* ── SCOREBOARD OVERLAY ── */
  #scoreboardOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #scoreboardOverlay.show { display: flex; }
  #scoreboardBox {
    width: 420px;
    max-height: 85vh;
    background: #050d20;
    border: 2px solid #0ff;
    box-shadow: 0 0 40px #0ff8, 0 0 80px #0ff3;
    border-radius: 4px;
    padding: 28px 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  #sbTitle {
    text-align: center;
    color: #0ff;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #0ff;
    margin-bottom: 6px;
  }
  #sbSubtitle {
    text-align: center;
    color: #0ff6;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 18px;
  }
  #sbList {
    flex: 1;
    overflow-y: auto;
    max-height: 320px;
  }
  #sbList::-webkit-scrollbar { width: 4px; }
  #sbList::-webkit-scrollbar-thumb { background: #0ff4; border-radius: 2px; }
  .sb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-bottom: 1px solid #0ff1;
    transition: background 0.15s;
  }
  .sb-row:hover { background: #00ffff10; }
  .sb-row.new-entry { background: #ff08; animation: flashNew 0.6s ease 2; }
  @keyframes flashNew { 0%,100%{background:#ff08} 50%{background:#ff03} }
  .sb-rank {
    width: 28px;
    text-align: center;
    font-size: 13px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .rank-1 { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
  .rank-2 { color: #c0c0c0; text-shadow: 0 0 8px #c0c0c0; }
  .rank-3 { color: #cd7f32; text-shadow: 0 0 8px #cd7f32; }
  .sb-rank.other { color: #0ff8; }
  .sb-name {
    flex: 1;
    font-size: 13px;
    color: #eee;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sb-tags {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .sb-tag {
    font-size: 9px;
    padding: 1px 5px;
    border: 1px solid #0ff5;
    border-radius: 3px;
    color: #0ffa;
    letter-spacing: 1px;
  }
  .sb-tag.hard   { border-color: #f005; color: #f008; }
  .sb-tag.speed  { border-color: #ff05; color: #ff08; }
  .sb-tag.reverse{ border-color: #f0f5; color: #f0f8; }
  .sb-tag.night  { border-color: #55f5; color: #88f8; }
  .sb-score {
    min-width: 48px;
    text-align: right;
    font-size: 16px;
    font-weight: bold;
    color: #0ff;
    text-shadow: 0 0 10px #0ff;
    flex-shrink: 0;
  }
  .sb-date {
    min-width: 70px;
    text-align: right;
    font-size: 9px;
    color: #0ff5;
    flex-shrink: 0;
  }
  #sbEmpty {
    text-align: center;
    color: #0ff4;
    font-size: 13px;
    padding: 40px 0;
    letter-spacing: 2px;
  }
  #sbActions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: center;
  }
  .sb-btn {
    background: #000;
    border: 1px solid #0ff;
    color: #0ff;
    padding: 7px 18px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    text-shadow: 0 0 6px #0ff;
  }
  .sb-btn:hover { background: #0ff2; box-shadow: 0 0 12px #0ff; }
  .sb-btn.danger { border-color: #f44; color: #f44; text-shadow: 0 0 6px #f44; }
  .sb-btn.danger:hover { background: #f442; box-shadow: 0 0 12px #f44; }

  #sbOpenBtn {
    background: #000;
    border: 1px solid #0ff4;
    color: #0ff8;
    padding: 5px 14px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 0 0 6px #0ff4;
    margin-top: 4px;
  }
  #sbOpenBtn:hover { border-color: #0ff; color: #0ff; text-shadow: 0 0 10px #0ff; }

  /* ── USERNAME ENTRY SCREEN ── */
  #usernameScreen {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  #usernameScreen.hidden { display: none; }

  /* scanline overlay */
  #usernameScreen::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 1;
  }

  #usernameWrap {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: min(900px, 96vw);
    max-height: 90vh;
    border: 2px solid #0ff;
    box-shadow: 0 0 50px #0ff8, 0 0 100px #0ff3;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    z-index: 2;
  }

  /* LEFT — name entry */
  #usernameCard {
    background: #050d20;
    padding: 40px 32px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    min-width: 300px;
    flex: 0 0 300px;
    border-right: 1px solid #0ff3;
  }
  #usernameCard .us-logo {
    font-size: 22px;
    font-weight: bold;
    color: #0ff;
    letter-spacing: 3px;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff6;
    text-align: center;
    line-height: 1.3;
  }
  #usernameCard .us-sub {
    font-size: 10px;
    color: #ff0;
    letter-spacing: 3px;
    text-shadow: 0 0 8px #ff0;
  }
  #usernameCard .us-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #0ff5, transparent);
  }
  #usernameCard .us-label {
    font-size: 10px;
    color: #0ff9;
    letter-spacing: 2px;
    text-align: center;
  }
  #usernameInput {
    background: #000;
    border: 2px solid #0ff;
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 20px;
    padding: 9px 14px;
    width: 100%;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    text-transform: uppercase;
    text-shadow: 0 0 10px #0ff;
    box-shadow: 0 0 14px #0ff4, inset 0 0 10px #0ff1;
    border-radius: 2px;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  #usernameInput:focus {
    box-shadow: 0 0 22px #0ff8, inset 0 0 12px #0ff2;
    border-color: #fff;
  }
  #usernameInput::placeholder { color: #0ff3; }
  #usernameCard .us-hint {
    font-size: 9px;
    color: #0ff5;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.7;
  }
  #usernameSubmit {
    background: #0ff1;
    border: 2px solid #0ff;
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 12px #0ff4;
    transition: all 0.2s;
    width: 100%;
  }
  #usernameSubmit:hover { background: #0ff3; box-shadow: 0 0 22px #0ff8; color: #fff; }
  #usernameSubmit:active { transform: scale(0.98); }
  #usCurrent {
    font-size: 10px;
    color: #0ff6;
    letter-spacing: 1px;
    text-align: center;
    min-height: 16px;
  }

  /* RIGHT — live leaderboard panel */
  #usLiveBoard {
    background: #030b18;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 20px 20px;
    min-width: 0;
    overflow: hidden;
  }
  #usLiveBoardTitle {
    text-align: center;
    color: #0ff;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 4px;
    text-shadow: 0 0 14px #0ff;
    margin-bottom: 4px;
  }
  #usLiveBoardSub {
    text-align: center;
    color: #0ff5;
    font-size: 9px;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  #usLiveList {
    flex: 1;
    overflow-y: auto;
    max-height: 420px;
  }
  #usLiveList::-webkit-scrollbar { width: 3px; }
  #usLiveList::-webkit-scrollbar-thumb { background: #0ff3; border-radius: 2px; }
  .us-sb-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-bottom: 1px solid #0ff1;
  }
  .us-sb-row.highlight {
    background: rgba(0,255,255,0.08);
    border-bottom-color: #0ff4;
  }
  .us-sb-rank {
    width: 24px;
    text-align: center;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
    color: #0ff7;
  }
  .us-sb-rank.r1 { color: #ffd700; text-shadow: 0 0 8px #ffd700; }
  .us-sb-rank.r2 { color: #c0c0c0; }
  .us-sb-rank.r3 { color: #cd7f32; }
  .us-sb-name {
    flex: 1;
    font-size: 12px;
    color: #ddd;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .us-sb-name.you { color: #0ff; text-shadow: 0 0 6px #0ff5; }
  .us-sb-tags { display: flex; gap: 3px; flex-shrink: 0; }
  .us-sb-tag {
    font-size: 8px;
    padding: 1px 4px;
    border: 1px solid #0ff4;
    color: #0ff7;
    letter-spacing: 1px;
  }
  .us-sb-score {
    min-width: 36px;
    text-align: right;
    font-size: 15px;
    font-weight: bold;
    color: #0ff;
    text-shadow: 0 0 8px #0ff;
    flex-shrink: 0;
  }
  #usLiveEmpty {
    text-align: center;
    color: #0ff3;
    font-size: 11px;
    padding: 40px 0;
    letter-spacing: 2px;
    line-height: 2;
  }

  /* "change pilot" button shown in modeBar */
  #changePilotBtn {
    background: #000;
    border: 1px solid #0ff4;
    color: #0ff6;
    padding: 5px 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 0 0 5px #0ff3;
    transition: all 0.2s;
  }
  #changePilotBtn:hover { border-color: #0ff; color: #0ff; text-shadow: 0 0 8px #0ff; }
  #pilotTag {
    font-size: 11px;
    color: #0ffa;
    letter-spacing: 2px;
    padding: 5px 8px;
    border: 1px solid #0ff3;
    text-shadow: 0 0 6px #0ff5;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<!-- Username / Leaderboard Entry Screen -->
<div id="usernameScreen">
  <div id="usernameWrap">
    <!-- LEFT: name entry -->
    <div id="usernameCard">
      <div class="us-logo">FLAPPY<br>FRENZY</div>
      <div class="us-sub">◈ NEON SKY ◈</div>
      <div class="us-divider"></div>
      <div class="us-label">YOUR PILOT NAME</div>
      <input id="usernameInput" maxlength="12" placeholder="TYPE HERE" autocomplete="off" spellcheck="false">
      <div id="usCurrent"></div>
      <div class="us-hint">
        UP TO 12 CHARS<br>
        SCORES AUTO-SAVE UNDER THIS NAME
      </div>
      <button id="usernameSubmit" onclick="confirmUsername()">▶ FLY!</button>
    </div>
    <!-- RIGHT: live leaderboard -->
    <div id="usLiveBoard">
      <div id="usLiveBoardTitle">🏆 LEADERBOARD</div>
      <div id="usLiveBoardSub">TOP PILOTS</div>
      <div id="usLiveList"></div>
    </div>
  </div>
</div>

<div id="gameContainer">
  <canvas id="c" width="480" height="640"></canvas>
</div>
<div id="modeBar">
  <span id="pilotTag">✈ —</span>
  <button class="modeBtn" id="btnHard"    onclick="toggleMode('hard')">⚡ HARD</button>
  <button class="modeBtn" id="btnSpeed"   onclick="toggleMode('speed')">🚀 SPEED</button>
  <button class="modeBtn" id="btnReverse" onclick="toggleMode('reverse')">🔀 REVERSE</button>
  <button class="modeBtn" id="btnNight"   onclick="toggleMode('night')">🌙 NIGHT</button>
  <button id="sbOpenBtn"                  onclick="openScoreboard()">🏆 SCORES</button>
  <button id="changePilotBtn"             onclick="changePilot()">✏ PILOT</button>
</div>

<!-- Scoreboard Overlay -->
<div id="scoreboardOverlay">
  <div id="scoreboardBox">
    <div id="sbTitle">🏆 HALL OF FAME</div>
    <div id="sbSubtitle">TOP PILOTS — NEON SKY</div>
    <div id="sbList"></div>
    <div id="sbActions">
      <button class="sb-btn" onclick="closeScoreboard()">▶ PLAY</button>
      <button class="sb-btn danger" onclick="clearScoreboard()">🗑 CLEAR</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const sbClient = window.supabase.createClient(
  "https://mqkbzxbrvzosemndjwja.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xa2J6eGJydnpvc2VtbmRqd2phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzE3NTEsImV4cCI6MjA5MTMwNzc1MX0.mSdhi4Pl5aJEIIXJv9SOTaj_jKJ_TRrM2LSNS0aqYag"
);
  

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── PILOT NAME ───
const PILOT_KEY = 'flappyFrenzy_pilot';

function getSavedPilot() {
  try { return localStorage.getItem(PILOT_KEY) || ''; }
  catch(e) { return ''; }
}

function savePilot(name) {
  try { localStorage.setItem(PILOT_KEY, name); }
  catch(e) {}
}

let currentPilot = getSavedPilot();

// Always show the username screen on load / when changePilot is called
function bootGame() {
  showUsernameScreen();
}

function showUsernameScreen() {
  const screen = document.getElementById('usernameScreen');
  screen.classList.remove('hidden');
  const inp = document.getElementById('usernameInput');
  inp.value = '';               // always start blank so player types fresh
  updateCurrentHint('');
  renderLiveBoard('');
  setTimeout(() => inp.focus(), 80);
}

function hideUsernameScreen() {
  document.getElementById('usernameScreen').classList.add('hidden');
}

// Show who played last session under the input
function updateCurrentHint(typedVal) {
  const el = document.getElementById('usCurrent');
  if (!el) return;
  if (typedVal.length === 0 && currentPilot) {
    el.textContent = 'LAST PILOT: ' + currentPilot;
  } else {
    el.textContent = '';
  }
}

// Render the live leaderboard inside the username screen,
// highlighting rows that match the typed name
async function renderLiveBoard(typed) {
  const scores = await loadScores();           // safe to call before SB_KEY is used below
  const list = document.getElementById('usLiveList');
  if (!list) return;
  if (scores.length === 0) {
    list.innerHTML = '<div id="usLiveEmpty">NO SCORES YET<br><br>BE THE FIRST<br>PILOT ON THE<br>BOARD</div>';
    return;
  }
  const upper = typed.trim().toUpperCase();
  list.innerHTML = scores.map((e, i) => {
    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const rankIcon  = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    const isYou = upper.length > 0 && e.name.startsWith(upper);
    const modeTags = (e.modes || []).map(m =>
      `<span class="us-sb-tag">${m.toUpperCase().slice(0,1)}</span>`
    ).join('');
    return `<div class="us-sb-row${isYou ? ' highlight' : ''}">
      <div class="us-sb-rank ${rankClass}">${rankIcon}</div>
      <div class="us-sb-name${isYou ? ' you' : ''}">${escHtml(e.name)}</div>
      <div class="us-sb-tags">${modeTags}</div>
      <div class="us-sb-score">${e.score}</div>
    </div>`;
  }).join('');
}

function confirmUsername() {
  const raw = document.getElementById('usernameInput').value.trim();
  // If they left it blank, keep the previous pilot name (or fall back to ANON)
  const name = (raw.toUpperCase().slice(0, 12)) || currentPilot || 'ANON';
  currentPilot = name;
  savePilot(name);
  hideUsernameScreen();
  updatePilotTag();
  // Start the game immediately so the FLY button actually flies!
  restart();
}

function changePilot() {
  if (state === 'playing') state = 'title';
  showUsernameScreen();
}

function updatePilotTag() {
  const tag = document.getElementById('pilotTag');
  if (tag) tag.textContent = '✈ ' + (currentPilot || '—');
}

// Live-update leaderboard as user types
document.getElementById('usernameInput').addEventListener('input', function() {
  updateCurrentHint(this.value);
  renderLiveBoard(this.value);
});
document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmUsername();
});

// Run boot — always shows screen
bootGame();

// ─── SCOREBOARD STORAGE ───
const SB_KEY = 'flappyFrenzy_scores';
let latestEntryIdx = -1;

async function loadScores() {
  const { data, error } = await sbClient
    .from("Scores")
    .select("*")
    .order("score", { ascending: false })
    .limit(10);

  if (error) {
    console.error("loadScores error:", JSON.stringify(error));
    return [];
  }

  return data;
}

async function addScore(name, sc, activeModes) {
  const entry = {
    name: (name || 'ANON').toUpperCase().slice(0, 12),
    score: sc,
    modes: activeModes
  };

  console.log("Inserting score:", JSON.stringify(entry));
  const { data, error } = await sbClient
    .from("Scores")
    .insert([entry])
    .select();

  if (error) {
    console.error("Insert failed:", JSON.stringify(error));
  } else {
    console.log("Insert success:", JSON.stringify(data));
  }
}







async function getHighScore() {
  const scores = await loadScores();
  return scores.length > 0 ? scores[0].score : 0;
}

// ─── SCOREBOARD UI ───
async function renderScoreboard() {
  const scores = await loadScores();
  const list = document.getElementById('sbList');
  if (scores.length === 0) {
    list.innerHTML = '<div id="sbEmpty">NO SCORES YET<br>BE THE FIRST PILOT</div>';
    return;
  }
  list.innerHTML = scores.map((e, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'other';
    const rankIcon  = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    const isNew = (i === latestEntryIdx);
    const modeTags = (e.modes || []).map(m =>
      `<span class="sb-tag ${m}">${m.toUpperCase()}</span>`
    ).join('');
    return `<div class="sb-row${isNew ? ' new-entry' : ''}">
      <div class="sb-rank ${rankClass}">${rankIcon}</div>
      <div class="sb-name">${escHtml(e.name)}</div>
      <div class="sb-tags">${modeTags}</div>
      <div class="sb-score">${e.score}</div>
      <div class="sb-date">${e.date || ''}</div>
    </div>`;
  }).join('');
  // scroll to new entry
  if (latestEntryIdx >= 0) {
    setTimeout(() => {
      const rows = list.querySelectorAll('.sb-row');
      if (rows[latestEntryIdx]) rows[latestEntryIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openScoreboard() {
  latestEntryIdx = -1;
  renderScoreboard();
  document.getElementById('scoreboardOverlay').classList.add('show');
}

function closeScoreboard() {
  document.getElementById('scoreboardOverlay').classList.remove('show');
}

function clearScoreboard() {
  if (!confirm('Clear all scores? This cannot be undone.')) return;
  localStorage.removeItem(SB_KEY);
  latestEntryIdx = -1;
  renderScoreboard();
}

// ─── HIGH SCORE ───
let highScore = 0;

async function initHighScore() {
  highScore = await getHighScore();
}

initHighScore();

// ─── MODES ───
const modes = { hard: false, speed: false, reverse: false, night: false };
function toggleMode(m) {
  modes[m] = !modes[m];
  document.getElementById('btn' + m.charAt(0).toUpperCase() + m.slice(1)).classList.toggle('active', modes[m]);
  if (state !== 'title') restart();
}

// ─── STATE ───
let state = 'title';
let score = 0, frame = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;

// ─── BIRD ───
const bird = { x: 100, y: H / 2, vy: 0, r: 14, flap: 0, trail: [] };
const GRAVITY_BASE = 0.38;
const FLAP_BASE = -7.2;
let gravity = GRAVITY_BASE;
let flapPower = FLAP_BASE;

// ─── PIPES ───
let pipes = [];
let pipeTimer = 0;
const PIPE_W = 52;
let pipeGap, pipeSpeed;

// ─── PARTICLES ───
let particles = [];

// ─── CLOUDS ───
let clouds = [
  { x: 100, y: 80, s: 1.0 }, { x: 280, y: 140, s: 0.7 },
  { x: 400, y: 60, s: 0.85 }, { x: 50, y: 200, s: 0.6 },
  { x: 350, y: 180, s: 0.9 },
];

// ─── STARS (night) ───
const stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * W, y: Math.random() * (H - 80),
  b: Math.random(), s: Math.random() * 1.5 + 0.5
}));

// ─── AUDIO ───
const AC = window.AudioContext ? new AudioContext() : null;
function beep(freq, type, dur, vol = 0.3, decay = 0.3) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + decay);
  o.start(); o.stop(AC.currentTime + dur);
}
function sfxFlap()  { beep(320, 'square', 0.08, 0.15, 0.08); }
function sfxPoint() {
  beep(660, 'sine', 0.07, 0.2, 0.07);
  setTimeout(() => beep(880, 'sine', 0.1, 0.2, 0.1), 70);
}
function sfxDie() {
  beep(180, 'sawtooth', 0.3, 0.4, 0.3);
  setTimeout(() => beep(100, 'sawtooth', 0.4, 0.4, 0.4), 100);
}

// ─── REVERSE GRAVITY ───
let reverseFlip = 0, reverseFlipping = false, reverseTimer = 0;

function getDifficultyParams() {
  const t = Math.floor(score / 5);
  pipeGap   = modes.hard  ? Math.max(100, 160 - t * 4) : Math.max(120, 190 - t * 4);
  pipeSpeed = (modes.speed ? 4.5 : 3.0) + Math.min(t * 0.18, 2.5);
  gravity   = (modes.reverse && reverseFlipping ? -GRAVITY_BASE : GRAVITY_BASE);
  flapPower = (modes.reverse && reverseFlipping ? -FLAP_BASE    : FLAP_BASE);
}

function spawnPipe() {
  const minY = 60, maxY = H - 100 - pipeGap;
  const gapY = minY + Math.random() * (maxY - minY);
  pipes.push({ x: W + 10, gapY, scored: false });
}

function restart() {
  bird.x = 100; bird.y = H / 2; bird.vy = 0; bird.trail = [];
  pipes = []; particles = [];
  score = 0; frame = 0; pipeTimer = 0;
  reverseFlip = 0; reverseFlipping = false; reverseTimer = 0;
  getDifficultyParams();
  state = 'playing';
}

function doFlap() {
  if (AC && AC.state === 'suspended') AC.resume();
  if (state === 'title') { restart(); return; }
  if (state === 'dead')  { restart(); return; }
  bird.vy = flapPower;
  bird.flap = 8;
  sfxFlap();
  spawnFlapParticles();
}

function spawnFlapParticles() {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: bird.x, y: bird.y,
      vx: -Math.random() * 2 - 0.5,
      vy: (Math.random() - 0.5) * 3,
      life: 1, decay: 0.06 + Math.random() * 0.04,
      r: Math.random() * 4 + 1,
      color: `hsl(${170 + Math.random() * 60}, 100%, 70%)`
    });
  }
}

function spawnCrashParticles() {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 5 + 1;
    particles.push({
      x: bird.x, y: bird.y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, decay: 0.025 + Math.random() * 0.02,
      r: Math.random() * 5 + 2,
      color: `hsl(${Math.random() * 60}, 100%, 70%)`
    });
  }
}

// ─── UPDATE ───
function update() {
  if (state !== 'playing') return;
  frame++;
  getDifficultyParams();

  if (modes.reverse) {
    reverseTimer++;
    if (reverseTimer > 240) {
      reverseTimer = 0;
      reverseFlipping = !reverseFlipping;
      reverseFlip = 20;
    }
    if (reverseFlip > 0) reverseFlip--;
  }

  bird.vy += gravity;
  bird.vy = Math.max(-12, Math.min(12, bird.vy));
  bird.y += bird.vy;
  if (bird.flap > 0) bird.flap--;

  bird.trail.unshift({ x: bird.x, y: bird.y });
  if (bird.trail.length > 10) bird.trail.pop();

  if (bird.y + bird.r >= H - 30 || bird.y - bird.r <= 0) die();

  pipeTimer++;
  const spawnInterval = Math.max(55, 85 - Math.floor(score / 5) * 2);
  if (pipeTimer >= spawnInterval) { pipeTimer = 0; spawnPipe(); }

  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= pipeSpeed;
    if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x) {
      pipes[i].scored = true;
      score++;
      sfxPoint();
    }
    const p = pipes[i];
    if (bird.x + bird.r - 4 > p.x && bird.x - bird.r + 4 < p.x + PIPE_W) {
      if (bird.y - bird.r < p.gapY || bird.y + bird.r > p.gapY + pipeGap) die();
    }
    if (p.x + PIPE_W < -10) pipes.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  clouds.forEach(c => { c.x -= c.s * (modes.night ? 0.3 : 0.5); if (c.x < -120) c.x = W + 60; });

  if (shakeDur > 0) {
    shakeDur--;
    shakeX = (Math.random() - 0.5) * 8;
    shakeY = (Math.random() - 0.5) * 8;
  } else { shakeX = 0; shakeY = 0; }
}

async function die() {
  if (state !== 'playing') return;
  state = 'dead';
  const prevHigh = await getHighScore();
  const isNewHigh = score > prevHigh;
  if (isNewHigh) highScore = score;
  else highScore = Math.max(highScore, prevHigh);
  sfxDie();
  spawnCrashParticles();
  shakeDur = 20;
  // Auto-save score immediately under the pilot name — no prompt needed
  if (score > 0) {
    const activeModes = Object.keys(modes).filter(m => modes[m]);
    await addScore(currentPilot || 'ANON', score, activeModes);
  }
}

// ─── DRAW HELPERS ───
function neon(color, blur = 12) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function clearNeon() { ctx.shadowBlur = 0; }

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  if (modes.night) {
    grad.addColorStop(0, '#020818');
    grad.addColorStop(1, '#050d20');
  } else {
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.6, '#0d1b4b');
    grad.addColorStop(1, '#1a0a3a');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  if (!modes.night) return;
  stars.forEach(s => {
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(frame * 0.02 + s.b * 10));
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawCloud(cx, cy, scale) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.fillStyle = modes.night ? 'rgba(100,150,255,0.08)' : 'rgba(180,200,255,0.12)';
  [[0,0,30],[22,-10,22],[44,0,28],[66,-8,20],[88,0,24]].forEach(([x, y, r]) => {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.restore();
}

function drawPipe(p) {
  const topH = p.gapY;
  const botY = p.gapY + pipeGap;
  const botH = H - 30 - botY;
  const pipeColor = modes.night ? '#00ff88' : '#00ff66';
  const capH = 18, capExtra = 6;

  function drawSection(x, y, w, h) {
    if (h <= 0) return;
    const grad = ctx.createLinearGradient(x, 0, x + w, 0);
    grad.addColorStop(0, '#003322');
    grad.addColorStop(0.3, pipeColor);
    grad.addColorStop(0.7, '#00ff88');
    grad.addColorStop(1, '#001a11');
    neon(pipeColor, 18);
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(x + 6, y, 8, h);
    clearNeon();
  }

  function drawCap(x, y, w, h, flip) {
    const capY = flip ? y - capH : y;
    neon(pipeColor, 22);
    const grad = ctx.createLinearGradient(x - capExtra, 0, x + w + capExtra, 0);
    grad.addColorStop(0, '#002211');
    grad.addColorStop(0.25, pipeColor);
    grad.addColorStop(0.75, '#00ff88');
    grad.addColorStop(1, '#001a11');
    ctx.fillStyle = grad;
    ctx.fillRect(x - capExtra, capY, w + capExtra * 2, capH);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(x - capExtra + 6, capY, 10, capH);
    clearNeon();
  }

  if (topH > 0) {
    drawSection(p.x, 0, PIPE_W, topH - capH);
    drawCap(p.x, topH - capH, PIPE_W, capH, false);
  }
  if (botH > 0) {
    drawCap(p.x, botY, PIPE_W, capH, false);
    drawSection(p.x, botY + capH, PIPE_W, botH - capH);
  }
}

function drawBird() {
  bird.trail.forEach((t, i) => {
    const alpha = (1 - i / bird.trail.length) * 0.3;
    ctx.save();
    ctx.globalAlpha = alpha;
    neon('#ff0', 8);
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath();
    ctx.arc(t.x, t.y, bird.r * (1 - i / bird.trail.length * 0.5), 0, Math.PI * 2);
    ctx.fill();
    clearNeon();
    ctx.restore();
  });

  const tilt = Math.max(-30, Math.min(25, bird.vy * 3.5));
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(tilt * Math.PI / 180);

  neon('#ffdd00', 20);
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r + 2, bird.r, 0, 0, Math.PI * 2);
  ctx.fill();

  const wingY = bird.flap > 0 ? -6 : 4;
  ctx.fillStyle = '#ff9900';
  neon('#ff6600', 10);
  ctx.beginPath();
  ctx.ellipse(-4, wingY, 10, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(6, -3, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(7, -3, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(8, -4, 1, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.moveTo(bird.r, -1); ctx.lineTo(bird.r + 8, 2); ctx.lineTo(bird.r, 5);
  ctx.closePath(); ctx.fill();

  clearNeon();
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    neon(p.color, 10);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    clearNeon();
    ctx.restore();
  });
}

function drawGround() {
  const gColor = modes.night ? '#00ff88' : '#00ff66';
  neon(gColor, 15);
  const grad = ctx.createLinearGradient(0, H - 30, 0, H);
  grad.addColorStop(0, modes.night ? '#00332a' : '#002211');
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H - 30, W, 30);
  ctx.strokeStyle = gColor;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, H - 30); ctx.lineTo(W, H - 30); ctx.stroke();
  clearNeon();
}

function drawHUD() {
  ctx.save();
  neon('#0ff', 20);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 38px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, 60);
  ctx.font = '13px "Courier New"';
  ctx.fillStyle = '#0ff';
  ctx.fillText(`HI: ${highScore}`, W / 2, 80);
  clearNeon();

  let modeText = [];
  if (modes.hard)    modeText.push('⚡HARD');
  if (modes.speed)   modeText.push('🚀SPEED');
  if (modes.reverse) modeText.push('🔀REVERSE');
  if (modes.night)   modeText.push('🌙NIGHT');
  if (modeText.length) {
    ctx.font = '11px "Courier New"';
    ctx.fillStyle = '#ff0';
    ctx.fillText(modeText.join('  '), W / 2, 98);
  }

  if (modes.reverse && reverseFlip > 0) {
    const alpha = reverseFlip / 20;
    ctx.globalAlpha = alpha;
    neon('#f0f', 30);
    ctx.fillStyle = '#f0f';
    ctx.font = 'bold 24px "Courier New"';
    ctx.fillText('⚠ GRAVITY FLIP!', W / 2, H / 2 - 60);
    clearNeon();
  }
  ctx.restore();
}

function drawTitle() {
  drawBackground();
  drawStars();
  clouds.forEach(c => drawCloud(c.x, c.y, c.s));
  drawGround();
  ctx.save();
  drawScanlines();

  neon('#0ff', 30);
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 32px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('FLAPPY FRENZY', W / 2, H / 2 - 100);
  ctx.font = 'bold 18px "Courier New"';
  ctx.fillStyle = '#ff0';
  neon('#ff0', 20);
  ctx.fillText('NEON SKY', W / 2, H / 2 - 70);

  ctx.font = '13px "Courier New"';
  ctx.fillStyle = '#aaa';
  ctx.shadowBlur = 0;
  ctx.fillText('ONE TAP.  ONE CHANCE.', W / 2, H / 2 - 30);
  ctx.fillText("DON'T HIT THE PIPE.", W / 2, H / 2 - 10);

  const pulse = 0.6 + 0.4 * Math.sin(frame * 0.05);
  ctx.globalAlpha = pulse;
  neon('#0ff', 20);
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 16px "Courier New"';
  ctx.fillText('[ SPACE / CLICK TO START ]', W / 2, H / 2 + 50);

  if (highScore > 0) {
    ctx.globalAlpha = 1;
    ctx.font = '13px "Courier New"';
    ctx.fillStyle = '#ff0';
    neon('#ff0', 10);
    ctx.fillText(`BEST: ${highScore}`, W / 2, H / 2 + 80);
  }

  clearNeon();
  ctx.restore();
}

function drawDead() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  neon('#f00', 30);
  ctx.fillStyle = '#ff3333';
  ctx.font = 'bold 40px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 80);

  ctx.font = 'bold 28px "Courier New"';
  neon('#fff', 10);
  ctx.fillStyle = '#fff';
  ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 - 30);

  ctx.font = '14px "Courier New"';
  neon('#0ff', 15);
  ctx.fillStyle = '#0ff';
  ctx.fillText(`BEST: ${highScore}`, W / 2, H / 2 + 35);

  const pulse = 0.6 + 0.4 * Math.sin(frame * 0.08);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#aaa';
  ctx.font = '14px "Courier New"';
  ctx.shadowBlur = 0;
  ctx.fillText('[ SPACE / CLICK TO RETRY ]', W / 2, H / 2 + 80);

  clearNeon();
  ctx.restore();
}

function drawScanlines() {
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);
  ctx.restore();
}

// ─── MAIN LOOP ───
function loop() {
  requestAnimationFrame(loop);
  frame++;

  if (state === 'title') {
    drawTitle();
    bird.y = H / 2 + Math.sin(frame * 0.05) * 20;
    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBird();
    ctx.restore();
    return;
  }

  update();

  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawBackground();
  drawStars();
  clouds.forEach(c => drawCloud(c.x, c.y, c.s));
  pipes.forEach(drawPipe);
  drawParticles();
  drawBird();
  drawGround();
  drawHUD();
  drawScanlines();
  ctx.restore();

  if (state === 'dead') drawDead();
}

// ─── INPUT ───
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeScoreboard(); return; }
  if (!document.getElementById('usernameScreen').classList.contains('hidden')) return;
  if (document.getElementById('scoreboardOverlay').classList.contains('show')) return;
  if (e.code === 'Space') { e.preventDefault(); doFlap(); }
});
canvas.addEventListener('click', () => {
  if (!document.getElementById('usernameScreen').classList.contains('hidden')) return;
  if (document.getElementById('scoreboardOverlay').classList.contains('show')) return;
  doFlap();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!document.getElementById('usernameScreen').classList.contains('hidden')) return;
  if (document.getElementById('scoreboardOverlay').classList.contains('show')) return;
  doFlap();
}, { passive: false });

loop();
</script>
</body>
