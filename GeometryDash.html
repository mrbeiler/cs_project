<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Dash: Neon Rebellion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-lime: #39ff14;
    --neon-yellow: #ffff00;
    --bg: #050508;
    --grid: rgba(0,245,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: none;
  }

  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    border: 2px solid var(--neon-cyan);
    transform: rotate(45deg) translate(-50%,-50%);
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s;
    box-shadow: 0 0 8px var(--neon-cyan);
  }

  /* ─── SCREENS ─── */
  .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .hidden { display: none !important; }

  /* ─── MENU ─── */
  #menuScreen {
    background: radial-gradient(ellipse at 50% 60%, #0a0020 0%, #050508 70%);
  }

  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 4s linear infinite;
  }

  @keyframes gridScroll {
    from { background-position: 0 0; }
    to { background-position: 40px 40px; }
  }

  .menu-content { position: relative; z-index: 2; text-align: center; }

  .logo {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .logo-geo {
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px rgba(0,245,255,0.4);
    display: block;
    animation: flicker 6s ease-in-out infinite;
  }

  .logo-dash {
    color: var(--neon-pink);
    text-shadow: 0 0 20px var(--neon-pink), 0 0 60px rgba(255,45,120,0.4);
    display: block;
  }

  .logo-sub {
    font-size: clamp(0.9rem, 2vw, 1.4rem);
    color: var(--neon-lime);
    letter-spacing: 0.5em;
    text-shadow: 0 0 15px var(--neon-lime);
    margin-top: 8px;
    font-weight: 400;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  .preview-cube {
    width: 60px; height: 60px;
    background: var(--neon-cyan);
    border: 2px solid white;
    box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 10px rgba(0,0,0,0.5);
    margin: 30px auto;
    animation: cubeSpin 2s linear infinite, cubeBob 1s ease-in-out infinite alternate;
    position: relative;
  }

  .preview-cube::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 2px solid rgba(255,255,255,0.5);
  }

  @keyframes cubeSpin { to { transform: rotate(360deg); } }
  @keyframes cubeBob { from { transform: translateY(0) rotate(0deg); } to { transform: translateY(-10px) rotate(180deg); } }

  .menu-buttons { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }

  .btn {
    padding: 14px 48px;
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, box-shadow 0.2s;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--neon-pink);
    color: #000;
    box-shadow: 0 0 20px var(--neon-pink), 0 0 40px rgba(255,45,120,0.3);
  }

  .btn-primary:hover { box-shadow: 0 0 30px var(--neon-pink), 0 0 60px rgba(255,45,120,0.5); }

  .btn-secondary {
    background: transparent;
    color: var(--neon-cyan);
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,245,255,0.3), inset 0 0 15px rgba(0,245,255,0.05);
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  .btn-secondary:hover { background: rgba(0,245,255,0.1); box-shadow: 0 0 25px var(--neon-cyan); }

  .level-select { display: flex; gap: 20px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }

  .level-btn {
    padding: 10px 22px;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    border: 2px solid;
    background: transparent;
    cursor: none;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .level-btn:hover { transform: scale(1.08); }
  .level-btn.easy { color: var(--neon-lime); border-color: var(--neon-lime); box-shadow: 0 0 10px rgba(57,255,20,0.3); }
  .level-btn.easy:hover { background: rgba(57,255,20,0.15); }
  .level-btn.medium { color: var(--neon-yellow); border-color: var(--neon-yellow); box-shadow: 0 0 10px rgba(255,255,0,0.3); }
  .level-btn.medium:hover { background: rgba(255,255,0,0.15); }
  .level-btn.hard { color: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255,45,120,0.3); }
  .level-btn.hard:hover { background: rgba(255,45,120,0.15); }
  .level-btn.demon { color: #ff4400; border-color: #ff4400; box-shadow: 0 0 10px rgba(255,68,0,0.3); }
  .level-btn.demon:hover { background: rgba(255,68,0,0.15); }
  .level-btn.selected { filter: brightness(1.5); }

  .difficulty-label {
    color: rgba(255,255,255,0.4);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  /* ─── GAME CANVAS ─── */
  #gameScreen { background: var(--bg); }

  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  /* ─── HUD ─── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 100;
  }

  .hud-left, .hud-right { display: flex; flex-direction: column; gap: 4px; }

  .hud-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .hud-percent { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
  .hud-attempts { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
  .hud-mode { color: var(--neon-lime); text-shadow: 0 0 10px var(--neon-lime); font-size: 0.85rem; }

  /* ─── PROGRESS BAR ─── */
  #progressBarContainer {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.06);
    z-index: 101;
  }

  #progressBar {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    box-shadow: 0 0 8px var(--neon-cyan);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ─── DEATH SCREEN ─── */
  #deathScreen {
    background: rgba(5,5,8,0.9);
    backdrop-filter: blur(4px);
    z-index: 200;
  }

  .death-title {
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 900;
    color: var(--neon-pink);
    text-shadow: 0 0 30px var(--neon-pink), 0 0 80px rgba(255,45,120,0.5);
    letter-spacing: 0.15em;
    animation: deathShake 0.5s ease-out;
  }

  @keyframes deathShake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-15px); }
    40% { transform: translateX(15px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(10px); }
  }

  .death-percent {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(1rem, 3vw, 1.8rem);
    color: rgba(255,255,255,0.5);
    margin: 8px 0 4px;
    letter-spacing: 0.1em;
  }

  .death-attempts {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.15em;
    margin-bottom: 32px;
  }

  .death-buttons { display: flex; gap: 16px; }

  /* ─── WIN SCREEN ─── */
  #winScreen {
    background: rgba(5,5,8,0.92);
    z-index: 200;
  }

  .win-title {
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-lime));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px var(--neon-cyan));
    letter-spacing: 0.1em;
    animation: winPulse 1s ease-in-out infinite alternate;
  }

  @keyframes winPulse {
    from { filter: drop-shadow(0 0 15px var(--neon-cyan)); }
    to { filter: drop-shadow(0 0 35px var(--neon-lime)); }
  }

  .win-stats {
    display: flex;
    gap: 40px;
    margin: 24px 0 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .win-stat { text-align: center; }
  .win-stat-val { font-size: 2rem; font-weight: 900; color: var(--neon-yellow); text-shadow: 0 0 15px var(--neon-yellow); }
  .win-stat-label { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.35); letter-spacing: 0.2em; margin-top: 4px; }

  /* ─── PARTICLES ─── */
  #particleCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  /* ─── BEAT FLASH ─── */
  #beatFlash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
    opacity: 0;
    background: radial-gradient(ellipse at center, rgba(0,245,255,0.08) 0%, transparent 70%);
  }

  /* ─── MOBILE TAP HINT ─── */
  .tap-hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.2em;
    animation: blink 1.5s ease-in-out infinite;
    pointer-events: none;
    z-index: 90;
  }

  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

  /* ─── COINS ─── */
  .coin-indicator {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .coin-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid var(--neon-yellow);
    box-shadow: 0 0 6px rgba(255,255,0,0.3);
  }

  .coin-dot.collected {
    background: var(--neon-yellow);
    box-shadow: 0 0 10px var(--neon-yellow);
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="particleCanvas"></canvas>
<div id="beatFlash"></div>

<!-- ─── MENU ─── -->
<div id="menuScreen" class="screen">
  <div class="grid-bg"></div>
  <div class="menu-content">
    <div class="logo">
      <span class="logo-geo">Geometry Dash</span>
      <span class="logo-dash">Neon Rebellion</span>
      <span class="logo-sub">◆ Sync or Die ◆</span>
    </div>
    <div class="preview-cube"></div>
    <div class="difficulty-label">Select Difficulty</div>
    <div class="level-select">
      <button class="level-btn easy selected" onclick="selectDifficulty('easy',this)">Easy</button>
      <button class="level-btn medium" onclick="selectDifficulty('medium',this)">Medium</button>
      <button class="level-btn hard" onclick="selectDifficulty('hard',this)">Hard</button>
      <button class="level-btn demon" onclick="selectDifficulty('demon',this)">Demon</button>
    </div>
    <div class="menu-buttons" style="margin-top:24px;">
      <button class="btn btn-primary" onclick="startGame()">▶ PLAY</button>
      <button class="btn btn-secondary" onclick="startPractice()">✦ PRACTICE MODE</button>
    </div>
  </div>
</div>

<!-- ─── GAME ─── -->
<div id="gameScreen" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
  <div id="progressBarContainer"><div id="progressBar"></div></div>
  <div id="hud">
    <div class="hud-left">
      <div class="hud-label">Progress</div>
      <div class="hud-value hud-percent" id="hudPercent">0%</div>
      <div class="coin-indicator">
        <div class="coin-dot" id="coin0"></div>
        <div class="coin-dot" id="coin1"></div>
        <div class="coin-dot" id="coin2"></div>
      </div>
    </div>
    <div class="hud-right">
      <div class="hud-label">Attempts</div>
      <div class="hud-value hud-attempts" id="hudAttempts">1</div>
      <div class="hud-value hud-mode" id="hudMode">CUBE</div>
    </div>
  </div>
  <div class="tap-hint" id="tapHint">TAP / CLICK TO JUMP</div>
</div>

<!-- ─── DEATH ─── -->
<div id="deathScreen" class="screen hidden">
  <div class="death-title">YOU DIED</div>
  <div class="death-percent" id="deathPercent">Reached 0%</div>
  <div class="death-attempts" id="deathAttempts">ATTEMPT 1</div>
  <div class="death-buttons">
    <button class="btn btn-primary" onclick="restartGame()">↺ RETRY</button>
    <button class="btn btn-secondary" onclick="showMenu()">⌂ MENU</button>
  </div>
</div>

<!-- ─── WIN ─── -->
<div id="winScreen" class="screen hidden">
  <div class="win-title">LEVEL COMPLETE</div>
  <div class="win-stats">
    <div class="win-stat">
      <div class="win-stat-val" id="winAttempts">-</div>
      <div class="win-stat-label">Attempts</div>
    </div>
    <div class="win-stat">
      <div class="win-stat-val" id="winCoins">0/3</div>
      <div class="win-stat-label">Secret Coins</div>
    </div>
    <div class="win-stat">
      <div class="win-stat-val" id="winTime">-</div>
      <div class="win-stat-label">Time (sec)</div>
    </div>
  </div>
  <div class="death-buttons">
    <button class="btn btn-primary" onclick="restartGame()">↺ PLAY AGAIN</button>
    <button class="btn btn-secondary" onclick="showMenu()">⌂ MENU</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  GEOMETRY DASH: NEON REBELLION  –  Full Engine
// ═══════════════════════════════════════════════════════════

const C = document.getElementById('gameCanvas');
const ctx = C.getContext('2d');
const PC = document.getElementById('particleCanvas');
const pctx = PC.getContext('2d');

// ─── DIFFICULTY CONFIGS ───
const DIFFICULTY = {
  easy:   { speed: 320, obstacleRate: 0.38, gravityFlips: false, fakeBlocks: false, waves: false },
  medium: { speed: 400, obstacleRate: 0.30, gravityFlips: true,  fakeBlocks: false, waves: false },
  hard:   { speed: 500, obstacleRate: 0.24, gravityFlips: true,  fakeBlocks: true,  waves: true  },
  demon:  { speed: 650, obstacleRate: 0.18, gravityFlips: true,  fakeBlocks: true,  waves: true  }
};

let selectedDifficulty = 'easy';
let cfg = DIFFICULTY.easy;

// ─── STATE ───
let state = 'menu';
let attempts = 0;
let practiceMode = false;
let levelStartTime = 0;
let coinsCollected = [false, false, false];

// ─── GAME VARS ───
let W, H, GROUND, CEILING;
let player, obstacles, particles, beatParticles;
let scrollX, levelProgress;
let running = false;
let lastTime = 0;
let beatTimer = 0;
const BEAT_INTERVAL = 0.5; // seconds between beats
let beatPhase = 0;
let gravityFlipped = false;
let currentMode = 'cube'; // cube, ship, ball, wave
let modeTimer = 0;
let nextModeChange = 0;
let holdingJump = false;
let checkpoints = [];
let lastCheckpoint = null;
let speedMultiplier = 1;
let speedTimer = 0;
let screenShake = 0;
let coinObjects = [];

function resize() {
  W = C.width = PC.width = window.innerWidth;
  H = C.height = PC.height = window.innerHeight;
  GROUND = H * 0.75;
  CEILING = H * 0.12;
}

window.addEventListener('resize', () => { resize(); if(running) initLevel(); });

// ─── CUSTOM CURSOR ───
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

// ─── DIFFICULTY SELECT ───
function selectDifficulty(d, btn) {
  selectedDifficulty = d;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ─── SCREENS ───
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
function showMenu() { state='menu'; running=false; show('menuScreen'); }

// ─── LEVEL GENERATION ───
function genLevel() {
  obstacles = [];
  coinObjects = [];
  const levelLen = 6000;
  cfg = DIFFICULTY[selectedDifficulty];

  // Platforms (ground + ceiling segments)
  // Obstacles: spikes, blocks, saws
  let x = 600;
  const gap = 28;

  const modePortalPositions = [];
  if(cfg.waves) {
    modePortalPositions.push(levelLen * 0.3, levelLen * 0.55, levelLen * 0.72);
  }

  while(x < levelLen - 200) {
    const r = Math.random();
    const zone = x / levelLen;
    const density = 0.4 + zone * 0.5; // harder as level progresses

    if(r < cfg.obstacleRate * density) {
      // spike cluster
      const count = 1 + Math.floor(Math.random() * (selectedDifficulty === 'demon' ? 4 : 2));
      for(let i = 0; i < count; i++) {
        const onCeiling = cfg.gravityFlips && Math.random() < 0.3 && zone > 0.4;
        obstacles.push({ type:'spike', x: x + i*gap, y: onCeiling ? CEILING : GROUND, onCeiling, size: 24 + Math.random()*8 });
      }
      x += count * gap + 60 + Math.random() * 120;
    } else if(r < cfg.obstacleRate * density + 0.12) {
      // block
      const w = 36 + Math.floor(Math.random()*3)*18;
      const h = 36;
      const onCeiling = cfg.gravityFlips && Math.random() < 0.2 && zone > 0.3;
      const isFake = cfg.fakeBlocks && Math.random() < 0.15;
      obstacles.push({ type:'block', x, y: onCeiling ? CEILING : GROUND-h, w, h, onCeiling, fake: isFake });
      x += w + 80 + Math.random() * 100;
    } else if(r < cfg.obstacleRate * density + 0.18 && zone > 0.2) {
      // saw blade
      obstacles.push({ type:'saw', x, y: GROUND - 18, r: 18, rot:0, speed: 3 + Math.random()*3 });
      x += 120 + Math.random() * 140;
    } else {
      x += 80 + Math.random() * 80;
    }
  }

  // 3 secret coins in risky positions
  const coinPositions = [levelLen*0.22, levelLen*0.52, levelLen*0.78];
  coinPositions.forEach((cx, i) => {
    coinObjects.push({ x: cx, y: GROUND - 80 - Math.random()*60, r: 10, collected: false, idx: i });
  });

  // Speed change portals
  obstacles.push({ type:'speedPortal', x: levelLen*0.4, multiplier: 1.3 });
  obstacles.push({ type:'speedPortal', x: levelLen*0.7, multiplier: 1.5 });

  // Gravity flip portals
  if(cfg.gravityFlips) {
    obstacles.push({ type:'gravPortal', x: levelLen*0.35, flip: true });
    obstacles.push({ type:'gravPortal', x: levelLen*0.5, flip: false });
  }

  // Mode portals
  if(cfg.waves) {
    obstacles.push({ type:'modePortal', x: levelLen*0.3, mode:'ship' });
    obstacles.push({ type:'modePortal', x: levelLen*0.45, mode:'cube' });
    obstacles.push({ type:'modePortal', x: levelLen*0.6, mode:'wave' });
    obstacles.push({ type:'modePortal', x: levelLen*0.68, mode:'cube' });
  }

  // Practice checkpoints
  if(practiceMode) {
    for(let i=0; i<5; i++) checkpoints.push(levelLen * (i+1)/6);
  }

  return levelLen;
}

// ─── INIT ───
let levelLen = 6000;
function initLevel() {
  resize();
  levelLen = genLevel();
  coinsCollected = [false,false,false];
  scrollX = 0;
  levelProgress = 0;
  gravityFlipped = false;
  currentMode = 'cube';
  speedMultiplier = 1;
  screenShake = 0;
  holdingJump = false;
  lastCheckpoint = null;
  beatTimer = 0;
  beatPhase = 0;

  player = {
    x: 120, y: GROUND - 30,
    vy: 0,
    size: 30,
    rot: 0,
    grounded: false,
    alive: true,
    trail: [],
    color: '#00f5ff',
    glowColor: '#00f5ff'
  };

  particles = [];

  updateCoinUI();
  document.getElementById('hudMode').textContent = 'CUBE';
  document.getElementById('tapHint').style.opacity = '1';
}

// ─── START ───
function startGame() {
  state = 'game';
  practiceMode = false;
  attempts = 1;
  levelStartTime = Date.now();
  show('gameScreen');
  initLevel();
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function startPractice() {
  state = 'game';
  practiceMode = true;
  attempts = 1;
  levelStartTime = Date.now();
  show('gameScreen');
  initLevel();
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

// ─── INPUT ───
let jumpQueued = false;
function doJump() {
  if(!running || !player.alive) return;
  jumpQueued = true;
  holdingJump = true;
  document.getElementById('tapHint').style.opacity = '0';
}
function doRelease() { holdingJump = false; }

document.addEventListener('keydown', e => { if(e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); } });
document.addEventListener('keyup', e => { if(e.code==='Space'||e.code==='ArrowUp') doRelease(); });
document.getElementById('gameCanvas').addEventListener('mousedown', doJump);
document.addEventListener('mouseup', doRelease);
document.getElementById('gameCanvas').addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, {passive:false});
document.addEventListener('touchend', doRelease);

// ─── PHYSICS CONSTANTS ───
function getGravity() {
  const base = 3200;
  const dm = selectedDifficulty === 'demon' ? 1.15 : selectedDifficulty === 'hard' ? 1.1 : 1;
  return (gravityFlipped ? -1 : 1) * base * dm;
}

function getJumpVel() {
  const base = -950;
  return (gravityFlipped ? -1 : 1) * base * (selectedDifficulty === 'demon' ? 1.05 : 1);
}

function getFloor() { return gravityFlipped ? CEILING + player.size/2 : GROUND - player.size/2; }
function getCeiling() { return gravityFlipped ? GROUND - player.size/2 : CEILING + player.size/2; }

// ─── UPDATE ───
function update(dt) {
  if(!player.alive) return;

  beatTimer += dt;
  if(beatTimer >= BEAT_INTERVAL) {
    beatTimer -= BEAT_INTERVAL;
    beatPhase++;
    onBeat();
  }

  const speed = cfg.speed * speedMultiplier;
  scrollX += speed * dt;
  levelProgress = Math.min(scrollX / levelLen, 1);

  // Update player based on mode
  if(currentMode === 'cube') {
    updateCube(dt);
  } else if(currentMode === 'ship') {
    updateShip(dt);
  } else if(currentMode === 'wave') {
    updateWave(dt);
  } else if(currentMode === 'ball') {
    updateBall(dt);
  }

  // Screen shake decay
  screenShake *= 0.85;

  // Trail
  player.trail.push({ x: player.x, y: player.y, rot: player.rot, alpha: 1 });
  if(player.trail.length > 12) player.trail.shift();
  player.trail.forEach(t => t.alpha -= dt * 3);

  // Saws rotate
  obstacles.forEach(o => { if(o.type==='saw') o.rot += o.speed * dt * 60; });

  // Collisions
  checkCollisions();

  // Coins
  coinObjects.forEach(coin => {
    if(!coin.collected) {
      const dx = (player.x) - coin.x;
      const dy = player.y - coin.y;
      if(Math.sqrt(dx*dx+dy*dy) < player.size/2 + coin.r) {
        coin.collected = true;
        coinsCollected[coin.idx] = true;
        updateCoinUI();
        spawnCoinBurst(coin.x - scrollX + W*0.2, coin.y);
      }
    }
  });

  // HUD
  const pct = Math.floor(levelProgress * 100);
  document.getElementById('hudPercent').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  // Practice checkpoints
  if(practiceMode) {
    checkpoints.forEach(cp => {
      if(!lastCheckpoint || cp > lastCheckpoint) {
        if(scrollX >= cp) {
          lastCheckpoint = cp;
          saveCheckpoint();
        }
      }
    });
  }

  // Win
  if(levelProgress >= 1) win();

  // Particles update
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 300 * dt;
    p.life -= dt;
    p.alpha = p.life / p.maxLife;
  });
}

function updateCube(dt) {
  player.vy += getGravity() * dt;

  if(jumpQueued && player.grounded) {
    player.vy = getJumpVel();
    player.grounded = false;
    spawnJumpParticles();
  }
  jumpQueued = false;

  player.y += player.vy * dt;

  const floor = getFloor();
  const ceil = getCeiling();

  if((!gravityFlipped && player.y >= floor) || (gravityFlipped && player.y <= floor)) {
    player.y = floor;
    player.vy = 0;
    player.grounded = true;
  } else {
    player.grounded = false;
  }

  if((!gravityFlipped && player.y <= ceil) || (gravityFlipped && player.y >= ceil)) {
    player.y = ceil;
    player.vy = 0;
  }

  player.rot += dt * (gravityFlipped ? -300 : 300);
  if(player.grounded) player.rot = Math.round(player.rot/90)*90;
}

function updateShip(dt) {
  if(holdingJump) {
    player.vy -= 1400 * dt;
  } else {
    player.vy += 900 * dt;
  }
  player.vy = Math.max(-400, Math.min(400, player.vy));
  player.y += player.vy * dt;

  const floor = getFloor();
  const ceil = getCeiling();
  if(player.y >= floor) { player.y = floor; player.vy = 0; }
  if(player.y <= ceil) { player.y = ceil; player.vy = 0; }

  jumpQueued = false;
  player.rot = player.vy * 0.05;
}

function updateWave(dt) {
  const waveSpeed = 280;
  if(holdingJump) {
    player.y -= waveSpeed * dt;
  } else {
    player.y += waveSpeed * dt;
  }
  jumpQueued = false;
  player.rot += dt * 180;

  const floor = getFloor();
  const ceil = getCeiling();
  if(player.y >= floor) { die(); return; }
  if(player.y <= ceil) { die(); return; }
}

function updateBall(dt) {
  if(jumpQueued) {
    gravityFlipped = !gravityFlipped;
    jumpQueued = false;
  }
  player.vy += getGravity() * dt;
  player.y += player.vy * dt;
  const floor = getFloor();
  const ceil = getCeiling();
  if((!gravityFlipped && player.y >= floor) || (gravityFlipped && player.y <= floor)) {
    player.y = floor; player.vy = 0; player.grounded = true;
  } else { player.grounded = false; }
  player.rot += dt * 200 * (gravityFlipped ? -1 : 1);
}

let savedCheckpointState = null;
function saveCheckpoint() {
  savedCheckpointState = {
    scrollX, levelProgress, playerY: player.y, playerVy: player.vy,
    gravityFlipped, currentMode, speedMultiplier, coinsCollected: [...coinsCollected]
  };
  spawnCheckpointEffect();
}

function loadCheckpoint() {
  if(!savedCheckpointState) { initLevel(); return; }
  const s = savedCheckpointState;
  scrollX = s.scrollX;
  levelProgress = s.levelProgress;
  player.y = s.playerY;
  player.vy = s.playerVy;
  gravityFlipped = s.gravityFlipped;
  currentMode = s.currentMode;
  speedMultiplier = s.speedMultiplier;
  coinsCollected = [...s.coinsCollected];
  player.alive = true;
  player.grounded = false;
  document.getElementById('hudMode').textContent = currentMode.toUpperCase();
}

// ─── COLLISION ───
function checkCollisions() {
  const px = player.x, py = player.y, ps = player.size * 0.44;

  obstacles.forEach(o => {
    const ox = o.x - scrollX + W * 0.2;

    if(o.type === 'spike') {
      if(Math.abs(ox - px) < ps + 8 && Math.abs(o.y - py) < ps + 14) die();
    }
    else if(o.type === 'block' && !o.fake) {
      const bx = ox, by = o.y, bw = o.w, bh = o.h;
      if(px+ps > bx && px-ps < bx+bw && py+ps > by && py-ps < by+bh) die();
    }
    else if(o.type === 'saw') {
      const dist = Math.sqrt((ox-px)**2 + (o.y-py)**2);
      if(dist < ps + o.r * 0.8) die();
    }
    else if(o.type === 'speedPortal' && Math.abs(ox - px) < 18) {
      speedMultiplier = o.multiplier;
    }
    else if(o.type === 'gravPortal' && Math.abs(ox - px) < 18) {
      if(o.flip !== gravityFlipped) {
        gravityFlipped = o.flip;
        player.vy = 0;
      }
    }
    else if(o.type === 'modePortal' && Math.abs(ox - px) < 18) {
      if(o.mode !== currentMode) {
        currentMode = o.mode;
        document.getElementById('hudMode').textContent = currentMode.toUpperCase();
        if(currentMode === 'cube') player.color = player.glowColor = '#00f5ff';
        if(currentMode === 'ship') { player.color = '#ff2d78'; player.glowColor = '#ff2d78'; }
        if(currentMode === 'wave') { player.color = '#39ff14'; player.glowColor = '#39ff14'; }
        if(currentMode === 'ball') { player.color = '#ffff00'; player.glowColor = '#ffff00'; }
      }
    }
  });
}

// ─── DIE ───
function die() {
  if(!player.alive) return;
  player.alive = false;
  running = false;
  screenShake = 14;
  spawnDeathExplosion(player.x, player.y);

  setTimeout(() => {
    document.getElementById('deathPercent').textContent = 'Reached ' + Math.floor(levelProgress*100) + '%';
    document.getElementById('deathAttempts').textContent = 'ATTEMPT ' + attempts;
    show('deathScreen');
  }, 600);
}

function restartGame() {
  attempts++;
  document.getElementById('hudAttempts').textContent = attempts;
  show('gameScreen');
  if(practiceMode && savedCheckpointState) {
    initLevel();
    loadCheckpoint();
  } else {
    initLevel();
  }
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function win() {
  running = false;
  const elapsed = ((Date.now() - levelStartTime) / 1000).toFixed(1);
  const coins = coinsCollected.filter(Boolean).length;
  document.getElementById('winAttempts').textContent = attempts;
  document.getElementById('winCoins').textContent = coins + '/3';
  document.getElementById('winTime').textContent = elapsed + 's';
  spawnWinFireworks();
  setTimeout(() => show('winScreen'), 800);
}

// ─── BEAT ───
function onBeat() {
  const flash = document.getElementById('beatFlash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 80);
  screenShake += 1.5;

  // Spawn ambient beat particles
  for(let i=0; i<3; i++) {
    const colors = ['#00f5ff','#ff2d78','#39ff14'];
    particles.push({
      x: Math.random()*W, y: GROUND,
      vx: (Math.random()-0.5)*80,
      vy: -Math.random()*200-60,
      life: 0.8, maxLife: 0.8,
      color: colors[beatPhase%3],
      size: 2+Math.random()*3, alpha:1
    });
  }
}

// ─── COIN UI ───
function updateCoinUI() {
  for(let i=0;i<3;i++) {
    const el = document.getElementById('coin'+i);
    if(coinsCollected[i]) el.classList.add('collected');
    else el.classList.remove('collected');
  }
}

// ─── PARTICLES ───
function spawnJumpParticles() {
  for(let i=0;i<8;i++) {
    particles.push({
      x: player.x + (Math.random()-0.5)*20,
      y: player.y + player.size/2,
      vx: (Math.random()-0.5)*120,
      vy: Math.random()*80+20,
      life: 0.4, maxLife: 0.4,
      color: player.glowColor, size: 3+Math.random()*3, alpha:1
    });
  }
}

function spawnDeathExplosion(x, y) {
  for(let i=0;i<40;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 80+Math.random()*300;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - 100,
      life: 0.6+Math.random()*0.4, maxLife:1,
      color: ['#ff2d78','#00f5ff','#ffff00','#fff'][Math.floor(Math.random()*4)],
      size: 2+Math.random()*6, alpha:1
    });
  }
}

function spawnCoinBurst(x, y) {
  for(let i=0;i<20;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 50+Math.random()*150;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - 80,
      life: 0.8, maxLife:0.8,
      color: '#ffff00', size: 3+Math.random()*4, alpha:1
    });
  }
}

function spawnCheckpointEffect() {
  for(let i=0;i<25;i++) {
    particles.push({
      x: player.x, y: player.y,
      vx: (Math.random()-0.5)*200,
      vy: -Math.random()*150-50,
      life:0.7, maxLife:0.7,
      color:'#39ff14', size:3+Math.random()*4, alpha:1
    });
  }
}

function spawnWinFireworks() {
  setInterval(() => {
    if(state !== 'game') return;
    const x = Math.random()*W, y = Math.random()*H*0.6;
    const c = ['#ff2d78','#00f5ff','#39ff14','#ffff00'][Math.floor(Math.random()*4)];
    for(let i=0;i<30;i++) {
      const a=Math.random()*Math.PI*2, s=80+Math.random()*200;
      particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, maxLife:1, color:c, size:2+Math.random()*4, alpha:1 });
    }
  }, 200);
}

// ─── DRAW ───
function draw() {
  ctx.clearRect(0, 0, W, H);

  const shakeX = (Math.random()-0.5)*screenShake;
  const shakeY = (Math.random()-0.5)*screenShake*0.5;
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#050508');
  bgGrad.addColorStop(0.7, '#050508');
  bgGrad.addColorStop(1, '#0a001a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawBackground();
  drawObstacles();
  drawCoins();
  drawPlayer();
  drawGround();

  ctx.restore();
  drawParticles();
}

function drawGrid() {
  const gridSize = 40;
  const offsetX = (-scrollX * 0.15) % gridSize;
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for(let x = offsetX; x < W; x += gridSize) {
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
  }
  for(let y = 0; y < H; y += gridSize) {
    ctx.moveTo(0, y); ctx.lineTo(W, y);
  }
  ctx.stroke();
}

function drawBackground() {
  // Distant parallax neon lines
  const t = Date.now()/1000;
  ctx.save();
  ctx.globalAlpha = 0.06;
  [0.3, 0.6, 0.9].forEach((y,i) => {
    ctx.strokeStyle = ['#ff2d78','#00f5ff','#39ff14'][i];
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, H*y + Math.sin(t+i)*5);
    ctx.lineTo(W, H*y + Math.cos(t*0.7+i)*5);
    ctx.stroke();
  });
  ctx.restore();
}

function drawGround() {
  // Ground
  ctx.save();
  const gy = GROUND;
  const grad = ctx.createLinearGradient(0, gy, 0, H);
  grad.addColorStop(0, 'rgba(0,245,255,0.25)');
  grad.addColorStop(0.08, 'rgba(0,245,255,0.08)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gy, W, H-gy);
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();

  // Ceiling line
  ctx.strokeStyle = 'rgba(0,245,255,0.25)';
  ctx.lineWidth = 1;
  ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.moveTo(0,CEILING); ctx.lineTo(W,CEILING); ctx.stroke();
  ctx.restore();
}

function drawObstacles() {
  obstacles.forEach(o => {
    const ox = o.x - scrollX + W * 0.2;
    if(ox < -100 || ox > W + 100) return;

    ctx.save();

    if(o.type === 'spike') {
      const tx = ox, ty = o.y, s = o.size;
      ctx.shadowColor = '#ff2d78';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#ff2d78';
      ctx.strokeStyle = '#ff8ab0';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      if(o.onCeiling) {
        ctx.moveTo(tx, ty + s);
        ctx.lineTo(tx - s/2, ty);
        ctx.lineTo(tx + s/2, ty);
      } else {
        ctx.moveTo(tx, ty - s);
        ctx.lineTo(tx - s/2, ty);
        ctx.lineTo(tx + s/2, ty);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
    else if(o.type === 'block') {
      ctx.shadowColor = o.fake ? '#39ff14' : '#ff2d78';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = o.fake ? '#39ff14' : '#ff2d78';
      ctx.lineWidth = 2;
      ctx.fillStyle = o.fake ? 'rgba(57,255,20,0.15)' : 'rgba(255,45,120,0.2)';
      ctx.fillRect(ox, o.y, o.w, o.h);
      ctx.strokeRect(ox, o.y, o.w, o.h);
      // inner grid lines
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = o.fake ? '#39ff14' : '#ff2d78';
      ctx.lineWidth = 1;
      for(let ix=18; ix<o.w; ix+=18) { ctx.beginPath(); ctx.moveTo(ox+ix,o.y); ctx.lineTo(ox+ix,o.y+o.h); ctx.stroke(); }
      for(let iy=18; iy<o.h; iy+=18) { ctx.beginPath(); ctx.moveTo(ox,o.y+iy); ctx.lineTo(ox+o.w,o.y+iy); ctx.stroke(); }
    }
    else if(o.type === 'saw') {
      ctx.translate(ox, o.y);
      ctx.rotate(o.rot * Math.PI/180);
      ctx.shadowColor = '#ff2d78';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#ff2d78';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, o.r, 0, Math.PI*2); ctx.stroke();
      // teeth
      const teeth = 8;
      ctx.fillStyle = '#ff2d78';
      for(let i=0;i<teeth;i++) {
        const a = (i/teeth)*Math.PI*2;
        ctx.save();
        ctx.rotate(a);
        ctx.beginPath();
        ctx.moveTo(o.r-4, -5);
        ctx.lineTo(o.r+8, 0);
        ctx.lineTo(o.r-4, 5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill();
    }
    else if(o.type === 'speedPortal') {
      drawPortal(ox, (GROUND+CEILING)/2, '#ffff00', '▶▶');
    }
    else if(o.type === 'gravPortal') {
      drawPortal(ox, (GROUND+CEILING)/2, '#ff9900', o.flip ? '↑' : '↓');
    }
    else if(o.type === 'modePortal') {
      const modeColors = { cube:'#00f5ff', ship:'#ff2d78', wave:'#39ff14', ball:'#ffff00' };
      const modeIcons  = { cube:'◆', ship:'✈', wave:'~', ball:'○' };
      drawPortal(ox, (GROUND+CEILING)/2, modeColors[o.mode]||'#fff', modeIcons[o.mode]||'?');
    }

    ctx.restore();
  });
}

function drawPortal(x, y, color, label) {
  const ph = (GROUND-CEILING)*0.85;
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.85;
  ctx.strokeRect(x-16, y-ph/2, 32, ph);
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = color;
  ctx.fillRect(x-16, y-ph/2, 32, ph);
  ctx.globalAlpha = 1;
  ctx.fillStyle = color;
  ctx.font = 'bold 18px Orbitron';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.shadowBlur = 0;
}

function drawCoins() {
  coinObjects.forEach(coin => {
    if(coin.collected) return;
    const cx = coin.x - scrollX + W * 0.2;
    if(cx < -50 || cx > W+50) return;
    const t = Date.now()/1000;
    const cy = coin.y + Math.sin(t*2 + coin.idx)*6;
    ctx.save();
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 2.5;
    ctx.fillStyle = 'rgba(255,255,0,0.2)';
    ctx.beginPath(); ctx.arc(cx, cy, coin.r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 10px Orbitron';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('★', cx, cy);
    ctx.restore();
  });
}

function drawPlayer() {
  if(!player.alive && Date.now()%200 < 100) return;

  const { x, y, size, rot, trail, color, glowColor } = player;

  // Trail
  trail.forEach((t, i) => {
    if(t.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = t.alpha * 0.35;
    ctx.translate(t.x, t.y);
    ctx.rotate(t.rot * Math.PI/180);
    ctx.fillStyle = color;
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 8;
    const s = size * (0.5 + (i/trail.length)*0.5);
    ctx.fillRect(-s/2, -s/2, s, s);
    ctx.restore();
  });

  // Player body
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot * Math.PI/180);
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 25;

  if(currentMode === 'cube') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.fillStyle = color;
    ctx.fillRect(-size/2, -size/2, size, size);
    ctx.strokeRect(-size/2, -size/2, size, size);
    // Inner design
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    const is = size*0.35;
    ctx.strokeRect(-is/2, -is/2, is, is);
    ctx.globalAlpha = 1;
  } else if(currentMode === 'ship') {
    ctx.fillStyle = color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(size*0.6, 0);
    ctx.lineTo(-size*0.5, -size*0.35);
    ctx.lineTo(-size*0.3, 0);
    ctx.lineTo(-size*0.5, size*0.35);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  } else if(currentMode === 'wave') {
    ctx.fillStyle = color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -size*0.5);
    ctx.lineTo(size*0.5, 0);
    ctx.lineTo(0, size*0.5);
    ctx.lineTo(-size*0.5, 0);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  } else if(currentMode === 'ball') {
    ctx.fillStyle = color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,0,size/2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,size*0.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();
  }

  ctx.restore();

  // Glow orb
  ctx.save();
  const glowGrad = ctx.createRadialGradient(x,y,0,x,y,size*1.5);
  glowGrad.addColorStop(0, glowColor + '33');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(x,y,size*1.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticles() {
  pctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    if(p.alpha <= 0) return;
    pctx.save();
    pctx.globalAlpha = p.alpha;
    pctx.shadowColor = p.color;
    pctx.shadowBlur = p.size * 2;
    pctx.fillStyle = p.color;
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    pctx.fill();
    pctx.restore();
  });
}

// ─── MAIN LOOP ───
function loop(ts) {
  if(!running) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── INIT ───
resize();
</script>
</body>
