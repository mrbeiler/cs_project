<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Dynasty 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rye&family=Cabin:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a0a00;overflow:hidden;font-family:'Cabin',sans-serif;color:#fff}
  #canvas-container{position:fixed;inset:0}
  canvas{display:block}

  /* HUD */
  #hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
  #top-bar{background:linear-gradient(180deg,rgba(0,0,0,.8)0%,transparent 100%);padding:12px 20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  #title{font-family:'Rye',serif;font-size:1.4em;color:#f5c542;text-shadow:0 0 20px rgba(245,197,66,.5)}
  .stat{background:rgba(0,0,0,.5);border:1px solid rgba(245,197,66,.3);padding:5px 12px;border-radius:20px;font-size:.85em;color:#f5c542}
  .stat span{color:#fff;font-weight:700}

  /* Controls panel */
  #controls-panel{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.95)0%,transparent 100%);padding:15px 20px 20px;pointer-events:auto;z-index:10}
  #controls-inner{display:flex;gap:12px;align-items:center;flex-wrap:wrap;max-width:1400px;margin:0 auto}
  
  .btn{padding:8px 16px;border:2px solid;border-radius:8px;cursor:pointer;font-family:'Cabin',sans-serif;font-weight:700;font-size:.82em;transition:all .15s;letter-spacing:.5px;text-transform:uppercase}
  .btn-gold{background:rgba(245,197,66,.15);border-color:#f5c542;color:#f5c542}
  .btn-gold:hover,.btn-gold.active{background:#f5c542;color:#000}
  .btn-green{background:rgba(76,175,80,.15);border-color:#4caf50;color:#4caf50}
  .btn-green:hover,.btn-green.active{background:#4caf50;color:#000}
  .btn-blue{background:rgba(33,150,243,.15);border-color:#2196f3;color:#2196f3}
  .btn-blue:hover,.btn-blue.active{background:#2196f3;color:#000}
  .btn-red{background:rgba(244,67,54,.15);border-color:#f44336;color:#f44336}
  .btn-red:hover,.btn-red.active{background:#f44336;color:#fff}
  .btn-purple{background:rgba(156,39,176,.15);border-color:#9c27b0;color:#ce93d8}
  .btn-purple:hover,.btn-purple.active{background:#9c27b0;color:#fff}
  .btn:disabled{opacity:.35;cursor:not-allowed}

  .sep{width:1px;height:36px;background:rgba(255,255,255,.15)}

  select{background:#111;border:2px solid rgba(245,197,66,.4);color:#f5c542;padding:7px 12px;border-radius:8px;font-family:'Cabin',sans-serif;font-size:.82em;cursor:pointer}
  select:focus{outline:none;border-color:#f5c542}

  /* Tractor switcher */
  #tractor-panel{position:fixed;right:0;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.9);border-left:2px solid rgba(245,197,66,.3);padding:15px;width:220px;z-index:10;pointer-events:auto}
  #tractor-panel h3{font-family:'Rye',serif;color:#f5c542;font-size:.95em;margin-bottom:10px;text-align:center}
  .tractor-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;transition:all .2s}
  .tractor-card:hover{background:rgba(245,197,66,.1);border-color:rgba(245,197,66,.4)}
  .tractor-card.active{background:rgba(245,197,66,.2);border-color:#f5c542}
  .tractor-card.locked{opacity:.4;cursor:not-allowed}
  .tractor-name{font-weight:700;color:#f5c542;font-size:.82em}
  .tractor-info{font-size:.72em;color:#aaa;margin-top:3px}
  .tractor-price{font-size:.75em;color:#4caf50;margin-top:4px;font-weight:700}

  /* Message */
  #msg{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:2px solid #f5c542;padding:10px 24px;border-radius:25px;font-weight:700;color:#f5c542;z-index:100;pointer-events:none;opacity:0;transition:opacity .3s;font-size:.9em;white-space:nowrap}

  /* Key guide */
  #key-guide{position:fixed;left:15px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;z-index:10;font-size:.72em;line-height:1.8}
  #key-guide b{color:#f5c542}

  /* Mini map */
  #minimap{position:fixed;right:235px;bottom:100px;width:120px;height:120px;border:2px solid rgba(245,197,66,.5);border-radius:8px;overflow:hidden;z-index:10}
  #minimap canvas{width:100%;height:100%}

  /* Attachment indicator */
  #attachment-hud{position:fixed;left:50%;transform:translateX(-50%);bottom:110px;display:flex;gap:8px;z-index:10;pointer-events:none}
  .attach-btn{padding:6px 14px;border-radius:20px;font-size:.78em;font-weight:700;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.6);color:rgba(255,255,255,.4)}
  .attach-btn.equipped{border-color:#f5c542;color:#f5c542;background:rgba(245,197,66,.2)}

  /* Sell popup */
  #sell-total{font-size:.75em;color:#aaa;margin-left:4px}
</style>
</head>
<body>
<div id="canvas-container"><canvas id="c"></canvas></div>

<div id="hud">
  <div id="top-bar">
    <div id="title">🚜 Farm Dynasty 3D</div>
    <div class="stat">💰 $<span id="h-money">1000</span></div>
    <div class="stat">📅 Day <span id="h-day">1</span> · <span id="h-season">🌸 Spring</span></div>
    <div class="stat">⛽ Fuel <span id="h-fuel">100</span>%</div>
    <div class="stat">🌾 W:<span id="h-wheat">0</span> 🌽 C:<span id="h-corn">0</span> 🥔 P:<span id="h-pot">0</span></div>
    <div class="stat">🗺️ <span id="h-plots">0</span>/100 worked</div>
  </div>
</div>

<div id="attachment-hud">
  <div class="attach-btn" id="att-none" onclick="">🚜 Free</div>
  <div class="attach-btn" id="att-plow">🔧 Plow</div>
  <div class="attach-btn" id="att-water">💧 Sprayer</div>
  <div class="attach-btn" id="att-harvest">🌾 Harvester</div>
</div>

<div id="controls-panel">
  <div id="controls-inner">
    <div style="color:#aaa;font-size:.75em;line-height:1.4">WASD/Arrows<br>to drive</div>
    <div class="sep"></div>
    <button class="btn btn-gold" onclick="G.attachPlow()" id="btn-plow">🔧 Plow</button>
    <button class="btn btn-blue" onclick="G.attachWater()" id="btn-water">💧 Sprayer</button>
    <button class="btn btn-green" onclick="G.attachHarvest()" id="btn-harvest">🌾 Harvester</button>
    <button class="btn btn-red" onclick="G.detach()" id="btn-detach">❌ Detach</button>
    <div class="sep"></div>
    <select id="crop-sel">
      <option value="wheat">🌾 Wheat (2d·$10·$30)</option>
      <option value="corn">🌽 Corn (3d·$15·$50)</option>
      <option value="potatoes">🥔 Potatoes (4d·$20·$80)</option>
    </select>
    <div class="sep"></div>
    <button class="btn btn-green" onclick="G.nextDay()">⏭️ Next Day</button>
    <button class="btn btn-gold" onclick="G.sellCrops()">💰 Sell Crops<span id="sell-total"></span></button>
    <button class="btn btn-blue" onclick="G.refuel()">⛽ Refuel $50</button>
    <button class="btn btn-purple" onclick="G.buyLand()">🏞️ Buy Land $5k</button>
  </div>
</div>

<div id="tractor-panel">
  <h3>🚜 Tractors</h3>
  <div id="tractor-list"></div>
</div>

<div id="key-guide">
  <b>W/↑</b> Forward<br>
  <b>S/↓</b> Reverse<br>
  <b>A/←</b> Turn Left<br>
  <b>D/→</b> Turn Right<br>
  <b>Space</b> Action<br>
  <b>C</b> Camera<br>
  <b>1/2/3</b> Attach
</div>

<div id="minimap"><canvas id="minimap-c" width="120" height="120"></canvas></div>
<div id="msg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GAME STATE ──────────────────────────────────────────────────────────────
const GRID_W = 10, GRID_H = 10;
const CELL = 4; // world units per cell
const G = {
  money: 1000, day: 1, fuel: 100,
  season: 0, seasons: ['🌸 Spring','☀️ Summer','🍂 Fall','❄️ Winter'],
  crops: {wheat:0, corn:0, potatoes:0},
  cropTypes: {
    wheat:{icon:'🌾',growTime:2,buyPrice:10,sellPrice:30,color:0xf0c040},
    corn:{icon:'🌽',growTime:3,buyPrice:15,sellPrice:50,color:0xf0a020},
    potatoes:{icon:'🥔',growTime:4,buyPrice:20,sellPrice:80,color:0xa06030}
  },
  fields: [], // {status:'empty'|'plowed'|'planted'|'ready', crop, plantDay, mesh}
  attachment: null, // 'plow','water','harvest'
  currentTractorIdx: 0,
  tractorDefs: [
    {name:'Basic Tractor',      price:0,      speed:6,  eff:1,   fuel:2, color:0xe05020, owned:true},
    {name:'Farm Master 2000',   price:5000,   speed:9,  eff:1.5, fuel:2,  color:0x2060e0, owned:false},
    {name:'Crop King Pro',      price:15000,  speed:12, eff:2,   fuel:1,  color:0x20b040, owned:false},
    {name:'Harvest Giant X',    price:35000,  speed:15, eff:3,   fuel:1,  color:0xe0a020, owned:false},
    {name:'Quantum Harvester',  price:150000, speed:20, eff:6,   fuel:0,  color:0xe020e0, owned:false},
  ],
};

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 40, 120);

const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 500);
let camMode = 0; // 0=follow, 1=overhead, 2=free

// ─── LIGHTING ────────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
sun.position.set(30, 50, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6090c0, 0.6));
const hemi = new THREE.HemisphereLight(0x87ceeb, 0x5a3a10, 0.4);
scene.add(hemi);

// ─── GROUND ──────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshLambertMaterial({color:0x5a8a2a});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Border fence posts
for(let i=0;i<20;i++){
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.2,1.5,0.2), new THREE.MeshLambertMaterial({color:0x8B6914}));
  post.position.set(-21+i*2.2, 0.75, -21); post.castShadow=true; scene.add(post);
  const post2 = post.clone(); post2.position.z = 21; scene.add(post2);
}

// ─── FIELD GRID ──────────────────────────────────────────────────────────────
const fieldMats = {
  empty:   new THREE.MeshLambertMaterial({color:0x8B6914}),
  plowed:  new THREE.MeshLambertMaterial({color:0x4a2808}),
  planted: new THREE.MeshLambertMaterial({color:0x3a7a18}),
  ready:   new THREE.MeshLambertMaterial({color:0xd4a017}),
};

const fieldGeo = new THREE.BoxGeometry(CELL-0.15, 0.18, CELL-0.15);
const fieldGroup = new THREE.Group();
scene.add(fieldGroup);

// Center grid
const gridOffX = -(GRID_W * CELL)/2 + CELL/2;
const gridOffZ = -(GRID_H * CELL)/2 + CELL/2;

for(let r=0;r<GRID_H;r++){
  for(let c=0;c<GRID_W;c++){
    const idx = r*GRID_W+c;
    const mesh = new THREE.Mesh(fieldGeo, fieldMats.empty.clone());
    mesh.position.set(gridOffX + c*CELL, 0.09, gridOffZ + r*CELL);
    mesh.receiveShadow = true;
    fieldGroup.add(mesh);

    G.fields[idx] = {status:'empty', crop:null, plantDay:0, mesh, wx:gridOffX+c*CELL, wz:gridOffZ+r*CELL};
  }
}

// Crop visuals (simple geometry stand-ins)
function updateFieldMesh(f){
  const s = f.status;
  f.mesh.material.color.setHex(
    s==='empty'?0x8B6914: s==='plowed'?0x4a2808: s==='planted'?0x3a7a18: 0xd4a017
  );
  // Remove old crop mesh
  if(f.cropMesh){scene.remove(f.cropMesh);f.cropMesh=null;}
  if(s==='planted'||s==='ready'){
    const ct = G.cropTypes[f.crop];
    let geo, mat;
    if(f.crop==='wheat'){
      geo = new THREE.CylinderGeometry(0.05,0.08,0.8,5);
      mat = new THREE.MeshLambertMaterial({color: s==='ready'?0xf0c040:0x70b020});
    } else if(f.crop==='corn'){
      geo = new THREE.CylinderGeometry(0.1,0.15,1.2,6);
      mat = new THREE.MeshLambertMaterial({color: s==='ready'?0xf0a020:0x40a020});
    } else {
      geo = new THREE.SphereGeometry(0.35,6,5);
      mat = new THREE.MeshLambertMaterial({color: s==='ready'?0xa06030:0x306010});
    }
    const cm = new THREE.Mesh(geo, mat);
    cm.position.set(f.wx, f.crop==='wheat'?0.4: f.crop==='corn'?0.6:0.35, f.wz);
    cm.castShadow=true;
    scene.add(cm);
    f.cropMesh = cm;
  }
}

// ─── TRACTOR ─────────────────────────────────────────────────────────────────
let tractorGroup = null;
let attachmentGroup = null;
let plowParticles = [], waterParticles = [];

function buildTractor(def){
  if(tractorGroup) scene.remove(tractorGroup);
  tractorGroup = new THREE.Group();
  const c = def.color;

  // Body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.8,1.1,2.8),
    new THREE.MeshLambertMaterial({color:c})
  );
  body.position.y = 1.1; body.castShadow=true;
  tractorGroup.add(body);

  // Cab
  const cab = new THREE.Mesh(
    new THREE.BoxGeometry(1.3,1.0,1.4),
    new THREE.MeshLambertMaterial({color:c})
  );
  cab.position.set(0,2.1,0.2); cab.castShadow=true;
  tractorGroup.add(cab);

  // Windshield
  const wind = new THREE.Mesh(
    new THREE.BoxGeometry(1.25,0.85,0.05),
    new THREE.MeshLambertMaterial({color:0x88ccff, transparent:true, opacity:0.6})
  );
  wind.position.set(0,2.1,-0.5);
  tractorGroup.add(wind);

  // Rear window
  const rwi = wind.clone(); rwi.position.z = 0.9; tractorGroup.add(rwi);

  // Exhaust pipe
  const pipe = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08,0.08,1.0,8),
    new THREE.MeshLambertMaterial({color:0x333333})
  );
  pipe.position.set(0.5,2.4,-0.8); tractorGroup.add(pipe);

  // Wheels (4)
  const wGeo = new THREE.CylinderGeometry(0.55,0.55,0.38,16);
  const wMat = new THREE.MeshLambertMaterial({color:0x222222});
  const hubGeo = new THREE.CylinderGeometry(0.18,0.18,0.42,10);
  const hubMat = new THREE.MeshLambertMaterial({color:0xaaaaaa});
  const wheelPos = [
    [-1.1,0.55,-0.8], [1.1,0.55,-0.8],
    [-1.1,0.55, 0.9], [1.1,0.55, 0.9]
  ];
  wheelPos.forEach(p=>{
    const w = new THREE.Mesh(wGeo, wMat);
    w.rotation.z = Math.PI/2;
    w.position.set(...p); w.castShadow=true;
    tractorGroup.add(w);
    const h = new THREE.Mesh(hubGeo, hubMat);
    h.rotation.z = Math.PI/2;
    h.position.set(...p);
    tractorGroup.add(h);
  });

  // Headlights
  [-0.6,0.6].forEach(x=>{
    const light = new THREE.Mesh(
      new THREE.BoxGeometry(0.25,0.18,0.08),
      new THREE.MeshLambertMaterial({color:0xffffaa, emissive:0xffff88, emissiveIntensity:0.5})
    );
    light.position.set(x,1.3,-1.45);
    tractorGroup.add(light);
  });

  tractorGroup.position.set(0, 0, 0);
  scene.add(tractorGroup);
  buildAttachment(G.attachment);
}

function buildAttachment(type){
  if(attachmentGroup){scene.remove(attachmentGroup); attachmentGroup=null;}
  plowParticles=[]; waterParticles=[];
  if(!type) return;
  attachmentGroup = new THREE.Group();

  if(type==='plow'){
    // Big plow blade at back
    const blade = new THREE.Mesh(
      new THREE.BoxGeometry(2.4,0.5,0.2),
      new THREE.MeshLambertMaterial({color:0xc0c0c0})
    );
    blade.position.set(0,0.25,0);
    attachmentGroup.add(blade);
    // Tines
    for(let i=-1;i<=1;i++){
      const tine = new THREE.Mesh(
        new THREE.BoxGeometry(0.12,0.5,0.7),
        new THREE.MeshLambertMaterial({color:0x888888})
      );
      tine.position.set(i*0.8,-0.2,0.35);
      attachmentGroup.add(tine);
    }
    // Hitch arm
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.15,0.15,1.2),
      new THREE.MeshLambertMaterial({color:0x333333})
    );
    arm.position.set(0,0.35,-0.6);
    attachmentGroup.add(arm);
    attachmentGroup.position.set(0,0,1.8);
  }

  if(type==='water'){
    // Tank on back
    const tank = new THREE.Mesh(
      new THREE.CylinderGeometry(0.5,0.5,1.8,12),
      new THREE.MeshLambertMaterial({color:0x2080ff})
    );
    tank.rotation.z = Math.PI/2;
    tank.position.set(0,1.2,0);
    attachmentGroup.add(tank);
    // Spray bar
    const bar = new THREE.Mesh(
      new THREE.BoxGeometry(3.2,0.08,0.08),
      new THREE.MeshLambertMaterial({color:0x444444})
    );
    bar.position.set(0,0.5,0.6);
    attachmentGroup.add(bar);
    // Nozzles
    for(let i=-1.4;i<=1.5;i+=0.7){
      const nozzle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05,0.05,0.2,6),
        new THREE.MeshLambertMaterial({color:0x333333})
      );
      nozzle.position.set(i,0.3,0.6);
      attachmentGroup.add(nozzle);
    }
    attachmentGroup.position.set(0,0,1.8);
  }

  if(type==='harvest'){
    // Combine header
    const header = new THREE.Mesh(
      new THREE.BoxGeometry(3.6,0.6,0.8),
      new THREE.MeshLambertMaterial({color:0xd4a017})
    );
    header.position.set(0,0.3,0);
    attachmentGroup.add(header);
    // Reel
    for(let i=0;i<6;i++){
      const spoke = new THREE.Mesh(
        new THREE.BoxGeometry(0.08,1.2,0.08),
        new THREE.MeshLambertMaterial({color:0x888800})
      );
      spoke.rotation.z = (i/6)*Math.PI*2;
      spoke.position.set(0,0.3,0.1);
      attachmentGroup.add(spoke);
    }
    // Cutting bar teeth
    for(let i=-1.6;i<=1.7;i+=0.22){
      const tooth = new THREE.Mesh(
        new THREE.BoxGeometry(0.12,0.25,0.18),
        new THREE.MeshLambertMaterial({color:0xcccccc})
      );
      tooth.position.set(i,-0.1,0.4);
      attachmentGroup.add(tooth);
    }
    attachmentGroup.position.set(0,0,-2.0);
  }

  if(attachmentGroup) scene.add(attachmentGroup);
}

// Tractor state
const tractor = {
  x:0, z:0, angle:0,
  speed:0, maxSpeed:8, turnSpeed:2.2,
  accel:12, decel:8,
};

// Input
const keys = {};
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='KeyC'){camMode=(camMode+1)%3; e.preventDefault();}
  if(e.code==='Digit1'){G.attachPlow();}
  if(e.code==='Digit2'){G.attachWater();}
  if(e.code==='Digit3'){G.attachHarvest();}
  if(e.code==='Space'){G.doAction(); e.preventDefault();}
});
document.addEventListener('keyup', e=>{keys[e.code]=false;});

// Particle systems
const waterDrops = [];
const dirtClumps = [];
function spawnWaterDrop(wx,wy,wz){
  if(waterDrops.length>80) return;
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.06,4,3),
    new THREE.MeshLambertMaterial({color:0x60a0ff,transparent:true,opacity:0.8})
  );
  m.position.set(wx+(Math.random()-0.5)*2, wy+0.5+Math.random()*0.5, wz+(Math.random()-0.5)*2);
  m.userData = {vy:-2-Math.random()*2, life:1};
  scene.add(m);
  waterDrops.push(m);
}
function spawnDirt(wx,wy,wz){
  if(dirtClumps.length>60) return;
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(0.12,0.12,0.12),
    new THREE.MeshLambertMaterial({color:0x5a3010})
  );
  m.position.set(wx+(Math.random()-0.5)*1, wy+0.3, wz+(Math.random()-0.5)*1);
  const a = Math.random()*Math.PI*2;
  m.userData = {vx:Math.cos(a)*2,vy:2+Math.random()*2,vz:Math.sin(a)*2,life:1.2};
  scene.add(m);
  dirtClumps.push(m);
}

// Exhaust smoke
const smokeParticles = [];
function spawnSmoke(){
  if(smokeParticles.length>20) return;
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.15+Math.random()*0.1,5,4),
    new THREE.MeshLambertMaterial({color:0x888888,transparent:true,opacity:0.5})
  );
  const wx = tractor.x + Math.sin(tractor.angle)*0.5;
  const wz = tractor.z + Math.cos(tractor.angle)*0.5;
  m.position.set(wx,2.5+Math.random()*0.2,wz);
  m.userData={vy:1.5+Math.random(),life:1};
  scene.add(m);
  smokeParticles.push(m);
}

// ─── GAME LOGIC ──────────────────────────────────────────────────────────────
G.attachPlow = function(){
  G.attachment='plow'; buildAttachment('plow');
  updateAttachUI(); showMsg('🔧 Plow attached! Drive over empty fields.');
};
G.attachWater = function(){
  G.attachment='water'; buildAttachment('water');
  updateAttachUI(); showMsg('💧 Sprayer attached! Drive over planted fields.');
};
G.attachHarvest = function(){
  G.attachment='harvest'; buildAttachment('harvest');
  updateAttachUI(); showMsg('🌾 Harvester attached! Drive over ready crops.');
};
G.detach = function(){
  G.attachment=null; buildAttachment(null);
  updateAttachUI(); showMsg('Attachment removed.');
};

G.doAction = function(){
  // Space bar = manual action at current position
  const ci = getTractorCell();
  if(ci<0) return;
  const f = G.fields[ci];
  if(G.attachment==='plow' && f.status==='empty'){
    plowField(ci); return;
  }
  if(G.attachment==='water' && f.status==='planted'){
    waterField(ci); return;
  }
  if(G.attachment==='harvest' && f.status==='ready'){
    harvestField(ci); return;
  }
  // No attachment - plant if plowed
  if(!G.attachment && f.status==='plowed'){
    plantField(ci);
  }
};

function getTractorCell(){
  const c = Math.round((tractor.x - gridOffX) / CELL);
  const r = Math.round((tractor.z - gridOffZ) / CELL);
  if(c<0||c>=GRID_W||r<0||r>=GRID_H) return -1;
  return r*GRID_W+c;
}

function plowField(idx){
  const f = G.fields[idx];
  const td = G.tractorDefs[G.currentTractorIdx];
  if(G.fuel < td.fuel){showMsg('⛽ Out of fuel!'); return;}
  f.status='plowed'; G.fuel -= td.fuel;
  updateFieldMesh(f);
  updateHUD();
  spawnDirt(f.wx, 0.09, f.wz);
  showMsg('Field plowed!');
}
function plantField(idx){
  const f = G.fields[idx];
  const crop = document.getElementById('crop-sel').value;
  const ct = G.cropTypes[crop];
  if(G.money < ct.buyPrice){showMsg('Not enough money!'); return;}
  f.status='planted'; f.crop=crop; f.plantDay=G.day;
  G.money -= ct.buyPrice;
  updateFieldMesh(f);
  updateHUD();
  showMsg(`${ct.icon} ${crop} planted!`);
}
function waterField(idx){
  const f = G.fields[idx];
  f.watered=true;
  spawnWaterDrop(f.wx,0.2,f.wz);
  showMsg('💧 Watered!');
}
function harvestField(idx){
  const f = G.fields[idx];
  const td = G.tractorDefs[G.currentTractorIdx];
  const amt = Math.floor(td.eff*(1+Math.random()));
  G.crops[f.crop] += amt;
  f.status='empty'; f.crop=null; f.plantDay=0;
  updateFieldMesh(f);
  updateHUD();
  showMsg(`🌾 Harvested ${amt}!`);
}

G.nextDay = function(){
  G.day++;
  if(G.day%30===0) G.season=(G.season+1)%4;
  G.fields.forEach((f,i)=>{
    if(f.status==='planted'){
      const ct = G.cropTypes[f.crop];
      if((G.day-f.plantDay)>=ct.growTime){
        f.status='ready';
        updateFieldMesh(f);
      }
    }
  });
  if(Math.random()<0.1){
    const b = Math.floor(Math.random()*200)+50;
    G.money+=b; showMsg(`☀️ Good weather bonus! +$${b}`);
  }
  updateHUD();
  updateSellPreview();
  showMsg(`Day ${G.day} · ${G.seasons[G.season]}`);
};
G.sellCrops = function(){
  let total=0;
  Object.keys(G.crops).forEach(crop=>{
    total += G.crops[crop]*G.cropTypes[crop].sellPrice;
    G.crops[crop]=0;
  });
  G.money+=total;
  updateHUD();
  updateSellPreview();
  showMsg(`💰 Sold for $${total}!`);
};
G.refuel = function(){
  if(G.money<50){showMsg('Not enough money!');return;}
  G.money-=50; G.fuel=100; updateHUD(); showMsg('⛽ Tank full!');
};
G.buyLand = function(){
  if(G.money<5000){showMsg('Need $5000!');return;}
  G.money-=5000; updateHUD(); showMsg('🏞️ Land purchased! (+ area coming soon)');
};
G.switchTractor = function(idx){
  const def = G.tractorDefs[idx];
  if(!def.owned){
    if(G.money<def.price){showMsg(`Need $${def.price}!`);return;}
    G.money-=def.price; def.owned=true;
    showMsg(`🚜 Purchased ${def.name}!`);
    updateHUD();
  }
  G.currentTractorIdx=idx;
  buildTractor(def);
  buildAttachment(G.attachment);
  renderTractorList();
  showMsg(`Driving: ${def.name}`);
};

// ─── UPDATE ATTACHMENT POSITION ─────────────────────────────────────────────
function syncAttachment(){
  if(!attachmentGroup||!tractorGroup) return;
  attachmentGroup.position.copy(tractorGroup.position);
  attachmentGroup.rotation.copy(tractorGroup.rotation);
  // offset relative
  const offset = new THREE.Vector3();
  if(G.attachment==='plow'||G.attachment==='water'){
    offset.set(0,0,1.8);
  } else if(G.attachment==='harvest'){
    offset.set(0,0,-2.0);
  }
  offset.applyEuler(tractorGroup.rotation);
  attachmentGroup.position.add(offset);
  attachmentGroup.rotation.y = tractorGroup.rotation.y;
  attachmentGroup.position.y = 0;
}

// ─── RENDER TRACTOR LIST ─────────────────────────────────────────────────────
function renderTractorList(){
  const el = document.getElementById('tractor-list');
  el.innerHTML = G.tractorDefs.map((t,i)=>`
    <div class="tractor-card ${i===G.currentTractorIdx?'active':''} ${!t.owned&&G.money<t.price?'locked':''}"
         onclick="G.switchTractor(${i})">
      <div class="tractor-name">🚜 ${t.name}</div>
      <div class="tractor-info">Speed:${t.speed} Eff:${t.eff}x Fuel:${t.fuel}</div>
      ${t.owned?'<div class="tractor-price" style="color:#4caf50">✓ Owned</div>':
        `<div class="tractor-price">$${t.price.toLocaleString()}</div>`}
    </div>
  `).join('');
}

function updateAttachUI(){
  document.getElementById('att-none').className='attach-btn'+(G.attachment?'':' equipped');
  document.getElementById('att-plow').className='attach-btn'+(G.attachment==='plow'?' equipped':'');
  document.getElementById('att-water').className='attach-btn'+(G.attachment==='water'?' equipped':'');
  document.getElementById('att-harvest').className='attach-btn'+(G.attachment==='harvest'?' equipped':'');
}

function updateHUD(){
  document.getElementById('h-money').textContent = G.money.toLocaleString();
  document.getElementById('h-day').textContent = G.day;
  document.getElementById('h-season').textContent = G.seasons[G.season];
  document.getElementById('h-fuel').textContent = G.fuel;
  document.getElementById('h-wheat').textContent = G.crops.wheat;
  document.getElementById('h-corn').textContent = G.crops.corn;
  document.getElementById('h-pot').textContent = G.crops.potatoes;
  const worked = G.fields.filter(f=>f.status!=='empty').length;
  document.getElementById('h-plots').textContent = worked;
}

function updateSellPreview(){
  let t=0;
  Object.keys(G.crops).forEach(c=>t+=G.crops[c]*G.cropTypes[c].sellPrice);
  document.getElementById('sell-total').textContent = t>0?` (+$${t})`:'';
}

let msgTimer=null;
function showMsg(text){
  const el = document.getElementById('msg');
  el.textContent=text; el.style.opacity='1';
  clearTimeout(msgTimer);
  msgTimer=setTimeout(()=>{el.style.opacity='0';},2500);
}

// ─── MINIMAP ─────────────────────────────────────────────────────────────────
const mmCanvas = document.getElementById('minimap-c');
const mmCtx = mmCanvas.getContext('2d');
function drawMinimap(){
  mmCtx.fillStyle='#1a1a0a';
  mmCtx.fillRect(0,0,120,120);
  const cs = 12;
  G.fields.forEach((f,i)=>{
    const c=i%GRID_W, r=Math.floor(i/GRID_W);
    mmCtx.fillStyle = f.status==='empty'?'#5a3a0a':
                      f.status==='plowed'?'#3a1a05':
                      f.status==='planted'?'#2a6010':'#d4a010';
    mmCtx.fillRect(c*cs+1,r*cs+1,cs-2,cs-2);
  });
  // Tractor dot
  const tx = ((tractor.x - gridOffX)/CELL)*cs + cs/2;
  const tz = ((tractor.z - gridOffZ)/CELL)*cs + cs/2;
  mmCtx.fillStyle='#ff4444';
  mmCtx.beginPath();
  mmCtx.arc(tx,tz,3.5,0,Math.PI*2);
  mmCtx.fill();
}

// ─── CAMERA ──────────────────────────────────────────────────────────────────
let camAngle=0, camDist=14, camHeight=8;
let freeCamX=0,freeCamY=20,freeCamZ=0;

function updateCamera(){
  if(!tractorGroup) return;
  if(camMode===0){
    // Follow cam
    const tx = tractorGroup.position.x - Math.sin(tractor.angle)*camDist;
    const tz = tractorGroup.position.z - Math.cos(tractor.angle)*camDist;
    camera.position.lerp(new THREE.Vector3(tx, camHeight, tz), 0.08);
    camera.lookAt(tractorGroup.position.x, 1.5, tractorGroup.position.z);
  } else if(camMode===1){
    // Overhead
    camera.position.lerp(new THREE.Vector3(tractorGroup.position.x, 35, tractorGroup.position.z), 0.05);
    camera.lookAt(tractorGroup.position.x, 0, tractorGroup.position.z);
  } else {
    // Free - orbit with mouse if needed; just use overhead for now
    camera.position.set(0,50,0);
    camera.lookAt(0,0,0);
  }
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
let last=0, actionCooldown=0;
let smokeTimer=0, actionAutoTimer=0;
const td = G.tractorDefs;

function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now-last)/1000, 0.05);
  last=now;

  // Tractor movement
  const def = td[G.currentTractorIdx];
  const maxSpd = def.speed;
  let turning = 0, driving = false;

  if(keys['KeyW']||keys['ArrowUp']){tractor.speed=Math.min(tractor.speed+def.speed*2*dt, maxSpd); driving=true;}
  else if(keys['KeyS']||keys['ArrowDown']){tractor.speed=Math.max(tractor.speed-def.speed*2*dt, -maxSpd*0.5); driving=true;}
  else{
    if(tractor.speed>0) tractor.speed=Math.max(0,tractor.speed-def.speed*1.5*dt);
    else tractor.speed=Math.min(0,tractor.speed+def.speed*1.5*dt);
  }

  if(Math.abs(tractor.speed)>0.1){
    const ts = 2.2 * (Math.abs(tractor.speed)/maxSpd);
    if(keys['KeyA']||keys['ArrowLeft']) tractor.angle += ts*dt;
    if(keys['KeyD']||keys['ArrowRight']) tractor.angle -= ts*dt;
  }

  tractor.x += Math.sin(tractor.angle)*tractor.speed*dt;
  tractor.z += Math.cos(tractor.angle)*tractor.speed*dt;

  // Clamp to farm area
  tractor.x = Math.max(-28, Math.min(28, tractor.x));
  tractor.z = Math.max(-28, Math.min(28, tractor.z));

  if(tractorGroup){
    tractorGroup.position.set(tractor.x, 0, tractor.z);
    tractorGroup.rotation.y = tractor.angle;
  }
  syncAttachment();

  // Smoke
  smokeTimer+=dt;
  if(smokeTimer>0.12 && Math.abs(tractor.speed)>0.5){smokeTimer=0;spawnSmoke();}

  // Auto-action while driving with attachment
  actionAutoTimer+=dt;
  if(actionAutoTimer>0.35 && Math.abs(tractor.speed)>0.3 && G.attachment && G.fuel>0){
    actionAutoTimer=0;
    const ci=getTractorCell();
    if(ci>=0){
      const f=G.fields[ci];
      if(G.attachment==='plow'&&f.status==='empty'){plowField(ci);}
      else if(G.attachment==='water'&&f.status==='planted'){
        waterField(ci);
        for(let i=0;i<4;i++) spawnWaterDrop(f.wx,0.2,f.wz);
      }
      else if(G.attachment==='harvest'&&f.status==='ready') harvestField(ci);
    }
    updateSellPreview();
  }

  // Also auto-plant when no attachment and plowed
  if(actionAutoTimer>0.35 && Math.abs(tractor.speed)>0.3 && !G.attachment){
    actionAutoTimer=0;
    const ci=getTractorCell();
    if(ci>=0){
      const f=G.fields[ci];
      if(f.status==='plowed') plantField(ci);
    }
  }

  // Update particles
  for(let i=waterDrops.length-1;i>=0;i--){
    const p=waterDrops[i];
    p.userData.life-=dt*1.5;
    p.position.y += p.userData.vy*dt;
    p.material.opacity = p.userData.life*0.8;
    if(p.userData.life<=0){scene.remove(p);waterDrops.splice(i,1);}
  }
  for(let i=dirtClumps.length-1;i>=0;i--){
    const p=dirtClumps[i];
    p.userData.life-=dt*1.5;
    p.position.x+=p.userData.vx*dt;
    p.position.y+=p.userData.vy*dt;
    p.position.z+=p.userData.vz*dt;
    p.userData.vy-=9*dt;
    if(p.userData.life<=0){scene.remove(p);dirtClumps.splice(i,1);}
  }
  for(let i=smokeParticles.length-1;i>=0;i--){
    const p=smokeParticles[i];
    p.userData.life-=dt*0.9;
    p.position.y+=p.userData.vy*dt;
    p.scale.setScalar(1+(1-p.userData.life)*1.5);
    p.material.opacity=p.userData.life*0.45;
    if(p.userData.life<=0){scene.remove(p);smokeParticles.splice(i,1);}
  }

  // Plow sparks (dirt spray while plowing)
  if(G.attachment==='plow'&&Math.abs(tractor.speed)>1){
    if(Math.random()<0.3) spawnDirt(tractor.x,0.2,tractor.z+(Math.cos(tractor.angle)*1.5));
  }
  // Water spray while watering
  if(G.attachment==='water'&&Math.abs(tractor.speed)>0.5){
    if(Math.random()<0.5) spawnWaterDrop(tractor.x,0.3,tractor.z);
  }

  updateCamera();
  drawMinimap();
  renderer.render(scene, camera);
}

}
