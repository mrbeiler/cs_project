<!DOCTYPE html>
<html lang="en">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" rel="stylesheet">
<head>
    <title>Git Games</title>
</head>

    <style>
        body {
            margin: 0;
            background-color: rgb(15, 15, 15);
        }

        h1 {
            background-color: rgb(165, 165, 255);
            border-radius: 25px;
            box-shadow: rgb(255, 80, 110) 0 0 50px;
            font-family: 'Baloo 2', cursive;
            font-size: 120px;
            letter-spacing: -15px; /* makes letters overlap */
            color: rgb(255, 80, 110);
            -webkit-text-stroke: 4px black;
            text-shadow: 
            6px 6px 0px black,
            12px 12px 20px rgba(0,0,0,0.4);
        }

        img {
            border-radius: 15px;
            margin: 20px;
            transition: 0.5s;
            border: rgb(165, 165, 255) 2px solid;
            box-shadow: rgb(165, 165, 255) 0 0 10px;
            width: 250px;
            height: 200px;
        }

        img:hover {
            transform: scale(1.05);
        }

        /* Tooltip container */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        /* Tooltip text */
        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            transition: 0.5s;

            position: absolute;
            bottom: 75%;
            left: 50%;
            transform: translateX(-50%);

            background-color: rgb(165, 165, 255);
            color: rgb(255, 255, 255);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            white-space: nowrap;
        }

        /* Show tooltip on hover */
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        
    </style>

<body>

    <h1>Git Games</h1>

    <a href="space_mining_v2.html">
        <div class="tooltip">
            <img src="spacemining.png" alt="Space Mining Game">
            <span class="tooltip-text">Space Mining</span>
        </div>
    </a>

    <a href="LogansPage.html">
        <div class="tooltip">
            <img src="ChatGPT Image Feb 26, 2026, 02_44_54 PM.png" alt="Logan's Game">
            <span class="tooltip-text">Basketball manager</span>
        </div>
    </a>
    <a href="mrbeilerpage.html">
        <div class="tooltip">
            <img src="Screenshot 2026-02-26 145059.png" alt="Mr. Beiler's Game">
            <span class="tooltip-text">FROGGO</span>
        </div>
    </a>

    <a href="tactical-space.html">
        <div class="tooltip">
            <img src="ChatGPT Image Feb 26, 2026, 03_16_40 PM.png" alt="Tactical Space">
            <span class="tooltip-text">Tactical Space</span>
        </div>
    </a>
    <a href="Harvest Valley.html">
        <div class="tooltip">
            <img src="Harvest Valley.png" alt="Harvest Valley">
            <span class="tooltip-text">Harvest Valley</span>
        </div>
    </a>
    <a href="Mr.Salvador page.html">
        <div class="tooltip">
            <img src="Wild Hunt.png" alt="Wild Hunt">
            <span class="tooltip-text">Wild Hunt</span>
        </div>

    </a>
</body>
</html>
