<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Games</title>

    <style>
        body {
            margin: 0;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 70px;
            background-color: blue;
            color: white;
            padding: 20px 0;
        }

        /* Game Card Container */
        .game-card {
            position: relative;
            display: inline-block;
            margin: 20px;
            transition: transform 0.3s ease;
        }

        /* Expand entire card on hover */
        .game-card:hover {
            transform: scale(1.07);
        }

        /* Game Images */
        .game-card img {
            border-radius: 15px;
            border: 3px solid blue;
            width: 250px;
            height: 200px;
            display: block;
        }

        /* Tooltip */
        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            transition: 0.3s ease;
            position: absolute;
            bottom: 75%;
            left: 50%;
            transform: translateX(-50%);
            background-color: white;
            color: black;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            white-space: nowrap;
            z-index: 3;
        }

        .game-card:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* Centered Play Icon */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, background-color 0.3s ease;
            z-index: 2;
        }

        /* Fade in on hover */
        .game-card:hover .play-button {
            opacity: 1;
        }

        /* Slight brighten on hover */
        .play-button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <h1>Git Games</h1>
