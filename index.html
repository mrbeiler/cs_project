    <style>
        body {
            margin: 0;
            background-color: rgb(15, 15, 15);
        }

        h1 {
            background-color: rgb(165, 165, 255);
            border-radius: 25px;
            box-shadow: rgb(255, 80, 110) 0 0 50px;
            font-family: 'Baloo 2', cursive;
            font-size: 120px;
            letter-spacing: -15px; /* makes letters overlap */
            color: rgb(255, 80, 110);
            -webkit-text-stroke: 4px black;
            text-shadow: 
            6px 6px 0px black,
            12px 12px 20px rgba(0,0,0,0.4);
        }

        a {
            display: inline-block;
            text-decoration: none;
        }

        /* Game Card Container */
        .game-card {
            position: relative;
            display: inline-block;
            margin: 20px;
            transition: 0.5s;
            border: rgb(165, 165, 255) 2px solid;
            box-shadow: rgb(165, 165, 255) 0 0 10px;
            width: 250px;
            height: 200px;
            transition: transform 0.3s ease;
        }

        /* Expand entire card on hover */
        .game-card:hover {
            transform: scale(1.07);
        }

        /* Game Images */
        .game-card img {
            margin: 0;
            border-radius: 15px;
            border: 3px solid blue;
            width: 250px;
            height: 200px;
            display: block;
        }

        /* Tooltip */
        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            transition: 0.3s ease;
            position: absolute;
            bottom: 75%;
            left: 50%;
            transform: translateX(-50%);

            background-color: rgb(165, 165, 255);
            color: rgb(255, 255, 255);
            background-color: white;
            color: black;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            white-space: nowrap;
            z-index: 3;
        }

        .game-card:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        
        /* Centered Play Icon */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, background-color 0.3s ease;
            z-index: 2;
        }

        /* Fade in on hover */
        .game-card:hover .play-button {
            opacity: 1;
        }

        /* Slight brighten on hover */
        .play-button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
