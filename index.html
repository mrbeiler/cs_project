<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Portal</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #ffe47a, #ff7d7d);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px;
    background: #ff4f4f;
    color: white;
    text-align: center;
    font-size: 2.2rem;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    margin-top: 20px;
    max-width: 1200px;
    width: 100%;
    padding-bottom: 40px;
  }

  .game-card {
    background: #fff;
    border-radius: 15px;
    width: 280px;
    text-align: center;
    padding: 15px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .game-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 20px rgba(0,0,0,0.3);
  }

  .game-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
  }

  .game-card h3 {
    margin: 10px 0;
    color: #ff4f4f;
  }

  .play-btn {
    display: inline-block;
    background: #ff7d00;
    color: white;
    padding: 10px 20px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    margin-top: 10px;
  }

  .play-btn:hover {
    background: #ff9900;
    transform: scale(1.05);
  }

  footer {
    margin-top: 20px;
    padding: 15px;
    text-align: center;
    font-size: 0.9rem;
    color: #333;
  }

  /* Decorations */
  body::before {
    content: '';
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/7QkH1eP.png') repeat;
    opacity: 0.05;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>Mini Game Portal</header>

<main>
  <!-- Game 1 -->
  <div class="game-card">
    <img src="https://via.placeholder.com/280x150?text=Block+Builder" alt="Block Builder">
    <h3>Block Builder</h3>
    <a href="game1.html" class="play-btn">Play Game</a>
  </div>

  <!-- Game 2 -->
  <div class="game-card">
    <img src="https://via.placeholder.com/280x150?text=Monster+Escape" alt="Monster Escape">
    <h3>Monster Escape</h3>
    <a href="game2.html" class="play-btn">Play Game</a>
  </div>

  <!-- Game 3 -->
  <div class="game-card">
    <img src="https://via.placeholder.com/280x150?text=Treasure+Hunt" alt="Treasure Hunt">
    <h3>Treasure Hunt</h3>
    <a href="game3.html" class="play-btn">Play Game</a>
  </div>
</main>

<footer>&copy; 2026 Mini Game Portal | Have fun!</footer>

</body>
</html>
