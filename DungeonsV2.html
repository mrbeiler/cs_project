<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>DUNGEON DEPTHS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080406;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;font-family:'Cinzel',serif;overflow:hidden;user-select:none;}
#title{color:#c8933a;font-size:1.9rem;font-weight:900;letter-spacing:.3em;text-shadow:0 0 20px #c8933a88;margin-bottom:5px;}
#sub{color:#5a4028;font-size:.6rem;letter-spacing:.4em;margin-bottom:10px;font-style:italic;}
#gw{position:relative;border:2px solid #2a1808;box-shadow:0 0 40px #c8933a18;}
canvas{display:block;}
/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:flex-start;justify-content:space-between;
  padding:7px 12px;pointer-events:none;background:linear-gradient(180deg,#08040699 0%,transparent 100%);}
.hc{display:flex;flex-direction:column;gap:3px;}
.hl{color:#6a4820;font-size:.47rem;letter-spacing:.18em;}
.bt{width:120px;height:7px;background:#160a04;border:1px solid #2a1408;border-radius:1px;overflow:hidden;}
#hpf{height:100%;background:linear-gradient(90deg,#701010,#d83030);transition:width .15s;}
#xpf{height:100%;background:linear-gradient(90deg,#104870,#2080c8);transition:width .2s;}
#wl{color:#c8933a;font-size:.85rem;font-weight:700;letter-spacing:.2em;text-shadow:0 0 8px #c8933a88;text-align:center;}
#sl{color:#6a4820;font-size:.52rem;letter-spacing:.12em;text-align:center;margin-top:1px;}
#coinl{color:#f0c840;font-size:.58rem;letter-spacing:.15em;text-align:center;margin-top:2px;text-shadow:0 0 6px #f0c84066;}
#hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);color:#2a1408;font-size:.42rem;letter-spacing:.18em;pointer-events:none;white-space:nowrap;}
/* OVERLAYS */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,4,6,.88);backdrop-filter:blur(3px);z-index:10;}
#overlay h2{color:#c8933a;font-size:1.7rem;font-weight:900;letter-spacing:.3em;text-shadow:0 0 24px #c8933a;margin-bottom:10px;}
#overlay p{color:#6a4820;font-size:.62rem;letter-spacing:.22em;margin-bottom:5px;}
.obtn{padding:9px 28px;background:transparent;border:2px solid #c8933a;color:#c8933a;
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.25em;cursor:pointer;transition:background .2s;margin:4px;}
.obtn:hover{background:#c8933a22;}
/* SHOP */
#shop{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,4,6,.93);backdrop-filter:blur(4px);z-index:11;gap:10px;}
#shop h2{color:#c8933a;font-size:1.4rem;font-weight:900;letter-spacing:.3em;text-shadow:0 0 20px #c8933a;}
#shop .coins-disp{color:#f0c840;font-size:.75rem;letter-spacing:.2em;text-shadow:0 0 8px #f0c84066;margin-bottom:4px;}
#shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:680px;width:100%;padding:0 16px;}
.shop-item{background:#110809;border:1px solid #2a1408;padding:10px 8px;cursor:pointer;transition:border-color .2s,background .2s;
  display:flex;flex-direction:column;align-items:center;gap:5px;min-height:110px;}
.shop-item:hover:not(.owned):not(.broke){border-color:#c8933a;background:#1a0f04;}
.shop-item.owned{border-color:#2080c8;background:#04101a;cursor:default;}
.shop-item.equipped{border-color:#f0c840;background:#1a1204;cursor:default;}
.shop-item.broke{opacity:.4;cursor:not-allowed;}
.si-name{color:#c8933a;font-size:.58rem;letter-spacing:.15em;text-align:center;}
.si-stats{color:#6a4820;font-size:.5rem;letter-spacing:.1em;text-align:center;line-height:1.5;}
.si-cost{color:#f0c840;font-size:.6rem;letter-spacing:.12em;}
.si-tag{font-size:.45rem;letter-spacing:.1em;padding:1px 4px;border-radius:1px;}
.si-tag.eq{color:#f0c840;border:1px solid #f0c84044;}
.si-tag.own{color:#2080c8;border:1px solid #2080c844;}
.si-canvas{width:52px;height:40px;}
#shop-skip{margin-top:4px;}
</style>
</head>
<body>
<div id="title">DUNGEON DEPTHS</div>
<div id="sub">descend into the abyss — if you dare</div>
<div id="gw">
  <canvas id="c" width="700" height="480"></canvas>
  <div id="hud">
    <div class="hc">
      <div class="hl">VITALITY</div>
      <div class="bt"><div id="hpf" style="width:100%"></div></div>
      <div class="hl" id="hptxt">100/100</div>
    </div>
    <div class="hc" style="align-items:center">
      <div id="wl">WAVE 1</div>
      <div id="sl">SCORE 0</div>
      <div id="coinl">⬡ 0 COINS</div>
    </div>
    <div class="hc" style="align-items:flex-end">
      <div class="hl">EXPERIENCE</div>
      <div class="bt"><div id="xpf" style="width:0%"></div></div>
      <div class="hl" id="lvltxt">LEVEL 1</div>
    </div>
  </div>
  <div id="hint">WASD·MOVE &nbsp;|&nbsp; SPACE/CLICK·ATTACK &nbsp;|&nbsp; SHIFT·DASH</div>
  <div id="overlay">
    <h2>DUNGEON DEPTHS</h2>
    <p>Kill monsters. Collect coins. Buy better gear.</p>
    <p>Survive the waves to descend deeper.</p>
    <button class="obtn" id="ovlbtn">DESCEND</button>
  </div>
  <div id="shop">
    <h2>THE ARMORY</h2>
    <div class="coins-disp" id="shop-coins">⬡ 0 COINS</div>
    <div id="shop-grid"></div>
    <button class="obtn" id="shop-skip">CONTINUE →</button>
  </div>
</div>
<script>
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height,TILE=40,COLS=W/TILE|0,ROWS=H/TILE|0;

// ── tile textures ──
function mkTex(fn){const c=document.createElement('canvas');c.width=c.height=TILE;fn(c.getContext('2d'));return c;}
const wallTex=mkTex(x=>{
  x.fillStyle='#0d0809';x.fillRect(0,0,TILE,TILE);x.strokeStyle='#1c1014';x.lineWidth=1;
  for(let r=0;r<3;r++){const h=TILE/3,o=r%2?TILE/2:0;x.strokeRect(o,r*h,TILE/2,h);x.strokeRect(o+TILE/2,r*h,TILE/2,h);}
  for(let i=0;i<28;i++){x.fillStyle=`rgba(255,255,255,${Math.random()*.018})`;x.fillRect(Math.random()*TILE,Math.random()*TILE,1,1);}
});
const floorTex=mkTex(x=>{
  x.fillStyle='#150c10';x.fillRect(0,0,TILE,TILE);x.strokeStyle='#1c1318';x.strokeRect(0,0,TILE,TILE);
  for(let i=0;i<12;i++){x.fillStyle=`rgba(255,255,255,${Math.random()*.012})`;x.fillRect(Math.random()*TILE,Math.random()*TILE,1+Math.random(),1+Math.random());}
});
const wallPat=ctx.createPattern(wallTex,'repeat'),floorPat=ctx.createPattern(floorTex,'repeat');

// ── WEAPONS ──
const WEAPONS=[
  {id:'sword',    name:'IRON SWORD',   cost:0,   atk:0,  range:56, speed:0,  desc:'Balanced. Fast swing.',      col:'#9898b8'},
  {id:'dagger',   name:'TWIN DAGGERS', cost:60,  atk:-5, range:38, speed:14, desc:'+Speed. Short range.',        col:'#80d0a0'},
  {id:'axe',      name:'WAR AXE',      cost:90,  atk:18, range:62, speed:-8, desc:'+Damage. Slower swing.',      col:'#c05020'},
  {id:'spear',    name:'IRON SPEAR',   cost:120, atk:8,  range:80, speed:4,  desc:'Long reach. Pierce thrust.',  col:'#a0b8d0'},
  {id:'greatsword',name:'GREATSWORD',  cost:200, atk:35, range:72, speed:-12,desc:'Massive damage. Heavy swing.',col:'#d0d8f8'},
];
// ── ARMORS ──
const ARMORS=[
  {id:'rags',    name:'TATTERED RAGS', cost:0,   hp:0,   def:0,  spd:0,   desc:'No protection.',             col:'#504030'},
  {id:'leather', name:'LEATHER ARMOR', cost:80,  hp:30,  def:3,  spd:0,   desc:'+30 Max HP. Light.',         col:'#8B5A2B'},
  {id:'chain',   name:'CHAIN MAIL',    cost:150, hp:70,  def:7,  spd:-.1, desc:'+70 Max HP. Some weight.',   col:'#909090'},
  {id:'plate',   name:'PLATE ARMOR',   cost:280, hp:140, def:14, spd:-.4, desc:'+140 Max HP. Very heavy.',   col:'#a8b8d0'},
];

// ── state ──
let gs='menu',player,monsters,particles,floatTexts,coins_arr;
let wave,score,coins,level,xp,xpNext;
let spawnTimer,waveKills,waveTotal,frame,camX,camY;
let map=[],rooms=[];
let weaponId='sword',armorId='rags',ownedWeapons=['sword'],ownedArmors=['rags'];
const keys={};

// ── map ──
function genMap(){
  map=Array.from({length:ROWS},()=>new Uint8Array(COLS).fill(1));rooms=[];
  const N=6+wave;
  for(let t=0;t<N*14&&rooms.length<N;t++){
    const rw=4+(Math.random()*5|0),rh=3+(Math.random()*4|0);
    const rx=1+(Math.random()*(COLS-rw-2)|0),ry=1+(Math.random()*(ROWS-rh-2)|0);
    rooms.push({x:rx,y:ry,w:rw,h:rh});
  }
  for(const r of rooms)for(let y=r.y;y<r.y+r.h;y++)for(let x=r.x;x<r.x+r.w;x++)map[y][x]=0;
  for(let i=0;i<rooms.length-1;i++){
    const a=rooms[i],b=rooms[i+1];
    let cx=a.x+(a.w/2|0),cy=a.y+(a.h/2|0),tx=b.x+(b.w/2|0),ty=b.y+(b.h/2|0);
    while(cx!==tx){if(cy>=0&&cy<ROWS&&cx>=0&&cx<COLS)map[cy][cx]=0;cx+=cx<tx?1:-1;}
    while(cy!==ty){if(cy>=0&&cy<ROWS&&cx>=0&&cx<COLS)map[cy][cx]=0;cy+=cy<ty?1:-1;}
  }
}
function solid(tx,ty){return tx<0||ty<0||tx>=COLS||ty>=ROWS||map[ty][tx]===1;}
function moveEnt(e,dx,dy){
  const hw=e.hw||8,hh=e.hh||8;
  let bx=false;
  const nx=e.x+dx;
  for(let ty2=((e.y-hh)/TILE|0);ty2<=((e.y+hh)/TILE|0);ty2++)
    for(let tx2=((nx-hw)/TILE|0);tx2<=((nx+hw)/TILE|0);tx2++)if(solid(tx2,ty2)){bx=true;break;}
  if(!bx)e.x=nx;
  let by=false;
  const ny=e.y+dy;
  for(let tx2=((e.x-hw)/TILE|0);tx2<=((e.x+hw)/TILE|0);tx2++)
    for(let ty2=((ny-hh)/TILE|0);ty2<=((ny+hh)/TILE|0);ty2++)if(solid(tx2,ty2)){by=true;break;}
  if(!by)e.y=ny;
}

// ── player ──
function getWeapon(){return WEAPONS.find(w=>w.id===weaponId);}
function getArmor(){return ARMORS.find(a=>a.id===armorId);}
function makePlayer(){
  const r=rooms[0];
  const arm=getArmor(),wpn=getWeapon();
  const baseHp=100+(level-1)*20+arm.hp;
  return{x:(r.x+r.w*.5)*TILE,y:(r.y+r.h*.5)*TILE,
    hw:9,hh:11,hp:baseHp,maxHp:baseHp,
    atk:20+(level-1)*5+wpn.atk,
    speed:2.8+arm.spd,
    def:arm.def,
    atkCD:0,atkRange:wpn.range,
    dashTimer:0,iframes:0,facing:1,animT:0,animF:0};
}

// ── monsters ──
const MT=[
  {name:'Slime',   col:'#2a8a3a',size:14,hw:10,hh:10,hp:30, atk:8, spd:1.2,xp:10,coinDrop:[1,3]},
  {name:'Skeleton',col:'#c8c8a8',size:16,hw:11,hh:16,hp:50, atk:14,spd:1.6,xp:20,coinDrop:[2,5]},
  {name:'Bat',     col:'#6a3a8a',size:11,hw:9, hh:8, hp:20, atk:10,spd:2.4,xp:15,coinDrop:[1,4]},
  {name:'Orc',     col:'#3a6a1a',size:20,hw:15,hh:18,hp:120,atk:22,spd:1.0,xp:40,coinDrop:[4,9]},
  {name:'Wraith',  col:'#3a3a8a',size:15,hw:12,hh:12,hp:60, atk:18,spd:1.9,xp:30,coinDrop:[3,7],phase:true},
  {name:'Dragon',  col:'#8a1a1a',size:26,hw:22,hh:20,hp:300,atk:35,spd:1.2,xp:100,coinDrop:[15,30],boss:true},
];
function spawnMonster(){
  let pool=MT.filter(t=>!t.boss);
  if(wave>=5&&Math.random()<.06)pool=[MT[5]];
  else if(wave<2)pool=pool.slice(0,2);
  else if(wave<4)pool=pool.slice(0,4);
  const tp=pool[Math.random()*pool.length|0];
  const ri=1+(Math.random()*(rooms.length-1)|0);
  const r=rooms[ri];
  const hpScale=1+wave*.12;
  return{...tp,x:(r.x+.5+Math.random()*(r.w-1))*TILE,y:(r.y+.5+Math.random()*(r.h-1))*TILE,
    maxHp:Math.floor(tp.hp*hpScale),hp:Math.floor(tp.hp*hpScale),
    atk:Math.floor(tp.atk*(1+wave*.08)),
    vx:0,vy:0,atkTimer:0,stunT:0,flashT:0,animT:0,id:Math.random()*1e5|0};
}

// ── coins ──
function spawnCoins(x,y,min,max){
  const n=min+(Math.random()*(max-min)|0);
  const clump=Math.max(1,n/3|0);
  let spawned=0;
  while(spawned<n){
    const batch=Math.min(clump,n-spawned);
    const a=Math.random()*Math.PI*2,r=8+Math.random()*20;
    coins_arr.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r,
      val:batch,life:600,bob:Math.random()*Math.PI*2,picked:false});
    spawned+=batch;
  }
}

// ── particles / floats ──
function burst(x,y,col,n,type='blood'){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dec:.03+Math.random()*.04,col,sz:2+Math.random()*3,type});
  }
}
function floatTxt(x,y,txt,col){floatTexts.push({x,y,txt,col,life:1,vy:-1.2});}

// ── attack ──
function playerAttack(){
  if(!player||player.atkCD>0)return;
  const wpn=getWeapon();
  const baseCD=42-(level-1)*2;
  player.atkCD=Math.max(18,baseCD-wpn.speed);
  let hit=false;
  for(const m of monsters){
    const dx=m.x-player.x,dy=m.y-player.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<player.atkRange&&dx*player.facing>-player.atkRange*.38){
      const rawDmg=player.atk+(Math.random()*10|0);
      const dmg=Math.max(1,rawDmg-Math.floor(m.def||0));
      m.hp-=dmg;m.flashT=10;m.stunT=8;
      const ka=Math.atan2(dy,dx);m.vx+=Math.cos(ka)*5;m.vy+=Math.sin(ka)*5;
      burst(m.x,m.y,m.col,8);floatTxt(m.x,m.y-m.size,`-${dmg}`,'#ff6060');hit=true;
    }
  }
  if(hit){
    const col=wpn.col;
    for(let i=0;i<7;i++){
      const a=(player.facing>0?0:Math.PI)+(-0.7+Math.random()*1.4);
      particles.push({x:player.x+player.facing*24,y:player.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,life:1,dec:.15,col,sz:3,type:'spark'});
    }
  }
}

// ── xp ──
function addXP(a){
  xp+=a;
  while(xp>=xpNext){
    xp-=xpNext;level++;xpNext=Math.floor(xpNext*1.4);
    player.maxHp+=20;player.hp=Math.min(player.hp+40,player.maxHp);player.atk+=5;
    floatTxt(player.x,player.y-38,`LEVEL ${level}!`,'#f0d860');
    burst(player.x,player.y,'#f0d860',20,'spark');
  }
}

// ── HUD ──
function updHUD(){
  document.getElementById('hpf').style.width=Math.max(0,player.hp/player.maxHp*100)+'%';
  document.getElementById('hptxt').textContent=`${Math.max(0,Math.ceil(player.hp))}/${player.maxHp}`;
  document.getElementById('xpf').style.width=(xp/xpNext*100)+'%';
  document.getElementById('lvltxt').textContent=`LEVEL ${level}`;
  document.getElementById('wl').textContent=`WAVE ${wave}`;
  document.getElementById('sl').textContent=`SCORE ${score}`;
  document.getElementById('coinl').textContent=`⬡ ${coins} COINS`;
}

// ── SHOP ──
function drawWeaponIcon(id,canvas){
  const c=canvas.getContext('2d');c.clearRect(0,0,52,40);
  const w=WEAPONS.find(x=>x.id===id);
  c.save();c.translate(26,20);
  if(id==='sword'){
    c.fillStyle=w.col;c.fillRect(-2,-16,4,28);
    c.fillStyle='#c0c0d8';c.fillRect(-2,-16,4,20);
    c.fillRect(-1,-18,2,3);
    c.fillStyle='#604020';c.fillRect(-5,-5,10,5);c.fillRect(-2,4,4,8);
  }else if(id==='dagger'){
    c.fillStyle='#d0d0d0';c.fillRect(-1,-14,2,18);
    c.fillStyle=w.col;c.fillRect(-1,-18,2,7);
    c.fillStyle='#604020';c.fillRect(-4,-4,8,4);
    c.save();c.translate(8,4);c.fillStyle=w.col;c.fillRect(-1,-14,2,18);c.fillStyle='#d0d0d0';c.fillRect(-1,-18,2,7);c.fillStyle='#604020';c.fillRect(-4,-4,8,4);c.restore();
  }else if(id==='axe'){
    c.fillStyle='#604020';c.fillRect(-2,-16,4,32);
    c.fillStyle=w.col;
    c.beginPath();c.moveTo(2,-14);c.lineTo(16,-6);c.lineTo(14,6);c.lineTo(2,2);c.closePath();c.fill();
    c.beginPath();c.moveTo(-2,-14);c.lineTo(-16,-6);c.lineTo(-14,6);c.lineTo(-2,2);c.closePath();c.fill();
    c.fillStyle='#d08040';c.fillRect(-1,-16,2,3);
  }else if(id==='spear'){
    c.fillStyle='#704820';c.fillRect(-1,-18,2,36);
    c.fillStyle=w.col;
    c.beginPath();c.moveTo(0,-18);c.lineTo(-5,-4);c.lineTo(5,-4);c.closePath();c.fill();
    c.fillStyle='#808090';c.fillRect(-3,-4,6,4);
  }else if(id==='greatsword'){
    c.fillStyle='#504060';c.fillRect(-3,-18,6,34);
    c.fillStyle=w.col;c.fillRect(-3,-18,6,26);
    c.fillStyle='#f0f0ff';c.fillRect(-2,-18,2,22);
    c.fillStyle='#d0a040';c.fillRect(-7,-4,14,5);
    c.fillStyle='#604020';c.fillRect(-2,8,4,10);
    c.fillStyle='#d0a040';c.beginPath();c.arc(0,18,4,0,Math.PI*2);c.fill();
  }
  c.restore();
}
function drawArmorIcon(id,canvas){
  const c=canvas.getContext('2d');c.clearRect(0,0,52,40);
  const a=ARMORS.find(x=>x.id===id);
  c.save();c.translate(26,22);
  if(id==='rags'){
    c.fillStyle=a.col;c.fillRect(-10,-14,20,20);
    c.fillStyle='#3a2820';c.fillRect(-8,-14,3,14);c.fillRect(5,-14,3,14);
    c.fillStyle='#3a2820';c.beginPath();c.arc(-10,-14,3,0,Math.PI*2);c.arc(10,-14,3,0,Math.PI*2);c.fill();
  }else if(id==='leather'){
    c.fillStyle=a.col;c.fillRect(-11,-15,22,22);
    c.fillStyle='#6a4020';c.fillRect(-9,-15,5,15);c.fillRect(4,-15,5,15);
    c.fillStyle='#4a2a10';c.fillRect(-11,-15,22,5);
    c.fillStyle='#c08040';for(let i=0;i<3;i++){c.beginPath();c.arc(-6+i*6,-6,2,0,Math.PI*2);c.fill();}
  }else if(id==='chain'){
    c.fillStyle=a.col;c.fillRect(-12,-16,24,23);
    c.fillStyle='#606060';
    for(let y=-14;y<8;y+=4)for(let x=-10;x<12;x+=5){c.beginPath();c.arc(x,y,1.5,0,Math.PI*2);c.fill();}
    c.fillStyle='#a0a0a0';c.fillRect(-12,-16,24,4);c.fillRect(-12,5,24,3);
  }else if(id==='plate'){
    c.fillStyle=a.col;c.fillRect(-13,-17,26,24);
    c.fillStyle='#c8d8e8';c.fillRect(-11,-15,22,5);c.fillRect(-11,-4,22,5);
    c.fillStyle='#8898a8';c.fillRect(-13,-17,26,4);c.fillRect(-13,6,26,2);
    c.fillStyle='#d8e8f8';
    c.beginPath();c.moveTo(-5,-10);c.lineTo(5,-10);c.lineTo(4,2);c.lineTo(-4,2);c.closePath();c.fill();
    c.fillStyle='#6878a8';c.fillRect(-13,-17,4,24);c.fillRect(9,-17,4,24);
  }
  c.restore();
}

function openShop(){
  document.getElementById('shop').style.display='flex';
  document.getElementById('shop-coins').textContent=`⬡ ${coins} COINS`;
  const grid=document.getElementById('shop-grid');
  grid.innerHTML='';
  const allItems=[
    ...WEAPONS.map(w=>({...w,type:'weapon'})),
    ...ARMORS.map(a=>({...a,type:'armor'}))
  ];
  // show 4 weapons + 4 armors
  [...WEAPONS,...ARMORS].forEach(item=>{
    const isWeapon=WEAPONS.includes(item);
    const owned=isWeapon?ownedWeapons.includes(item.id):ownedArmors.includes(item.id);
    const equipped=isWeapon?weaponId===item.id:armorId===item.id;
    const canAfford=coins>=item.cost;
    const div=document.createElement('div');
    div.className='shop-item'+(equipped?' equipped':owned?' owned':!canAfford?' broke':'');
    // icon canvas
    const ic=document.createElement('canvas');ic.width=52;ic.height=40;ic.className='si-canvas';
    if(isWeapon)drawWeaponIcon(item.id,ic);else drawArmorIcon(item.id,ic);
    div.appendChild(ic);
    const nm=document.createElement('div');nm.className='si-name';nm.textContent=item.name;div.appendChild(nm);
    const st=document.createElement('div');st.className='si-stats';
    st.textContent=item.desc;div.appendChild(st);
    if(equipped){const t=document.createElement('span');t.className='si-tag eq';t.textContent='EQUIPPED';div.appendChild(t);}
    else if(owned){const t=document.createElement('span');t.className='si-tag own';t.textContent='OWNED';div.appendChild(t);}
    else{const t=document.createElement('div');t.className='si-cost';t.textContent=`⬡ ${item.cost}`;div.appendChild(t);}
    if(!equipped){
      div.onclick=()=>{
        if(owned){
          if(isWeapon)weaponId=item.id;else armorId=item.id;
          // reapply stats
          const wpn=getWeapon(),arm=getArmor();
          player.atk=20+(level-1)*5+wpn.atk;
          player.atkRange=wpn.range;
          player.speed=2.8+arm.spd;
          const newMax=100+(level-1)*20+arm.hp;
          const diff=newMax-player.maxHp;
          player.maxHp=newMax;player.hp=Math.min(player.hp+diff,newMax);
          player.def=arm.def;
          openShop();
        } else if(canAfford&&item.cost>0){
          coins-=item.cost;
          if(isWeapon){ownedWeapons.push(item.id);weaponId=item.id;}
          else{ownedArmors.push(item.id);armorId=item.id;}
          const wpn=getWeapon(),arm=getArmor();
          player.atk=20+(level-1)*5+wpn.atk;
          player.atkRange=wpn.range;
          player.speed=2.8+arm.spd;
          const newMax=100+(level-1)*20+arm.hp;
          const diff=newMax-player.maxHp;
          player.maxHp=newMax;player.hp=Math.min(player.hp+diff,newMax);
          player.def=arm.def;
          openShop();
        }
      };
    }
    grid.appendChild(div);
  });
}

// ── UPDATE ──
function update(){
  frame++;
  if(gs!=='playing')return;
  const up=keys['arrowup']||keys['w'],dn=keys['arrowdown']||keys['s'];
  const lt=keys['arrowleft']||keys['a'],rt=keys['arrowright']||keys['d'];
  let mx=0,my=0;
  if(up)my--;if(dn)my++;if(lt)mx--;if(rt)mx++;
  if(mx||my){const l=Math.sqrt(mx*mx+my*my);mx/=l;my/=l;}
  if(mx>0)player.facing=1;else if(mx<0)player.facing=-1;
  if(player.dashTimer>0)player.dashTimer--;
  if(keys['shift']&&player.dashTimer===0&&(mx||my)){
    player.dashTimer=50;player.iframes=14;burst(player.x,player.y,'#c8933a',10,'spark');
  }
  const spd=player.dashTimer>38?player.speed*3.2:player.speed;
  moveEnt(player,mx*spd,my*spd);
  if(player.atkCD>0)player.atkCD--;
  if(player.iframes>0)player.iframes--;
  player.animT++;if(player.animT>8){player.animT=0;player.animF=(player.animF+1)%4;}

  // spawn
  spawnTimer++;
  if(monsters.length<4+wave*2&&monsters.length+waveKills<waveTotal&&spawnTimer>Math.max(38,125-wave*9)){
    monsters.push(spawnMonster());spawnTimer=0;
  }

  // coins pickup
  for(const c of coins_arr){
    if(c.picked)continue;
    c.life--;
    const dx=player.x-c.x,dy=player.y-c.y,d=Math.sqrt(dx*dx+dy*dy);
    // magnet range
    if(d<60){c.x+=dx/d*3.5;c.y+=dy/d*3.5;}
    if(d<14){
      c.picked=true;coins+=c.val;
      floatTxt(c.x,c.y-10,`+${c.val}⬡`,'#f0c840');
      burst(c.x,c.y,'#f0c840',5,'spark');
    }
  }
  coins_arr=coins_arr.filter(c=>!c.picked&&c.life>0);

  // monsters
  for(let i=monsters.length-1;i>=0;i--){
    const m=monsters[i];
    if(m.hp<=0){
      score+=m.xp*wave;addXP(m.xp);waveKills++;
      spawnCoins(m.x,m.y,m.coinDrop[0],m.coinDrop[1]);
      burst(m.x,m.y,m.col,16);floatTxt(m.x,m.y-20,`+${m.xp*wave}`,'#f0d860');
      monsters.splice(i,1);continue;
    }
    m.animT++;if(m.flashT>0)m.flashT--;
    if(m.stunT>0){m.stunT--;m.vx*=.65;m.vy*=.65;m.phase?((m.x+=m.vx),(m.y+=m.vy)):moveEnt(m,m.vx,m.vy);continue;}
    const dx=player.x-m.x,dy=player.y-m.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    m.vx=m.vx*.8+(dx/dist*m.spd)*.2;m.vy=m.vy*.8+(dy/dist*m.spd)*.2;
    m.phase?((m.x+=m.vx),(m.y+=m.vy)):moveEnt(m,m.vx,m.vy);
    for(const m2 of monsters){
      if(m2===m)continue;
      const sx=m.x-m2.x,sy=m.y-m2.y,sd=Math.sqrt(sx*sx+sy*sy)||1;
      if(sd<m.size+m2.size+4){m.x+=sx/sd*1.2;m.y+=sy/sd*1.2;}
    }
    if(dist<m.size+12){
      m.atkTimer++;
      if(m.atkTimer>45&&player.iframes===0){
        m.atkTimer=0;
        const rawDmg=m.atk;
        const dmg=Math.max(1,rawDmg-player.def);
        player.hp-=dmg;player.iframes=22;
        burst(player.x,player.y,'#d83030',10);floatTxt(player.x,player.y-32,`-${dmg}`,'#ff3030');
      }
    }else if(m.atkTimer>0)m.atkTimer--;
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.88;p.vy=p.vy*.88+.06;p.life-=p.dec;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=floatTexts.length-1;i>=0;i--){
    const t=floatTexts[i];t.y+=t.vy;t.vy*=.94;t.life-=.022;if(t.life<=0)floatTexts.splice(i,1);
  }
  camX=Math.max(0,Math.min(player.x-W/2,COLS*TILE-W));
  camY=Math.max(0,Math.min(player.y-H/2,ROWS*TILE-H));
  updHUD();

  if(player.hp<=0){
    gs='dead';showOverlay('YOU HAVE FALLEN',[`WAVE ${wave}  ·  SCORE ${score}`,`⬡ ${coins} COINS`,`LEVEL ${level} HERO`],'RISE AGAIN',startGame);
  } else if(waveKills>=waveTotal&&monsters.length===0&&coins_arr.filter(c=>!c.picked).length===0){
    gs='cleared';
    openShop();
  }
}

// ── DRAW ──
function drawTorch(wx,wy){
  const f=.7+Math.sin(frame*.14+wx*.01+wy*.01)*.3,r=85*f;
  const g=ctx.createRadialGradient(wx,wy,2,wx,wy,r);
  g.addColorStop(0,`rgba(200,147,58,${.18*f})`);g.addColorStop(.5,`rgba(180,80,10,${.07*f})`);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(wx,wy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c8933a';ctx.beginPath();ctx.arc(wx,wy,3.5,0,Math.PI*2);ctx.fill();
}

function drawWeaponOnPlayer(px,py,bob,facing,atkCD){
  const wpn=getWeapon();
  const sw=atkCD>0?Math.sin((1-atkCD/Math.max(18,42-(level-1)*2))*Math.PI)*1.4:0;
  ctx.save();ctx.translate(px,py+bob);ctx.scale(facing,1);
  ctx.save();ctx.translate(9,-2);ctx.rotate(sw);
  if(wpn.id==='sword'){
    ctx.fillStyle='#604020';ctx.fillRect(-5,-5,6,9);
    ctx.fillStyle='#9898b8';ctx.fillRect(0,-3,20,4);
    ctx.fillStyle='#c0c0d8';ctx.fillRect(8,-2,11,2);
    ctx.fillStyle='#d0d0e8';ctx.fillRect(18,-3,3,4);
  }else if(wpn.id==='dagger'){
    ctx.fillStyle='#604020';ctx.fillRect(-4,-4,7,7);
    ctx.fillStyle='#80d0a0';ctx.fillRect(0,-2,15,3);
    ctx.fillStyle='#b0f0c0';ctx.fillRect(8,-2,7,2);
    // second dagger below
    ctx.save();ctx.translate(0,6);
    ctx.fillStyle='#604020';ctx.fillRect(-4,-4,7,7);
    ctx.fillStyle='#80d0a0';ctx.fillRect(0,-2,13,3);
    ctx.restore();
  }else if(wpn.id==='axe'){
    ctx.fillStyle='#604020';ctx.fillRect(-3,-4,5,30);
    ctx.fillStyle='#c05020';
    ctx.beginPath();ctx.moveTo(2,-3);ctx.lineTo(18,2);ctx.lineTo(16,14);ctx.lineTo(2,10);ctx.closePath();ctx.fill();
    ctx.fillStyle='#e07030';ctx.fillRect(2,-3,2,13);
    ctx.fillStyle='#f0a060';ctx.fillRect(2,-3,16,3);
  }else if(wpn.id==='spear'){
    ctx.fillStyle='#704820';ctx.fillRect(-2,-4,4,36);
    ctx.fillStyle='#a0b8d0';
    ctx.beginPath();ctx.moveTo(2,-4);ctx.lineTo(8,10);ctx.lineTo(2,10);ctx.lineTo(-2,10);ctx.lineTo(-6,10);ctx.lineTo(0,-4);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c8d8e8';ctx.fillRect(-1,-4,2,10);
    ctx.fillStyle='#808090';ctx.fillRect(-3,8,6,5);
  }else if(wpn.id==='greatsword'){
    ctx.fillStyle='#504060';ctx.fillRect(-3,-5,6,44);
    ctx.fillStyle='#d0d8f8';ctx.fillRect(-3,-5,6,32);
    ctx.fillStyle='#f0f0ff';ctx.fillRect(-2,-5,2,26);
    ctx.fillStyle='#d0a040';ctx.fillRect(-9,-1,18,5);
    ctx.fillStyle='#604020';ctx.fillRect(-2,14,4,12);
    ctx.fillStyle='#d0a040';ctx.beginPath();ctx.arc(0,26,5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();ctx.restore();
}

function drawArmorOnPlayer(px,py,bob,facing,iframes){
  if(iframes>0&&frame%4<2)return;
  const arm=getArmor();
  ctx.save();ctx.translate(px,py);
  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,11,9,4,0,0,Math.PI*2);ctx.fill();
  // dash trail
  if(player.dashTimer>38){
    for(let i=1;i<=3;i++){ctx.globalAlpha=.14/i;ctx.fillStyle='#c8933a';ctx.fillRect(-9-facing*i*9,-11,18,22);}
    ctx.globalAlpha=1;
  }
  ctx.scale(facing,1);
  // legs
  const leg=Math.sin(frame*.2)*3;
  ctx.fillStyle=arm.id==='rags'?'#1e0c02':arm.id==='leather'?'#4a2810':arm.id==='chain'?'#404040':'#606878';
  ctx.fillRect(-6,8+bob,5,10+leg);ctx.fillRect(1,8+bob,5,10-leg);
  // body
  if(arm.id==='rags'){
    ctx.fillStyle='#382010';ctx.fillRect(-7,-8+bob,14,16);
    ctx.fillStyle='#281408';ctx.fillRect(-5,-6+bob,10,7);
  }else if(arm.id==='leather'){
    ctx.fillStyle='#6a3818';ctx.fillRect(-8,-9+bob,16,17);
    ctx.fillStyle='#8B5A2B';ctx.fillRect(-6,-7+bob,12,9);
    ctx.fillStyle='#5a2a10';ctx.fillRect(-8,-9+bob,16,5);
    ctx.fillStyle='#c08040';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-5+i*5,3+bob,1.8,0,Math.PI*2);ctx.fill();}
  }else if(arm.id==='chain'){
    ctx.fillStyle='#707070';ctx.fillRect(-8,-9+bob,16,18);
    ctx.fillStyle='#505050';
    for(let y=-7;y<9;y+=3)for(let x=-6;x<8;x+=4){ctx.beginPath();ctx.arc(x,y+bob,1.2,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#909090';ctx.fillRect(-8,-9+bob,16,4);
  }else{
    ctx.fillStyle='#a8b8d0';ctx.fillRect(-9,-10+bob,18,20);
    ctx.fillStyle='#c8d8e8';ctx.fillRect(-7,-8+bob,14,7);ctx.fillRect(-7,0+bob,14,6);
    ctx.fillStyle='#8898a8';ctx.fillRect(-9,-10+bob,18,4);ctx.fillRect(-9,8+bob,18,3);
    ctx.fillStyle='#d8e8f8';ctx.beginPath();ctx.moveTo(-4,-5+bob);ctx.lineTo(4,-5+bob);ctx.lineTo(3,4+bob);ctx.lineTo(-3,4+bob);ctx.closePath();ctx.fill();
    ctx.fillStyle='#6878a8';ctx.fillRect(-9,-10+bob,3,20);ctx.fillRect(6,-10+bob,3,20);
  }
  // head (same for all, just helmet changes)
  ctx.fillStyle='#c49060';ctx.fillRect(-5,-18+bob,10,10);
  if(arm.id==='rags'){
    ctx.fillStyle='#281810';ctx.fillRect(-5,-22+bob,10,6);
  }else if(arm.id==='leather'){
    ctx.fillStyle='#5a3010';ctx.fillRect(-6,-21+bob,12,8);ctx.fillStyle='#7a4818';ctx.fillRect(-4,-21+bob,8,4);
  }else if(arm.id==='chain'){
    ctx.fillStyle='#606060';ctx.fillRect(-6,-22+bob,12,9);ctx.fillStyle='#404040';ctx.fillRect(-7,-17+bob,3,6);ctx.fillRect(4,-17+bob,3,6);
  }else{
    ctx.fillStyle='#a0b0c8';ctx.fillRect(-7,-23+bob,14,12);ctx.fillStyle='#c0d0e0';ctx.fillRect(-5,-23+bob,10,5);
    ctx.fillStyle='#303848';ctx.fillRect(-7,-17+bob,3,7);ctx.fillRect(4,-17+bob,3,7);
    ctx.fillStyle='#d0e0f0';ctx.fillRect(-3,-23+bob,6,3);
  }
  // shield
  const shCol=arm.id==='rags'?'#2a2018':arm.id==='leather'?'#5a3010':arm.id==='chain'?'#505060':'#707888';
  ctx.fillStyle=shCol;ctx.fillRect(-14,-4+bob,8,13);
  ctx.fillStyle=arm.id==='plate'?'#a0b0c8':'#404048';ctx.fillRect(-13,-3+bob,6,7);
  ctx.restore();
}

function drawMonster(m){
  const mx=m.x-camX,my=m.y-camY;
  if(mx<-90||mx>W+90||my<-90||my>H+90)return;
  ctx.save();ctx.translate(mx,my);
  if(m.flashT>0)ctx.globalAlpha=.45+Math.sin(m.flashT*.5)*.55;
  ctx.save();ctx.globalAlpha=(ctx.globalAlpha||1)*.3;
  ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,m.size*.7,m.size*.7,m.size*.22,0,0,Math.PI*2);ctx.fill();ctx.restore();
  const bob=Math.sin(frame*.11+m.id*.1)*2,fc=m.flashT>0?'#ffffff':m.col;
  if(m.name==='Slime'){
    const sq=1+Math.sin(frame*.15+m.id)*.1;ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(0,bob,m.size*sq,m.size*(2-sq),0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.arc(-4,-4+bob,3,0,Math.PI*2);ctx.arc(4,-3+bob,2,0,Math.PI*2);ctx.fill();
  }else if(m.name==='Skeleton'){
    ctx.fillStyle=fc;ctx.fillRect(-5,-m.size+bob,10,m.size);ctx.beginPath();ctx.arc(0,-m.size-6+bob,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0608';ctx.fillRect(-4,-m.size-8+bob,3,4);ctx.fillRect(1,-m.size-8+bob,3,4);
  }else if(m.name==='Bat'){
    const wf=Math.sin(frame*.3+m.id)*.45;ctx.fillStyle=fc;
    ctx.save();ctx.rotate(wf);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-m.size*2,-m.size);ctx.lineTo(-m.size*1.5,m.size*.5);ctx.closePath();ctx.fill();ctx.restore();
    ctx.save();ctx.rotate(-wf);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(m.size*2,-m.size);ctx.lineTo(m.size*1.5,m.size*.5);ctx.closePath();ctx.fill();ctx.restore();
    ctx.beginPath();ctx.arc(0,bob,m.size*.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff3030';ctx.fillRect(-4,-2+bob,3,3);ctx.fillRect(1,-2+bob,3,3);
  }else if(m.name==='Orc'){
    ctx.fillStyle=fc;ctx.fillRect(-m.size,-m.size+bob,m.size*2,m.size*2);
    ctx.fillStyle=m.flashT>0?'#fff':'#5a9a2a';ctx.beginPath();ctx.arc(0,-m.size*.8+bob,m.size*.7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0608';ctx.fillRect(-6,-m.size-2+bob,4,6);ctx.fillRect(2,-m.size-2+bob,4,6);
    ctx.fillStyle='#f0e0b0';ctx.fillRect(-5,-m.size+6+bob,3,6);ctx.fillRect(2,-m.size+6+bob,3,6);
  }else if(m.name==='Wraith'){
    ctx.globalAlpha=(ctx.globalAlpha||1)*.75;ctx.fillStyle=fc;
    ctx.beginPath();ctx.moveTo(0,-m.size*1.5+bob);
    for(let a=0;a<Math.PI*2;a+=.28){const r=m.size+Math.sin(a*3+frame*.1)*4;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r+bob);}
    ctx.closePath();ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle='#8888ff';ctx.fillRect(-5,-m.size*.3+bob,4,5);ctx.fillRect(1,-m.size*.3+bob,4,5);
  }else if(m.name==='Dragon'){
    ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(0,bob,m.size*1.2,m.size,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=m.flashT>0?'#fff':'#cc2a2a';ctx.beginPath();ctx.arc(m.size*.7,-m.size*.5+bob,m.size*.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff9900';ctx.fillRect(m.size*.4,-m.size*.3+bob,4,4);ctx.fillRect(m.size*.9,-m.size*.3+bob,4,4);
    ctx.fillStyle=m.flashT>0?'#fff':'#6a0000';
    const wb=Math.sin(frame*.1+m.id)*.3;
    ctx.save();ctx.rotate(-0.4-wb);ctx.beginPath();ctx.moveTo(0,-m.size);ctx.lineTo(-m.size*2.5,-m.size*2.5);ctx.lineTo(-m.size,0);ctx.closePath();ctx.fill();ctx.restore();
    ctx.save();ctx.rotate(0.4+wb);ctx.beginPath();ctx.moveTo(0,-m.size);ctx.lineTo(m.size*2.5,-m.size*2.5);ctx.lineTo(m.size,0);ctx.closePath();ctx.fill();ctx.restore();
  }
  if(m.hp<m.maxHp){
    const bw=m.size*2+10,by=-m.size-14;ctx.globalAlpha=1;
    ctx.fillStyle='#1a0404';ctx.fillRect(-bw/2,by,bw,4);ctx.fillStyle='#d83030';ctx.fillRect(-bw/2,by,bw*(m.hp/m.maxHp),4);
  }
  ctx.restore();
}

function drawCoin(c){
  const cx=c.x-camX,cy=c.y-camY+Math.sin(frame*.12+c.bob)*2;
  if(cx<-20||cx>W+20||cy<-20||cy>H+20)return;
  const pulse=.85+Math.sin(frame*.2+c.bob)*.15;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,7*pulse);
  g.addColorStop(0,'#fff8c0');g.addColorStop(.4,'#f0c840');g.addColorStop(1,'#c08020');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(cx,cy,5*pulse,0,Math.PI*2);ctx.fill();
  // sparkle
  if(frame%18<9){
    ctx.strokeStyle='rgba(255,240,120,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,cy-8*pulse);ctx.lineTo(cx,cy+8*pulse);ctx.moveTo(cx-8*pulse,cy);ctx.lineTo(cx+8*pulse,cy);ctx.stroke();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#080406';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(-camX,-camY);
  const tx0=Math.max(0,camX/TILE-1|0),tx1=Math.min(COLS,(camX+W)/TILE+2|0);
  const ty0=Math.max(0,camY/TILE-1|0),ty1=Math.min(ROWS,(camY+H)/TILE+2|0);
  for(let y=ty0;y<ty1;y++)for(let x=tx0;x<tx1;x++){
    const wx=x*TILE,wy=y*TILE;ctx.save();ctx.translate(wx,wy);
    if(map[y][x]===1){
      ctx.fillStyle=wallPat;ctx.fillRect(0,0,TILE,TILE);
      if(y>0 && map[y-1][x]===0){
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.fillRect(0,0,TILE,6);
}
    }else{ctx.fillStyle=floorPat;ctx.fillRect(0,0,TILE,TILE);}
    ctx.restore();
  }
  for(const r of rooms){
    drawTorch((r.x+r.w*.5)*TILE,r.y*TILE+TILE*.5);
    if(r.w>5)drawTorch(r.x*TILE+TILE*.5,(r.y+r.h*.5)*TILE);
  }
  // coins
  for(const c of coins_arr)drawCoin(c);
  // blood particles
  ctx.save();for(const p of particles)if(p.type==='blood'){ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();}ctx.restore();
  for(const m of monsters)drawMonster(m);
  // player
  if(player){
    const px=player.x-camX,py=player.y-camY,bob=Math.sin(frame*.1)*1.5;
    drawArmorOnPlayer(px,py,bob,player.facing,player.iframes);
    drawWeaponOnPlayer(px,py,bob,player.facing,player.atkCD);
  }
  // sparks
  ctx.save();for(const p of particles)if(p.type==='spark'){ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}ctx.restore();
  // float texts
  ctx.save();ctx.font='bold 13px Cinzel,serif';ctx.textAlign='center';
  for(const t of floatTexts){ctx.globalAlpha=t.life;ctx.fillStyle=t.col;ctx.fillText(t.txt,t.x,t.y);}ctx.restore();
  // attack range hint
  if(player&&player.atkCD>20){
    ctx.save();ctx.globalAlpha=.05;ctx.fillStyle='#f0d860';ctx.beginPath();ctx.arc(player.x,player.y,player.atkRange,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  ctx.restore();
  // vignette
  const vig=ctx.createRadialGradient(W/2,H/2,W*.18,W/2,H/2,W*.75);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  // dash bar
  if(player&&player.dashTimer>0&&player.dashTimer<50){
    const f=(50-player.dashTimer)/50;
    ctx.fillStyle='#1a0f04';ctx.fillRect(10,H-20,90,5);
    ctx.fillStyle='#c8933a';ctx.fillRect(10,H-20,90*f,5);
    ctx.fillStyle='#6a4820';ctx.font='.42rem Cinzel,serif';ctx.textAlign='left';ctx.fillText('DASH',10,H-23);
  }
  // equip indicator bottom right
  if(player){
    const wpn=getWeapon(),arm=getArmor();
    ctx.fillStyle='rgba(8,4,6,.6)';ctx.fillRect(W-170,H-34,165,30);
    ctx.fillStyle='#c8933a';ctx.font='.45rem Cinzel,serif';ctx.textAlign='right';
    ctx.fillText(`⚔ ${wpn.name}`,W-8,H-20);
    ctx.fillText(`🛡 ${arm.name}`,W-8,H-7);
  }
}

// ── loop ──
let loopRunning=false;
function loop(){update();draw();requestAnimationFrame(loop);}

// ── start / next wave ──
function startGame(){
  wave=1;score=0;level=1;xp=0;xpNext=100;coins=0;
  ownedWeapons=['sword'];ownedArmors=['rags'];weaponId='sword';armorId='rags';
  genMap();player=makePlayer();
  monsters=[];particles=[];floatTexts=[];coins_arr=[];
  spawnTimer=0;waveKills=0;waveTotal=3+wave*2;
  frame=0;camX=0;camY=0;gs='playing';
  document.getElementById('overlay').style.display='none';
  document.getElementById('shop').style.display='none';
  updHUD();
  if(!loopRunning){loopRunning=true;loop();}
}
function nextWave(){
  wave++;genMap();
  const r=rooms[0];player.x=(r.x+r.w*.5)*TILE;player.y=(r.y+r.h*.5)*TILE;
  monsters=[];particles=[];floatTexts=[];coins_arr=[];
  spawnTimer=0;waveKills=0;waveTotal=3+wave*3;
  gs='playing';document.getElementById('shop').style.display='none';updHUD();
}

// ── overlay helper ──
const ovl=document.getElementById('overlay'),ovlBtn=document.getElementById('ovl-btn');
function showOverlay(title,lines,btnLabel,fn){
  ovl.querySelector('h2').textContent=title;
  ovl.querySelectorAll('p').forEach(p=>p.remove());
  lines.forEach(l=>{const p=document.createElement('p');p.textContent=l;ovlBtn.before(p);});
  ovlBtn.textContent=btnLabel;ovlBtn.onclick=fn;ovl.style.display='flex';
}

// ── input ──
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '){e.preventDefault();playerAttack();}
  if(e.key==='Escape'&&gs==='cleared'){nextWave();}
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
canvas.addEventListener('click',e=>{
  if(gs!=='playing')return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width)+camX;
  player.facing=mx>player.x?1:-1;playerAttack();
});
ovlBtn.onclick=startGame;
document.getElementById('shop-skip').onclick=nextWave;

// ── init ──
genMap();player=makePlayer();monsters=[];particles=[];floatTexts=[];coins_arr=[];
camX=0;camY=0;frame=0;draw();
</script>
