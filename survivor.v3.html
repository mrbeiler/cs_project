<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SURVIVOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0f;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Share Tech Mono',monospace;}
  #gameContainer{position:relative;width:800px;height:600px;}
  canvas{display:block;border:1px solid #1a1a2e;box-shadow:0 0 40px rgba(0,200,255,0.15),0 0 80px rgba(0,200,255,0.05);}
  #ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;}
  #hud{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;gap:12px;}
  #healthBar{width:200px;}
  #healthLabel{color:#ff4466;font-size:10px;letter-spacing:2px;margin-bottom:4px;font-family:'Orbitron',monospace;}
  #healthOuter{background:#1a0a0a;border:1px solid #ff4466;height:10px;border-radius:2px;}
  #healthInner{background:linear-gradient(90deg,#ff2244,#ff6688);height:100%;border-radius:2px;transition:width 0.1s;box-shadow:0 0 6px #ff4466;}
  #xpBar{flex:1;}
  #xpLabel{color:#44ffaa;font-size:10px;letter-spacing:2px;margin-bottom:4px;font-family:'Orbitron',monospace;}
  #xpOuter{background:#0a1a0a;border:1px solid #44ffaa;height:10px;border-radius:2px;}
  #xpInner{background:linear-gradient(90deg,#00cc66,#44ffaa);height:100%;border-radius:2px;transition:width 0.3s;box-shadow:0 0 6px #44ffaa;}
  #stats{display:flex;gap:16px;align-items:center;}
  .stat{text-align:center;}
  .statVal{color:#00ccff;font-size:18px;font-family:'Orbitron',monospace;font-weight:700;}
  .statLbl{color:#336688;font-size:9px;letter-spacing:1px;}
  #timer{color:#ffcc00;font-family:'Orbitron',monospace;font-size:22px;font-weight:900;text-shadow:0 0 10px #ffcc00;}
  #levelUpScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;backdrop-filter:blur(4px);}
  #levelUpTitle{font-family:'Orbitron',monospace;color:#ffcc00;font-size:28px;font-weight:900;letter-spacing:4px;margin-bottom:8px;text-shadow:0 0 20px #ffcc00;}
  #levelUpSub{color:#666;font-size:12px;letter-spacing:2px;margin-bottom:32px;}
  #choices{display:flex;gap:16px;}
  .choice{background:#0d0d1a;border:1px solid #334;padding:20px;width:180px;cursor:pointer;transition:all 0.2s;border-radius:4px;pointer-events:all;}
  .choice:hover{border-color:#00ccff;background:#0a1520;box-shadow:0 0 20px rgba(0,200,255,0.2);transform:translateY(-2px);}
  .choiceIcon{font-size:32px;text-align:center;margin-bottom:10px;}
  .choiceName{color:#00ccff;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px;}
  .choiceDesc{color:#668;font-size:10px;line-height:1.5;}
  .choiceRarity{font-size:9px;letter-spacing:2px;margin-bottom:8px;}
  .rare{color:#44aaff;}.common{color:#88aacc;}.epic{color:#aa44ff;}.legendary{color:#ffaa00;text-shadow:0 0 8px #ffaa00;}
  #startScreen,#gameOverScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;}
  #gameOverScreen{display:none;}
  .screenTitle{font-family:'Orbitron',monospace;color:#00ccff;font-size:48px;font-weight:900;letter-spacing:6px;text-shadow:0 0 30px #00ccff,0 0 60px rgba(0,200,255,0.3);margin-bottom:8px;}
  .screenSub{color:#446;font-size:12px;letter-spacing:4px;margin-bottom:40px;}
  .bigBtn{background:transparent;border:1px solid #00ccff;color:#00ccff;font-family:'Orbitron',monospace;font-size:14px;letter-spacing:3px;padding:14px 40px;cursor:pointer;transition:all 0.2s;}
  .bigBtn:hover{background:#00ccff;color:#000;box-shadow:0 0 30px rgba(0,200,255,0.5);}
  #weapons{position:absolute;bottom:12px;left:12px;display:flex;gap:8px;}
  .weaponSlot{width:36px;height:36px;border:1px solid #334;background:#0a0a14;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;}
  .weaponSlot .wLvl{position:absolute;bottom:1px;right:3px;font-size:8px;color:#ffcc00;font-family:'Orbitron',monospace;}
  #killCount{position:absolute;bottom:12px;right:12px;text-align:right;}
  .killNum{color:#ff4466;font-family:'Orbitron',monospace;font-size:24px;font-weight:900;}
  .killLbl{color:#446;font-size:9px;letter-spacing:2px;}
  #goStats{color:#aaa;font-size:13px;line-height:2;margin-bottom:30px;text-align:center;}
  #goStats span{color:#00ccff;font-family:'Orbitron',monospace;}

  /* INVENTORY PANEL */
  #inventoryPanel{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;pointer-events:all;backdrop-filter:blur(6px);z-index:20;overflow-y:auto;}
  #invHeader{padding:20px 24px 0;text-align:center;width:100%;}
  #invTitle{font-family:'Orbitron',monospace;color:#00ccff;font-size:22px;font-weight:900;letter-spacing:5px;text-shadow:0 0 20px #00ccff;}
  #invSub{color:#446;font-size:10px;letter-spacing:3px;margin:4px 0 12px;}
  #invGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px 16px;width:100%;max-width:780px;}
  .invCard{background:#0d0d1a;border:1px solid #223;border-radius:5px;padding:10px;position:relative;transition:all 0.15s;display:flex;flex-direction:column;gap:6px;}
  .invCard.equipped{border-color:#00ccff;box-shadow:0 0 12px rgba(0,200,255,0.25);}
  .invCard:hover{background:#111628;}
  .invCardIcon{font-size:28px;text-align:center;line-height:1.1;}
  .invCardName{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:0.5px;text-align:center;line-height:1.3;}
  .invCardRarity{font-size:8px;letter-spacing:2px;text-align:center;}
  .invCardStats{color:#556;font-size:8px;line-height:1.6;border-top:1px solid #1a1a2e;padding-top:4px;}
  .invCardEffect{font-size:8px;text-align:center;padding:2px 6px;border-radius:2px;background:#0a0a14;}
  .invCardBtns{display:flex;gap:5px;margin-top:2px;}
  .invBtn{flex:1;background:transparent;border:1px solid #334;color:#667;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:4px 2px;cursor:pointer;border-radius:2px;transition:all 0.15s;}
  .invBtn:hover:not(:disabled){background:#1a2030;color:#aaa;border-color:#556;}
  .invBtn.equipBtn{border-color:#00ccff44;color:#00ccff99;}
  .invBtn.equipBtn:hover{background:#003344;color:#00ffff;border-color:#00ccff;}
  .invBtn.equipBtn.active{background:#00334466;color:#00ffff;border-color:#00ccff;cursor:default;}
  .invBtn.mergeBtn{border-color:#ffcc0044;color:#ffcc0099;}
  .invBtn.mergeBtn:hover{background:#1a1400;color:#ffdd44;border-color:#ffcc00;}
  .invCardCount{position:absolute;top:5px;right:7px;background:#ffcc00;color:#000;font-family:'Orbitron',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;}
  .invCardLevel{position:absolute;top:5px;left:7px;font-family:'Orbitron',monospace;font-size:8px;font-weight:700;}
  .emptySlot{background:#080810;border:1px dashed #1a1a2e;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#1a1a2e;font-size:22px;min-height:80px;}
  #invFooter{padding:8px;text-align:center;width:100%;}
  #invCloseBtn{background:transparent;border:1px solid #334;color:#446;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;padding:8px 28px;cursor:pointer;transition:all 0.2s;}
  #invCloseBtn:hover{border-color:#ff4466;color:#ff4466;}
  #invHint{color:#223;font-size:9px;letter-spacing:2px;margin-top:6px;}
  #tabHint{position:absolute;bottom:14px;left:88px;color:#335;font-size:9px;letter-spacing:1px;pointer-events:none;}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="ui">
    <div id="hud">
      <div id="healthBar">
        <div id="healthLabel">HP ■■■</div>
        <div id="healthOuter"><div id="healthInner" style="width:100%"></div></div>
      </div>
      <div id="stats">
        <div class="stat"><div class="statVal" id="levelDisp">1</div><div class="statLbl">LVL</div></div>
        <div id="timer">00:00</div>
      </div>
      <div id="xpBar">
        <div id="xpLabel">EXP ■■■</div>
        <div id="xpOuter"><div id="xpInner" style="width:0%"></div></div>
      </div>
    </div>
    <div id="weapons"></div>
    <div id="killCount"><div class="killNum" id="killNum">0</div><div class="killLbl">KILLS</div></div>
  </div>
  <div id="levelUpScreen">
    <div id="levelUpTitle">LEVEL UP!</div>
    <div id="levelUpSub">CHOOSE AN UPGRADE</div>
    <div id="choices"></div>
  </div>

  <div id="inventoryPanel">
    <div id="invHeader">
      <div id="invTitle">⚔ ARSENAL</div>
      <div id="invSub">CLICK EQUIP TO SWITCH WEAPON · MERGE DUPLICATES TO LEVEL UP</div>
    </div>
    <div id="invGrid"></div>
    <div id="invFooter">
      <button id="invCloseBtn" onclick="closeInventory()">CLOSE [ TAB ]</button>
      <div id="invHint">collect weapons on level-up · max 8 slots · merge 2 identical to upgrade</div>
    </div>
  </div>
  <div id="tabHint">TAB · ARSENAL</div>
  <div id="startScreen">
    <div class="screenTitle">SURVIVOR</div>
    <div class="screenSub">SURVIVE THE HORDE</div>
    <button class="bigBtn" onclick="startGame()">START GAME</button>
    <div style="margin-top:20px;color:#334;font-size:11px;letter-spacing:2px;">WASD / ARROW KEYS TO MOVE</div>
  </div>
  <div id="gameOverScreen">
    <div class="screenTitle" style="color:#ff4466;text-shadow:0 0 30px #ff4466;">DEFEATED</div>
    <div id="goStats"></div>
    <button class="bigBtn" style="border-color:#ff4466;color:#ff4466;" onclick="startGame()">RETRY</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let game = {};

function initGame() {
  game = {
    running: false, paused: false,
    time: 0, kills: 0,
    player: {
      x: W/2, y: H/2, r: 14, hp: 100, maxHp: 100,
      spd: 160, invuln: 0,
      xp: 0, xpNext: 20, level: 1,
      weapons: [],
    },
    enemies: [], bullets: [], gems: [], particles: [],
    keys: {}, spawnTimer: 0, spawnRate: 1.5,
    inventory: [],   // array of weapon instances (max 8)
    equippedIdx: 0,
  };
  // Start with pistol
  addToInventory('pistol');
  syncEquipped();
}

// Weapon definitions
// effect types: dot (burn/poison), slow, pierce, spread, explode, crit
const WEAPONS = {
  pistol:   {name:'AUTOPISTOL',    icon:'🔫', rarity:'common',    color:'#aaccff', cd:0.22, dmg:12, spd:520, r:4,  pierce:0, spread:0,    effect:null,                             desc:'Fast semi-auto. Reliable damage output.'},
  shotgun:  {name:'SHOTGUN',       icon:'💥', rarity:'common',    color:'#ff8844', cd:0.75, dmg:18, spd:420, r:5,  pierce:0, spread:5,    effect:null,  pellets:5,                desc:'5 pellets per shot. Devastating at close range.'},
  sniper:   {name:'SNIPER RIFLE',  icon:'🎯', rarity:'rare',      color:'#00ffcc', cd:1.1,  dmg:75, spd:900, r:4,  pierce:5, spread:0,    effect:null,                             desc:'Slow fire, extreme damage. Pierces all enemies.'},
  smg:      {name:'NEON SMG',      icon:'⚡', rarity:'common',    color:'#ffff44', cd:0.09, dmg:7,  spd:480, r:3,  pierce:0, spread:0,    effect:{type:'slow',amt:0.4,dur:1.2},    desc:'Blazing fire rate. Slows enemies on hit.'},
  flamer:   {name:'FLAMETHROWER',  icon:'🔥', rarity:'rare',      color:'#ff5500', cd:0.12, dmg:6,  spd:240, r:6,  pierce:2, spread:0,    effect:{type:'dot',dmg:4,tick:0.5,dur:3},desc:'Short range. Ignites enemies — burns over time.'},
  cryo:     {name:'CRYO CANNON',   icon:'❄️', rarity:'rare',      color:'#88ddff', cd:0.55, dmg:22, spd:340, r:7,  pierce:0, spread:0,    effect:{type:'freeze',amt:0.7,dur:2.0},  desc:'Freezes enemies solid. Massive slow on hit.'},
  railgun:  {name:'RAILGUN',       icon:'🟣', rarity:'epic',      color:'#cc44ff', cd:2.2,  dmg:180,spd:1100,r:4,  pierce:99,spread:0,    effect:null,  chargeVfx:true,           desc:'Rare. Punches through the entire screen.'},
  grenade:  {name:'GRENADE LAUNCHER',icon:'💣',rarity:'rare',     color:'#ffcc00', cd:1.0,  dmg:55, spd:320, r:8,  pierce:0, spread:0,    effect:null,  explode:{r:90,dmg:30},    desc:'Bouncy grenades. Explode on impact.'},
  toxic:    {name:'TOXIC SPRAYER', icon:'☣️', rarity:'epic',      color:'#44ff88', cd:0.18, dmg:5,  spd:280, r:6,  pierce:1, spread:0,    effect:{type:'dot',dmg:8,tick:0.4,dur:4},desc:'Coats enemies in acid. Stacking poison damage.'},
  plasma:   {name:'PLASMA CANNON', icon:'🌀', rarity:'epic',      color:'#ff00ff', cd:0.45, dmg:40, spd:380, r:9,  pierce:0, spread:0,    effect:{type:'dot',dmg:10,tick:0.6,dur:2},desc:'Slow plasma blobs. Burns and melts armour.'},
  minigun:  {name:'MINIGUN',       icon:'🔴', rarity:'legendary', color:'#ff4444', cd:0.06, dmg:9,  spd:560, r:3,  pierce:0, spread:0,    effect:null,  spinUp:true,              desc:'LEGENDARY. Insane fire rate. Pure devastation.'},
  burst:    {name:'BURST RIFLE',   icon:'🟦', rarity:'rare',      color:'#44aaff', cd:0.55, dmg:20, spd:600, r:4,  pierce:0, spread:0,    effect:null,  burstCount:3,burstDelay:0.08,desc:'3-round burst. Precise and powerful.'},
};

const UPGRADES = [
  {id:'pistol',  type:'weapon', name:'AUTOPISTOL',       icon:'🔫', rarity:'common',    desc:'Fast semi-auto. Reliable damage output.'},
  {id:'shotgun', type:'weapon', name:'SHOTGUN',           icon:'💥', rarity:'common',    desc:'5 pellets per shot. Devastating close range.'},
  {id:'sniper',  type:'weapon', name:'SNIPER RIFLE',      icon:'🎯', rarity:'rare',      desc:'Slow fire, extreme damage. Pierces enemies.'},
  {id:'smg',     type:'weapon', name:'NEON SMG',          icon:'⚡', rarity:'common',    desc:'Blazing fire rate. Slows enemies on hit.'},
  {id:'flamer',  type:'weapon', name:'FLAMETHROWER',      icon:'🔥', rarity:'rare',      desc:'Short range. Ignites enemies — burns over time.'},
  {id:'cryo',    type:'weapon', name:'CRYO CANNON',       icon:'❄️', rarity:'rare',      desc:'Freezes enemies solid. Massive slow on hit.'},
  {id:'railgun', type:'weapon', name:'RAILGUN',           icon:'🟣', rarity:'epic',      desc:'Full screen pierce. One-shot potential.'},
  {id:'grenade', type:'weapon', name:'GRENADE LAUNCHER',  icon:'💣', rarity:'rare',      desc:'Grenades explode on impact. Area damage.'},
  {id:'toxic',   type:'weapon', name:'TOXIC SPRAYER',     icon:'☣️', rarity:'epic',      desc:'Stacking poison. Melts groups of enemies.'},
  {id:'plasma',  type:'weapon', name:'PLASMA CANNON',     icon:'🌀', rarity:'epic',      desc:'Slow blobs. Burns and melts armour.'},
  {id:'minigun', type:'weapon', name:'MINIGUN',           icon:'🔴', rarity:'legendary', desc:'LEGENDARY. Insane fire rate. Pure devastation.'},
  {id:'burst',   type:'weapon', name:'BURST RIFLE',       icon:'🟦', rarity:'rare',      desc:'3-round burst. Precise and powerful.'},
  {id:'spd', type:'stat', name:'Speed Boost', icon:'👟', rarity:'common',    desc:'+20% movement speed'},
  {id:'hp',  type:'stat', name:'Vital Surge', icon:'❤️', rarity:'common',    desc:'+25 max HP, restore 20 HP'},
  {id:'dmg', type:'stat', name:'Power Core',  icon:'🔋', rarity:'rare',      desc:'+25% damage to all weapons'},
  {id:'atk', type:'stat', name:'Attack Speed',icon:'⏱️', rarity:'common',    desc:'+20% attack speed'},
];

function addToInventory(id) {
  const def = WEAPONS[id];
  if(!def || game.inventory.length >= 8) return false;
  game.inventory.push({id, ...JSON.parse(JSON.stringify(def)), level:1, timer:0, burstTimer:0, burstFired:0, spinupAmt:0});
  return true;
}

function syncEquipped() {
  const w = game.inventory[game.equippedIdx];
  if(w) { game.player.weapons = [w]; }
  else if(game.inventory.length > 0){ game.equippedIdx=0; game.player.weapons=[game.inventory[0]]; }
  else { game.player.weapons=[]; }
  game.bullets = [];
}

function equipFromInventory(idx) {
  if(idx < 0 || idx >= game.inventory.length) return;
  game.equippedIdx = idx;
  syncEquipped();
  renderInventory();
}

function mergeWeapons(id) {
  const indices = [];
  for(let i=0;i<game.inventory.length;i++) if(game.inventory[i].id===id) indices.push(i);
  if(indices.length < 2) return;
  const keep = game.inventory[indices[0]];
  keep.level++;
  keep.dmg  = Math.floor(keep.dmg * 1.3);
  keep.cd   = keep.cd * 0.85;
  keep.timer = 0;
  game.inventory.splice(indices[1], 1);
  if(game.equippedIdx >= indices[1] && game.equippedIdx > 0) game.equippedIdx--;
  syncEquipped();
  renderInventory();
}

// Compatibility shim
function addWeapon(id){ addToInventory(id); if(game.inventory.length===1) syncEquipped(); }

// Enemy types
function spawnEnemy() {
  const p = game.player;
  const side = Math.floor(Math.random()*4);
  let x, y;
  const pad = 30;
  if(side===0){x=Math.random()*W;y=-pad;}
  else if(side===1){x=W+pad;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+pad;}
  else{x=-pad;y=Math.random()*H;}
  
  const t = game.time;
  const types = t < 30 ? ['slime'] : t < 60 ? ['slime','runner'] : t < 120 ? ['slime','runner','tank'] : ['slime','runner','tank','speeder'];
  const type = types[Math.floor(Math.random()*types.length)];
  
  const configs = {
    slime: {r:12,hp:30,maxHp:30,spd:60,dmg:10,xp:3,color:'#33ff66',score:1},
    runner: {r:9,hp:18,maxHp:18,spd:120,dmg:8,xp:2,color:'#ff9933',score:1},
    tank: {r:20,hp:120,maxHp:120,spd:35,dmg:20,xp:8,color:'#ff3366',score:3},
    speeder: {r:8,hp:12,maxHp:12,spd:180,dmg:6,xp:2,color:'#ffff00',score:1},
  };
  const cfg = configs[type];
  game.enemies.push({x,y,type,...cfg,hit:0});
}

function update(dt) {
  if(!game.running || game.paused) return;
  game.time += dt;

  const p = game.player;
  const spd = p.spd * (p.spdMult||1);
  let dx=0,dy=0;
  if(game.keys['ArrowLeft']||game.keys['a']||game.keys['A']) dx-=1;
  if(game.keys['ArrowRight']||game.keys['d']||game.keys['D']) dx+=1;
  if(game.keys['ArrowUp']||game.keys['w']||game.keys['W']) dy-=1;
  if(game.keys['ArrowDown']||game.keys['s']||game.keys['S']) dy+=1;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  p.x = Math.max(p.r, Math.min(W-p.r, p.x + dx*spd*dt));
  p.y = Math.max(p.r, Math.min(H-p.r, p.y + dy*spd*dt));
  if(p.invuln>0) p.invuln -= dt;

  // Spawn enemies
  game.spawnTimer -= dt;
  const rate = Math.max(0.3, game.spawnRate - game.time*0.005);
  if(game.spawnTimer<=0){spawnEnemy();game.spawnTimer=rate;}
  // Boss spawns
  if(game.time > 60 && Math.random() < 0.002) spawnBoss();

  // Update enemies
  for(let i=game.enemies.length-1;i>=0;i--){
    const e = game.enemies[i];
    const edx = p.x-e.x, edy = p.y-e.y;
    const dist = Math.sqrt(edx*edx+edy*edy)||1;
    const slowF = e.slowAmt ? (1-e.slowAmt) : 1;
    e.x += (edx/dist)*e.spd*slowF*dt;
    e.y += (edy/dist)*e.spd*slowF*dt;
    if(e.hit>0) e.hit-=dt;
    // Player collision
    if(dist < p.r+e.r && p.invuln<=0){
      let dmg = e.dmg;
      
      p.hp = Math.max(0, p.hp-dmg);
      p.invuln = 0.6;
      spawnParticles(p.x,p.y,'#ff4466',8);
      if(p.hp<=0){gameOver();return;}
    }
  }

  // Update weapons/bullets
  updateWeapons(dt);

  // Update bullets
  for(let i=game.bullets.length-1;i>=0;i--){
    const b = game.bullets[i];
    b.x += b.vx*dt; b.y += b.vy*dt;
    b.life -= dt;
    if(b.life<=0||b.x<-60||b.x>W+60||b.y<-60||b.y>H+60){
      game.bullets.splice(i,1); continue;
    }
    // Hit enemies
    let hitAny = false;
    for(let j=game.enemies.length-1;j>=0;j--){
      const e = game.enemies[j];
      const dx2=b.x-e.x, dy2=b.y-e.y;
      if(dx2*dx2+dy2*dy2 < (b.r+e.r)*(b.r+e.r)){
        const dmg = Math.floor(b.dmg*(p.dmgMult||1));
        e.hp -= dmg; e.hit=0.15;
        spawnDamageNum(e.x,e.y,dmg,b.color);
        // Apply status effect
        if(b.effect){
          if(b.effect.type==='slow'||b.effect.type==='freeze'){
            e.slowAmt = b.effect.amt; e.slowTimer = b.effect.dur;
          }
          if(b.effect.type==='dot'){
            e.dot = {dmg:b.effect.dmg, tick:b.effect.tick, timer:b.effect.tick, dur:b.effect.dur};
          }
        }
        // Grenade explode
        if(b.explode){
          doExplosion(b.x, b.y, b.explode.r, b.explode.dmg, p.dmgMult||1);
          game.bullets.splice(i,1); hitAny=true; break;
        }
        b.pierce = (b.pierce||0) - 1;
        if(b.pierce < 0){ game.bullets.splice(i,1); hitAny=true; }
        if(e.hp<=0) killEnemy(e,j);
        if(hitAny) break;
      }
    }
  }

  // XP gems
  const magnetRange = 80;
  for(let i=game.gems.length-1;i>=0;i--){
    const g = game.gems[i];
    const gdx=p.x-g.x,gdy=p.y-g.y;
    const gd=Math.sqrt(gdx*gdx+gdy*gdy)||1;
    if(gd < magnetRange){ g.x+=gdx/gd*200*dt; g.y+=gdy/gd*200*dt; }
    if(gd < p.r+g.r){ 
      p.xp+=g.val; game.gems.splice(i,1);
      checkLevelUp();
    }
  }

  // Tick enemy status effects (dot / slow)
  for(let i=game.enemies.length-1;i>=0;i--){
    const e = game.enemies[i];
    if(e.slowTimer>0){ e.slowTimer-=dt; if(e.slowTimer<=0){e.slowAmt=0;} }
    if(e.dot){
      e.dot.timer-=dt; e.dot.dur-=dt;
      if(e.dot.timer<=0){
        const ddmg=Math.floor(e.dot.dmg*(p.dmgMult||1));
        e.hp-=ddmg; e.hit=0.1;
        spawnDamageNum(e.x,e.y-8,ddmg,'#ff8800');
        e.dot.timer=e.dot.tick;
        if(e.hp<=0){killEnemy(e,i); continue;}
      }
      if(e.dot.dur<=0) e.dot=null;
    }
  }

  // Update particles
  for(let i=game.particles.length-1;i>=0;i--){
    const pt=game.particles[i];
    pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt; pt.vy+=200*dt;
    if(pt.life<=0) game.particles.splice(i,1);
  }

  updateHUD();
}

function fireBullet(p, w, ax, ay, angleOffset){
  const baseAngle = Math.atan2(ay - p.y, ax - p.x);
  const angle = baseAngle + (angleOffset||0);
  const spd = w.spd || 400;
  const life = Math.min(2.5, (W*1.2) / spd);
  game.bullets.push({
    x:p.x, y:p.y,
    vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
    r:w.r||4, dmg:w.dmg, color:w.color, life,
    pierce:w.pierce||0,
    effect: w.effect ? {...w.effect} : null,
    explode: w.explode || null,
    weaponId: w.id,
  });
}

function updateWeapons(dt){
  const p = game.player;
  for(const w of p.weapons){
    w.timer -= dt;
    // Minigun spin-up
    if(w.spinUp) w.spinupAmt = game.mouseDown ? Math.min(1, (w.spinupAmt||0)+dt*1.5) : Math.max(0,(w.spinupAmt||0)-dt*2);
    // Burst sub-timer
    if(w.burstFired > 0){
      w.burstTimer -= dt;
      if(w.burstTimer <= 0){
        const [ax,ay] = [mouse.x, mouse.y];
        fireBullet(p, w, ax, ay);
        w.burstFired--;
        w.burstTimer = w.burstDelay||0.08;
      }
    }
    const effectiveCd = w.cd * (p.atkMult||1) * (w.spinUp ? (2-w.spinupAmt) : 1);
    if(!game.mouseDown || w.timer > 0) continue;
    w.timer = effectiveCd;
    const ax = mouse.x, ay = mouse.y;
    if(w.pellets && w.pellets > 1){
      // Shotgun spread
      const spread = (w.spread||12) * Math.PI/180;
      for(let i=0; i<w.pellets; i++){
        const off = (i/(w.pellets-1) - 0.5) * spread;
        fireBullet(p, w, ax, ay, off);
      }
    } else if(w.burstCount){
      // Burst: fire first bullet now, rest via burstTimer
      fireBullet(p, w, ax, ay);
      w.burstFired = w.burstCount - 1;
      w.burstTimer = w.burstDelay||0.08;
    } else {
      fireBullet(p, w, ax, ay);
    }
  }
}

function applyPassive(w){ /* no passive weapons */ }



function doExplosion(x, y, radius, dmg, dmgMult){
  spawnParticles(x,y,'#ffaa00',18);
  for(let i=0;i<16;i++){
    const a=Math.PI*2/16*i;
    game.particles.push({x,y,vx:Math.cos(a)*150,vy:Math.sin(a)*150,life:0.5,color:'#ff6600',r:5});
  }
  for(let j=game.enemies.length-1;j>=0;j--){
    const e=game.enemies[j];
    const dx=e.x-x,dy=e.y-y;
    if(dx*dx+dy*dy<radius*radius){
      const d=Math.floor(dmg*dmgMult);
      e.hp-=d; e.hit=0.2;
      spawnDamageNum(e.x,e.y,d,'#ffcc00');
      if(e.hp<=0) killEnemy(e,j);
    }
  }
}

function nearestEnemy(){
  const p=game.player;
  let best=null,bestD=Infinity;
  for(const e of game.enemies){
    const d=(e.x-p.x)**2+(e.y-p.y)**2;
    if(d<bestD){bestD=d;best=e;}
  }
  return best;
}

function killEnemy(e, idx){
  game.kills++;
  game.enemies.splice(idx,1);
  spawnParticles(e.x,e.y,e.color,10);
  // Drop gem
  const val = e.xp || 3;
  game.gems.push({x:e.x,y:e.y,r:6,val,color:'#44ffaa'});
}

function spawnBoss(){
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*W;y=-30;}
  else if(side===1){x=W+30;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+30;}
  else{x=-30;y=Math.random()*H;}
  game.enemies.push({x,y,type:'boss',r:30,hp:500,maxHp:500,spd:45,dmg:40,xp:30,color:'#cc00ff',hit:0});
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=50+Math.random()*100;
    game.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:0.4+Math.random()*0.3,color,r:2+Math.random()*3});
  }
}

const dmgNums=[];
function spawnDamageNum(x,y,dmg,color){
  dmgNums.push({x,y,dmg,color,life:0.8,vy:-60});
}

function checkLevelUp(){
  const p=game.player;
  while(p.xp>=p.xpNext){
    p.xp-=p.xpNext;
    p.level++;
    p.xpNext=Math.floor(p.xpNext*1.4);
    showLevelUp();
  }
}

const RARITY_WEIGHTS = {common:55, rare:25, epic:14, legendary:4};
function weightedPickUpgrades(count){
  // Build weighted pool
  const pool = UPGRADES.map(u=>({u, w:RARITY_WEIGHTS[u.rarity]||5}));
  const picks=[], used=new Set();
  let attempts=0;
  while(picks.length<count && attempts<200){
    attempts++;
    const total=pool.reduce((s,p)=>s+(used.has(p.u.id)?0:p.w),0);
    if(total<=0) break;
    let r=Math.random()*total;
    for(const p of pool){
      if(used.has(p.u.id)) continue;
      r-=p.w;
      if(r<=0){ picks.push(p.u); used.add(p.u.id); break; }
    }
  }
  return picks;
}

function showLevelUp(){
  game.paused=true;
  const screen=document.getElementById('levelUpScreen');
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  const picks = weightedPickUpgrades(3);
  for(const u of picks){
    const div=document.createElement('div');
    div.className='choice';
    const rc2={'common':'#88aacc','rare':'#44aaff','epic':'#aa44ff','legendary':'#ffaa00'}[u.rarity]||'#aaa';
    div.style.borderColor=rc2;
    // Show if already in inventory
    const owned = u.type==='weapon' ? game.inventory.filter(w=>w.id===u.id).length : 0;
    const ownedTxt = owned>0 ? `<div style="color:#556;font-size:8px;margin-top:4px">OWNED ×${owned}</div>` : '';
    const invFull = u.type==='weapon' && game.inventory.length>=8;
    const fullTxt = invFull ? `<div style="color:#ff4466;font-size:8px;margin-top:4px">INVENTORY FULL</div>` : '';
    div.innerHTML=`<div class="choiceIcon">${u.icon}</div><div class="choiceRarity ${u.rarity}">${u.rarity.toUpperCase()}</div><div class="choiceName" style="color:${rc2}">${u.name}</div><div class="choiceDesc">${u.desc}</div>${ownedTxt}${fullTxt}`;
    if(!invFull) div.onclick=()=>applyUpgrade(u);
    else div.style.opacity='0.45';
    choicesEl.appendChild(div);
  }
  screen.style.display='flex';
}

function applyUpgrade(u){
  const p=game.player;
  if(u.type==='weapon'){
    addToInventory(u.id);
    // Don't auto-equip if player already has a weapon equipped
    if(game.inventory.length===1) syncEquipped();
  }
  else if(u.id==='spd') p.spdMult=(p.spdMult||1)*1.2;
  else if(u.id==='hp'){p.maxHp+=25;p.hp=Math.min(p.maxHp,p.hp+20);}
  else if(u.id==='dmg') p.dmgMult=(p.dmgMult||1)*1.25;
  else if(u.id==='atk') p.atkMult=(p.atkMult||1)*0.8;
  document.getElementById('levelUpScreen').style.display='none';
  game.paused=false;
}

function openInventory(){
  if(!game.running) return;
  game.paused=true;
  game.mouseDown=false;
  renderInventory();
  document.getElementById('inventoryPanel').style.display='flex';
}

function closeInventory(){
  document.getElementById('inventoryPanel').style.display='none';
  game.paused=false;
}

function renderInventory(){
  const grid=document.getElementById('invGrid');
  grid.innerHTML='';
  const RC={'common':'#88aacc','rare':'#44aaff','epic':'#aa44ff','legendary':'#ffaa00'};
  const EFFECT_COLORS={dot:'#ff8800',slow:'#88ddff',freeze:'#00ccff'};

  // Group by id for merge count
  const counts={};
  for(const w of game.inventory) counts[w.id]=(counts[w.id]||0)+1;

  // Show each weapon (no dedup — show individual cards so player sees duplicates)
  for(let i=0;i<game.inventory.length;i++){
    const w=game.inventory[i];
    const rc=RC[w.rarity]||'#aaa';
    const isEquipped=(i===game.equippedIdx);
    const canMerge=counts[w.id]>=2;
    const effColor=w.effect?EFFECT_COLORS[w.effect.type]||'#aaa':'';
    const effBadge=w.effect?`<div class="invCardEffect" style="color:${effColor};border:1px solid ${effColor}22">${w.effect.type.toUpperCase()}</div>`:'';
    const fRate = w.pellets?`${(1/w.cd).toFixed(1)}/s ×${w.pellets}p`:(w.burstCount?`${(1/w.cd).toFixed(1)}/s ×${w.burstCount}b`:`${(1/w.cd).toFixed(1)}/s`);

    const card=document.createElement('div');
    card.className='invCard'+(isEquipped?' equipped':'');
    card.innerHTML=`
      <div class="invCardLevel" style="color:${rc}">Lv${w.level}</div>
      ${counts[w.id]>1?`<div class="invCardCount">×${counts[w.id]}</div>`:''}
      <div class="invCardIcon">${w.icon}</div>
      <div class="invCardName" style="color:${rc}">${w.name}</div>
      <div class="invCardRarity ${w.rarity}">${w.rarity.toUpperCase()}</div>
      ${effBadge}
      <div class="invCardStats">DMG: ${w.dmg} &nbsp; ${fRate}<br>PIERCE: ${w.pierce||0} &nbsp; ${w.explode?'EXPLODES':''}</div>
      <div class="invCardBtns">
        <button class="invBtn equipBtn${isEquipped?' active':''}" ${isEquipped?'disabled':''} onclick="equipFromInventory(${i})">${isEquipped?'EQUIPPED':'EQUIP'}</button>
        ${canMerge?`<button class="invBtn mergeBtn" onclick="mergeWeapons('${w.id}')">MERGE ×2</button>`:''}
      </div>
    `;
    grid.appendChild(card);
  }

  // Empty slots
  for(let i=game.inventory.length;i<8;i++){
    const empty=document.createElement('div');
    empty.className='emptySlot';
    empty.innerHTML='＋';
    grid.appendChild(empty);
  }
}

function updateHUD(){

  document.getElementById('healthInner').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('xpInner').style.width=(p.xp/p.xpNext*100)+'%';
  document.getElementById('levelDisp').textContent=p.level;

    const effTxt = w0.effect ? `<div style="color:${w0.color};font-size:8px;letter-spacing:1px;margin-top:1px">${w0.effect.type.toUpperCase()}</div>` : '';

  } else { wEl.innerHTML=''; }

function draw(){
  ctx.clearRect(0,0,W,H);
  // Background grid
  ctx.strokeStyle='#0d0d1a';
  ctx.lineWidth=1;
  const gs=40;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if(!game.running) return;
  const p=game.player;

  // Gems
  for(const g of game.gems){
    ctx.save();
    ctx.shadowColor='#44ffaa'; ctx.shadowBlur=8;
    ctx.fillStyle='#44ffaa';
    ctx.beginPath();
    // Diamond shape
    ctx.moveTo(g.x,g.y-g.r);ctx.lineTo(g.x+g.r*0.6,g.y);ctx.lineTo(g.x,g.y+g.r);ctx.lineTo(g.x-g.r*0.6,g.y);ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // AOE rings
  for(const w of p.weapons){
    if(w.aoeActive&&w.x!==undefined){
      ctx.save();
      ctx.strokeStyle=w.color; ctx.lineWidth=2;
      ctx.globalAlpha=w.aoeDur>0?Math.min(1,w.aoeDur*3):0;
      ctx.shadowColor=w.color; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(w.x,w.y,w.radius||80,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=0.1; ctx.fillStyle=w.color;
      ctx.fill(); ctx.restore();
    }
  }

  // Enemies
  for(const e of game.enemies){
    ctx.save();
    if(e.hit>0) ctx.globalAlpha=0.5;
    ctx.shadowColor=e.color; ctx.shadowBlur=10;
    if(e.type==='boss'){
      // Boss: spiky
      ctx.fillStyle=e.color;
      for(let i=0;i<8;i++){
        const a=Math.PI*2/8*i+Date.now()*0.001;
        ctx.beginPath();
        ctx.moveTo(e.x,e.y);
        ctx.lineTo(e.x+Math.cos(a)*e.r*1.4,e.y+Math.sin(a)*e.r*1.4);
        ctx.lineTo(e.x+Math.cos(a+0.3)*e.r*0.8,e.y+Math.sin(a+0.3)*e.r*0.8);
        ctx.closePath(); ctx.fill();
      }
    } else {
      ctx.fillStyle=e.color;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
      // Eye
      const toPlayerA=Math.atan2(p.y-e.y,p.x-e.x);
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(e.x+Math.cos(toPlayerA)*e.r*0.4,e.y+Math.sin(toPlayerA)*e.r*0.4,e.r*0.3,0,Math.PI*2); ctx.fill();
    }
    // Status effect overlay
    if(e.slowAmt){
      ctx.globalAlpha=0.35; ctx.fillStyle='#88ddff';
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+3,0,Math.PI*2); ctx.fill();
    }
    if(e.dot){
      ctx.globalAlpha=0.3+Math.abs(Math.sin(Date.now()*0.01))*0.2;
      ctx.fillStyle=e.dot.dmg>6?'#44ff88':'#ff6600';
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+2,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=e.hit>0?0.5:1;
    // HP bar
    if(e.hp<e.maxHp){
      ctx.globalAlpha=0.9;
      ctx.fillStyle='#1a1a1a';
      ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,4);
      ctx.fillStyle=e.color;
      ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*(e.hp/e.maxHp),4);
    }
    ctx.restore();
  }

  // Bullets
  for(const b of game.bullets){
    ctx.save();
    ctx.shadowColor=b.color; ctx.shadowBlur=14;
    const angle = Math.atan2(b.vy, b.vx);
    if(b.weaponId==='flamer'||b.weaponId==='toxic'||b.weaponId==='plasma'){
      // Blob
      ctx.fillStyle=b.color; ctx.globalAlpha=0.85;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    } else if(b.weaponId==='railgun'){
      // Long streak
      ctx.strokeStyle=b.color; ctx.lineWidth=b.r*2;
      ctx.beginPath(); ctx.moveTo(b.x-Math.cos(angle)*20,b.y-Math.sin(angle)*20);
      ctx.lineTo(b.x+Math.cos(angle)*30,b.y+Math.sin(angle)*30); ctx.stroke();
    } else if(b.weaponId==='grenade'){
      // Circle with cross
      ctx.fillStyle=b.color;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(b.x-b.r+2,b.y); ctx.lineTo(b.x+b.r-2,b.y);
      ctx.moveTo(b.x,b.y-b.r+2); ctx.lineTo(b.x,b.y+b.r-2); ctx.stroke();
    } else {
      // Elongated bullet streak
      ctx.strokeStyle=b.color; ctx.lineWidth=b.r*1.8;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(b.x - Math.cos(angle)*(b.r*2), b.y - Math.sin(angle)*(b.r*2));
      ctx.lineTo(b.x + Math.cos(angle)*(b.r*3), b.y + Math.sin(angle)*(b.r*3));
      ctx.stroke();
    }
    ctx.restore();
  }

  // Player
  ctx.save();
  if(p.invuln>0&&Math.floor(p.invuln*10)%2===0) ctx.globalAlpha=0.4;

  ctx.globalAlpha=p.invuln>0&&Math.floor(p.invuln*10)%2===0?0.4:1;
  // Body
  ctx.shadowColor='#00ccff'; ctx.shadowBlur=20;
  ctx.fillStyle='#00ccff';
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  // Inner
  ctx.fillStyle='#003344';
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.5,0,Math.PI*2); ctx.fill();
  // Weapon barrel pointing at mouse
  const w0draw = p.weapons[0];
  const a2=Math.atan2(mouse.y-p.y,mouse.x-p.x);
  const barrelColor = w0draw ? w0draw.color : '#00ffff';
  ctx.strokeStyle=barrelColor; ctx.lineWidth=3; ctx.shadowColor=barrelColor; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(p.x+Math.cos(a2)*p.r,p.y+Math.sin(a2)*p.r);
  ctx.lineTo(p.x+Math.cos(a2)*(p.r+10),p.y+Math.sin(a2)*(p.r+10)); ctx.stroke();
  // Minigun spin ring
  if(w0draw && w0draw.spinUp && w0draw.spinupAmt>0){
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=2; ctx.globalAlpha=w0draw.spinupAmt;
    ctx.shadowColor='#ff4444'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r+5+w0draw.spinupAmt*6,0,Math.PI*2*w0draw.spinupAmt); ctx.stroke();
  }
  ctx.restore();

  // Particles
  for(const pt of game.particles){
    ctx.save();
    ctx.globalAlpha=pt.life/0.7;
    ctx.fillStyle=pt.color;
    ctx.shadowColor=pt.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Damage numbers
  for(let i=dmgNums.length-1;i>=0;i--){
    const dn=dmgNums[i];
    dn.y+=dn.vy*0.016; dn.life-=0.016;
    ctx.save();
    ctx.globalAlpha=dn.life/0.8;
    ctx.fillStyle=dn.color; ctx.font='bold 13px "Orbitron",monospace';
    ctx.shadowColor=dn.color; ctx.shadowBlur=8;
    ctx.fillText(dn.dmg,dn.x,dn.y);
    ctx.restore();
    if(dn.life<=0) dmgNums.splice(i,1);
  }
}

let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOverScreen').style.display='none';
  document.getElementById('levelUpScreen').style.display='none';
  document.getElementById('inventoryPanel').style.display='none';
  initGame();
  game.running=true;
  game.paused=false;
}

function gameOver(){
  game.running=false;
  document.getElementById('inventoryPanel').style.display='none';
  const m=Math.floor(game.time/60),s=Math.floor(game.time%60);
  document.getElementById('goStats').innerHTML=`
    <div>Time Survived: <span>${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span></div>
    <div>Enemies Killed: <span>${game.kills}</span></div>
    <div>Level Reached: <span>${game.player.level}</span></div>
  `;
  document.getElementById('gameOverScreen').style.display='flex';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault(); const inv=document.getElementById('inventoryPanel'); if(inv.style.display==='flex') closeInventory(); else openInventory(); return;}
  game.keys[e.key]=true; e.preventDefault();
});
document.addEventListener('keyup',e=>{game.keys[e.key]=false;});

const mouse = {x:400, y:300};
canvas.addEventListener('mousemove', e=>{
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener('mousedown', e=>{ if(e.button===0) game.mouseDown=true; });
canvas.addEventListener('mouseup',   e=>{ if(e.button===0) game.mouseDown=false; });
canvas.addEventListener('mouseleave',e=>{ game.mouseDown=false; });

requestAnimationFrame(loop);
</script>
</body>
</html>
