<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL GRIDIRON</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Press Start 2P', monospace;
    overflow: hidden; color: #eee;
  }
  canvas { display:block; image-rendering:pixelated;
    border:3px solid #1a1a2e;
    box-shadow:0 0 60px rgba(0,200,80,0.12),0 0 120px rgba(0,0,0,0.9); }
  .scanlines { position:fixed;top:0;left:0;right:0;bottom:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.07) 0px,rgba(0,0,0,0.07) 1px,transparent 1px,transparent 3px);
    pointer-events:none;z-index:100; }
  .vignette { position:fixed;top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.65) 100%);
    pointer-events:none;z-index:99; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>
<script>
// ═══════════════════════════════════════════════════════════════════
//  PIXEL GRIDIRON v2
//  SPACE = hike → receivers run routes with numbered badges
//  Press 1/2/3 to throw → open = catch, covered = defended
//  Arrow keys control ball carrier after catch
//  Where you get tackled = next line of scrimmage
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const BW = 800, BH = 520;
let SCL = 1;
function resize() {
  SCL = Math.min((innerWidth-16)/BW, (innerHeight-16)/BH, 1.6);
  canvas.width=BW; canvas.height=BH;
  canvas.style.width=BW*SCL+'px'; canvas.style.height=BH*SCL+'px';
}
resize(); addEventListener('resize', resize);

// Field pixel bounds
const FX=60, FW=680, FY=44, FH=BH-88;
const yardToX = yd => FX + (yd/100)*FW;
const xToYard = x  => Math.max(0, Math.min(100, ((x-FX)/FW)*100));

// ── TEAMS ──────────────────────────────────────────────────────────
const TEAMS = {
  hawks:  {name:'CITY HAWKS',   abbr:'CHW',emoji:'🦅',j:'#2563eb',h:'#d4af37',offense:85,defense:78,passSpd:1.3,runPow:1.0,defSpd:1.1},
  bears:  {name:'IRON BEARS',   abbr:'IRB',emoji:'🐻',j:'#7c2d12',h:'#c0a060',offense:75,defense:88,passSpd:1.0,runPow:1.4,defSpd:1.2},
  wolves: {name:'NIGHT WOLVES', abbr:'NWV',emoji:'🐺',j:'#4c1d95',h:'#7c3aed',offense:90,defense:70,passSpd:1.5,runPow:1.1,defSpd:0.9},
  vipers: {name:'DESERT VIPERS',abbr:'DVP',emoji:'🐍',j:'#4d7c0f',h:'#84cc16',offense:72,defense:92,passSpd:0.9,runPow:0.9,defSpd:1.5},
};
const TKEYS = Object.keys(TEAMS);

const DIFFS = {
  rookie:{label:'ROOKIE',aispd:0.65,covDist:60,intRate:0.04,col:'#4ade80'},
  pro:   {label:'PRO',   aispd:1.0, covDist:38,intRate:0.09,col:'#fbbf24'},
  legend:{label:'LEGEND',aispd:1.4, covDist:24,intRate:0.16,col:'#f87171'},
};
const DKEYS = Object.keys(DIFFS);

const C = {
  bg:'#050508', field:'#1a4a20', fieldAlt:'#1d5222',
  endzone:'#0d2e14', ezTxt:'#f0c040',
  scrim:'rgba(255,255,80,0.55)', fd:'rgba(255,140,0,0.65)',
  white:'#ffffff', dim:'#3a3a55',
  green:'#4ade80', yellow:'#fbbf24', red:'#f87171',
  blue:'#60a5fa', purple:'#a78bfa', orange:'#fb923c',
  scoreBg:'#080810',
  recCol:['#60a5fa','#a78bfa','#fb923c'],
};

// ── STATE ─────────────────────────────────────────────────────────
let G;
function freshG() {
  return {
    screen:'title',
    pKey:'hawks', oKey:'bears', dKey:'pro',
    tCur:0, oCur:1, dCur:1,
    score:[0,0], quarter:1, clock:120, clockOn:false,
    fieldPos:25,   // player's current yard line
    losX:0,        // pixel X of line of scrimmage
    down:1, ytg:10,
    possession:'player',
    weather:Math.random()<0.2?'rain':Math.random()<0.1?'snow':'clear',
    halfDone:false, overtime:false,
    // phases: presnap | routes | passing | carrying | cpu | dead
    phase:'presnap',
    celebMsg:'', celebCol:'#4ade80', celebTimer:0,
  };
}
G = freshG();

// ── ENTITIES ───────────────────────────────────────────────────────
let QB, RECS, DEFS, CARRIER, BALL;

// Route functions: given routeTimer t → {dx,dy} target velocity
const ROUTE_FNS = [
  t => ({dx: t<55?2.4:0.1,  dy: t<55?0.2:-2.5}),   // out-and-up
  t => ({dx: 2.6,            dy: t<45?0.8:-1.4}),    // post
  t => ({dx: t<28?0.3:3.0,  dy: t<28?-2.2:0.1}),    // slant-then-go
];

function initPlay() {
  const qbX = yardToX(G.fieldPos);
  const qbY = FY + FH/2;
  const pt = TEAMS[G.pKey];
  const df = DIFFS[G.dKey];

  QB = {
    x:qbX, y:qbY, vx:0, vy:0, w:14, h:18,
    hasBall:true, col:pt.j, hat:pt.h,
    facingRight:true, sprinting:false,
  };

  RECS = [0,1,2].map(i => ({
    x: qbX + 8,
    y: FY + FH*0.18 + i*(FH*0.3),
    vx:0, vy:0, w:12, h:16,
    col:C.recCol[i], hat:pt.h,
    routeTimer:0, ri:i,
    hasBall:false, facingRight:true,
  }));

  const spd = df.aispd * TEAMS[G.oKey].defSpd;
  const ot = TEAMS[G.oKey];
  DEFS = [0,1,2,3].map(i => ({
    x: qbX + 90 + i*18,
    y: FY + FH*0.12 + i*(FH*0.22),
    vx:0, vy:0, w:12, h:16,
    col:ot.j, hat:ot.h,
    speed: spd * (0.85 + i*0.1),
    targetRec: i<3 ? i : null,
    blitzing: i===3,
  }));

  BALL = {x:qbX, y:qbY, vx:0, vy:0, active:false,
          trail:[], arcT:0, target:-1, covered:false, intercepted:false};
  CARRIER = null;

  G.losX = qbX;
  G.phase = 'presnap';
  G.clockOn = false;
}

// ── INPUT ──────────────────────────────────────────────────────────
const K = {};
addEventListener('keydown', e => {
  if (!K[e.code]) { K[e.code]=true; onKey(e.code); }
  e.preventDefault();
});
addEventListener('keyup', e => { K[e.code]=false; });

function onKey(code) {
  // menus
  if (G.screen==='title')   { if(code==='Space'||code==='Enter') G.screen='teamsel'; return; }
  if (G.screen==='teamsel') {
    if(code==='ArrowRight') G.tCur=(G.tCur+1)%TKEYS.length;
    if(code==='ArrowLeft')  G.tCur=(G.tCur-1+TKEYS.length)%TKEYS.length;
    if(code==='Space'||code==='Enter'){ G.pKey=TKEYS[G.tCur]; G.oCur=(G.tCur+1)%TKEYS.length; G.screen='oppsel'; }
    return;
  }
  if (G.screen==='oppsel') {
    if(code==='ArrowRight') G.oCur=(G.oCur+1)%TKEYS.length;
    if(code==='ArrowLeft')  G.oCur=(G.oCur-1+TKEYS.length)%TKEYS.length;
    if(code==='Space'||code==='Enter'){ G.oKey=TKEYS[G.oCur]; G.screen='diffsel'; }
    if(code==='Escape') G.screen='teamsel';
    return;
  }
  if (G.screen==='diffsel') {
    if(code==='ArrowRight') G.dCur=(G.dCur+1)%DKEYS.length;
    if(code==='ArrowLeft')  G.dCur=(G.dCur-1+DKEYS.length)%DKEYS.length;
    if(code==='Space'||code==='Enter'){ G.dKey=DKEYS[G.dCur]; startGame(); }
    if(code==='Escape') G.screen='oppsel';
    return;
  }
  if (G.screen==='halftime') { if(code==='Space'||code==='Enter') doHalftime(); return; }
  if (G.screen==='gameover') { if(code==='Space'||code==='Enter') { G=freshG(); } return; }
  if (G.screen!=='playing') return;

  // in-play
  if (G.phase==='presnap') {
    if (code==='Space') { G.phase='routes'; G.clockOn=true; }
    if (code==='KeyR')  { G.phase='routes'; G.clockOn=true;
      // Immediate QB sneak
      setTimeout(()=>{ if(G.phase==='routes'){ G.phase='carrying'; CARRIER=QB; } },16); }
  }
  if (G.phase==='routes') {
    const idx = code==='Digit1'?0 : code==='Digit2'?1 : code==='Digit3'?2 : -1;
    if (idx>=0) throwTo(idx);
    if (code==='KeyR') { G.phase='carrying'; CARRIER=QB; }
  }
  // carrying — handled via K[] in update loop
}

// ── GAME START ────────────────────────────────────────────────────
function startGame() {
  G.score=[0,0]; G.quarter=1; G.clock=120;
  G.fieldPos=25; G.down=1; G.ytg=10;
  G.possession='player'; G.halfDone=false; G.overtime=false;
  G.screen='playing';
  initPlay();
}

function doHalftime() {
  G.quarter=3; G.clock=120; G.halfDone=true;
  G.possession='player'; G.fieldPos=25; G.down=1; G.ytg=10;
  G.screen='playing';
  initPlay();
}

// ── THROW ─────────────────────────────────────────────────────────
function throwTo(idx) {
  if (G.phase!=='routes') return;
  const rec = RECS[idx];
  const df = DIFFS[G.dKey];
  const pt = TEAMS[G.pKey];

  // Is receiver covered?
  const covered = DEFS.some(d =>
    d.targetRec===idx && Math.hypot(d.x-rec.x, d.y-rec.y) < df.covDist
  );

  QB.hasBall = false;
  G.phase = 'passing';

  const speed = pt.passSpd * 7;
  const dx=rec.x-QB.x, dy=rec.y-QB.y, dist=Math.hypot(dx,dy);
  BALL.x=QB.x; BALL.y=QB.y;
  BALL.vx=(dx/dist)*speed; BALL.vy=(dy/dist)*speed;
  BALL.active=true; BALL.trail=[]; BALL.arcT=0;
  BALL.target=idx; BALL.covered=covered;
  BALL.intercepted = covered && Math.random()<df.intRate;
}

// ── RESOLVE PLAY ──────────────────────────────────────────────────
function tackled(carrierX) {
  if (G.phase==='dead') return;
  G.phase='dead'; CARRIER=null;

  const endYd = Math.round(xToYard(carrierX));
  const gain  = endYd - Math.round(G.fieldPos);

  if (endYd >= 100) { playerTD(); return; }

  G.fieldPos = Math.max(G.fieldPos, endYd);   // can't go backward after catch
  G.ytg -= Math.max(0, gain);

  if (G.ytg <= 0) {
    G.down=1; G.ytg=10;
    celeb(`FIRST DOWN! +${gain} YDS`, C.yellow);
  } else {
    G.down++;
    if (G.down > 4) { punt(); return; }
    celeb(`TACKLED +${Math.max(0,gain)} YDS`, C.orange);
  }
  setTimeout(() => { if(G.screen==='playing'){ G.possession='player'; initPlay(); }}, 1300);
}

function incomplete() {
  if (G.phase==='dead') return;
  G.phase='dead'; BALL.active=false;
  G.down++;
  if (G.down > 4) { punt(); return; }
  celeb('INCOMPLETE!', C.yellow);
  setTimeout(() => { if(G.screen==='playing') initPlay(); }, 1100);
}

function interceped() {
  if (G.phase==='dead') return;
  G.phase='dead'; BALL.active=false;
  G.possession='cpu';
  G.fieldPos = 100-Math.max(10, Math.min(90, xToYard(BALL.x)));
  G.down=1; G.ytg=10;
  celeb('INTERCEPTED!', C.red);
  setTimeout(() => cpuDrive(), 2000);
}

function playerTD() {
  G.score[0]+=7;
  celeb('TOUCHDOWN! +7 ★', C.green);
  G.possession='cpu'; G.down=1; G.ytg=10; G.fieldPos=25;
  checkEnd();
  setTimeout(() => { if(G.screen==='playing') cpuDrive(); }, 2400);
}

function punt() {
  G.fieldPos = 100-Math.max(20, G.fieldPos);
  G.down=1; G.ytg=10; G.possession='cpu';
  celeb('PUNTED — CPU BALL', C.red);
  setTimeout(() => cpuDrive(), 1800);
}

function sacked() {
  if (G.phase==='dead') return;
  G.phase='dead';
  G.fieldPos = Math.max(1, G.fieldPos-7);
  G.ytg += 7;
  G.down++;
  celeb('SACKED! LOSS 7 YDS', C.red);
  if (G.down>4) { setTimeout(()=>punt(),1200); return; }
  setTimeout(() => { if(G.screen==='playing') initPlay(); }, 1400);
}

// ── CPU DRIVE ─────────────────────────────────────────────────────
function cpuDrive() {
  if (G.screen!=='playing') return;
  G.phase='cpu'; G.clockOn=true;
  const ot=TEAMS[G.oKey], df=DIFFS[G.dKey];
  const plays = Math.floor(Math.random()*3)+1;
  for (let p=0; p<plays; p++) {
    setTimeout(() => {
      if (G.screen!=='playing') return;
      const gain = Math.floor(Math.random()*14*(ot.offense/85)*df.aispd);
      const cpuPos = 100-G.fieldPos;
      const newCpu = Math.min(100, cpuPos+gain);
      G.fieldPos = 100-newCpu;
      if (newCpu>=100) {
        G.score[1]+=7;
        celeb('CPU TOUCHDOWN!', C.red);
        G.fieldPos=25; G.down=1; G.ytg=10; G.possession='player';
        checkEnd();
        setTimeout(() => { if(G.screen==='playing'){ G.possession='player'; initPlay(); }},2200);
        return;
      }
      if (p===plays-1) {
        G.down=1; G.ytg=10; G.possession='player';
        checkEnd();
        setTimeout(() => { if(G.screen==='playing') initPlay(); },700);
      }
    }, 800+p*1000);
  }
}

// ── QUARTER / END ─────────────────────────────────────────────────
function checkEnd() {
  if (G.clock<=0) {
    G.quarter++;
    if (G.quarter===3 && !G.halfDone) { G.screen='halftime'; G.clockOn=false; return; }
    if (G.quarter>4) {
      if (G.score[0]===G.score[1]) { G.overtime=true; G.quarter=5; G.clock=60; }
      else { G.screen='gameover'; }
    } else { G.clock=120; }
  }
}

// ── CELEB ─────────────────────────────────────────────────────────
function celeb(msg,col) { G.celebMsg=msg; G.celebCol=col; G.celebTimer=90; }

// ── MAIN UPDATE ───────────────────────────────────────────────────
let lastT=0;
function loop(ts) {
  const dt=Math.min((ts-lastT)/16.67,3); lastT=ts;
  if(G.screen==='playing') tick(dt);
  if(G.celebTimer>0) G.celebTimer=Math.max(0,G.celebTimer-dt);
  render();
  requestAnimationFrame(loop);
}

function tick(dt) {
  const df=DIFFS[G.dKey], pt=TEAMS[G.pKey];

  // Clock runs during routes, passing, carrying
  if (G.clockOn && (G.phase==='routes'||G.phase==='passing'||G.phase==='carrying')) {
    G.clock-=dt/60;
    if (G.clock<0) { G.clock=0; checkEnd(); }
  }

  if (G.phase==='presnap') return;

  // ── ROUTES phase: receivers run, defenders cover, blitzer rushes QB
  if (G.phase==='routes') {
    RECS.forEach(r => {
      r.routeTimer+=dt;
      const rv=ROUTE_FNS[r.ri](r.routeTimer);
      r.vx+=(rv.dx-r.vx)*0.15; r.vy+=(rv.dy-r.vy)*0.15;
      r.x=clamp(r.x+r.vx*dt, FX+2, FX+FW-2);
      r.y=clamp(r.y+r.vy*dt, FY+2, FY+FH-2);
      r.facingRight=r.vx>=0;
    });
    DEFS.forEach(d => {
      const tx=d.blitzing?QB.x:(d.targetRec!=null?RECS[d.targetRec].x:d.x);
      const ty=d.blitzing?QB.y:(d.targetRec!=null?RECS[d.targetRec].y:d.y);
      const dx=tx-d.x, dy=ty-d.y, dd=Math.hypot(dx,dy);
      if(dd>2){ d.x+=dx/dd*d.speed*dt; d.y+=dy/dd*d.speed*dt; }
      if(d.blitzing && Math.hypot(d.x-QB.x,d.y-QB.y)<14) sacked();
    });
    // QB can step back slightly with arrow keys while reading routes
    moveQB(dt, 1.5);
  }

  // ── PASSING phase: ball in air
  if (G.phase==='passing' && BALL.active) {
    BALL.trail.push({x:BALL.x,y:BALL.y});
    if(BALL.trail.length>14) BALL.trail.shift();
    BALL.x+=BALL.vx*dt; BALL.y+=BALL.vy*dt;
    BALL.arcT+=0.11*dt;
    BALL.y-=Math.sin(BALL.arcT)*1.6;  // arc

    const rec=RECS[BALL.target];
    if (Math.hypot(rec.x-BALL.x, rec.y-BALL.y)<22) {
      BALL.active=false;
      if (BALL.intercepted) { interceped(); }
      else if (BALL.covered && Math.random()<0.72) { celeb('DEFENDED!',C.red); incomplete(); }
      else { catchBall(rec); }
      return;
    }
    // Defenders can deflect mid-air
    for(const d of DEFS){
      if(!d.blitzing && Math.hypot(d.x-BALL.x,d.y-BALL.y)<16 && Math.random()<0.04){ celeb('DEFLECTED!',C.orange); incomplete(); return; }
    }
    if(BALL.x>FX+FW+30||BALL.x<FX-30||BALL.y<FY-30||BALL.y>FY+FH+30) incomplete();
  }

  // ── CARRYING phase: player controls the carrier
  if (G.phase==='carrying' && CARRIER) {
    const basespd=(CARRIER===QB?3.1:3.7)*TEAMS[G.pKey].runPow*(G.weather==='rain'?0.82:1);
    const spd=basespd*(K['ShiftLeft']||K['ShiftRight']?1.55:1.0);
    CARRIER.sprinting=K['ShiftLeft']||K['ShiftRight'];
    if(K['ArrowLeft']){  CARRIER.vx-=0.75*dt; CARRIER.facingRight=false; }
    if(K['ArrowRight']){ CARRIER.vx+=0.75*dt; CARRIER.facingRight=true;  }
    if(K['ArrowUp'])    CARRIER.vy-=0.75*dt;
    if(K['ArrowDown'])  CARRIER.vy+=0.75*dt;
    CARRIER.vx=clamp(CARRIER.vx,-spd,spd)*0.83;
    CARRIER.vy=clamp(CARRIER.vy,-spd,spd)*0.83;
    CARRIER.x=clamp(CARRIER.x+CARRIER.vx*dt, FX-55, FX+FW+55);
    CARRIER.y=clamp(CARRIER.y+CARRIER.vy*dt, FY+2, FY+FH-2);

    if(CARRIER.x>FX+FW){ tackled(FX+FW+10); return; }

    // Defenders chase
    DEFS.forEach(d=>{
      const dx=CARRIER.x-d.x, dy=CARRIER.y-d.y, dd=Math.hypot(dx,dy);
      if(dd>2){ d.x+=dx/dd*d.speed*1.25*dt; d.y+=dy/dd*d.speed*1.25*dt; }
      if(Math.hypot(d.x-CARRIER.x,d.y-CARRIER.y)<14){ tackled(CARRIER.x); }
    });
  }
}

function catchBall(rec) {
  BALL.active=false;
  rec.hasBall=true;
  CARRIER=rec;
  G.phase='carrying';
  celeb('CAUGHT! RUN!', C.green);
}

function moveQB(dt,spd){
  if(K['ArrowLeft']){  QB.vx-=0.5*dt; QB.facingRight=false; }
  if(K['ArrowRight']){ QB.vx+=0.5*dt; QB.facingRight=true; }
  if(K['ArrowUp'])    QB.vy-=0.5*dt;
  if(K['ArrowDown'])  QB.vy+=0.5*dt;
  QB.vx=clamp(QB.vx,-spd,spd)*0.8; QB.vy=clamp(QB.vy,-spd,spd)*0.8;
  QB.x=clamp(QB.x+QB.vx*dt, FX-40, G.losX+20);  // can't cross LOS while reading
  QB.y=clamp(QB.y+QB.vy*dt, FY+2, FY+FH-2);
}

function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

// ── DRAW HELPERS ──────────────────────────────────────────────────
function pr(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(~~x,~~y,~~w,~~h); }
function tx(str,x,y,sz,col,align='left'){
  ctx.fillStyle=col; ctx.font=`${sz}px 'Press Start 2P'`; ctx.textAlign=align;
  ctx.fillText(str,~~x,~~y); ctx.textAlign='left';
}

function sprite(x,y,w,h,bodyCol,hatCol,facingRight,hasBall,label){
  // shadow
  pr(x-w/2+2, y+h/2+1, w, 3, 'rgba(0,0,0,0.28)');
  // body
  pr(x-w/2, y-h/2, w, h, bodyCol);
  // helmet
  pr(x-w/2, y-h/2-7, w, 8, '#e8e8e8');
  pr(x-w/2+1, y-h/2-6, w-2, 6, hatCol);
  // face mask
  pr(x+(facingRight?w/2-3:-w/2), y-h/2-2, 3, 5, '#888');
  // arms
  const dk=dk2(bodyCol);
  pr(x-w/2-3, y-h/2+4, 4, ~~(h/2)-2, dk);
  pr(x+w/2-1, y-h/2+4, 4, ~~(h/2)-2, dk);
  // ball
  if(hasBall){
    const bx=facingRight?x+w/2-2:x-w/2-4;
    pr(bx,y,6,5,'#c08030'); pr(bx+1,y+1,4,2,'#a06020');
    pr(bx+2,y+1,2,1,'#fff');
  }
  // jersey label
  if(label!==undefined){
    ctx.fillStyle='#fff'; ctx.font="bold 9px 'Press Start 2P'";
    ctx.textAlign='center'; ctx.fillText(label,~~x,~~(y+4)); ctx.textAlign='left';
  }
}

function dk2(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${~~(r*.6)},${~~(g*.6)},${~~(b*.6)})`;
}

function drawBall(x,y){
  pr(x-4,y-3,9,6,'#c08030'); pr(x-2,y-4,5,2,'#c08030');
  pr(x-2,y+3,5,2,'#c08030'); pr(x-1,y-1,3,2,'#fff');
}

// ── FIELD ─────────────────────────────────────────────────────────
function drawField(){
  pr(0,0,BW,BH,C.bg);
  // crowd rows
  for(let i=0;i<BW;i+=7){
    pr(i,0,6,FY+10,`hsl(230,24%,${8+Math.sin(i)*.5*3}%)`);
    pr(i,FY+FH-10,6,BH-(FY+FH)+10,`hsl(230,24%,${7+Math.cos(i)*.5*3}%)`);
  }
  // field stripes
  for(let i=0;i<10;i++) pr(FX+i*(FW/10),FY,FW/10,FH,i%2===0?C.field:C.fieldAlt);
  // endzones
  pr(FX-60,FY,60,FH,C.endzone); pr(FX+FW,FY,60,FH,C.endzone);
  ctx.save(); ctx.translate(FX-30,FY+FH/2); ctx.rotate(-Math.PI/2);
  tx('HOME',0,4,6,C.ezTxt,'center'); ctx.restore();
  ctx.save(); ctx.translate(FX+FW+30,FY+FH/2); ctx.rotate(Math.PI/2);
  tx('AWAY',0,4,6,C.ezTxt,'center'); ctx.restore();
  // yard lines
  for(let i=0;i<=10;i++){
    const lx=FX+i*(FW/10);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=i===5?2:1;
    ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(lx,FY); ctx.lineTo(lx,FY+FH); ctx.stroke();
    if(i>0&&i<10){ tx(i*10+'',lx,FY+13,5,'rgba(255,255,255,0.35)','center'); tx(i*10+'',lx,FY+FH-4,5,'rgba(255,255,255,0.35)','center'); }
  }
  // hash marks
  for(let hy=FY+24;hy<FY+FH-20;hy+=22)
    for(let i=1;i<10;i++){ ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(FX+i*(FW/10),hy,7,2); }
  // scrimmage line
  ctx.strokeStyle=C.scrim; ctx.lineWidth=2; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(G.losX,FY); ctx.lineTo(G.losX,FY+FH); ctx.stroke();
  // first down line
  const fdX=yardToX(clamp(G.fieldPos+G.ytg,0,100));
  ctx.strokeStyle=C.fd; ctx.lineWidth=2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(fdX,FY); ctx.lineTo(fdX,FY+FH); ctx.stroke();
  // weather
  const now=Date.now();
  if(G.weather==='rain'){
    ctx.strokeStyle='rgba(120,180,255,0.22)'; ctx.lineWidth=1;
    for(let i=0;i<50;i++){
      const rx=(now*.07*(i+1))%BW, ry=(now*.12*(i*.4+1))%BH;
      ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-2,ry+9); ctx.stroke();
    }
  }
  if(G.weather==='snow'){
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<30;i++){
      const sx=(now*.025*(i+1)+i*58)%BW, sy=(now*.04*(i*.3+1))%BH;
      ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
    }
  }
}

// ── HUD ───────────────────────────────────────────────────────────
function drawHUD(){
  const pt=TEAMS[G.pKey], ot=TEAMS[G.oKey];
  // Scoreboard
  const sbW=390,sbH=38,sbX=BW/2-sbW/2,sbY=3;
  pr(sbX,sbY,sbW,sbH,C.scoreBg);
  ctx.strokeStyle='#1a1a38'; ctx.lineWidth=2; ctx.strokeRect(sbX,sbY,sbW,sbH);
  tx(pt.abbr, sbX+8, sbY+26, 8, pt.j);
  tx(G.score[0]+'', sbX+62, sbY+26, 11, C.green);
  tx('VS', BW/2, sbY+26, 7, C.dim, 'center');
  tx(ot.abbr, sbX+sbW-8, sbY+26, 8, ot.j, 'right');
  tx(G.score[1]+'', sbX+sbW-62, sbY+26, 11, C.red, 'right');
  const qStr=G.overtime?'OT':'Q'+G.quarter;
  tx(qStr, BW/2+14, sbY+13, 6, C.yellow);
  const mm=Math.floor(Math.max(0,G.clock)/60), ss=Math.floor(Math.max(0,G.clock)%60);
  tx(`${mm}:${ss<10?'0':''}${ss}`, BW/2+14, sbY+28, 7, C.white);
  // Down / distance
  const sfx=['ST','ND','RD','TH'][G.down-1]||'TH';
  tx(`${G.down}${sfx} & ${G.ytg}`, 8, BH-14, 7, C.yellow);
  tx('OWN '+~~G.fieldPos, 8, BH-30, 6, C.dim);
  const poss=G.possession==='player'?`▶ ${pt.abbr} BALL`:`▶ ${ot.abbr} BALL`;
  tx(poss, BW-8, BH-14, 6, G.possession==='player'?C.green:C.red, 'right');
  if(G.weather!=='clear') tx(G.weather==='rain'?'🌧 RAIN':'❄ SNOW', BW-8, 58, 5, C.blue, 'right');

  // Phase prompt
  const prompts={
    presnap:'SPACE = HIKE    R = QB SNEAK',
    routes: '1  2  3 = THROW    R = SCRAMBLE',
    carrying:'ARROWS = RUN    SHIFT = SPRINT',
    cpu:'CPU OFFENSE…',
    dead:'',
    passing:'PASS IN AIR…',
  };
  tx(prompts[G.phase]||'', BW/2, BH-2, 5, C.dim, 'center');

  // Celebration
  if(G.celebTimer>0){
    const a=clamp(G.celebTimer/20,0,1);
    const sc=1+Math.sin(Date.now()*0.015)*0.06;
    ctx.save(); ctx.globalAlpha=a; ctx.translate(BW/2,FY+FH/2); ctx.scale(sc,sc);
    ctx.shadowBlur=28; ctx.shadowColor=G.celebCol;
    ctx.fillStyle=G.celebCol; ctx.font="17px 'Press Start 2P'"; ctx.textAlign='center';
    ctx.fillText(G.celebMsg,0,0); ctx.restore();
    if(G.celebMsg.includes('TOUCH')||G.celebMsg.includes('FIRST')){
      for(let i=0;i<18;i++){
        const cx=(Date.now()*.09*i)%BW, cy=(Date.now()*.06*(i+1))%BH;
        pr(cx,cy,4,4,['#ff0','#0f0','#f0f','#0ff','#f00'][i%5]);
      }
    }
  }
}

// ── GAME DRAW ────────────────────────────────────────────────────
function isCovered(idx){
  return DEFS.some(d=>d.targetRec===idx&&Math.hypot(d.x-RECS[idx].x,d.y-RECS[idx].y)<DIFFS[G.dKey].covDist);
}

function drawGame(){
  drawField();
  const pt=TEAMS[G.pKey], ot=TEAMS[G.oKey];

  // Receivers
  RECS.forEach((r,i)=>{
    sprite(r.x,r.y,r.w,r.h,r.col,pt.h,r.facingRight,r.hasBall);
    // Number badge (show when presnap or routes)
    if(G.phase==='presnap'||G.phase==='routes'){
      const cov=isCovered(i);
      const bc=cov?C.red:C.green;
      // box
      pr(r.x-11,r.y-r.h/2-26,22,19,C.scoreBg);
      ctx.strokeStyle=bc; ctx.lineWidth=2;
      ctx.strokeRect(r.x-11,r.y-r.h/2-26,22,19);
      // key number
      tx((i+1)+'',r.x,r.y-r.h/2-11,8,bc,'center');
      // open/covered dot
      ctx.beginPath(); ctx.arc(r.x+9,r.y-r.h/2-20,3,0,Math.PI*2);
      ctx.fillStyle=bc; ctx.fill();
    }
  });

  // Defenders
  DEFS.forEach(d=>{
    sprite(d.x,d.y,d.w,d.h,ot.j,ot.h,false,false);
    pr(d.x-5,d.y-d.h/2-16,11,12,'#1a0000');
    tx('D',d.x,d.y-d.h/2-6,6,'#f87171','center');
  });

  // QB
  sprite(QB.x,QB.y,QB.w,QB.h,QB.col,pt.h,QB.facingRight,QB.hasBall,QB.hasBall?'Q':undefined);

  // Ball in air
  if(BALL.active){
    BALL.trail.forEach((p,i)=>{
      ctx.fillStyle=`rgba(200,140,50,${(i/BALL.trail.length)*.5})`;
      ctx.fillRect(p.x-2,p.y-2,5,5);
    });
    drawBall(BALL.x,BALL.y);
  }

  drawHUD();
}

// ── MENU SCREENS ────────────────────────────────────────────────
function drawTitle(){
  pr(0,0,BW,BH,C.bg);
  for(let i=0;i<90;i++){
    const sx=(i*139)%BW,sy=(i*91)%BH;
    ctx.fillStyle=`rgba(255,255,255,${.07+Math.sin(Date.now()*.002+i)*.1})`;
    ctx.fillRect(sx,sy,2,2);
  }
  pr(0,BH-70,BW,70,C.field);
  for(let x=0;x<BW;x+=50){ ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,BH-70); ctx.lineTo(x,BH); ctx.stroke(); }
  ctx.save(); ctx.shadowBlur=32; ctx.shadowColor=C.green;
  tx('PIXEL',BW/2,138,34,C.green,'center'); ctx.restore();
  ctx.save(); ctx.shadowBlur=22; ctx.shadowColor=C.yellow;
  tx('GRIDIRON',BW/2,180,22,C.yellow,'center'); ctx.restore();
  tx('★ ARCADE FOOTBALL ★',BW/2,210,6,C.dim,'center');
  const bx=BW/2+Math.sin(Date.now()*.003)*28, by=248+Math.cos(Date.now()*.002)*8;
  drawBall(bx,by);
  // Controls preview box
  pr(BW/2-260,270,520,120,C.scoreBg);
  ctx.strokeStyle='#1a1a38'; ctx.lineWidth=1; ctx.strokeRect(BW/2-260,270,520,120);
  tx('HOW TO PLAY',BW/2,290,6,C.yellow,'center');
  tx('SPACE = HIKE BALL AFTER SNAP',BW/2,312,5,C.dim,'center');
  tx('1 / 2 / 3 = THROW TO RECEIVER (GREEN=OPEN)',BW/2,330,5,C.dim,'center');
  tx('ARROWS = RUN AFTER CATCH   SHIFT = SPRINT',BW/2,348,5,C.dim,'center');
  tx('R = QB SCRAMBLE',BW/2,366,5,C.dim,'center');
  if(Math.sin(Date.now()*.005)>0) tx('PRESS SPACE TO START',BW/2,BH-30,7,C.green,'center');
}

function drawTeamSel(isOpp){
  pr(0,0,BW,BH,C.bg);
  tx(isOpp?'CHOOSE OPPONENT':'YOUR TEAM',BW/2,44,9,C.yellow,'center');
  tx('← → NAVIGATE    SPACE CONFIRM',BW/2,64,5,C.dim,'center');
  const cur=isOpp?G.oCur:G.tCur, forb=isOpp?G.tCur:-1;
  TKEYS.forEach((k,i)=>{
    const t=TEAMS[k], x=78+i*166, y=100, cw=140, ch=230;
    const sel=cur===i, fb=forb===i;
    pr(x,y,cw,ch,sel?'#0e1a0e':'#0a0a0a');
    ctx.strokeStyle=sel?t.h:fb?C.red:'#1a1a2e'; ctx.lineWidth=sel?3:1; ctx.strokeRect(x,y,cw,ch);
    if(fb){ pr(x,y,cw,ch,'rgba(255,0,0,0.07)'); tx('TAKEN',x+cw/2,y+ch/2,6,C.red,'center'); }
    ctx.font='34px serif'; ctx.textAlign='center'; ctx.fillText(t.emoji,x+cw/2,y+52); ctx.textAlign='left';
    tx(t.name,x+cw/2,y+74,4,sel?t.h:C.dim,'center');
    ['offense','defense'].forEach((s,si)=>{
      const by2=y+104+si*34, val=t[s], bc=s==='offense'?C.green:C.red;
      tx(s.slice(0,3).toUpperCase(),x+8,by2+10,5,C.dim);
      pr(x+44,by2,86,10,'#111'); pr(x+44,by2,(val/100)*86,10,bc);
      tx(val+'',x+132,by2+10,5,bc);
    });
    // color swatches
    pr(x+14,y+185,32,14,t.j); pr(x+52,y+185,32,14,t.h);
    if(sel) tx('▼ SELECTED',x+cw/2,y+ch+14,5,t.h,'center');
  });
}

function drawDiffSel(){
  pr(0,0,BW,BH,C.bg);
  tx('DIFFICULTY',BW/2,48,11,C.yellow,'center');
  DKEYS.forEach((k,i)=>{
    const d=DIFFS[k], x=104+i*198, y=110, cw=162, ch=200, sel=G.dCur===i;
    pr(x,y,cw,ch,sel?'#0e100e':'#080808');
    ctx.strokeStyle=sel?d.col:'#1a1a2e'; ctx.lineWidth=sel?3:1; ctx.strokeRect(x,y,cw,ch);
    tx(d.label,x+cw/2,y+30,9,d.col,'center');
    [['AI SPEED',Math.round(d.aispd*100)+'%'],
     ['COVER RANGE',~~d.covDist+' px'],
     ['INT RATE',~~(d.intRate*100)+'%']].forEach(([l,v],ti)=>{
      tx(l,x+12,y+64+ti*38,4,C.dim);
      tx(v,x+12,y+80+ti*38,7,sel?d.col:C.dim);
    });
    if(sel) tx('◀ SELECTED ▶',x+cw/2,y+ch+14,5,d.col,'center');
  });
  tx('← → CHOOSE    SPACE CONFIRM',BW/2,BH-18,5,C.dim,'center');
}

function drawHalftime(){
  pr(0,0,BW,BH,C.bg);
  const pt=TEAMS[G.pKey],ot=TEAMS[G.oKey];
  tx('HALFTIME',BW/2,78,18,C.yellow,'center');
  tx(pt.name,BW/2-100,155,6,pt.j,'center');
  tx(G.score[0]+'',BW/2-100,200,28,C.green,'center');
  tx('—',BW/2,195,10,C.dim,'center');
  tx(ot.name,BW/2+100,155,6,ot.j,'center');
  tx(G.score[1]+'',BW/2+100,200,28,C.red,'center');
  const lead=G.score[0]>G.score[1]?`UP ${G.score[0]-G.score[1]}`:G.score[1]>G.score[0]?`DOWN ${G.score[1]-G.score[0]}`:'TIED!';
  tx(lead,BW/2,255,9,G.score[0]>G.score[1]?C.green:G.score[1]>G.score[0]?C.red:C.yellow,'center');
  if(Math.sin(Date.now()*.005)>0) tx('SPACE = 2ND HALF KICKOFF →',BW/2,320,6,C.white,'center');
}

function drawGameover(){
  pr(0,0,BW,BH,C.bg);
  const pt=TEAMS[G.pKey],ot=TEAMS[G.oKey];
  const win=G.score[0]>G.score[1],tie=G.score[0]===G.score[1];
  const hcol=tie?C.yellow:win?C.green:C.red;
  ctx.save(); ctx.shadowBlur=30; ctx.shadowColor=hcol;
  tx(tie?'TIED!':win?'VICTORY!':'DEFEAT!',BW/2,88,22,hcol,'center'); ctx.restore();
  tx(pt.abbr,BW/2-110,158,8,pt.j,'center');
  tx(G.score[0]+'',BW/2-110,200,28,C.green,'center');
  tx('VS',BW/2,195,9,C.dim,'center');
  tx(ot.abbr,BW/2+110,158,8,ot.j,'center');
  tx(G.score[1]+'',BW/2+110,200,28,C.red,'center');
  tx(`Q${G.quarter} | ${G.weather.toUpperCase()} | ${G.dKey.toUpperCase()}`,BW/2,270,5,C.dim,'center');
  if(Math.sin(Date.now()*.005)>0) tx('SPACE = MAIN MENU',BW/2,330,6,C.white,'center');
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,BW,BH);
  switch(G.screen){
    case 'title':    drawTitle(); break;
    case 'teamsel':  drawTeamSel(false); break;
    case 'oppsel':   drawTeamSel(true); break;
    case 'diffsel':  drawDiffSel(); break;
    case 'playing':  drawGame(); break;
    case 'halftime': drawHalftime(); break;
    case 'gameover': drawGameover(); break;
  }
}

requestAnimationFrame(loop);
</script>
