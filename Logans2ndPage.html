<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELOCITY: BREAKPOINT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Rajdhani',sans-serif;}
#c{display:block;width:100vw;height:100vh;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.screen.hidden{display:none!important;}
.screen-bg{background:linear-gradient(135deg,#0a0a1a 0%,#0d1a0d 50%,#1a0a0a 100%);}
.screen-bg::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);pointer-events:none;}

.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(32px,5vw,64px);letter-spacing:4px;color:#fff;text-align:center;z-index:2;line-height:1.1;}
.logo span{color:#ff6600;text-shadow:0 0 30px #ff6600;}
.logo-sub{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:10px;color:rgba(255,255,255,0.25);margin-top:6px;z-index:2;}

.divider{width:260px;height:1px;background:linear-gradient(90deg,transparent,#ff6600,transparent);margin:24px 0;z-index:2;opacity:0.5;}

.mbtn{background:transparent;border:none;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.45);padding:12px 24px;cursor:pointer;text-align:left;text-transform:uppercase;position:relative;transition:all 0.18s;outline:none;z-index:2;width:260px;}
.mbtn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#ff6600;transform:scaleY(0);transition:transform 0.18s;box-shadow:0 0 8px #ff6600;}
.mbtn:hover{color:#fff;padding-left:36px;}
.mbtn:hover::before{transform:scaleY(1);}

/* ── GARAGE ── */
#garage-screen{overflow-y:auto;}
.garage-wrap{display:flex;gap:30px;z-index:2;padding:20px;max-width:900px;width:100%;}
.car-list{display:flex;flex-direction:column;gap:8px;width:200px;flex-shrink:0;}
.car-item{border:1px solid rgba(255,102,0,0.2);border-radius:4px;padding:10px 14px;cursor:pointer;transition:all 0.15s;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.5);}
.car-item:hover,.car-item.selected{border-color:#ff6600;color:#fff;background:rgba(255,102,0,0.08);}
.car-item.locked{opacity:0.25;cursor:not-allowed;}
.car-emoji{font-size:22px;margin-bottom:4px;}

.upgrade-panel{flex:1;}
.upg-title{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:4px;color:#ff6600;margin-bottom:16px;}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.stat-name{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.4);width:90px;}
.stat-track{flex:1;height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.upg-btn{background:rgba(255,102,0,0.12);border:1px solid rgba(255,102,0,0.4);border-radius:3px;padding:4px 10px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:#ff8844;transition:all 0.15s;}
.upg-btn:hover{background:rgba(255,102,0,0.25);color:#fff;}
.money-display{font-family:'Orbitron',sans-serif;font-size:18px;color:#ffd700;margin-bottom:16px;letter-spacing:2px;}

/* ── TRACK SELECT ── */
.tracks-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;z-index:2;width:640px;margin-top:20px;}
.tc{border:1px solid rgba(255,102,0,0.15);border-radius:6px;padding:16px;cursor:pointer;transition:all 0.18s;background:rgba(0,0,0,0.3);}
.tc:hover{border-color:#ff6600;background:rgba(255,102,0,0.07);transform:translateY(-2px);}
.tc.locked{opacity:0.2;cursor:not-allowed;}
.tc-icon{font-size:28px;margin-bottom:8px;}
.tc-name{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:4px;}
.tc-desc{font-size:11px;color:rgba(255,255,255,0.35);line-height:1.5;}
.tc-diff{margin-top:8px;font-size:8px;letter-spacing:2px;font-family:'Orbitron',sans-serif;}
.tc-feats{font-size:9px;color:rgba(255,150,50,0.6);margin-top:4px;}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
#spedo{position:absolute;bottom:24px;right:32px;text-align:center;}
.sring{width:150px;height:150px;position:relative;}
.sring svg{width:150px;height:150px;transform:rotate(-135deg);}
.sarc-bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:7;}
.sarc{fill:none;stroke:url(#sg);stroke-width:7;stroke-linecap:round;}
.snum{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.sval{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:#fff;line-height:1;}
.sunit{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:3px;}
#gear-d{position:absolute;bottom:90px;right:32px;font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:rgba(255,255,255,0.75);text-shadow:0 0 20px #ff6600;}

#lap-info{position:absolute;top:16px;left:50%;transform:translateX(-50%);text-align:center;}
#lap-num{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.4);}
#lap-time{font-family:'Orbitron',monospace;font-size:26px;font-weight:700;color:#fff;margin-top:2px;}
#best-time{font-size:10px;color:#ffaa00;letter-spacing:2px;margin-top:2px;font-family:'Orbitron',sans-serif;}

#pos-hud{position:absolute;top:16px;right:32px;text-align:right;}
#pos-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.3);}
#pos-val{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:#fff;line-height:1;}

#nitro-hud{position:absolute;bottom:24px;left:32px;width:180px;}
.nl{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:4px;color:#ff4400;margin-bottom:5px;}
.nt{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.nf{height:100%;background:linear-gradient(90deg,#ff6600,#ff0044);border-radius:4px;transition:width 0.08s;}
.nh{font-size:8px;color:rgba(255,80,0,0.6);margin-top:3px;letter-spacing:2px;font-family:'Orbitron',sans-serif;}

#damage-hud{position:absolute;bottom:80px;left:32px;width:180px;}
.dl{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:#ff2200;margin-bottom:5px;}
.dt{height:5px;background:rgba(255,0,0,0.08);border-radius:3px;}
.df{height:100%;background:linear-gradient(90deg,#00ff44,#aaff00,#ff2200);border-radius:3px;transition:width 0.3s;}

#mini-map{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:110px;height:110px;border-radius:50%;border:1px solid rgba(255,102,0,0.25);overflow:hidden;background:rgba(0,0,0,0.6);}
#mm-canvas{width:110px;height:110px;}

#event-banner{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity 0.25s;pointer-events:none;}
#ev-text{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:#ff4400;text-shadow:0 0 30px #ff4400;letter-spacing:4px;}
#ev-sub{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:6px;margin-top:4px;}

#drift-pts{position:absolute;left:50%;top:55%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#ff8800;text-shadow:0 0 15px #ff8800;opacity:0;letter-spacing:3px;}
#air-pts{position:absolute;left:50%;top:60%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#00aaff;opacity:0;letter-spacing:3px;}

#controls-hud{position:absolute;top:16px;left:32px;font-family:'Rajdhani',sans-serif;font-size:10px;color:rgba(255,255,255,0.2);line-height:1.8;}

#sl-canvas{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.15s;}
#dmg-flash{position:fixed;inset:0;z-index:49;background:rgba(255,0,0,0.25);pointer-events:none;opacity:0;transition:opacity 0.08s;}
#nitro-flash{position:fixed;inset:0;z-index:48;background:rgba(255,100,0,0.06);pointer-events:none;opacity:0;transition:opacity 0.08s;}

/* ── COUNTDOWN ── */
#countdown{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);pointer-events:none;}
#countdown.hidden{display:none;}
#cd-num{font-family:'Orbitron',monospace;font-size:110px;font-weight:900;color:#fff;animation:cdpop 0.6s ease-out;}
@keyframes cdpop{from{transform:scale(1.6);opacity:0;}to{transform:scale(1);opacity:1;}}

/* ── RESULTS ── */
#results-screen{background:linear-gradient(135deg,#050a05,#0a0505);}
#res-title{font-family:'Orbitron',sans-serif;font-size:44px;font-weight:900;letter-spacing:6px;margin-bottom:24px;z-index:2;}
.rstat{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.5);margin:6px 0;z-index:2;}
.rstat span{color:#ff8844;margin-left:16px;}
.rbtns{display:flex;gap:16px;margin-top:32px;z-index:2;}
</style>
</head>
<body>

<!-- ══ MAIN MENU ══ -->
<div id="main-menu" class="screen screen-bg">
  <div class="logo">VELOCITY<br><span>BREAKPOINT</span></div>
  <div class="logo-sub">STREET LEAGUE · SEASON 7</div>
  <div class="divider"></div>
  <div style="display:flex;flex-direction:column;gap:4px;z-index:2;">
    <button class="mbtn" onclick="showTrackSelect('race')">▶ &nbsp;QUICK RACE</button>
    <button class="mbtn" onclick="showTrackSelect('time')">⏱ &nbsp;TIME ATTACK</button>
    <button class="mbtn" onclick="showScreen('garage-screen')">🔧 &nbsp;GARAGE</button>
    <button class="mbtn" style="margin-top:12px;opacity:0.3;" disabled>⚙ &nbsp;SETTINGS</button>
  </div>
  <div style="position:absolute;bottom:24px;font-size:10px;color:rgba(255,255,255,0.1);letter-spacing:3px;font-family:'Orbitron',sans-serif;">ARROWS=STEER · SPACE=DRIFT · SHIFT=NITRO · C=CAMERA</div>
</div>

<!-- ══ GARAGE ══ -->
<div id="garage-screen" class="screen screen-bg hidden">
  <div class="logo" style="font-size:22px;letter-spacing:8px;z-index:2;margin-bottom:4px;">🔧 GARAGE</div>
  <div class="money-display" style="z-index:2;">💰 <span id="money-disp">5000</span></div>
  <div class="garage-wrap">
    <div class="car-list" id="car-list"></div>
    <div class="upgrade-panel">
      <div class="upg-title" id="upg-car-name">SELECT A CAR</div>
      <div id="upg-stats"></div>
      <div id="upg-buttons" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;"></div>
    </div>
  </div>
  <button class="mbtn" style="z-index:2;" onclick="showScreen('main-menu')">← BACK</button>
</div>

<!-- ══ TRACK SELECT ══ -->
<div id="track-select-screen" class="screen screen-bg hidden">
  <div class="logo" style="font-size:20px;letter-spacing:8px;z-index:2;">SELECT TRACK</div>
  <div class="tracks-grid" id="tracks-grid"></div>
  <button class="mbtn" style="margin-top:20px;z-index:2;" onclick="showScreen('main-menu')">← BACK</button>
</div>

<!-- ══ COUNTDOWN ══ -->
<div id="countdown" class="hidden"><div id="cd-num">3</div></div>

<!-- ══ RESULTS ══ -->
<div id="results-screen" class="screen hidden">
  <div id="res-title">FINISH</div>
  <div id="res-content"></div>
  <div class="rbtns">
    <button class="mbtn" onclick="showTrackSelect('race')">▶ RACE AGAIN</button>
    <button class="mbtn" onclick="showScreen('main-menu')">⌂ MENU</button>
  </div>
</div>

<!-- ══ 3D CANVAS ══ -->
<canvas id="c"></canvas>

<!-- ══ HUD ══ -->
<div id="hud" class="hidden">
  <div id="lap-info">
    <div id="lap-num">LAP 1 / 3</div>
    <div id="lap-time">0:00.000</div>
    <div id="best-time">BEST: --</div>
  </div>
  <div id="pos-hud">
    <div id="pos-label">POSITION</div>
    <div id="pos-val">1<span style="font-size:18px;opacity:0.4">/6</span></div>
  </div>
  <div id="spedo">
    <div class="sring">
      <svg viewBox="0 0 150 150">
        <defs>
          <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00ff88"/>
            <stop offset="50%" style="stop-color:#ff8800"/>
            <stop offset="100%" style="stop-color:#ff0044"/>
          </linearGradient>
        </defs>
        <circle class="sarc-bg" cx="75" cy="75" r="64" stroke-dasharray="335"/>
        <circle class="sarc" id="sarc" cx="75" cy="75" r="64" stroke-dasharray="335" stroke-dashoffset="335"/>
      </svg>
      <div class="snum"><div class="sval" id="sval">0</div><div class="sunit">KM/H</div></div>
    </div>
  </div>
  <div id="gear-d">N</div>
  <div id="nitro-hud">
    <div class="nl">⚡ NITRO</div>
    <div class="nt"><div class="nf" id="nf"></div></div>
    <div class="nh" id="nh-label">READY</div>
  </div>
  <div id="damage-hud">
    <div class="dl">HULL</div>
    <div class="dt"><div class="df" id="df"></div></div>
  </div>
  <div id="mini-map"><canvas id="mm-canvas" width="110" height="110"></canvas></div>
  <div id="event-banner"><div id="ev-text"></div><div id="ev-sub"></div></div>
  <div id="drift-pts"></div>
  <div id="air-pts"></div>
  <div id="controls-hud">↑ ACCEL &nbsp; ↓ BRAKE<br>← → STEER<br>SPACE DRIFT<br>SHIFT NITRO<br>C CAMERA</div>
</div>

<canvas id="sl-canvas"></canvas>
<div id="dmg-flash"></div>
<div id="nitro-flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

// ── BUILD SCENE ────────────────────────────────────────────────────
function buildScene(trackId) {
  // Dispose previous scene
  while(scene.children.length) scene.remove(scene.children[0]);
  aiCars = []; roadMeshes = []; obstacleBoxes = []; rampMeshes = [];

  const td = TRACK_DATA[trackId];
  scene.background = new THREE.Color(td.sky);
  scene.fog = new THREE.FogExp2(new THREE.Color(td.sky).lerp(new THREE.Color(0xffffff), 0.2), td.fog);

  // Lighting — daylight
  const sun = new THREE.DirectionalLight(new THREE.Color(td.sun.color), td.sun.intensity);
  sun.position.set(...td.sun.pos); sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 1000;
  sun.shadow.camera.left = -250; sun.shadow.camera.right = 250;
  sun.shadow.camera.top = 250; sun.shadow.camera.bottom = -250;
  scene.add(sun);
  scene.add(new THREE.AmbientLight(new THREE.Color(td.ambient.color), td.ambient.intensity));
  // Hemisphere
  scene.add(new THREE.HemisphereLight(new THREE.Color(td.sky), new THREE.Color(td.ground), 0.4));

  // Ground plane
  const gndMat = mkMat({color: td.ground, roughness:1});
  const gnd = new THREE.Mesh(new THREE.PlaneGeometry(2000,2000), gndMat);
  gnd.rotation.x = -Math.PI/2; gnd.position.y = -0.1; gnd.receiveShadow = true;
  scene.add(gnd);

  // Build spline
  const rawPts = td.waypoints.map(([x,z]) => new THREE.Vector3(x,0,z));
  trackSpline = new THREE.CatmullRomCurve3(rawPts, true);

  // Build road
  buildRoad(td, trackId);

  // Obstacles
  buildObstacles(td, trackId);

  // Ramps
  buildRamps(td, trackId);

  // Environment decoration
  buildEnvironment(td, trackId);

  // Player car
  const carDef = CAR_CATALOGUE.find(c=>c.id===SAVE.selectedCar) || CAR_CATALOGUE[0];
  playerCar = createCarMesh(carDef.color, 1.0);
  scene.add(playerCar);

  // AI cars
  const aiColors = [0x2244ff, 0xff8800, 0x00cc44, 0xcc00ff, 0xff0066];
  for(let i=0;i<5;i++){
    const ai = createCarMesh(aiColors[i], 1.0);
    ai.userData = {
      t: 0.015 + i*0.025,
      speed: 0.0045 + Math.random()*0.0025,
      lat: (Math.random()-0.5)*5,
      targetLat: 0,
      latV: 0,
      name: ['RICO','TANK','VIPER','GHOST','NOVA'][i],
    };
    scene.add(ai);
    aiCars.push(ai);
  }

  // Place player
  const sp = trackSpline.getPointAt(0.01);
  const st = trackSpline.getTangentAt(0.01);
  G.px = sp.x; G.pz = sp.z; G.py = 0.35;
  G.vx = 0; G.vz = 0; G.vy = 0;
  G.carYaw = Math.atan2(st.x, st.z);
  playerCar.position.set(G.px, G.py, G.pz);
  playerCar.rotation.y = G.carYaw;
  G.playerT = 0.01;
  G.speed = 0;
}

// ── ROAD BUILDER ──────────────────────────────────────────────────
function buildRoad(td, trackId) {
  const segments = 200;
  const roadW = trackId === 'desert' ? 20 : 14;
  const pts = trackSpline.getPoints(segments);

  for(let i=0;i<pts.length-1;i++){
    const a = pts[i], b = pts[i+1];
    const dir = b.clone().sub(a).normalize();
    const perp = new THREE.Vector3(-dir.z,0,dir.x);
    const len = a.distanceTo(b) + 0.15;
    const mid = a.clone().add(b).multiplyScalar(0.5);
    const angle = Math.atan2(dir.x, dir.z);

    // Road surface
    const road = new THREE.Mesh(new THREE.BoxGeometry(roadW, 0.12, len), MAT.road);
    road.position.copy(mid); road.position.y = 0;
    road.rotation.y = angle;
    road.receiveShadow = true;
    scene.add(road);
    roadMeshes.push({mesh:road, perp, mid, angle, width: roadW/2, len});

    // Center dashes
    if(i%6===0){
      const dash = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.13,2.5), MAT.line);
      dash.position.copy(mid); dash.position.y = 0.07;
      dash.rotation.y = angle;
      scene.add(dash);
    }

    // Kerbs (striped edge)
    for(const s of [-1,1]){
      const kerb = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.18,len), (i%4<2)?MAT.kerb:MAT.kerb2);
      kerb.position.copy(mid);
      kerb.position.x += perp.x*(roadW/2-0.4)*s;
      kerb.position.z += perp.z*(roadW/2-0.4)*s;
      kerb.position.y = 0.02;
      kerb.rotation.y = angle;
      kerb.receiveShadow = true;
      scene.add(kerb);

      // Armco barrier
      const bar = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.7,len+0.3), MAT.barrier);
      bar.position.copy(kerb.position);
      bar.position.x += perp.x*0.9*s;
      bar.position.z += perp.z*0.9*s;
      bar.position.y = 0.3;
      bar.rotation.y = angle;
      bar.castShadow = true;
      scene.add(bar);
    }
  }

  // Tyre stack markers at start/finish
  for(let s of[-1,1]){
    for(let j=0;j<3;j++){
      const sp = trackSpline.getPointAt(0);
      const st = trackSpline.getTangentAt(0);
      const perp = new THREE.Vector3(-st.z,0,st.x);
      const tyre = new THREE.Mesh(new THREE.TorusGeometry(0.5,0.2,8,12), MAT.tyre);
      tyre.rotation.z = Math.PI/2;
      tyre.position.set(sp.x+perp.x*(roadW/2+0.5)*s, j*0.8+0.3, sp.z+perp.z*(roadW/2+0.5)*s);
      scene.add(tyre);
    }
  }
}

// ── OBSTACLES ─────────────────────────────────────────────────────
function buildObstacles(td, trackId) {
  const snapped = (def) => {
    // Snap obstacle to nearest road height (0) + half height
    return def;
  };

  td.obstacles.forEach(ob => {
    let mesh, size;
    switch(ob.type){
      case 'barrier':
        mesh = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.9,3.5), MAT.barrier);
        size = new THREE.Vector3(1.0,0.9,3.5); break;
      case 'crate':
        mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,1.2), mkMat({color:0xaa6600,roughness:0.9,metalness:0.1}));
        size = new THREE.Vector3(1.2,1.2,1.2); break;
      case 'cone': {
        const cg = new THREE.ConeGeometry(0.3,0.7,8);
        mesh = new THREE.Mesh(cg, mkMat({color:0xff4400,roughness:0.8}));
        size = new THREE.Vector3(0.6,0.7,0.6); break;
      }
      case 'boulder':
        mesh = new THREE.Mesh(new THREE.SphereGeometry(1.2,8,6), mkMat({color:0x7a6a5a,roughness:1}));
        mesh.scale.set(1,0.8,1.2);
        size = new THREE.Vector3(2.4,1.2,2.4); break;
      case 'barrel':
        mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.9,10), mkMat({color:0x333333,roughness:0.5,metalness:0.5}));
        size = new THREE.Vector3(0.8,0.9,0.8); break;
      case 'pipe':
        mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,4,10), mkMat({color:0x888888,roughness:0.3,metalness:0.9}));
        mesh.rotation.z = Math.PI/2;
        size = new THREE.Vector3(4,0.7,0.7); break;
      case 'cactus': {
        const cact = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.3,2,8), mkMat({color:0x3a7a3a,roughness:1}));
        cact.add(body);
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,1,8), mkMat({color:0x3a7a3a,roughness:1}));
        arm.rotation.z = Math.PI/2; arm.position.set(0.5,0.5,0);
        cact.add(arm);
        mesh = cact; size = new THREE.Vector3(1,2,1); break;
      }
      default:
        mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), MAT.barrier);
        size = new THREE.Vector3(1,1,1);
    }
    mesh.position.set(ob.pos[0], ob.pos[1]+size.y/2, ob.pos[2]);
    mesh.rotation.y = ob.rot;
    mesh.castShadow = true; mesh.receiveShadow = true;
    scene.add(mesh);

    const box = new THREE.Box3().setFromCenterAndSize(
      mesh.position.clone(),
      size.clone().multiplyScalar(0.85)
    );
    obstacleBoxes.push({ mesh, box, size, pos:mesh.position.clone() });
  });
}

// ── RAMPS ─────────────────────────────────────────────────────────
function buildRamps(td, trackId) {
  td.ramps.forEach(ramp => {
    const rampGrp = new THREE.Group();

    // Ramp surface (wedge shape via BoxGeometry tilted)
    const rampMesh = new THREE.Mesh(
      new THREE.BoxGeometry(10, 0.25, 8),
      mkMat({color:0x555555, roughness:0.5, metalness:0.3})
    );
    rampMesh.position.set(0, 0.5, 0);
    rampMesh.rotation.x = -0.28; // ~16 degree incline
    rampGrp.add(rampMesh);

    // Ramp sides
    for(let s of[-1,1]){
      const side = new THREE.Mesh(new THREE.BoxGeometry(0.3,1.2,8), mkMat({color:0xff8800,roughness:0.6,emissive:0xff4400,emissiveIntensity:0.2}));
      side.position.set(s*5.1,0.3,0);
      rampGrp.add(side);
    }

    // Arrow markers on ramp
    const arrow = new THREE.Mesh(new THREE.BoxGeometry(6,0.05,1), mkMat({color:0xffff00,emissive:0xaaaa00,emissiveIntensity:0.5}));
    arrow.position.set(0,0.85,-1);
    arrow.rotation.x = -0.28;
    rampGrp.add(arrow);

    rampGrp.position.set(ramp.pos[0], ramp.pos[1], ramp.pos[2]);
    rampGrp.rotation.y = ramp.rot || 0;
    rampGrp.castShadow = true;
    rampGrp.receiveShadow = true;
    scene.add(rampGrp);

    rampMeshes.push({ pos: new THREE.Vector3(ramp.pos[0],0,ramp.pos[2]), rot: ramp.rot||0, width:10, depth:8 });
  });
}

// ── ENVIRONMENT ────────────────────────────────────────────────────
function buildEnvironment(td, trackId) {
  const rng = (min,max) => min+Math.random()*(max-min);
  const trackPts = trackSpline.getPoints(100);

  const tooCloseToTrack = (x,z,minD=20) => {
    for(const p of trackPts){
      if(Math.hypot(p.x-x,p.z-z)<minD) return true;
    }
    return false;
  };

  if(trackId==='circuit'||trackId==='industrial'){
    // Trees / grandstands
    for(let i=0;i<60;i++){
      const x=rng(-120,250), z=rng(-30,200);
      if(tooCloseToTrack(x,z,22)) continue;
      const h=rng(3,12);
      const tree=new THREE.Group();
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,h*0.4,8),mkMat({color:0x6b3a1f,roughness:1}));
      trunk.position.y=h*0.2;
      tree.add(trunk);
      const top=new THREE.Mesh(new THREE.SphereGeometry(rng(1.5,3.5),8,6),mkMat({color:trackId==='industrial'?0x2a4422:0x2a6a1a,roughness:1}));
      top.position.y=h*0.55;
      tree.add(top);
      tree.position.set(x,0,z);
      tree.castShadow=true;
      scene.add(tree);
    }
  }

  if(trackId==='canyon'){
    for(let i=0;i<100;i++){
      const x=rng(-100,200),z=rng(-50,200);
      if(tooCloseToTrack(x,z,18)) continue;
      const h=rng(8,35);
      const rock=new THREE.Mesh(new THREE.BoxGeometry(rng(5,14),h,rng(4,12)),mkMat({color:new THREE.Color().setHSL(0.07,0.4,rng(0.2,0.35)),roughness:1}));
      rock.rotation.y=rng(0,Math.PI);
      rock.position.set(x,h/2-1,z);
      rock.castShadow=true;
      scene.add(rock);
    }
  }

  if(trackId==='desert'){
    // Dunes
    for(let i=0;i<50;i++){
      const x=rng(-200,300),z=rng(-100,300);
      if(tooCloseToTrack(x,z,30)) continue;
      const dune=new THREE.Mesh(new THREE.SphereGeometry(rng(8,25),10,8),mkMat({color:new THREE.Color().setHSL(0.1,0.6,rng(0.35,0.5)),roughness:1}));
      dune.scale.y=0.25;
      dune.position.set(x,-1,z);
      scene.add(dune);
    }
    // Road signs
    for(let i=0;i<8;i++){
      const t=i/8;
      const pt=trackSpline.getPointAt(t);
      const tan=trackSpline.getTangentAt(t);
      const perp=new THREE.Vector3(-tan.z,0,tan.x);
      const sign=new THREE.Group();
      const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,4,8),mkMat({color:0xaaaaaa,metalness:0.7,roughness:0.3}));
      pole.position.y=2; sign.add(pole);
      const board=new THREE.Mesh(new THREE.BoxGeometry(2,1,0.1),mkMat({color:0x004488,roughness:0.5}));
      board.position.y=4.5; sign.add(board);
      sign.position.set(pt.x+perp.x*12, 0, pt.z+perp.z*12);
      scene.add(sign);
    }
  }

  // Spectator stands at start/finish
  const spPt = trackSpline.getPointAt(0.02);
  const spTan = trackSpline.getTangentAt(0.02);
  const spPerp = new THREE.Vector3(-spTan.z,0,spTan.x);
  for(let s of[-1,1]){
    const stand=new THREE.Mesh(new THREE.BoxGeometry(20,6,8),mkMat({color:0xddddcc,roughness:0.9}));
    stand.position.set(spPt.x+spPerp.x*18*s, 3, spPt.z+spPerp.z*18*s);
    stand.castShadow=true; stand.receiveShadow=true;
    scene.add(stand);
    // Roof
    const roof=new THREE.Mesh(new THREE.BoxGeometry(22,0.4,9),mkMat({color:s>0?0xff2200:0x2244aa,roughness:0.7}));
    roof.position.set(spPt.x+spPerp.x*18*s, 6.2, spPt.z+spPerp.z*18*s);
    scene.add(roof);
  }

  // Start/finish banner
  {
    const sp0 = trackSpline.getPointAt(0);
    const st0 = trackSpline.getTangentAt(0);
    const perp0 = new THREE.Vector3(-st0.z,0,st0.x);
    const pole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,8,8),mkMat({color:0xffffff,roughness:0.5}));
    pole1.position.set(sp0.x+perp0.x*7,4,sp0.z+perp0.z*7); scene.add(pole1);
    const pole2 = pole1.clone();
    pole2.position.set(sp0.x-perp0.x*7,4,sp0.z-perp0.z*7); scene.add(pole2);
    const banner = new THREE.Mesh(new THREE.BoxGeometry(14,1.2,0.15),mkMat({color:0x111111,roughness:0.8}));
    banner.position.set(sp0.x,7.5,sp0.z); banner.rotation.y=Math.atan2(st0.x,st0.z);
    scene.add(banner);
    // Checkerboard pattern via multiple small quads
    for(let ci=0;ci<14;ci++){
      const checker=new THREE.Mesh(new THREE.BoxGeometry(1,1,0.2),mkMat({color:ci%2===0?0xffffff:0x000000}));
      checker.position.set(sp0.x+(ci-6.5)*1,7.5,sp0.z);
      checker.rotation.y=Math.atan2(st0.x,st0.z);
      scene.add(checker);
    }
  }
}

// ── CAR MESH ──────────────────────────────────────────────────────
function createCarMesh(color, scale) {
  const g = new THREE.Group();
  const bodyMat = mkMat({color, roughness:0.2, metalness:0.85});

  // Main body
  const body = new THREE.Mesh(new THREE.BoxGeometry(2,0.55,4.2), bodyMat);
  body.position.y = 0.38; body.castShadow=true; g.add(body);

  // Cabin
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.5,0.48,2), MAT.glass);
  cabin.position.set(0,0.85,-0.15); g.add(cabin);

  // Hood slope
  const hood = new THREE.Mesh(new THREE.BoxGeometry(1.9,0.18,1.5), bodyMat);
  hood.position.set(0,0.6,1.1); hood.rotation.x=0.18; g.add(hood);

  // Spoiler
  const spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.1,0.05,0.45), MAT.metal);
  spoiler.position.set(0,0.95,-1.9); g.add(spoiler);
  const [sp1,sp2] = [new THREE.Mesh(new THREE.BoxGeometry(0.1,0.4,0.3),MAT.metal), new THREE.Mesh(new THREE.BoxGeometry(0.1,0.4,0.3),MAT.metal)];
  sp1.position.set(-0.9,0.72,-1.9); sp2.position.set(0.9,0.72,-1.9); g.add(sp1); g.add(sp2);

  // Front bumper
  const bumper = new THREE.Mesh(new THREE.BoxGeometry(2,0.28,0.4), MAT.metal);
  bumper.position.set(0,0.28,2.15); g.add(bumper);

  // Wheels (4)
  const wg = new THREE.CylinderGeometry(0.38,0.38,0.28,16);
  const rim = new THREE.CylinderGeometry(0.22,0.22,0.30,12);
  const rimMat = mkMat({color:0xcccccc,metalness:0.9,roughness:0.1});
  [[1.1,0.38,1.4],[-1.1,0.38,1.4],[1.1,0.38,-1.4],[-1.1,0.38,-1.4]].forEach(([x,y,z],i) => {
    const w = new THREE.Group();
    const tyre = new THREE.Mesh(wg, MAT.tyre); tyre.rotation.z=Math.PI/2;
    const r = new THREE.Mesh(rim, rimMat); r.rotation.z=Math.PI/2;
    w.add(tyre); w.add(r);
    w.position.set(x,y,z);
    w.castShadow=true;
    g.add(w);
  });

  // Headlights
  const hlMat = mkMat({color:0xffffff,emissive:0xffffff,emissiveIntensity:1.5});
  for(let s of[-0.7,0.7]){
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.18,0.08), hlMat);
    hl.position.set(s,0.5,2.1); g.add(hl);
  }

  // Underglow (subtle)
  const ugl = new THREE.PointLight(color, 0.8, 4);
  ugl.position.set(0,0,0); g.add(ugl);

  g.scale.setScalar(scale);
  return g;
}

// ── CAR STATS ─────────────────────────────────────────────────────
function getCarStats() {
  const carDef = CAR_CATALOGUE.find(c=>c.id===SAVE.selectedCar) || CAR_CATALOGUE[0];
  const upgLvls = SAVE.upgrades[SAVE.selectedCar] || {};
  const stats = {...carDef.stats};
  UPGRADES.forEach(u => {
    const lv = upgLvls[u.id] || 0;
    stats[u.stat] = Math.min(10, stats[u.stat] + lv * u.inc);
  });
  return stats;
}

// ── PHYSICS UPDATE ────────────────────────────────────────────────
// Player bounding box (half-extents)
const PBOX = new THREE.Vector3(1.0, 0.7, 2.1);

function updatePlayer(dt) {
  if(!G.running || G.raceFinished) return;
  const stats = getCarStats();

  // Tuning params from stats
  const baseMaxSpd    = 0.16 + stats.speed    * 0.018;
  const acceleration  = 0.0018 + stats.accel  * 0.0003;
  const handling      = 0.018  + stats.handling* 0.002;
  const nitroMult     = 1.0    + stats.nitro   * 0.06;

  const isNitro = (keys['ShiftLeft']||keys['ShiftRight']) && G.nitro>0 && G.nitroHeat<95;
  const isHandbrake = keys['Space'];
  const accel = keys['ArrowUp'];
  const brake = keys['ArrowDown'];
  const left  = keys['ArrowLeft'];
  const right = keys['ArrowRight'];

  // Nitro
  if(isNitro){ G.nitro=Math.max(0,G.nitro-0.4); G.nitroHeat=Math.min(100,G.nitroHeat+0.6); }
  else { G.nitro=Math.min(100,G.nitro+0.025); G.nitroHeat=Math.max(0,G.nitroHeat-0.25); }
  const nitroBoost = isNitro ? (1+stats.nitro*0.06) : 1.0;
  G.maxSpeed = baseMaxSpd * nitroBoost;

  // Longitudinal
  if(accel) G.speed = Math.min(G.maxSpeed, G.speed + acceleration);
  else if(brake) G.speed = Math.max(-G.maxSpeed*0.35, G.speed - acceleration*1.5);
  else {
    const drag = G.onGround ? 0.975 : 0.998;
    G.speed *= drag;
    if(Math.abs(G.speed)<0.0005) G.speed=0;
  }

  // Steering
  const speedRatio = Math.abs(G.speed) / G.maxSpeed;
  const steerAmt = handling * Math.max(0.3, speedRatio);
  let rawSteer = 0;
  if(left)  rawSteer = -1;
  if(right) rawSteer =  1;

  // Drift
  G.drifting = false;
  let driftBias = 0;
  if(isHandbrake && Math.abs(G.speed)>0.04 && rawSteer!==0){
    G.drifting = true;
    G.driftTime += dt;
    driftBias = rawSteer * steerAmt * 1.4;
    G.speed *= 0.992;
    G.lateralVel += rawSteer * 0.006;
    if(G.driftTime > 40) {
      G.nitro = Math.min(100, G.nitro + 0.15);
      showDriftBonus(Math.floor(G.driftTime*4));
    }
  } else {
    G.driftTime = 0;
    G.lateralVel *= 0.82;
  }

  if(G.onGround){
    G.carYaw += steerAmt * rawSteer * (G.speed/G.maxSpeed) * (G.drifting?1.6:1.0);
    G.carYaw += driftBias;
  }

  // Physics integration
  const sinY = Math.sin(G.carYaw), cosY = Math.cos(G.carYaw);
  G.vx = sinY * G.speed + Math.cos(G.carYaw)*G.lateralVel;
  G.vz = cosY * G.speed - Math.sin(G.carYaw)*G.lateralVel;

  const nextX = G.px + G.vx;
  const nextZ = G.pz + G.vz;

  // ── RAMP CHECK ──────────────────────────────────────────────────
  let onRamp = false;
  for(const ramp of rampMeshes){
    const dx = nextX - ramp.pos.x, dz = nextZ - ramp.pos.z;
    const cos_r = Math.cos(-ramp.rot), sin_r = Math.sin(-ramp.rot);
    const lx = dx*cos_r - dz*sin_r;
    const lz = dx*sin_r + dz*cos_r;
    if(Math.abs(lx)<ramp.width/2 && lz>-ramp.depth/2 && lz<ramp.depth/2){
      onRamp = true;
      // Launch upward based on how far along ramp
      const rampProgress = (lz+ramp.depth/2)/ramp.depth;
      if(rampProgress>0.5 && G.onGround){
        G.vy = Math.abs(G.speed) * 8.5 + 0.04;
        G.onGround = false;
        showAirBonus();
      }
      break;
    }
  }

  // ── GRAVITY ─────────────────────────────────────────────────────
  if(!G.onGround){
    G.vy -= 0.012; // gravity
    G.py += G.vy;
    G.airTime += dt;
    if(G.py <= 0.35){
      G.py = 0.35; G.vy = 0; G.onGround = true;
      if(G.airTime > 30) { G.nitro = Math.min(100, G.nitro+15); showAirLanding(); }
      G.airTime = 0;
    }
  } else {
    G.py = 0.35;
    G.airTime = 0;
  }

  // ── OBSTACLE COLLISION ───────────────────────────────────────────
  const playerBox = new THREE.Box3(
    new THREE.Vector3(nextX - PBOX.x, G.py - PBOX.y, nextZ - PBOX.z),
    new THREE.Vector3(nextX + PBOX.x, G.py + PBOX.y, nextZ + PBOX.z)
  );

  let collided = false;
  for(const ob of obstacleBoxes){
    // Update box to current world pos
    ob.box.setFromCenterAndSize(ob.pos, ob.size.clone().multiplyScalar(0.85));
    if(playerBox.intersectsBox(ob.box)){
      collided = true;
      G.speed *= -0.3; // bounce back
      G.lateralVel *= -0.4;
      G.damage = Math.min(100, G.damage + 3.5);
      flashDamage();
      // Push player out
      const pushDir = new THREE.Vector3(G.px-ob.pos.x, 0, G.pz-ob.pos.z).normalize();
      G.px += pushDir.x * 0.4;
      G.pz += pushDir.z * 0.4;
      break;
    }
  }

  // ── AI COLLISION ─────────────────────────────────────────────────
  for(const ai of aiCars){
    const dx = nextX - ai.position.x;
    const dz = nextZ - ai.position.z;
    const dist = Math.hypot(dx, dz);
    if(dist < 2.8){
      // Push apart
      const push = (2.8 - dist) / 2.8;
      G.speed *= 0.6;
      G.lateralVel += (dx / dist) * push * 0.08;
      ai.userData.lat += -(dx / dist) * push * 3;
      G.damage = Math.min(100, G.damage + 1.5);
      flashDamage();
    }
  }

  // ── ROAD BOUNDS ──────────────────────────────────────────────────
  // Find nearest road segment and check lateral distance
  const td = TRACK_DATA[G.track];
  const roadW = G.track==='desert' ? 20 : 14;
  // Soft bounce at barriers
  const nearestPt = trackSpline.getPointAt(G.playerT);
  const nearestTan = trackSpline.getTangentAt(G.playerT);
  const perp = new THREE.Vector3(-nearestTan.z, 0, nearestTan.x);
  const lateralOff = (nextX - nearestPt.x) * perp.x + (nextZ - nearestPt.z) * perp.z;
  if(Math.abs(lateralOff) > roadW/2 - 0.5){
    G.speed *= 0.5;
    G.lateralVel *= -0.6;
    G.damage = Math.min(100, G.damage + 0.5);
    flashDamage();
    // Don't move further off
    if(!collided){
      G.px += -perp.x * (Math.abs(lateralOff) - (roadW/2-0.5)) * Math.sign(lateralOff) * 0.5;
      G.pz += -perp.z * (Math.abs(lateralOff) - (roadW/2-0.5)) * Math.sign(lateralOff) * 0.5;
    }
  } else if(!collided) {
    G.px = nextX;
    G.pz = nextZ;
  }

  // Update spline T for minimap/position
  updatePlayerT();

  // Apply to car mesh
  playerCar.position.set(G.px, G.py, G.pz);
  playerCar.rotation.y = G.carYaw;
  // Pitch based on speed change
  playerCar.rotation.z = G.lateralVel * 0.5;
  playerCar.rotation.x = G.onGround ? 0 : -0.1;

  // Wheel spin
  const wheels = [3,4,5,6];
  wheels.forEach(i => { if(playerCar.children[i]) playerCar.children[i].children[0].rotation.x += G.speed*12; });

  // Smoke particles when drifting
  if(G.drifting && Math.random()>0.5) spawnSmoke();

  // Lap detection
  detectLap();
}

function updatePlayerT(){
  // Search nearby spline points to find closest T
  let best = G.playerT, bestD = Infinity;
  for(let dt=-0.08;dt<=0.08;dt+=0.004){
    const t = ((G.playerT+dt)%1+1)%1;
    const pt = trackSpline.getPointAt(t);
    const d = Math.hypot(pt.x-G.px, pt.z-G.pz);
    if(d<bestD){ bestD=d; best=t; }
  }
  G.playerT = best;
}

function detectLap(){
  const prevT = G.playerT;
  // Lap complete when passing near T=0 going forward
  if(prevT > 0.95 || prevT < 0.05){
    const pt = trackSpline.getPointAt(0);
    const dist = Math.hypot(pt.x-G.px, pt.z-G.pz);
    if(dist < 8 && G.speed > 0.02 && !G._lapCooldown){
      G._lapCooldown = true;
      setTimeout(()=>G._lapCooldown=false, 3000);
      const elapsed = performance.now() - G.lapStart;
      if(elapsed > 5000){ // sanity check
        if(elapsed < G.bestLap) G.bestLap = elapsed;
        G.lap++;
        G.lapStart = performance.now();
        if(G.lap > G.totalLaps) { finishRace(); return; }
        showEvent('LAP '+G.lap, 'KEEP PUSHING!');
      }
    }
  }
}

// ── AI UPDATE ─────────────────────────────────────────────────────
function updateAI(dt){
  aiCars.forEach((ai, idx) => {
    const ud = ai.userData;
    // Avoid player
    const distToPlayer = Math.hypot(ai.position.x - G.px, ai.position.z - G.pz);
    if(distToPlayer < 3.5 && distToPlayer > 0.5){
      const awayX = ai.position.x - G.px, awayZ = ai.position.z - G.pz;
      ud.targetLat += (awayX * 0.1 + awayZ * 0.05);
    }
    // Random lane change
    if(Math.random()<0.003) ud.targetLat = (Math.random()-0.5)*8;
    ud.targetLat = Math.max(-5, Math.min(5, ud.targetLat));
    ud.lat += (ud.targetLat - ud.lat) * 0.03;

    ud.t += ud.speed;
    if(ud.t>=1) ud.t-=1;

    const pt = trackSpline.getPointAt(ud.t);
    const tan = trackSpline.getTangentAt(ud.t);
    const perp = new THREE.Vector3(-tan.z,0,tan.x);

    ai.position.set(pt.x+perp.x*ud.lat, 0.35, pt.z+perp.z*ud.lat);
    ai.rotation.y = Math.atan2(tan.x,tan.z);
    // Wheel spin
    ai.children.forEach((c,i)=>{ if(i>=3&&i<=6&&c.children[0]) c.children[0].rotation.x+=ud.speed*1200; });
  });

  // Position calculation
  const ahead = aiCars.filter(ai => {
    const dt = ai.userData.t - G.playerT;
    return (dt>0.01&&dt<0.9)||(dt<-0.5);
  }).length;
  G.position = ahead+1;
}

// ── SMOKE PARTICLES ───────────────────────────────────────────────
const smokePool = [];
function spawnSmoke(){
  const s = new THREE.Mesh(new THREE.SphereGeometry(0.3+Math.random()*0.3,6,4),
    mkMat({color:0xaaaaaa, transparent:true, opacity:0.4}));
  s.position.set(G.px+(Math.random()-0.5)*1.5, 0.15, G.pz+(Math.random()-0.5)*1.5);
  s.userData.life = 1.0;
  scene.add(s);
  smokePool.push(s);
  if(smokePool.length>30){ scene.remove(smokePool.shift()); }
}
function updateSmoke(){
  for(let i=smokePool.length-1;i>=0;i--){
    const s=smokePool[i];
    s.userData.life-=0.04;
    s.material.opacity=s.userData.life*0.35;
    s.position.y+=0.02;
    s.scale.setScalar(1+(1-s.userData.life)*2);
    if(s.userData.life<=0){ scene.remove(s); smokePool.splice(i,1); }
  }
}

// ── CAMERA ────────────────────────────────────────────────────────
const camPos = new THREE.Vector3();
const camLook = new THREE.Vector3();

function updateCamera(){
  const yaw = G.carYaw;
  const sinY = Math.sin(yaw), cosY = Math.cos(yaw);

  if(G.camMode===0){
    // 3rd person chase — dynamic distance
    const dist = 9 + G.speed*80;
    const height = 4 + G.py;
    camPos.set(G.px - sinY*dist, G.py+height, G.pz - cosY*dist);
    camera.position.lerp(camPos, 0.12);
    camLook.set(G.px+sinY*5, G.py+1.5, G.pz+cosY*5);
    camera.lookAt(camLook);
  } else if(G.camMode===1){
    // 1st person (inside car)
    camPos.set(G.px+sinY*0.3, G.py+1.1, G.pz+cosY*0.3);
    camera.position.lerp(camPos, 0.25);
    camLook.set(G.px+sinY*12, G.py+0.9, G.pz+cosY*12);
    camera.lookAt(camLook);
  } else {
    // Cinematic — offset side + height
    const side = Math.PI/2;
    camPos.set(G.px+Math.sin(yaw+side)*14, G.py+5, G.pz+Math.cos(yaw+side)*14);
    camera.position.lerp(camPos, 0.04);
    camera.lookAt(G.px, G.py+0.5, G.pz);
  }
}

// ── HUD UPDATE ────────────────────────────────────────────────────
function updateHUD(dt){
  const kph = Math.round(Math.abs(G.speed) / G.maxSpeed * 280);
  document.getElementById('sval').textContent = kph;
  const arc = document.getElementById('sarc');
  arc.setAttribute('stroke-dashoffset', (335 - 335*kph/280).toFixed(1));

  const gearThresh = [0, 0.15,0.30,0.50,0.70,0.88,1.0];
  const ratio = G.speed/G.maxSpeed;
  const gIdx = gearThresh.findIndex((t,i)=>ratio<gearThresh[i+1]&&ratio>=t);
  document.getElementById('gear-d').textContent = G.speed<=0?'R':(gIdx<=0?'1':String(gIdx+1));

  document.getElementById('nf').style.width = G.nitro+'%';
  const overheat = G.nitroHeat>80;
  document.getElementById('nf').style.background = overheat?'#ff2200':'';
  document.getElementById('nh-label').textContent = overheat?'⚠ OVERHEAT':G.nitro>60?'READY':'CHARGING';

  document.getElementById('df').style.width = (100-G.damage)+'%';
  document.getElementById('pos-val').innerHTML = G.position+'<span style="font-size:18px;opacity:0.4">/6</span>';
  document.getElementById('lap-num').textContent = `LAP ${Math.min(G.lap,G.totalLaps)} / ${G.totalLaps}`;

  if(G.lapStart>0){
    const elapsed = performance.now()-G.lapStart;
    const s=Math.floor(elapsed/1000), ms=Math.floor(elapsed%1000);
    document.getElementById('lap-time').textContent=`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}.${ms.toString().padStart(3,'0')}`;
  }
  if(G.bestLap<Infinity){
    const s2=Math.floor(G.bestLap/1000), ms2=Math.floor(G.bestLap%1000);
    document.getElementById('best-time').textContent=`BEST: ${Math.floor(s2/60)}:${(s2%60).toString().padStart(2,'0')}.${ms2.toString().padStart(3,'0')}`;
  }

  // Speed lines
  const slc = document.getElementById('sl-canvas');
  slc.style.opacity = ratio>0.7 ? Math.min(1,(ratio-0.7)*3.3).toFixed(2) : 0;

  // Nitro flash
  if(keys['ShiftLeft']||keys['ShiftRight']){
    document.getElementById('nitro-flash').style.opacity = G.nitroHeat<80 ? '0.08' : '0';
  } else {
    document.getElementById('nitro-flash').style.opacity = '0';
  }

  // Random events
  G.eventTimer--;
  if(G.eventTimer<=0){ triggerEvent(); G.eventTimer = 700+Math.random()*600; }
}

function triggerEvent(){
  const evts=[
    {t:'⚡ EMP ZONE!',s:'NITRO OFFLINE',a:()=>{ G.nitro=Math.max(0,G.nitro-40); }},
    {t:'🚓 POLICE!',s:'PURSUIT ENGAGED',a:()=>{}},
    {t:'💥 DEBRIS!',s:'TAKE EVASIVE ACTION',a:()=>{ G.damage=Math.min(100,G.damage+8); flashDamage(); }},
    {t:'🌊 OIL SPILL!',s:'TRACTION LOSS',a:()=>{ G.lateralVel+=(Math.random()-0.5)*0.15; }},
  ];
  const e=evts[Math.floor(Math.random()*evts.length)];
  showEvent(e.t,e.s); e.a();
}

// ── SPEED LINES ────────────────────────────────────────────────────
const slc = document.getElementById('sl-canvas');
slc.width = innerWidth; slc.height = innerHeight;
const slCtx = slc.getContext('2d');
const SL = Array.from({length:100},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  len:40+Math.random()*180, spd:20+Math.random()*40, a:Math.random()*0.3
}));

function drawSpeedLines(){
  slCtx.clearRect(0,0,innerWidth,innerHeight);
  const opacity = parseFloat(slc.style.opacity||0);
  if(opacity<=0) return;
  SL.forEach(l=>{
    l.x -= l.spd;
    if(l.x<-l.len){ l.x=innerWidth+l.len; l.y=Math.random()*innerHeight; }
    const g=slCtx.createLinearGradient(l.x,l.y,l.x+l.len,l.y);
    g.addColorStop(0,`rgba(255,200,150,0)`);
    g.addColorStop(1,`rgba(255,220,180,${l.a*opacity})`);
    slCtx.strokeStyle=g; slCtx.lineWidth=1.2;
    slCtx.beginPath(); slCtx.moveTo(l.x,l.y); slCtx.lineTo(l.x+l.len,l.y); slCtx.stroke();
  });
}

// ── MINIMAP ────────────────────────────────────────────────────────
const mmCtxEl = document.getElementById('mm-canvas');
const mmC = mmCtxEl.getContext('2d');

function drawMinimap(){
  if(!trackSpline) return;
  mmC.clearRect(0,0,110,110);
  mmC.fillStyle='rgba(0,0,0,0.75)';
  mmC.fillRect(0,0,110,110);
  const pts=trackSpline.getPoints(80);
  const xs=pts.map(p=>p.x), zs=pts.map(p=>p.z);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const minZ=Math.min(...zs),maxZ=Math.max(...zs);
  const sc=Math.min(90/(maxX-minX),90/(maxZ-minZ));
  const ox=10, oz=10;
  const tm=(x,z)=>[(x-minX)*sc+ox,(z-minZ)*sc+oz];

  mmC.strokeStyle='rgba(255,200,100,0.35)'; mmC.lineWidth=2.5;
  mmC.beginPath();
  pts.forEach((p,i)=>{ const [mx,mz]=tm(p.x,p.z); i===0?mmC.moveTo(mx,mz):mmC.lineTo(mx,mz); });
  mmC.closePath(); mmC.stroke();

  // AI
  aiCars.forEach(ai=>{
    const [mx,mz]=tm(ai.position.x,ai.position.z);
    mmC.fillStyle='#ff4400'; mmC.beginPath(); mmC.arc(mx,mz,2.5,0,Math.PI*2); mmC.fill();
  });
  // Player
  const [pmx,pmz]=tm(G.px,G.pz);
  mmC.fillStyle='#ffffff'; mmC.beginPath(); mmC.arc(pmx,pmz,4,0,Math.PI*2); mmC.fill();
  // Direction arrow
  mmC.strokeStyle='#ff6600'; mmC.lineWidth=1.5;
  mmC.beginPath(); mmC.moveTo(pmx,pmz);
  mmC.lineTo(pmx+Math.sin(G.carYaw)*8, pmz+Math.cos(G.carYaw)*8); mmC.stroke();
}

// ── GAME LOOP ──────────────────────────────────────────────────────
let lastTS = 0;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  const dt = Math.min(ts-lastTS, 50);
  lastTS = ts;
  if(G.running){
    updatePlayer(dt);
    updateAI(dt);
    updateSmoke();
    updateCamera();
    updateHUD(dt);
    drawSpeedLines();
    drawMinimap();
  }
  renderer.render(scene, camera);
}
requestAnimationFrame(gameLoop);

// ── GARAGE UI ─────────────────────────────────────────────────────
function buildGarageUI(){
  document.getElementById('money-disp').textContent = SAVE.money.toLocaleString();
  const list = document.getElementById('car-list');
  list.innerHTML = '';
  CAR_CATALOGUE.forEach(car=>{
    const div=document.createElement('div');
    div.className='car-item'+(SAVE.selectedCar===car.id?' selected':'')+(SAVE.ownedCars.includes(car.id)?'':' locked');
    div.innerHTML=`<div class="car-emoji">${car.emoji}</div><div style="font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:${SAVE.selectedCar===car.id?'#ff6600':'rgba(255,255,255,0.6)'}">${car.name}</div>${!SAVE.ownedCars.includes(car.id)?`<div style="font-size:8px;color:#ffd700;margin-top:2px;">💰 ${car.price.toLocaleString()}</div>`:''}`;
    div.onclick=()=>{
      if(SAVE.ownedCars.includes(car.id)){
        SAVE.selectedCar=car.id;
        buildGarageUI();
        showCarUpgrades(car.id);
      } else if(SAVE.money>=car.price){
        SAVE.money-=car.price; SAVE.ownedCars.push(car.id); SAVE.selectedCar=car.id;
        buildGarageUI(); showCarUpgrades(car.id);
      } else {
        alert('Not enough money!');
      }
    };
    list.appendChild(div);
  });
  showCarUpgrades(SAVE.selectedCar);
}

function showCarUpgrades(carId){
  const car=CAR_CATALOGUE.find(c=>c.id===carId);
  if(!car) return;
  const upgLvls=SAVE.upgrades[carId]||{};
  const stats=getCarStats();
  document.getElementById('upg-car-name').textContent=car.name+' '+car.emoji;
  const statsDiv=document.getElementById('upg-stats');
  statsDiv.innerHTML='';
  const statKeys=[['speed','SPEED',0xff6600],['accel','ACCEL',0x00ff88],['handling','HANDLING',0x00aaff],['nitro','NITRO',0xff00aa]];
  statKeys.forEach(([key,label,col])=>{
    const val=Math.min(10,stats[key]);
    const div=document.createElement('div');
    div.className='stat-row';
    div.innerHTML=`<div class="stat-name">${label}</div><div class="stat-track"><div class="stat-fill" style="width:${val*10}%;background:#${col.toString(16).padStart(6,'0')}"></div></div><div style="font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(255,255,255,0.4);width:24px;text-align:right">${val.toFixed(1)}</div>`;
    statsDiv.appendChild(div);
  });
  const btnsDiv=document.getElementById('upg-buttons');
  btnsDiv.innerHTML='';
  UPGRADES.forEach(u=>{
    const lv=upgLvls[u.id]||0;
    const div=document.createElement('div');
    div.style.cssText='display:flex;flex-direction:column;gap:4px;align-items:center;';
    const pips=Array.from({length:u.maxLv},(_,i)=>`<div style="width:10px;height:10px;border-radius:50%;background:${i<lv?'#ff6600':'rgba(255,255,255,0.1)'}"></div>`).join('');
    const cost=u.cost*(lv+1);
    div.innerHTML=`
      <div style="font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.5);">${u.name}</div>
      <div style="display:flex;gap:3px;">${pips}</div>
      <div style="font-size:8px;color:#ffd700;">${lv>=u.maxLv?'MAX':'💰'+cost}</div>
      ${lv<u.maxLv?`<button class="upg-btn" onclick="buyUpgrade('${carId}','${u.id}',${cost})">UPGRADE</button>`:''}
    `;
    btnsDiv.appendChild(div);
  });
}

function buyUpgrade(carId,upgId,cost){
  if(SAVE.money<cost){ alert('Not enough money!'); return; }
  SAVE.money-=cost;
  if(!SAVE.upgrades[carId]) SAVE.upgrades[carId]={};
  SAVE.upgrades[carId][upgId]=(SAVE.upgrades[carId][upgId]||0)+1;
  buildGarageUI();
}

// ── RACE FLOW ─────────────────────────────────────────────────────
function startRace(trackId){
  G.track=trackId;
  G.running=false; G.raceFinished=false;
  G.lap=1; G.lapStart=0; G.lapTime=0; G.bestLap=Infinity;
  G.speed=0; G.vx=0; G.vz=0; G.vy=0;
  G.nitro=100; G.nitroHeat=0; G.damage=0; G.position=1;
  G.lateralVel=0; G.driftTime=0; G.airTime=0; G.onGround=true;
  G.eventTimer=800; G._lapCooldown=false;
  G.totalLaps = TRACK_DATA[trackId].laps;

  showScreen('_none_');
  document.getElementById('hud').classList.remove('hidden');

  buildScene(trackId);

  // Countdown
  const cd=document.getElementById('countdown');
  const cdNum=document.getElementById('cd-num');
  cd.classList.remove('hidden');
  let cnt=3; cdNum.textContent='3'; cdNum.style.color='#fff';
  const iv=setInterval(()=>{
    cnt--;
    if(cnt===0){
      cdNum.textContent='GO!'; cdNum.style.color='#00ff88';
      cdNum.style.animation='none'; void cdNum.offsetWidth; cdNum.style.animation='cdpop 0.5s ease-out';
      setTimeout(()=>{ cd.classList.add('hidden'); G.running=true; G.lapStart=performance.now(); },700);
      clearInterval(iv);
    } else {
      cdNum.textContent=cnt; cdNum.style.color='#fff';
      cdNum.style.animation='none'; void cdNum.offsetWidth; cdNum.style.animation='cdpop 0.6s ease-out';
    }
  },1000);
}

function finishRace(){
  G.running=false; G.raceFinished=true;
  const earnings = Math.max(0, (7-G.position)*800);
  SAVE.money += earnings;
  setTimeout(()=>{
    showScreen('results-screen');
    const title=document.getElementById('res-title');
    const posLabels=['🏆 VICTORY!','2ND PLACE','3RD PLACE','4TH PLACE','5TH PLACE','6TH PLACE'];
    title.textContent=posLabels[G.position-1]||`${G.position}TH PLACE`;
    title.style.color=G.position===1?'#ffd700':G.position<=3?'#ff8800':'#aaaaaa';
    title.style.textShadow=G.position===1?'0 0 30px #ffd700':'none';
    const bestFmt=G.bestLap<Infinity?`${Math.floor(G.bestLap/60000)}:${Math.floor((G.bestLap%60000)/1000).toString().padStart(2,'0')}.${Math.floor(G.bestLap%1000).toString().padStart(3,'0')}`:'--';
    document.getElementById('res-content').innerHTML=`
      <div class="rstat">TRACK <span>${TRACK_DATA[G.track].name}</span></div>
      <div class="rstat">FINISH POSITION <span>${G.position} / 6</span></div>
      <div class="rstat">BEST LAP <span>${bestFmt}</span></div>
      <div class="rstat">HULL INTEGRITY <span>${Math.round(100-G.damage)}%</span></div>
      <div class="rstat">EARNINGS <span>💰 +${earnings.toLocaleString()}</span></div>
      <div class="rstat" style="margin-top:12px;">TOTAL MONEY <span>💰 ${SAVE.money.toLocaleString()}</span></div>
    `;
  },1200);
  showEvent('CHECKERED FLAG!','RACE COMPLETE');
}

// Hook garage screen show
document.getElementById('garage-screen').addEventListener('transitionend',()=>{});
const garageBtn = document.querySelector('[onclick="showScreen(\'garage-screen\')"]');

// Override showScreen to build garage on show
const _origShowScreen = window.showScreen;
window.showScreen = function(id){
  _origShowScreen(id);
  if(id==='garage-screen') buildGarageUI();
};

// Init
buildGarageUI();
showScreen('main-menu');
</script>
